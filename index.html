condition prescrire des formules nutritives, des vitamines ou des minéraux","c":false},{"t":"Il n'existe aucune loi qui régit l'ostéopathie telle qu'elle est pratiquée au Québec","c":true},{"t":"Un physiothérapeute peut prescrire des médicaments liés aux traitements de physiothérapie qu'il prodigue","c":false}],"f":"Bonne réponse![10.6 Reconnaître les limites et restrictions au droit de prescrire selon le type de professionnel concerné]"},{"i":"06836","c":10,"q":"Même si le médecin est autorisé, au sens de la loi, à prescrire des médicaments, il arrive que certaines restrictions s’appliquent. Le pharmacien se doit de reconnaître ces situations. Parmi les énoncés suivants entourant les limites au droit de prescrire des médecins, lequel est FAUX?","a":[{"t":"Certains médecins sont inscrits sur une liste faisant en sorte qu'ils ne peuvent pas prescrire tous les médicaments","c":false},{"t":"Les résidents peuvent émettre des ordonnances, dans le cadre de leur formation, pour un patient hospitalisé ou externe d'un établissement","c":false},{"t":"Le pharmacien québécois ne peut exécuter une ordonnance d’un médecin sur un navire à moins que celui-ci obtienne une autorisation de Santé Canada","c":true},{"t":"Un résident en médecine n’est pas autorisé à rédiger une ordonnance pour famille et amis","c":false}],"f":"L’énoncé est FAUX!Le médecin doit obtenir une autorisation temporaire d’exercer en s’adressant au Collège des médecins du Québec (CMQ) pour que ses ordonnances soient valides au Québec. Cette autorisation n’est valide que pour l’équipage dudit navire."},{"i":"06837","c":10,"q":"En vertu de la Loi sur la pharmacie, le pharmacien a comme responsabilité de surveiller la thérapie médicamenteuse. Parmi les énoncés suivants entourant la surveillance de la thérapie médicamenteuse, lequel est VRAI?","a":[{"t":"L'adhésion au traitement n'est généralement pas un souci des pharmaciens lors de la surveillance de la thérapie médicamenteuse","c":false},{"t":"La surveillance de la thérapie médicamenteuse est une activité réservée aux pharmaciens et ne concerne donc aucun autre professionnel de la santé","c":false},{"t":"Lorsqu’il procède à la surveillance de la thérapie médicamenteuse, le pharmacien ne doit garder en tête que les objectifs thérapeutiques","c":false},{"t":"La surveillance de la thérapie médicamenteuse doit mener à l'analyse et à l'élaboration d'un plan d'action formel ou informel permettant au pharmacien de mesurer l'impact de ses activités sur le bien-être et la qualité de vie de son patient","c":true}],"f":"Bonne réponse![10.7 Discuter du droit de prescrire, d’initier et d’ajuster la thérapie médicamenteuse par le pharmacien]"},{"i":"06838","c":10,"q":"Parmi les énoncés suivants entourant la prescription de la contraception orale d’urgence (COU) par le pharmacien, lequel est FAUX?","a":[{"t":"La COU peut être prescrite en prévention","c":false},{"t":"Il est interdit de servir la COU à une tierce personne, à moins de vérifier clairement le consentement de la personne à être traitée","c":false},{"t":"Un pharmacien a le droit de s’opposer, pour des raisons religieuses ou morales, à l’utilisation de la COU, à condition qu'il réfère la patiente à un autre professionnel pouvant lui fournir le service","c":false},{"t":"Le pharmacien doit permettre la consultation du dossier d'un mineur par son parent ou son tuteur légal, sans exception","c":true}],"f":"L'énoncé est FAUX!Le pharmacien doit permettre la consultation du dossier À MOINS QU’il ait des motifs valables de croire que ceci peut causer un préjudice à l’enfant"},{"i":"06839","c":10,"q":"Parmi les énoncés suivants entourant le concept d'ordonnance collective, lequel est FAUX?","a":[{"t":"Les médecins signataires de l'ordonnance collective sont responsables des actes posés dans le cadre de l'ordonnance collective","c":true},{"t":"Le médecin qui rédige une ordonnance collective doit s’abstenir de rechercher ou d’obtenir un avantage financier, à l’exception de ses honoraires","c":false},{"t":"Une ordonnance collective est toujours délivrée par écrit","c":false},{"t":"Un ou plusieurs médecins peuvent signer une ordonnance collective","c":false}],"f":"L'énoncé est FAUX!Les professionnels ou les personnes habilitées visés par l'ordonnance collective sont responsables des actes posés dans ce cadre"},{"i":"06840","c":10,"q":"Parmi les énoncés suivants entourant le droit des pharmaciens de prescrire des médicaments au Canada et aux États-Unis, lequel est FAUX?","a":[{"t":"Accorder le droit de prescrire à d'autres professionnels de la santé que médecins, dentistes et vétérinaire tient souvent de juridiction provinciale","c":false},{"t":"La plupart des états américains limitent le droit de prescrire des pharmaciens étant donné le manque de compétences dans ce domaine","c":true},{"t":"Historiquement, les pharmaciens américains ont eu le droit de prescrire les médicaments sans restriction jusqu'en 1951","c":false},{"t":"Un Statement on pharmacist prescribing a été adopté par la Société canadienne des pharmaciens d'hôpitaux (SCPH) en 2001","c":false}],"f":"L'énoncé est FAUX!La plupart des états américains MISENT sur le droit de prescrire des pharmaciens dans une perspective de collaboration active à la pharmacothérapie"},{"i":"06841","c":10,"q":"Parmi les énoncés suivants entourant les professions ayant le droit de prescrire des médicaments au Québec, lequel est VRAI?","a":[{"t":"Un résident en médecine peut rédiger une ordonnance dans un cadre externe à sa formation, comme un médecin est autorisé à le faire en dehors de son milieu de pratique","c":false},{"t":"L'optométriste est autorisé à prescrire des médicaments s'il satisfait à certaines conditions, mais n'est pas autorisé à les administrer","c":false},{"t":"Les inhalothérapeutes peuvent administrer et ajuster des médicaments lorsqu'ils font l'objet d'une ordonnance","c":true},{"t":"Un étudiant en médecine peut rédiger et signer des ordonnances dans le cadre de sa formation","c":false}],"f":"Bonne réponse![10.4 Identifier les professions ayant le droit de prescrire des médicaments au Québec]"},{"i":"06842","c":10,"q":"Parmi les énoncés suivants entourant la conformité des ordonnances faites par un médecin, lequel est FAUX?","a":[{"t":"Une ordonnance rédigée par ordinateur et sur laquelle le médecin appose sa signature (signature manuscrite numérisée) n’est pas acceptable","c":false},{"t":"L’ordonnance que rédige un médecin ne doit pas contenir un nom ou un logo de produits, de services ou de fournisseurs de produits ou de services","c":false},{"t":"Un médecin qui désire se procurer des médicaments pour usage professionnel auprès d'un pharmacien doit notamment inscrire la mention «usage professionnel» sur son ordonnance","c":false},{"t":"Le médecin qui délivre une ordonnance individuelle doit notamment y inclure l'indication","c":true}],"f":"L'énoncé est FAUX!Le médecin qui délivre une ordonnance individuelle N'a PAS à y inclure l'indication"},{"i":"06843","c":10,"q":"Parmi les énoncés suivants entourant la conformité des ordonnances rédigées par d'autres professionnels que les médecins, lequel est FAUX?","a":[{"t":"Un inhalothérapeute est habilité à prescrire des médicaments pour la cessation tabagique en vertu du Règlement sur certaines activités professionnelles pouvant être exercées par un inhalothérapeute","c":false},{"t":"Un vétérinaire qui rédige une ordonnance doit porter au dossier du client propriétaire de l'animal une copie conforme de l'ordonnance","c":false},{"t":"La rédaction d’une ordonnance faite par une infirmière praticienne spécialisée (IPQ) est encadrée par le Règlement sur les normes relatives aux ordonnances faites par un médecin","c":false},{"t":"La rédaction d'une ordonnance par un docteur en homéopathie est encadrée par le Règlement sur les normes relatives aux ordonnances faites par un médecin","c":true}],"f":"L'énoncé est FAUX!Les homéopathes (et non les docteurs en homéopathie) NE sont PAS autorisés à prescrire"},{"i":"06844","c":10,"q":"Parmi les énoncés suivants entourant la conformité des ordonnances rédigées par un pharmacien, lequel est FAUX?","a":[{"t":"Le pharmacien qui rédige une ordonnance soit y inscrire le motif de l'ordonnance","c":false},{"t":"Le pharmacien doit rayer d'un trait oblique la partie non utilisée de la feuille d'ordonnance","c":false},{"t":"Un pharmacien qui rédige une ordonnance pour un patient admis ou hébergé dans un établissement de santé n'est pas tenu d'y inscrire le nombre de renouvellements","c":false},{"t":"L’ordonnance que rédige un pharmacien ne peut inclure le nom d’une entreprise, à l'exception du nom et/ou du logo de la chaîne ou bannière à laquelle il est affilié","c":true}],"f":"L'énoncé est FAUX!L’ordonnance ne peut inclure le nom d’une entreprise avec laquelle le pharmacien est affilié, NOTAMMENT une chaîne ou une bannière"},{"i":"06845","c":10,"q":"Parmi les énoncés suivants entourant les limites et restrictions du droit de prescrire des différents professionnels de la santé, lequel est FAUX?","a":[{"t":"L’infirmière peut prescrire certains produits, médicaments et pansements reliés au traitement des plaies et aux altérations de la peau et des téguments","c":false},{"t":"Une infirmière-auxiliaire peut prescrire aux fins de la vaccination seulement","c":true},{"t":"Une diététiste peut déterminer le plan de traitement nutritionnel, incluant la voie d'alimentation appropriée","c":false},{"t":"Le dentiste ne doit fournir un service ou prescrire une ordonnance que si ceux-ci sont requis au point de vue dentaire","c":false}],"f":"L'énoncé est FAUX!Une infirmière-auxiliaire N'est PAS autorisé à prescrire des vaccins, mais peut les administrer"},{"i":"06846","c":10,"q":"Parmi les énoncés suivants entourant les limites et restrictions du droit de prescrire des différents professionnels de la santé, lequel est FAUX?","a":[{"t":"Par le passé, la pratique de l'ostéopathie au Québec a donné lieu à des poursuites et condamnations pour pratique illégales de la médecine","c":false},{"t":"Un physiothérapeute peut prescrire et administrer des médicaments topiques dans le cadre de l'exercice de sa profession","c":true},{"t":"Une sage-femme est habilitée à utiliser et à prescrire tous les médicaments requis aux fins de l’exercice de la pratique de sage-femme","c":false},{"t":"Seuls les optométristes qui détiennent des permis spéciaux obtenus après avoir complété une formation particulière, peuvent administrer ou prescrire des médicaments, que ce soit aux fins de réaliser un examen oculo-visuel ou que ce soit à des fins de traitement","c":false}],"f":"L'énoncé est FAUX!Un physiothérapeute NE peut PAS prescrire des médicaments topiques dans le cadre de l'exercice de sa profession, mais il peut en administrer"},{"i":"06847","c":10,"q":"Parmi les énoncés suivants entourant les conditions de santé pour lesquelles un pharmacien peut prescrire un médicament de façon autonome, lequel est FAUX?","a":[{"t":"Un pharmacien ne peut pas prescrire un médicament lorsque le problème de santé est accompagné d'une réaction inhabituelle au médicament","c":false},{"t":"Un pharmacien peut prescrire un traitement antiviral à un patient présentant des signes et symptômes s'apparentant au zona, sauf s'ils sont présents au niveau de la tête, mais doit le diriger vers un médecin ou une infirmière praticienne spécialisée dans les 3 jours suivant l'amorce du traitement","c":false},{"t":"Un pharmacien peut prescrire un médicament pour un patient qui été traité il y a moins de 5 ans pour dysménorrhée primaire","c":true},{"t":"Un pharmacien peut prescrire un médicament pour un patient qui été traité il y a moins de 5 ans pour érythème fessier","c":false}],"f":"L'énoncé est FAUX!Un pharmacien peut prescrire un médicament pour un patient qui été traité il y a moins de 2 ANS pour dysménorrhée primaire"},{"i":"06848","c":10,"q":"Le pharmacien, dans l’exercice de sa pratique, doit pouvoir identifier les professionnels qui peuvent prescrire et les limites applicables. Parmi les énoncés suivants entourant le droit de prescrire et les restrictions qui l’accompagnent, lequel est VRAI?","a":[{"t":"L’optométriste peut prescrire des gouttes pour les yeux à un chat","c":false},{"t":"Les dentistes peuvent prescrire des médicaments uniquement s’ils sont requis au point de vue dentaire","c":true},{"t":"Une sage-femme peut prescrire des antihypertenseurs à un homme de 42 ans nouvellement papa","c":false},{"t":"Un podiatre peut prescrire un onguent antibiotique pour appliquer sur le bras","c":false}],"f":"Bonne réponse![10.4 Identifier les professions ayant le droit de prescrire des médicaments au Québec]et[10.6 Reconnaître les limites et restrictions au droit de prescrire selon le type de professionnel concerné]"},{"i":"06849","c":10,"q":"Le pharmacien doit être en mesure de juger de la conformité d'une ordonnance. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"Un patient se présente à la pharmacie avec une ordonnance d'antibiotiques rédigée par un médecin américain; le pharmacien peut exécuter l'ordonnance","c":false},{"t":"Un patient se présente à la pharmacie et demande au pharmacien ce qu'il advient de ses ordonnances, car il vient d'apprendre le décès de son médecin de famille; le pharmacien lui répond que ses ordonnances deviennent alors invalides","c":false},{"t":"Un patient se présente avec une ordonnance de vitamines rédigée par un homéopathe; le pharmacien peut exécuter l'ordonnance","c":false},{"t":"Une patiente se présente à la pharmacie en demandant un transfert d'ordonnance d'anovulant (1 seule boîte), car elle est en visite au Québec et a oublié de renouveler son anovulant dans sa pharmacie ontarienne avant son départ; le pharmacien peut procéder au transfert","c":true}],"f":"Bonne réponse![10.5 Déterminer si une ordonnance de médicaments est conforme]et[10.6 Reconnaître les limites et restrictions au droit de prescrire selon le type de professionnel concerné]"},{"i":"06850","c":10,"q":"Parmi les énoncés suivants entourant la rédaction d'ordonnance par un pharmacien, lequel est FAUX?","a":[{"t":"Lorsque le pharmacien rédige une ordonnance pour un patient admis ou hébergé dans un établissement de santé, il peut y omettre d'inscrire le nombre de renouvellements","c":false},{"t":"Lorsque le pharmacien rédige une ordonnance pour une patiente ayant une infection urinaire et qui avait reçu un traitement pour cette indication il y a 8 mois, il n'a pas à communiquer avec le prescripteur initial pour l'en informer","c":true},{"t":"Le pharmacien qui rédige une ordonnance doit y inscrire le motif de l'ordonnance","c":false},{"t":"Le pharmacien pourrait rédiger une ordonnance pour une femme ayant reçu il y a 3 ans un traitement pour une vaginite à levure","c":false}],"f":"L'énoncé est FAUX!Lorsque le pharmacien rédige une ordonnance pour une patiente ayant une infection urinaire et qui avait reçu un traitement pour cette indication il y a 8 mois, il DOIT communiquer avec le prescripteur initial pour l'en informer"},{"i":"06851","c":10,"q":"Parmi les énoncés suivants entourant les activités réservées au pharmacien, lequel est FAUX?","a":[{"t":"Un pharmacien qui procède à une prolongation d'ordonnance ne peut pas la prolonger au-delà de 12 mois","c":false},{"t":"L'activité d'effectuer l'évaluation physique du patient est à plusieurs professionnels, dont le pharmacien","c":false},{"t":"L'activité de vendre des médicaments est exclusivement réservée au pharmacien","c":true},{"t":"Le pharmacien peut amorcer une thérapie médicamenteuse pour traiter des conditions mineures si la condition en question a déjà été traitée par le passé selon certaines conditions; toutefois, le prescripteur initial ne peut pas être un autre pharmacien","c":false}],"f":"L'énoncé est FAUX!L’activité de vendre des médicaments est réservée aux pharmaciens, aux VÉTÉRINAIRES, aux MÉDECINS (selon certaines conditions), aux INFIRMIÈRES (i.e. vaccins)"},{"i":"06919","c":11,"q":"En ce qui concerne l’approvisionnement de médicaments, lequel des énoncés suivants est VRAI?","a":[{"t":"Il n'y a pas d'obligations particulières relatives à l'approvisionnement de substances contrôlées","c":false},{"t":"La conservation des médicaments est notamment soumise au Règlement sur les conditions et modalités de vente des médicaments","c":true},{"t":"La mise en marché de médicaments est réglementée par la Loi sur les aliments et drogues, la Loi réglementant certaines drogues et autres substances et le Règlement sur l’étiquetage des médicaments et poisons","c":false},{"t":"Le pharmacien ne peut acheter un médicament que d’un grossiste détenteur d’une licence appropriée","c":false}],"f":"Bonne réponse![11.1 Définir les obligations en terme d’approvisionnement des médicaments]"},{"i":"06920","c":11,"q":"Parmi les énoncés suivants entourant l'étiquetage de médicaments, lequel est FAUX?","a":[{"t":"En vertu du Règlement sur l'étiquetage des médicaments et des poisons, une étiquette d'un médicament vendu sur ordonnance doit notamment contenir l'identification du patient, du prescripteur et du pharmacien, ainsi que les informations sur le médicament prescrit","c":false},{"t":"Les normes entourant l'étiquetage comportent quelques différences entre la pratique en officine et en établissement de santé","c":false},{"t":"Il est préférable d'obtenir l'autorisation du patient avant d'indiquer l'intention thérapeutique sur l'étiquette","c":false},{"t":"L'identification du médicament sur l'étiquette doit comprendre la dénomination commerciale et la dénomination commune","c":true}],"f":"L'énoncé est FAUX!L'identification du médicament sur l'étiquette doit comprendre la dénomination commerciale OU la dénomination commune"},{"i":"06921","c":11,"q":"Parmi les énoncés suivants entourant la substitution, lequel est VRAI?","a":[{"t":"Lorsque le pharmacien procède à une substitution thérapeutique, le prescripteur de la nouvelle ordonnance demeure le prescripteur initial puisque le diagnostic a été posé par ce dernier","c":false},{"t":"Il n'est pas nécessaire de communiquer avec le prescripteur lorsqu'un pharmacien procède à une substitution thérapeutique","c":false},{"t":"Le gouvernement du Canada est responsable de déterminer l'équivalence thérapeutique des médicaments","c":false},{"t":"Un pharmacien ne doit pas procéder à une substitution si le prescripteur l'a interdit de sa main sur l'ordonnance","c":true}],"f":"Bonne réponse![11.4 Identifier les principes de la substitution et les obligations]"},{"i":"06922","c":11,"q":"Afin d'assurer la protection du public, le Règlement sur les conditions et modalités de vente des médicaments précise la nature du contrôle pharmaceutique exercé pour la vente de médicaments. Parmi les énoncés suivants entourant les conditions et modalités de vente, lequel est FAUX?","a":[{"t":"Le pharmacien doit constituer un dossier pour chaque patient à qui il vend un médicament inscrit à l'annexe I","c":false},{"t":"Un médicament inscrit à l'annexe IV ne peut être vendu que sur ordonnance d'un médecin vétérinaire","c":false},{"t":"Le Règlement sur les conditions et modalités de vente des médicaments comporte 4 annexes","c":true},{"t":"Les médicaments inscrits à l'annexe II du Règlement sur les conditions et modalités de vente des médicaments doivent être conservés dans une section de la pharmacie qui n'est pas accessible au public","c":false}],"f":"L'énoncé est FAUX!Le Règlement sur les conditions et modalités de vente des médicaments comporte 5 ANNEXES"},{"i":"06923","c":11,"q":"Le Guide de distribution de médicaments prescrits à l’école primaire trace les balises pour gérer plus harmonieusement la distribution de médicaments en milieu scolaire. Parmi les énoncés suivants entourant la législation applicable aux médicaments utilisés en garderie et en milieu scolaire, lequel est VRAI?","a":[{"t":"Le Guide de distribution de médicaments prescrits à l'école primaire inclut les médicaments utilisés lors de réactions anaphylactiques","c":false},{"t":"En vertu du Règlement sur les garderies, un membre du personnel ne peut administrer un médicament sans l’autorisation écrite du parent et d’un membre du Collège des médecins du Québec (CMQ)","c":true},{"t":"En vertu du Règlement sur les garderies, le titulaire d'un permis de garderie doit entreposer les médicaments dans une armoire en hauteur; il n'est pas nécessaire qu'elle soit sous clé, mais ne doit pas être accessible aux enfants","c":false},{"t":"En vertu du Code des professions, seule l’administration de médicaments prescrits par voie orale est permise","c":false}],"f":"Bonne réponse![11.6 Identifier les situations particulières liées à l’exécution d’ordonnances]"},{"i":"06924","c":11,"q":"La vente de seringues à des fins non thérapeutiques est une pratique de plus en plus courante dans les pharmacies du Québec. Parmi les énoncés suivants entourant cette pratique, lequel est FAUX?","a":[{"t":"L’Ordre des pharmaciens du Québec (OPQ) encourage les pharmaciens à mettre sur pied des programmes de récupération de matériel d’injection contaminé","c":false},{"t":"Le pharmacien qui distribue des seringues et aiguilles à des utilisateurs de drogues par injection pose un acte compatible avec son rôle de professionnel de la santé","c":false},{"t":"Un pharmacien peut devenir un centre d'accès au matériel d'injection (CAMI)","c":false},{"t":"La distribution de matériel d'injection aux utilisateurs de drogues injectables peut se faire uniquement par le pharmacien et ne peut pas être déléguée à un assistant technique en pharmacie (ATP)","c":true}],"f":"L'énoncé est FAUX!La distribution peut se faire directement par un ATP au laboratoire"},{"i":"06925","c":11,"q":"Le pharmacien doit connaître toutes les modalités quant à la gestion des substances ciblées afin de mieux servir sa clientèle et pour respecter le cadre législatif applicable. Parmi les énoncés suivants entourant les substances ciblées en pharmacie d’officine, lequel est VRAI?","a":[{"t":"Lors de la réception d’une substance ciblée, le pharmacien doit obligatoirement conserver les factures ou copies de factures ensemble et les classer par ordre chronologique","c":true},{"t":"Les résidents en médecine ne peuvent pas prescrire de substance ciblée","c":false},{"t":"En plus de respecter les exigences relatives au Règlement sur l’étiquetage des médicaments, les substances ciblées doivent être étiquetées conformément au Règlement sur l’étiquetage des substances ciblées en pharmacie communautaire","c":false},{"t":"L’ordonnance pour une substance ciblée doit absolument être écrite","c":false}],"f":"Bonne réponse![11.7 Décrire les modalités en matière de gestion des substances ciblées en officine]"},{"i":"06926","c":11,"q":"Le pharmacien doit savoir distinguer la fabrication de médicaments de la préparation de médicaments. Parmi les énoncés suivants entourant ces deux concepts, lequel est FAUX?","a":[{"t":"Au Québec, la préparation de médicaments relève de la Loi sur la pharmacie","c":false},{"t":"La norme 95.01 est une norme sur la préparation des produits stériles en pharmacie","c":false},{"t":"La fabrication des médicaments relève de la législation provinciale","c":true},{"t":"En vertu des normes et règlements applicables, une pharmacie peut préparer une drogue en quantité très limitée en prévision d’une ordonnance","c":false}],"f":"L'énoncé est FAUX!La fabrication des médicaments relève de la législation FÉDÉRALE"},{"i":"06927","c":11,"q":"En tant que futur pharmacien, vous devez connaître les précautions relatives à la manipulation de médicaments dangereux. Parmi les énoncés suivants entourant les médicaments dangereux, lequel est VRAI?","a":[{"t":"Il est possible de vendre une fiole de méthotrexate directement au patient pour qu’il le prépare lui-même","c":false},{"t":"Les distributeurs automatisés (ensacheuse, équipement de\nrobotisation, etc.) dont le mécanisme d’ensachage présente des risques de\ncontamination croisée ne doivent pas être utilisés pour compter les comprimés\nou capsules de médicaments antinéoplasiques","c":true},{"t":"Les médicaments dangereux peuvent pénétrer dans l’organisme uniquement par absorption cutanée ou par injection","c":false},{"t":"Il faut détruire les seringues et aiguilles utilisées pour l’administration des médicaments dangereux antinéoplasiques avec les déchets biomédicaux habituels","c":false}],"f":"Bonne réponse![11.11 Identifier les situations particulières reliées aux préparations magistrales]"},{"i":"06928","c":11,"q":"Parmi les énoncés suivants entourant la vente de vaccins aux infirmières, lequel est FAUX?","a":[{"t":"Les vaccins qui sont fournis à une infirmière ou un infirmier pour usage professionnel ne sont pas remis au nom d'un patient","c":false},{"t":"Lorsque le pharmacien vend des vaccins à une infirmière, le prix doit être juste et raisonnable et refléter notamment son niveau d'intervention ainsi que le contexte","c":false},{"t":"Il n'appartient pas au pharmacien de juger de la pertinence d'une activité de vaccination effectuée par une infirmière","c":false},{"t":"Le Protocole d'immunisation du Québec (PIQ) permet à l'infirmière qui procède à une activité de vaccination d'obtenir d'un pharmacien les vaccins nécessaires, selon certaines modalités","c":true}],"f":"L'énoncé est FAUX!Le Règlement sur les conditions et modalités de vente des médicaments permet à l'infirmière qui procède à une activité de vaccination d'obtenir d'un pharmacien les vaccins nécessaires, selon certaines modalités"},{"i":"06929","c":11,"q":"En 1990, l'Ordre a adopté la norme 90.03 sur l'utilisation du pilulier hebdomadaire. En ce qui concerne le pilulier, lequel des énoncés suivants est FAUX?","a":[{"t":"La décision de recourir au pilulier doit être individualisée en fonction de certaines considérations, dont l'absence de personnes-ressources sur lesquelles le patient pourrait compter pour suppléer à ses propres limites","c":false},{"t":"Les médicaments restants dans le pilulier au retour à la pharmacie doivent être jetés, le pharmacien ne pouvant en garantir ni l'identité, ni l'intégrité","c":false},{"t":"L'étiquetage du pilulier doit respecter les exigences du Règlement sur l'étiquetage des médicaments et des poisons","c":false},{"t":"Le pilulier doit être propre et sec au moment du remplissage, ce qui implique un nettoyage au moins hebdomadaire et un séchage approprié","c":true}],"f":"L'énoncé est FAUX!Le pilulier doit être propre et sec au moment du remplissage, ce qui implique un nettoyage au moins MENSUEL et un séchage approprié"},{"i":"06930","c":11,"q":"En ce qui concerne les différentes catégories de préparations magistrales non stériles, lequel des énoncés suivants est FAUX?","a":[{"t":"Les préparations magistrales de catégorie 2 excluent l'utilisation, comme ingrédients, des médicaments dangereux incluant les principes actifs sous forme de poudre","c":false},{"t":"La majorité des préparations magistrales effectuées en pharmacie sont de catégorie 1","c":false},{"t":"Un habillement particulier (sarrau propre réservé, gants, bonnet, couvre-barbe, masque) est obligatoire seulement pour la préparation des magistrales de catégorie 3","c":true},{"t":"En ce qui concerne les préparations magistrales de catégorie 1, les formes pharmaceutiques préparées sont liquides ou solides","c":false}],"f":"L'énoncé est FAUX!Cet habillement est obligatoire pour la préparation des magistrales de catégories 1, 2 et 3"},{"i":"06931","c":11,"q":"Parmi les énoncés suivants entourant les ordonnances et la continuité des soins dans un contexte ambulatoire, lequel est FAUX?","a":[{"t":"Dans le cas d'un patient qui reçoit la nutrition parentérale à domicile, c'est le pharmacien d'établissement de santé qui choisit la pharmacie communautaire du patient afin de s'assurer qu'elle offre des services appropriés dans ce domaine spécialisé","c":true},{"t":"Le pharmacien préparateur est celui qui exécute ou supervise l’exécution des préparations magistrales selon les ordonnances émises à la pharmacie où il travaille ou pour un pharmacien d’une autre pharmacie qui lui a demandé de le faire","c":false},{"t":"Comme le pharmacien communautaire est le professionnel le mieux placé pour assurer la surveillance de la thérapie médicamenteuse du patient, il s’avère le professionnel responsable de cette activité, et ce, même si d’autres pharmaciens ou d’autres professionnels sont impliqués auprès du patient","c":false},{"t":"Le fait, pour un pharmacien en établissement de santé responsable du service d’antibiothérapie à domicile, de traiter directement avec une pharmacie préparatrice, sans impliquer le pharmacien communautaire du patient constitue un bris dans la continuité des soins","c":false}],"f":"L'énoncé est FAUX!Le patient doit toujours avoir le libre choix du pharmacien\nqui assurera le service pharmaceutique dans la communauté"},{"i":"06932","c":11,"q":"Parmi les énoncés suivants entourant la date limite d'utilisation (DLU) des médicaments, lequel est FAUX?","a":[{"t":"Aucun médicament ne devrait être distribué si la période de stabilité déterminée par le pharmacien est inférieure à la durée de traitement","c":false},{"t":"En l'absence d'information sur la date de péremption fixée par le fabricant, il faut indiquer une DLU de 3 mois","c":false},{"t":"L'expression «DLU» devrait être privilégié à l'expression «date de péremption»","c":false},{"t":"La date de péremption indiquée par le fabricant peut être utilisé lors d'un simple reconditionnement de médicament à partir du contenant original","c":true}],"f":"L'énoncé est FAUX!La date de péremption indiquée par le fabricant peut être utilisé s'il n'y a AUCUN reconditionnement par le pharmacien et s'il n'y a pas de risque d'altération ou de contamination du produit lors de l'utilisation par le patient"},{"i":"06933","c":11,"q":"Parmi les énoncés suivants entourant la vente de médicaments, lequel est VRAI?","a":[{"t":"Le pharmacien peut vendre de\nmédicaments à un centre d'enseignement aux fins de simulation de manipulation des médicaments","c":false},{"t":"Un pharmacien peut vendre des drogues contrôlées à un autre pharmacien sous certaines conditions","c":true},{"t":"Les pharmaciens de pratique privée peuvent vendre des médicaments à un technicien ambulancier","c":false},{"t":"Un pharmacien peut vendre en gros des médicaments pour usage sur un navire","c":false}],"f":"Bonne réponse![11.5 Décrire les modalités entourant la gestion des\nmédicaments selon les annexes]"},{"i":"06934","c":11,"q":"Parmi les énoncés suivants entourant les autotests, lequel est FAUX?","a":[{"t":"Tout comme pour les médicaments, Santé Canada a un processus d’homologation pour les autotests","c":false},{"t":"L'un des avantages des autotests est l'implication active du patient dans la prise en charge de sa santé","c":false},{"t":"L'un des inconvénients des autotests est le mode d'utilisation invasif, ce qui expose le patient à un risque de blessure","c":true},{"t":"Santé Canada regroupe les autotests en 3 types, dont les tests permettant de diagnostiquer un état physique","c":false}],"f":"L'énoncé est FAUX!L'un des AVANTAGES des autotests est le mode d'utilisation PEU intrusif"},{"i":"06935","c":11,"q":"Parmi les énoncés suivants entourant le trouble lié à l'utilisation d'opioïdes (TUO), lequel est FAUX?","a":[{"t":"L’Ordre des pharmaciens du Québec (OPQ) s'oppose à la mise en place d’un programme d’échange de timbres de fentanyl dans les pharmacies, notamment en raison de la complexité de gestion d'un tel système dans une pharmacie communautaire","c":true},{"t":"Au Canada, on estime qu'entre 60 000 et 90 000 personnes sont dépendantes des opiacés","c":false},{"t":"On estime que la moitié des patients dépendants de l’héroïne profitent ou ont accès à un\ntraitement à la méthadone","c":false},{"t":"Afin de contrer les surdoses aux opiacés et particulièrement au fentanyl, la RAMQ rembourse différents produits relatifs à la naxolone","c":false}],"f":"L'énoncé est FAUX!L’OPQ APPUIE la mise en\nplace d’un programme d’échange de timbres de fentanyl dans les pharmacies, mais\nce type de mesure ne devrait être envisagé que chez les patients pour lesquels\nle pharmacien le juge approprié"},{"i":"06936","c":11,"q":"Parmi les énoncés suivants entourant les produits hors annexe, lequel est FAUX?","a":[{"t":"Le médecin doit fournir au patient qui envisage de se soumettre à un traitement non reconnu une information objective qui lui permette de bien comprendre les avantages, les risques et les conséquences de ses choix","c":false},{"t":"Les produits hors annexes comportent exclusivement des produits de santé naturels et des remèdes homéopathiques","c":true},{"t":"Le pharmacien est responsable de déterminer s'il range les produits hors annexe dans la pharmacie ou dans le commerce adjacent","c":false},{"t":"Il est souhaitable de traiter l’ensemble des produits hors annexe comme faisant partie du dossier patient","c":false}],"f":"L'énoncé est FAUX!Les produits hors annexes comportent aussi des MÉDICAMENTS"},{"i":"06937","c":11,"q":"Parmi les énoncés suivants entourant la norme 2012.01 sur les préparations magistrales non stériles en pharmacie, lequel est FAUX?","a":[{"t":"Le remballage d’une crème ou d’un onguent dans un pot de grandeur appropriée à l’ordonnance du médecin est exclu de la norme 2012.01","c":false},{"t":"Au Québec, la préparation magistrale relève de l'Ordre des pharmaciens du Québec (OPQ)","c":false},{"t":"La norme 2012.01 sur les préparations magistrales non stériles exclut la reconstitution ou le mélange effectués conformément aux directives d’utilisation données sur l’étiquette d’un médicament homologue par Santé Canada","c":false},{"t":"La norme 2012.01 sur les préparations magistrales non stériles exclut la préparation de produits non médicamenteux, tels que des produits cosmétiques, alimentaires ou diététiques","c":true}],"f":"L'énoncé est FAUX!La norme sur les préparations magistrales non stériles INCLUT la préparation de produits non médicamenteux (cosmétiques, alimentaires\nou diététiques) par des pharmaciens"},{"i":"06938","c":11,"q":"La substitution n’est pas une obligation déontologique. Par contre, le \nrecours à celle-ci soumet le pharmacien à des obligations légales. Parmi\n les énoncés suivants entourant la substitution, lequel est FAUX?","a":[{"t":"Lorsqu’il procède à une substitution générique, le pharmacien doit l’inscrire au dossier du patient","c":false},{"t":"Lors d’une substitution générique, le pharmacien doit indiquer sur l’étiquette du médicament dispensé la dénomination commune et le nom du médicament innovateur","c":true},{"t":"La substitution thérapeutique n’est pas synonyme de substitution générique","c":false},{"t":"Le pharmacien doit éviter de procéder à une substitution si le prescripteur l’a interdit de sa main","c":false}],"f":"L’énoncé est FAUX!Rien dans la présente réglementation n’oblige le pharmacien à indiquer sur l’étiquette le nom de la marque innovatrice"},{"i":"06939","c":11,"q":"Parmi les énoncés suivants entourant les préparations magistrales, lequel est VRAI?","a":[{"t":"Lors de l'exécution d'une préparation magistrale non stérile de catégorie 1, il n'est pas nécessaire de porter des gants et un bonnet pour les cheveux","c":false},{"t":"Le pharmacien préparateur d'une magistrale, contrairement au pharmacien dispensateur, n'a pas à ouvrir un dossier pour le patient","c":true},{"t":"La norme 2012.01 sur les préparations magistrales non stériles en pharmacie inclut la reconstitution de médicaments homologué par Santé Canada","c":false},{"t":"Seuls les pharmaciens accrédités pour la préparation des médicaments stériles injectable peuvent envoyer aux États-Unis des médicaments stériles injectables","c":false}],"f":"Bonne réponse![11.10 Expliquer le cadre législatif en regard des\npréparations magistrales] et[11.11 Identifier les situations particulières reliées aux\npréparations magistrales]"},{"i":"06940","c":11,"q":"Parmi les énoncés suivants entourant la date limite d'utilisation (DLU) des médicaments, lequel est VRAI?","a":[{"t":"Les préparations magistrales non stériles contenant de l'eau constitue généralement un plus grand risque pour les patients, de sorte que la DLU devrait être plus courte","c":true},{"t":"En l’absence de données sur la stabilité de l’insuline mise en seringue en dehors d’une hotte à flux laminaire, la date limite d’utilisation (DLU) est de 30 jours","c":false},{"t":"La DLU des solutions oto-naso-ophtalmiques est de 60 jours à partir de la date du service","c":false},{"t":"En l'absence d'information sur la date de péremption fixée par le fabricant, indiquer une DLU maximale de 6 mois","c":false}],"f":"Bonne réponse![11.3 Décrire les normes en matière d’étiquetage et de\nconditionnement de médicaments]et[11.11 Identifier les situations particulières\nreliées aux préparations magistrales]"},{"i":"06941","c":11,"q":"Parmi les énoncés suivants entourant l'étiquetage de médicaments, lequel est FAUX?","a":[{"t":"Lors de l'exécution d'une ordonnance de substance ciblée, il n'y a aucune obligation supplémentaire en matière d'étiquetage par rapport aux pratiques habituelles","c":false},{"t":"L'identification d'un médicament peut se limiter au nom commercial ou au nom générique","c":false},{"t":"L'étiquette d'un médicament remis au patient doit comporter l'identification du prescripteur, soit nom et prénom, adresse et numéro de téléphone","c":true},{"t":"Il existe des différences entre le contenu d’une étiquette de médicament en pharmacie d’officine et en établissement de santé","c":false}],"f":"L'énoncé est FAUX!L'étiquette d'un médicament remis au patient doit comporter  le NOM et le PRÉNOM\ndu prescripteur"},{"i":"07005","c":12,"q":"Parmi les énoncés suivants entourant les définitions des concepts de morale, d'éthique, de bioéthique et de déontologie, lequel est FAUX?","a":[{"t":"On définit la bioéthique comme un champ d'étude et de recherches portant sur les enjeux éthiques posés par les progrès scientifiques et technologiques de la médecine et de l'ensemble des sciences de la vie","c":false},{"t":"La morale désigne les mœurs, la conduite de la vie et les règles de comportement","c":false},{"t":"On définit la déontologie comme étant l'ensemble des règles et devoirs qui régissent chaque citoyen au sein d'un ensemble","c":true},{"t":"On définit l'éthique clinique comme étant l'ensemble des principes qui guident la prise de décision dans des situations comportant des aspects éthiques problématiques auxquels les médecins sont confrontés au chevet de leurs patients","c":false}],"f":"L'énoncé est FAUX!On définit la déontologie comme étant l’ensemble des règles et des devoirs qui régissent une PROFESSION ou une FONCTION, la conduite de ceux qui l'exercent, les rapports entre ceux-ci et leurs clients ou le public, habituellement définis par un ordre professionnel"},{"i":"07006","c":12,"q":"En vertu des lois applicables, chaque Bureau d’un ordre professionnel doit adopter par règlement un code de déontologie. Parmi les énoncés suivants entourant les bases légales d’un code de déontologie, lequel est VRAI?","a":[{"t":"Les codes de déontologie québécois doivent contenir des dispositions interdisant formellement la publicité par les membres de leur ordre professionnel respectif","c":false},{"t":"Un code de déontologie doit contenir des dispositions visant à prévenir les conflits entre les membres d'un ordre","c":false},{"t":"Les lois professionnelles sont les textes clés qui obligent chaque Bureau d'un ordre professionnel à adopter un code de déontologie","c":false},{"t":"Un code de déontologie doit imposer au professionnel des devoirs d’ordre général et particulier envers le public, ses clients et sa profession","c":true}],"f":"Bonne réponse![12.2 Identifier les bases légales des codes de déontologie au Québec]"},{"i":"07007","c":12,"q":"Un code de déontologie est un texte pivot du cadre juridique de la pratique pharmaceutique. Parmi les énoncés suivants entourant la déontologie pharmaceutique, lequel est VRAI?","a":[{"t":"L'article 56 du Code de déontologie des pharmaciens précise qu'un pharmacien peut permettre l'utilisation de sa signature numérique pour autant qu'un protocole ait été établi avec ses délégataires","c":false},{"t":"L'article 33 du Code de déontologie des pharmaciens précise qu'un pharmacien doit évaluer et assurer l'usage approprié de la thérapie médicamenteuse afin de détecter et de prévenir les problèmes médicaux","c":false},{"t":"L'article 27 du Code de déontologie des pharmaciens précise que le pharmacien doit respecter le droit du patient de consulter un confrère, un autre professionnel ou une autre personne compétente","c":true},{"t":"L'article 74 du Code de déontologie des pharmaciens précise qu'un pharmacien doit donner suite, au plus tard dans les 15 jours de sa réception, à toute demande faite par un patient aux fins de corriger ou supprimer des renseignements inexacts à son dossier","c":false}],"f":"Bonne réponse![12.3 Identifier les éléments clés du code de déontologie des pharmaciens]"},{"i":"07008","c":12,"q":"Chaque pharmacien est tenu de respecter les dispositions du Code de déontologie des pharmaciens. Parmi les énoncés suivants entourant les différents articles de ce code, lequel est FAUX?","a":[{"t":"L’article 70 précise que le pharmacien doit donner suite avec diligence et au plus tard dans les 15 jours de sa réception à une demande d’un patient d’obtenir copie de son dossier-patient","c":false},{"t":"L’article 78 précise que l’exercice de la médecine, à moins d’exceptions prévues par la loi, est incompatible avec l’exercice de la pharmacie","c":false},{"t":"L’article 36 précise que le pharmacien qui fournit des services pharmaceutiques à un patient est responsable d’assurer le suivi requis, à moins de s’être assuré qu’un confrère ou un autre professionnel l’ait pris en charge","c":false},{"t":"L’article 16 précise que le pharmacien doit collaborer avec les autres professionnels de la santé en vue d’assurer une disponibilité et une continuité raisonnables des services de santé dans la région dans laquelle il exerce la pharmacie","c":true}],"f":"L'énoncé est FAUX!L’article 16 précise que le pharmacien doit collaborer avec les autres PHARMACIENS en vue d’assurer une disponibilité et une continuité raisonnables des services PHARMACEUTIQUES dans la région dans laquelle il exerce la pharmacie"},{"i":"07009","c":12,"q":"Parmi les énoncés suivants entourant les dispositions du Code de déontologie des pharmaciens, lequel est VRAI?","a":[{"t":"L’article 37 précise que le pharmacien doit obtenir l'autorisation du prescripteur avant de refuser d’exécuter une ordonnance","c":false},{"t":"L’article 63 indique dans quelles situations le pharmacien peut être relevé du secret professionnel","c":true},{"t":"L’article 48 précise que le pharmacien doit faire preuve de subjectivité lorsque des personnes autres que ses patients lui demandent de l'information","c":false},{"t":"L’article 106 permet au pharmacien d’utiliser une reproduction du symbole graphique de l’Ordre des pharmaciens du Québec (OPQ) dans une publicité sur ses services professionnels","c":false}],"f":"Bonne réponse![12.3 Identifier les éléments clés du code de déontologie des pharmaciens]"},{"i":"07010","c":12,"q":"Il existe plusieurs actes contraires à la déontologie professionnelle du pharmacien. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Un pharmacien qui vend ou qui permet que soient vendus des médicaments inutilisés qui lui ont été retournés contrevient aux articles 3, 9 et 10 du Code de déontologie des pharmaciens","c":true},{"t":"Un pharmacien qui permet que soit utilisée sa signature numérique par les employés de sa pharmacie contrevient à l'article 56 du Code de déontologie des pharmaciens","c":false},{"t":"Un pharmacien qui partage ses honoraires avec un non-pharmacien contrevient à l'article 56 du Code de déontologie des pharmaciens","c":false},{"t":"Un pharmacien qui verse un rabais à des patients sur des médicaments visés à l'annexe I du Règlement sur les conditions et modalités de vente des médicaments contrevient à l'article 50 du Code de déontologie des pharmaciens","c":false}],"f":"L'énoncé est FAUX!Un pharmacien qui vend ou qui permet que soient vendus des médicaments inutilisés qui lui ont été retournés contrevient aux articles 57 ET 58 du Code de déontologie des pharmaciens"},{"i":"07011","c":12,"q":"Il existe plusieurs actes contraires à la déontologie professionnelle du pharmacien. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Un pharmacien peut conserver des comprimés de Synthroid dans un autre contenant que leur contenant d'origine, sans que ce contenant soit étiqueté","c":false},{"t":"Un pharmacien peut collaborer avec l'homéopathe qui a un bureau dans le même immeuble d'où se trouve la pharmacie","c":false},{"t":"Un pharmacien peut refuser de faire parvenir à l'employeur de son patient les reçus relatifs aux services pharmaceutiques rendus à ce patient","c":true},{"t":"Un pharmacien peut vendre 3 plaquettes d'échantillons de Proscar 5 mg à son patient, au moment du renouvellement de l'ordonnance","c":false}],"f":"Bonne réponse!\n[12.4 Déterminer les gestes qui sont dérogatoires à la pratique pharmaceutique]"},{"i":"07012","c":12,"q":"En plus du Code de déontologie des pharmaciens, il existe d’autres sources de déontologie entourant la pratique de la pharmacie. Parmi les énoncés suivants entourant les diverses sources de déontologie en pharmacie, lequel est VRAI?","a":[{"t":"Le Conseil canadien de l'éducation permanente en pharmacie propose des lignes directrices sur l'éthique des relations entre les pharmaciens et les fabricants pharmaceutiques","c":false},{"t":"Les codes de déontologie sont des lignes directrices","c":false},{"t":"L’Association québécoise des pharmaciens propriétaires (AQPP) présente un code d’éthique précisant les pratiques à valoriser par le biais de 10 règles de conduite","c":true},{"t":"L’Association des pharmaciens du Canada présente un code d’éthique par rapport aux conflits d’intérêts","c":false}],"f":"Bonne réponse![12.5 Identifier d’autres sources de déontologie en pharmacie]"},{"i":"07013","c":12,"q":"Parmi les énoncés suivants entourant l'éthique professionnelle, lequel est FAUX?","a":[{"t":"L’éthique professionnelle se veut représenter une opportunité d’éveil aux responsabilités inhérentes à la profession de pharmacien et à son établissement","c":false},{"t":"Le code d'éthique est disciplinaire et a la portée d'un règlement","c":true},{"t":"L’éthique professionnelle s’appuie sur une série de valeurs, dont l’indépendance, le respect de l’autonomie du patient et l’intégrité des ententes contractuelles","c":false},{"t":"L'éthique professionnelle consiste à placer le patient au centre des préoccupations des professionnels au niveau des orientations et des décisions prises","c":false}],"f":"L'énoncé est FAUX!Le code d'éthique N'est PAS disciplinaire et N'a PAS la portée d'un règlement"},{"i":"07014","c":12,"q":"Parmi les énoncés suivants entourant les relations éthiques et commerciales qu'entretiennent les pharmaciens, lequel est FAUX?","a":[{"t":"La plupart des pharmaciens disent ne pas avoir de problèmes à expliquer aux patients les éléments permettant de déterminer le prix d’un médicament, mais que cette tâche demeure complexe pour le personnel technique","c":false},{"t":"Les pharmaciens disent ne pas ressentir de pression des représentants pharmaceutiques par rapport aux cartes qu’ils distribuent aux médecins et qui sont redistribués aux patients, puisque les médecins expliquent aux patients qu’il est possible que ces cartes soient refusées à la pharmacie","c":true},{"t":"La majorité des pharmaciens ne demandent pas le consentement du patient lors d’une demande de profil pharmacologique s’il est à l’urgence, et que la demande provient d'une infirmière","c":false},{"t":"Les médecins qui ont des relations d’affaires avec des pharmaciens leur paieraient un loyer estimé juste et raisonnable dans le cadre d’une entente écrite respectant les règles du marché","c":false}],"f":"L'énoncé est FAUX!Les pharmaciens se disent PRIS entre des représentants pharmaceutiques qui proposent des cartes aux médecins, les médecins qui les donnent aux patients et les patients qui ne sont pas contents quand on les leur refuse"},{"i":"07015","c":12,"q":"Parmi les énoncés suivants entourant le jugement professionnel d'un pharmacien, lequel est FAUX?","a":[{"t":"Le jugement professionnel implique échanger des études de cas avec les membres de son équipe et d’autres professionnels","c":false},{"t":"Le jugement professionnel implique faire preuve d’ouverture, d’humilité et reconnaître ses limites","c":false},{"t":"Le jugement professionnel implique se mettre au centre des décisions afin de protéger soi-même en tant qu'individu et professionnel","c":true},{"t":"Le jugement professionnel implique garder en tête la littérature scientifique, les lois et règlements ainsi que les aspects éthiques","c":false}],"f":"L'énoncé est FAUX!Le jugement professionnel implique mettre le PATIENT au centre de ses décisions"},{"i":"07016","c":12,"q":"Parmi les énoncés suivants entourant l'annonce de rabais en pharmacie, lequel est VRAI?","a":[{"t":"Un pharmacien peut annoncer un rabais par la mention «solde» sur l'étiquette de prix du médicament","c":false},{"t":"Les chaînes et bannières peuvent annoncer les médicaments d'annexe III dans leur circulaire","c":true},{"t":"Le pharmacien qui désire offrir un médicament à moindre coût peut décider spontanément de mettre fin au rabais","c":false},{"t":"Un pharmacien peut accepter des coupons rabais sur les médicaments sous certaines conditions","c":false}],"f":"Bonne réponse![12.4 Déterminer les gestes qui sont dérogatoires à la pratique pharmaceutique]"},{"i":"07017","c":12,"q":"Parmi les énoncés suivants entourant les activités de formation admissibles ou non à la formation continue, lequel est FAUX?","a":[{"t":"La participation à un cours universitaire constitue une activité de formation continue admissible","c":false},{"t":"La rédaction d'un article scientifique qui a été publié constitue une activité de formation continue admissible","c":false},{"t":"La participation à des activités de promotion de la profession de pharmacien constitue une activité de formation continue admissible","c":true},{"t":"La participation à un colloque ou un congrès constitue une activité de formation continue admissible","c":false}],"f":"L'énoncé est FAUX!La participation à des activités de promotion de la profession de pharmacien NE constitue PAS une activité de formation continue admissible"},{"i":"07018","c":12,"q":"En vertu du volet «Maintien de la compétence, développement professionnel et activités de rayonnement et d’avancement de la profession» des standards de pratique de l'Ordre des pharmaciens du Québec (OPQ), 14 énoncés sont proposés. Parmi les associations suivantes entre les énoncés et les exigences qui leur sont associées, laquelle est FAUSSE?","a":[{"t":"Le pharmacien utilise et accroît ses connaissances sur les différents outils technologiques disponibles- Le pharmacien détermine et justifie ses besoins sur le plan de l’automatisation pour accroître l’efficacité et la sécurité de ses processus","c":false},{"t":"Le pharmacien est actif dans son milieu professionnel- Le pharmacien tient des réunions avec d’autres professionnels de son milieu ou de la région","c":false},{"t":"Le pharmacien participe à des activités de formation qui répondent à ses besoins-Le pharmacien consulte les sources documentaires les plus fiables et appropriées en fonction d’un besoin particulier","c":true},{"t":"Le pharmacien fait preuve d’éthique professionnelle- Le pharmacien est altruiste et transparent dans l’exercice de sa profession","c":false}],"f":"L'association est FAUSSE!Cette exigence est associée à l'énoncé suivant : le pharmacien sélectionne des sources documentaires pour répondre aux diverses demandes d’information qu’il reçoit"},{"i":"07019","c":12,"q":"Le programme d'accréditation pour les activités de formation continue en pharmacie de l'Ordre des pharmaciens du Québec (OPQ) comporte 8 critères. Parmi les critères suivants, lequel est ERRONÉ?","a":[{"t":"Le contenu de la formation est équilibré et présenté de façon objective","c":false},{"t":"La formation est évaluée par le participant","c":false},{"t":"La formation est dénuée d'influence sur le contenu des activités présentées","c":false},{"t":"Les objectifs d'apprentissage de l'activité de formation continue répondent à au moins 2 des caractéristiques suivantes : spécifiques, mesurables, atteignables par le participant et rattachés au contexte","c":true}],"f":"L'énoncé est FAUX!Les objectifs d'apprentissage de l'activité de formation continue répondent TOUTES les caractéristiques suivantes : spécifiques, mesurables, atteignables par le participant et rattachés au contexte"},{"i":"07020","c":12,"q":"Parmi les associations suivantes entre un acte dérogatoire et l'article du Code de déontologie des pharmaciens qui lui correspond, laquelle est VRAIE?","a":[{"t":"Un pharmacien qui tolère que de faux services de médicaments d'ordonnance soient inscrits au dossier d'une de ses employées dans le but de permettre à celle-ci de réclamer illégalement le remboursement de ces services auprès de son assureur contrevient à l'article 66 du Code de déontologie des pharmaciens","c":false},{"t":"Un pharmacien qui fait un usage immodéré d'alcool contrevient à l'article 14 du Code de déontologie des pharmaciens","c":true},{"t":"Un pharmacien qui permet qu'une entreprise commerciale l'identifie dans une publicité à des fins commerciales destinées au public contrevient à l'article 100 du Code de déontologie des pharmaciens","c":false},{"t":"Un pharmacien qui néglige ses obligations de diligence et de vérification dans l'exécution des services pharmaceutiques relatifs à un médicament contrevient à l'article 81 du Code de déontologie des pharmaciens","c":false}],"f":"Bonne réponse!\n[12.3 Identifier les éléments clés du code de déontologie des pharmaciens]\net\n[12.4 Déterminer les gestes qui sont dérogatoires à la pratique pharmaceutique]"},{"i":"07021","c":12,"q":"Parmi les énoncés suivants entourant le Code de déontologie des pharmaciens, lequel est FAUX?","a":[{"t":"Le Code de déontologie des pharmaciens n'impose pas aux pharmaciens de participer aux programmes de fidélisation des fabricants de médicaments","c":false},{"t":"En vertu du Code de déontologie des pharmaciens, le pharmacien doit éviter les conversations indiscrètes au sujet d'un patient et des services pharmaceutiques qui lui sont fournis","c":false},{"t":"En vertu du Code de déontologie des pharmaciens, le pharmacien a le droit, dans certaines situations précises, de faire usage de renseignements de nature confidentielle au préjudice d'un patient","c":true},{"t":"Le pharmacien doit, dans ses rapports avec l'Ordre des pharmaciens du Québec (OPQ), se comporter avec dignité, courtoisie, respect et intégrité","c":false}],"f":"L'énoncé est FAUX!En vertu de l'article 67, le pharmacien ne doit pas faire usage de renseignements de nature confidentielle au préjudice d'un patient"},{"i":"07022","c":12,"q":"Parmi les énoncés suivants entourant les obligations déontologiques du pharmacien en matière de publicité, lequel est FAUX?","a":[{"t":"La publicité faite par le pharmacien ou en son nom ne doit pas comparer la qualité de ses services pharmaceutiques à ceux d'un autre pharmacien","c":false},{"t":"Une publicité faite par le pharmacien ou en son nom qui promeut la consommation de médicaments ne doit pas faire l’annonce d’un rabais ou de tout autre avantage applicable à l’achat d’un médicament","c":true},{"t":"Le pharmacien doit s’abstenir de faire ou permettre que soit faite en son nom une publicité portant sur un médicament visé aux annexes I ou II Règlement sur les conditions et modalités de vente des médicaments","c":false},{"t":"Le Code des professions encadre le contenu du code de déontologie des ordres professionnels, notamment en exigeant que ce code contienne des dispositions énonçant des conditions, des obligations et, le cas échéant, des prohibitions quant à la publicité faite par les membres","c":false}],"f":"L'énoncé est FAUX!La publicité faite par le pharmacien ou en son nom NE doit PAS promouvoir la consommation de médicaments; contrevient notamment à cette obligation toute annonce d’un rabais ou de tout autre avantage applicable à l’achat d’un médicament"},{"i":"07023","c":12,"q":"Parmi les énoncés suivants entourant les rabais de médicaments et les avantages perçus par un pharmacien, lequel est FAUX?","a":[{"t":"Il peut accepter un remerciement d'usage ou un cadeau de valeur modeste dans le cadre de l’exercice de sa profession","c":false},{"t":"Les pharmaciens peuvent accepter les coupons rabais sur les médicaments de vente libre uniquement, et ce sous certaines conditions","c":true},{"t":"Il est interdit d'utiliser la mention «rabais» pour annoncer un rabais de médicaments","c":false},{"t":"Le pharmacien ne doit accepter aucun avantage relatif à l'exercice de sa profession, en plus de la rémunération à laquelle il a droit","c":false}],"f":"L'énoncé est FAUX!Les pharmaciens NE peuvent PAS accepter les coupons rabais sur les médicaments"},{"i":"07084","c":13,"q":"Au niveau canadien, plusieurs dispositions légales encadrent la gestion de l’information. Parmi les énoncés suivants entourant ces lois et les personnes ou organismes ressources, lequel est FAUX?","a":[{"t":"La Loi sur la protection des renseignements personnels et les documents électroniques modifie la Loi sur la preuve au Canada, la Loi sur les textes réglementaires et la Loi sur la révision des lois","c":false},{"t":"Le Commissaire à la protection de la vie privée du Canada peut demander d’être entendu par la Cour Suprême du Canada s’il a été incapable de résoudre un différend","c":true},{"t":"La Loi sur les aliments et drogues et la Loi règlementant certaines drogues et autres substances présentent des dispositions relatives à la gestion de l’information applicable au domaine de la santé","c":false},{"t":"La Loi sur la protection des renseignements personnels a pour objet de compléter la législation canadienne en matière de protection des renseignements personnels relevant des institutions fédérales et de droit d’accès des individus aux renseignements personnels qui les concernent","c":false}],"f":"L’énoncé est FAUX!En fait,  le Commissaire à la protection de la vie privée du Canada peut demander d’être entendu par la Cour FÉDÉRALE du Canada s’il a été incapable de résoudre un différend."},{"i":"07085","c":13,"q":"La Loi sur les services de santé et les services sociaux comporte plusieurs dispositions sur les renseignements personnels et l’accès aux documents. Parmi les énoncés suivants entourant cette loi, lequel est VRAI?","a":[{"t":"En vertu de cette loi, les dossiers et les procès-verbaux du comité de gestion des risques et de la qualité sont accessibles au public","c":false},{"t":"En vertu de cette loi, l’accès au dossier d’un usager nécessite le consentement de ce dernier ou celui de la personne pouvant donner un consentement en son nom","c":true},{"t":"En vertu de cette loi, nul ne peut prendre connaissance des procès-verbaux d'un comité du conseil des médecins, dentistes et pharmaciens, sauf les employés de l’hôpital","c":false},{"t":"En vertu de cette loi, les dossiers et procès-verbaux du conseil des médecins, dentistes et infirmières sont confidentiels","c":false}],"f":"Bonne réponse![13.2 Identifier les principales lois applicables à la gestion de l’information au niveau québécois]"},{"i":"07086","c":13,"q":"Il existe plusieurs lois applicables à la gestion de l'information en santé au niveau québécois. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Le Code civil du Québec prévoit les modalités entourant le respect de la réputation et de la vie privée","c":false},{"t":"La Loi sur la protection des renseignements personnels dans le secteur privé s'applique autant aux pharmacies d'officine qu'aux pharmacies hospitalières","c":true},{"t":"La Loi sur les services de santé et les services sociaux précise les modalités entourant le dossier d'un usager, son accès et son utilisation en établissement de santé","c":false},{"t":"La Loi sur l'accès aux documents des organismes publics et sur la protection des renseignements personnels encadre notamment l'accès à l'information reliée à la pratique en pharmacie hospitalière","c":false}],"f":"L’énoncé est FAUX!La Loi sur la protection des renseignements personnels dans le secteur privé NE s’applique PAS aux pharmacies hospitalières"},{"i":"07087","c":13,"q":"Plusieurs organismes exigent des identifiants afin d’identifier une personne. Parmi les énoncés suivants entourant les identifiants, lequel est FAUX?","a":[{"t":"Le numéro d’assurance sociale (NAS) ne peut jamais être exigé par un employeur à moins qu’il s’agisse d’un employeur de la fonction publique (ex. : gouvernement fédéral, ministère, etc.)","c":true},{"t":"Le Code de la sécurité routière indique que le titulaire d’un permis de conduire n’est tenu de produire celui-ci qu’à la demande d’un agent de la paix ou de la Société de l’assurance automobile du Québec et à des fins de sécurité routière uniquement","c":false},{"t":"Un propriétaire peut procéder à une vérification d’identité, mais il ne peut recueillir le numéro du permis de conduire et le numéro d’assurance sociale","c":false},{"t":"La Loi sur l’assurance maladie du Québec précise que la cueillette du numéro de la carte d’assurance maladie ne peut être exigé qu’à des fins liées à la prestation de services ou à la fourniture de biens ou de ressources en matière de santé ou de services sociaux","c":false}],"f":"L ‘énoncé est FAUX!Le NAS est émis par le gouvernement fédéral généralement à des fins d’emploi et d’impôt. Ainsi, un employeur PEUT exiger le NAS"},{"i":"07088","c":13,"q":"Le concept de consentement est un élément clé dans le système de santé québécois. Parmi les énoncés suivants entourant ce concept, lequel est VRAI?","a":[{"t":"En tout temps, le mineur de 14 ans et plus peut consentir seul à des soins peu importe leur nature","c":false},{"t":"Le consentement à la communication par un tiers de renseignements personnels peut être donné par la personne concernée à la personne qui les recueille auprès de ce tiers","c":true},{"t":"Le consentement aux soins médicaux est nécessaire en tout temps","c":false},{"t":"Une personne majeure peut se soumettre à une expérimentation peu importe la nature des risques pourvu qu’elle soit informée de ceux-ci","c":false}],"f":"Bonne réponse![13.3 Expliquer le concept de consentement, d’accès au dossier et de destruction de dossier]"},{"i":"07089","c":13,"q":"Parmi les énoncés suivants entourant la vente de données et Intercontinental Marketing Services (IMS), lequel est FAUX?","a":[{"t":"Les données envoyées par IMS à une compagnie pharmaceutique sont identiques aux données contenues dans un profil individuel et confidentiel envoyé à un médecin","c":true},{"t":"Il existe plusieurs différences entre les provinces en matière de consentement, de partage et de vente d’informations relatives aux ordonnances de médicaments","c":false},{"t":"IMS offre des profils de pratique individuels et confidentiels en ligne aux médecins du Québec","c":false},{"t":"IMS Health a élaboré un Code de gestion des renseignements personnels concernant les professionnels de la santé dans la province de Québec","c":false}],"f":"Les données de prescriptions contenues dans le profil sont PLUS PRÉCISES que celles qui sont fournies aux sociétés pharmaceutiques qui ne reçoivent que les données en agrégats"},{"i":"07090","c":13,"q":"En vertu des lignes directrices de l'Ordre des pharmaciens du Québec (OPQ) entourant la protection des renseignements personnels, quel énoncé parmi les suivants est FAUX?","a":[{"t":"Le pharmacien peut, à des fins commerciales, transmettre à un tiers des renseignements anonymes par agrégat d'au moins dix patients","c":false},{"t":"Le pharmacien doit informer le patient de l'objet du dossier pharmacologique et de l'utilisation qui sera faite des renseignements qu'il collecte auprès du patient","c":false},{"t":"Le pharmacien doit indiquer à l'assureur l'intention thérapeutique et l'observance du patient","c":true},{"t":"Le pharmacien est le gardien des renseignements personnels qui lui sont confiés dans le cadre de sa pratique professionnelle","c":false}],"f":"L’énoncé est FAUX!L'information transmise doit se limiter aux informations factuelles relatives à une demande de paiement"},{"i":"07091","c":13,"q":"Dans son bulletin d'informations professionnelles, l'Ordre des pharmaciens du Québec (OPQ) a publié des lignes directrices sur la protection et l'utilisation des renseignements personnels en pharmacie. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"La bannière, le franchiseur ou le gestionnaire de logiciels offrant au pharmacien un système d’accès au dossier pour les patients ne peut exclure sa responsabilité par une clause d’exonération","c":false},{"t":"La divulgation de renseignements personnels à un tiers nécessite l’obtention du consentement du patient","c":false},{"t":"Lorsque le pharmacien demande le consentement d'un patient, ce doit être fait par écrit","c":true},{"t":"Les renseignements personnels recueillis par un pharmacien dans l’exercice de ses fonctions appartiennent au patient","c":false}],"f":"L'énoncé est FAUX!Le consentement peut être donné par écrit ou VERBALEMENT"},{"i":"07092","c":13,"q":"Parmi les énoncés suivants entourant les lois applicables à la protection des renseignements personnels au niveau fédéral, lequel est FAUX?","a":[{"t":"La Loi sur la protection des renseignements personnels et les documents électroniques vise à faciliter et à promouvoir le commerce électronique en prévoyant l'utilisation de moyens électroniques pour communiquer ou enregistrer de l'information et des transactions","c":false},{"t":"La Loi sur le contrôle des renseignements relatifs aux matières dangereuses précise le fournisseur peut présenter au directeur de la Section de contrôle une demande de dérogation à l'obligation de divulguer la dénomination chimique d'un ingrédient d'un produit contrôlé, s'il estime que cette information est confidentielle","c":false},{"t":"La Loi sur l'accès à l'information vise à restreindre l'accès aux renseignements que les institutions fédérales mettent normalement à la disposition du grand public","c":true},{"t":"La Loi sur la protection des renseignements personnels a pour objet de compléter la législation canadienne en matière de droit d'accès des individus aux renseignements personnels qui les concernent","c":false}],"f":"L'énoncé est FAUX!La Loi sur l'accès à l'information NE vise PAS à restreindre l'accès aux renseignements que les institutions fédérales mettent normalement à la disposition du grand public"},{"i":"07093","c":13,"q":"Parmi les énoncés suivants entourant l'accès à un dossier par le patient lui-même, lequel est VRAI?","a":[{"t":"L'accès à un document est généralement payant, sauf exceptions","c":false},{"t":"La personne détenant le dossier qui fait l'objet d'une demande d'accès ou de rectification par la personne concernée doit donner suite à cette demande au plus tard dans les 30 jours de la date de la demande","c":true},{"t":"Une demande d'accès ou de rectification au dossier peut être faite par écrit ou verbalement","c":false},{"t":"Toute personne qui en fait la demande a droit d'accès aux documents d'un organisme public, incluant les notes personnelles inscrites sur un document, les esquisses, les ébauches, les brouillons et les notes préparatoires","c":false}],"f":"Bonne réponse![13.3 Expliquer le concept de consentement et ses applications]"},{"i":"07094","c":13,"q":"Parmi les énoncés suivants entourant la conservation et la destruction d'un dossier patient, lequel est FAUX?","a":[{"t":"Lorsque l'objet pour lequel un renseignement nominatif a été recueilli est accompli, l'organisme public est responsable de décider s'il le détruit ou s'il le conserve; dans ce dernier cas, il devra toutefois prendre les mesures nécessaires pour ce renseignement demeure confidentiel","c":true},{"t":"Le conseil d'administration d'un établissement de santé doit adopter des règlements portant sur la procédure d'élimination de dossiers ou de parties de dossiers de bénéficiaires","c":false},{"t":"En vertu de la Loi sur l'accès aux documents des organismes publics et sur la protection des renseignements personnels, un organisme public doit veiller à ce que les renseignements nominatifs qu'il conserve soient à jour, exacts et complets pour servir aux fins pour lesquelles ils sont recueillis","c":false},{"t":"En vertu de la Loi sur les archives, tout organisme public doit établir et tenir à jour un calendrier de conservation qui indique quels documents inactifs sont conservés de manière permanente et lesquels sont éliminés","c":false}],"f":"L'énoncé est FAUX!Lorsque l'objet pour lequel un renseignement nominatif a été recueilli est accompli, l'organisme public DOIT le détruire"},{"i":"07095","c":13,"q":"Parmi les énoncés suivants entourant le Dossier Santé Québec (DSQ), lequel est FAUX?","a":[{"t":"Toutes les personnes inscrites au régime d’assurance maladie du Québec participent automatiquement au DSQ à moins de manifester leur refus","c":false},{"t":"Le domaine médicament du DSQ est une banque de renseignements qui proviennent des logiciels de toutes les pharmacies communautaires du Québec","c":false},{"t":"Aucun renseignement de santé n'est disponible via le DSQ lorsqu'un patient refuse de participer au DSQ","c":false},{"t":"Le domaine médicament du DSQ est exclusivement accessible aux pharmaciens et aux médecins","c":true}],"f":"L'énoncé est FAUX!Le domaine médicament du DSQ est accessible à PLUSIEURS professionnels, dont les pharmaciens, les médecins, les infirmières, les infirmières auxiliaires, les sages-femmes, les biochimistes et les microbiologistes"},{"i":"07096","c":13,"q":"En vertu de la Loi sur la santé publique, on définit les modalités entourant le registre de vaccination du Québec. Parmi les énoncés suivants entourant ce registre, lequel est VRAI?","a":[{"t":"Seuls les médecins, les infirmières et les pharmaciens ont accès au registre","c":false},{"t":"Tous les détenteurs d'une carte de la Régie de l'assurance maladie du Québec (RAMQ) sont inscrits au registre, qu'ils aient reçu ou non des vaccins","c":false},{"t":"Le consentement de l’usager n’est pas requis pour l’inscription des vaccins au registre de vaccination","c":true},{"t":"Seuls vaccins administrés depuis 2014 sont inscrits au registre","c":false}],"f":"Bonne réponse![13.3 Expliquer le concept de consentement et ses applications]"},{"i":"07097","c":13,"q":"Parmi les énoncés suivants entourant l'utilisation et la vente de données, lequel est FAUX?","a":[{"t":"Les pharmaciens ont le droit de refuser que les données les concernant soient communiquées ou conservées à des fins d’analyse, de recherche ou de formation continue","c":false},{"t":"Au Québec, les données des dossiers médicaux électroniques (DMÉ) dans le secteur des soins et services sociaux de première ligne sont facilement accessibles","c":true},{"t":"Dans toutes les provinces, on permet la vente de données reliées à l’ordonnance, soit le nom du médicament, la forme, la teneur et la quantité","c":false},{"t":"Le Commissaire à la vie privée a conclu dans son rapport que les renseignements sur les ordonnances ne sont pas des renseignements personnels concernant le médecin","c":false}],"f":"L'énoncé est FAUX!Au Québec, les données des dossiers médicaux électroniques (DMÉ) dans le secteur des soins et services sociaux de première ligne sont DIFFICILEMENT accessibles en raison de la diversité des systèmes existants, de la complexité du processus d’extraction et de l’hétérogénéité des données"},{"i":"07098","c":13,"q":"Parmi les énoncés suivants entourant le consentement des patients en résidences privées pour aînés, lequel est FAUX?","a":[{"t":"Aucune entente ne peut être établie entre le propriétaire d'une résidence privée et un pharmacien afin que tous les résidents fassent affaire avec ce dernier","c":false},{"t":"Comme l’utilisation du pilulier hebdomadaire dans les résidences privées de personnes âgées facilite la gestion des médicaments par les résidences, le pilulier devrait être privilégié pour tous les résidents","c":true},{"t":"Lorsqu'un patient donne un consentement verbal au pharmacien, une note au dossier devra constater que le consentement verbal a été donné et préciser à quelle date il a été obtenu","c":false},{"t":"Lorsque le pharmacien doit rendre des services pharmaceutiques à des patients non autonomes ou inaptes, il devrait s’assurer d’avoir en sa possession une copie du mandat légal l’autorisant à divulguer les renseignements et les conseils de nature confidentielle à la personne légalement responsable","c":false}],"f":"L'énoncé est FAUX!Bien que l’utilisation du pilulier hebdomadaire dans les résidences privées de personnes âgées puisse comporter des avantages pour le personnel sur place et les patients, la décision de recourir au pilulier doit être INDIVIDUALISÉE"},{"i":"07099","c":13,"q":"Parmi les énoncés suivants entourant l'utilisation des médias sociaux et l'exercice professionnel, lequel est FAUX?","a":[{"t":"L’étudiant en pharmacie devrait s’assurer que son comportement en ligne, à titre personnel, soit compatible à court, moyen et long terme avec l’exercice de sa profession","c":false},{"t":"L’engagement à la protection des renseignements personnels signé par le personnel technique devraient intégrer des dispositions spécifiques en ce qui concerne le comportement en ligne responsable","c":false},{"t":"Tant que le pharmacien ne mentionne pas le nom du patient lorsqu'il utilise les médias sociaux pour consulter des collègues concernant le cas d'un patient, il est admis que le secret professionnel est maintenu","c":true},{"t":"La majorité des plaintes relatives aux médias sociaux reçues par le syndic de l’Ordre des pharmaciens du Québec (OPQ) concerne des propos inappropriés tenus par un pharmacien à l’égard d’un collègue ou d’un autre professionnel de la santé","c":false}],"f":"L'énoncé est FAUX! Le simple fait de ne pas mentionner le nom du patient N’assure PAS nécessairement la confidentialité des informations transmises"},{"i":"07100","c":13,"q":"Parmi les énoncés suivants entourant la confidentialité et le consentement en contexte pharmaceutique, lequel est FAUX?","a":[{"t":"Lorsqu'un collège demande de transférer un dossier patient à une autre pharmacie, le consentement du patient n'est pas requis, puisqu'on peut assumer que la demande du patient à un collègue constitue le consentement","c":true},{"t":"Le consentement du patient n'est pas nécessaire lorsque le syndic mène une enquête et qu'il demande l'accès à un dossier","c":false},{"t":"Lorsqu'un tiers vient chercher les reçus pour fin d'impôts pour un patient, le consentement de ce dernier est requis","c":false},{"t":"Devant un cas évident de fausse ordonnance, le secret professionnel ne s’applique pas et donc le pharmacien a le droit de communiquer avec la police à cet égard","c":false}],"f":"L'énoncé est FAUX!Lorsqu'un collège demande de transférer un dossier patient à une autre pharmacie, le consentement du patient EST requis"},{"i":"07101","c":13,"q":"Parmi les énoncés suivants entourant la gestion de l’information, lequel est VRAI?","a":[{"t":"Contrairement au pharmacien, le médecin ne peut refuser que les données le concernant soient communiquées à des fins d’analyse","c":false},{"t":"En vertu de la Loi sur les renseignements privés, le Conseil d’administration d’un établissement public doit adopter des règlements portant sur la procédure d’élimination de dossiers ou de parties de dossiers de bénéficiaires conformément à la Loi sur les archives","c":false},{"t":"En vertu de la Loi sur les services de santé et les services sociaux, les renseignements contenus dans un dossier d’un usager ne peuvent jamais être communiqués sans le consentement de celui-ci","c":false},{"t":"Les pharmaciens doivent être conscients que des données relatives aux ordonnances qu’ils exécutent sont vendues à des sociétés externes","c":true}],"f":"Bonne réponse![13.3 Expliquer le concept de consentement, d’accès au dossier et de destruction de dossier]et[13.4 Expliquer les obligations relatives à l’utilisation et la vente de données]"},{"i":"07102","c":13,"q":"En ce qui concerne le droit à la vie privée et la protection des renseignements personnels, quel énoncé parmi les suivants est FAUX?","a":[{"t":"La cueillette du numéro de la carte d’assurance maladie peut être exigée à des fins d'identification","c":true},{"t":"Un commerçant ne peut exiger le permis de conduire ou recueillir des renseignements contenus sur cette carte lors d'une transaction ou d'un abonnement","c":false},{"t":"Le pharmacien peut transgresser le secret professionnel si le patient a renoncé de manière explicite ou non au maintien du secret professionnel","c":false},{"t":"Le consentement du patient à la divulgation de renseignements le concernant n'est pas requis en cas d'urgence","c":false}],"f":"L'énoncé est FAUX!La cueillette du numéro de la carte d’assurance maladie NE peut être exigée QU’à des fins liées à la prestation de services ou à la fourniture de biens ou des ressources en matière de santé ou de services sociaux"},{"i":"07103","c":13,"q":"Parmi les énoncés suivants entourant les lois fédérales et provinciales applicables à la protection des renseignements personnels, lequel est FAUX?","a":[{"t":"En vertu de la Loi sur la non-discrimination génétique, un médecin ne peut obliger une personne à subir un test génétique comme condition préalable à lui fournir des services de santé","c":true},{"t":"La Loi sur la protection des renseignements personnels dans le secteur privé est une loi québécoise","c":false},{"t":"La Loi sur l'accès à l'information est une loi fédérale","c":false},{"t":"En vertu de la Loi sur l'accès aux documents des organismes publics et sur la protection des renseignements personnels, on peut procéder à une demande de rectification à des renseignements personnels par écrit à l’organisme public qui détient les renseignements","c":false}],"f":"L'énoncé est FAUX!En vertu de la Loi sur la non-discrimination génétique, l'interdiction d'obliger une personne à subir un test génétique comme condition préalable à lui fournir des services NE s'applique PAS aux médecins"},{"i":"07104","c":13,"q":"Parmi les énoncés suivants entourant le consentement dans certaines situations, lequel est FAUX?","a":[{"t":"Le consentement du patient à la divulgation de renseignements le concernant n’est pas requis pour des fins d'inspection professionnelle ou d'enquête du syndic","c":false},{"t":"Le secret professionnel ne s'applique pas lorsque le pharmacien fait face à une fausse ordonnance","c":false},{"t":"Le consentement aux soins qui ne sont pas requis par l'état de santé, à l'aliénation d'une partie du corps ou à une recherche susceptible de porter atteinte à l'intégrité doit être donné par écrit","c":false},{"t":"En tout temps, le mineur de 14 ans et plus peut consentir seul à ses soins de santé","c":true}],"f":"L'énoncé est FAUX!Le consentement du titulaire de l'autorité parentale ou du tuteur d'un mineur de 14 ans et plus est NÉCESSAIRE si les soins présentent un risque sérieux pour la santé du mineur et peuvent lui causer des effets graves et permanents"},{"i":"07156","c":14,"q":"Parmi les énoncés suivants entourant la Loi sur les normes du travail, lequel est FAUX?","a":[{"t":"La Loi sur les normes du travail protège la majorité des salariés québécois, qu'ils soient à temps plein ou à temps partiel","c":false},{"t":"La Loi sur les normes du travail prévoit que les périodes d'essai ou de formation exigées pa
