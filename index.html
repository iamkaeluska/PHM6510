r l'employeur peuvent ne pas être rémunérées","c":true},{"t":"Un employeur ne peut pas donner à un employé à temps partiel un salaire inférieur à celui des autres personnes salariées qui font le même travail dans le même établissement pour la seule raison que cet employé travaille moins d'heures par semaine","c":false},{"t":"Tout salarié peut porter plainte à la Commission des normes, de l'équité, de la santé et de la sécurité du travail (CNESST) si elle croit avoir subi une pratique interdite par son employeur","c":false}],"f":"L’énoncé est FAUX!La Loi sur les normes du travail prévoit que les périodes d'essai ou de formation exigées par l'employeur DOIVENT être rémunérées"},{"i":"07157","c":14,"q":"La santé et la sécurité au travail, c'est important. La Commission des normes, de l’équité, de la santé et de la sécurité au travail (CNESST) propose périodiquement des publicités chocs qui rappellent l'importance de la prévention. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"Le programme maternité sans danger a pour objet le retrait de l'emploi de la travailleuse enceinte ou qui allaite","c":false},{"t":"En vertu du Code criminel, on précise les obligations des personnes en position d'autorité qui font preuve de négligence grossière et mettent la vie d'autrui en péril","c":true},{"t":"En vertu de la Loi sur les services de santé et les services sociaux, un travailleur a le droit de refuser d'exécuter tout travail, peu importe le motif","c":false},{"t":"En vertu de la Loi sur la santé et la sécurité au travail, on définit les obligations de l'employeur, notamment de fournir au travailleur, à un prix raisonnable, tous les moyens et équipements de protection individuels choisis par le comité de santé et de sécurité","c":false}],"f":"Bonne réponse![14.1 Décrire les principales lois applicables au droit du travail]"},{"i":"07158","c":14,"q":"En vertu du cadre législatif, un consommateur est protégé s'il acquiert un produit défectueux. Parmi les énoncés suivants entourant la protection du consommateur, lequel est FAUX?","a":[{"t":"Plusieurs lois contribuent à la protection du consommateur, tant au niveau fédéral que provincial, tels que la Loi sur les aliments et drogues, le Code civil du Québec, la Loi sur la protection du consommateur","c":false},{"t":"L'Office de la protection du consommateur aide les consommateurs à se protéger et à se défendre en cas de problèmes avec un commerçant","c":false},{"t":"Les commerçants qui n’indiquent pas les prix sur les produits mais plutôt sur les tablettes doivent appliquer la Politique d’exactitude des prix dans leur magasin","c":false},{"t":"La Loi sur la protection du consommateur interdit notamment la publicité fausse ou trompeuse et la publicité s'adressant au moins de 18 ans","c":true}],"f":"L’énoncé est FAUX!La Loi sur la protection du consommateur interdit notamment la publicité fausse ou trompeuse et la publicité s'adressant au moins de 13 ans"},{"i":"07159","c":14,"q":"La Loi sur la taxe de vente du Québec a un impact significatif sur la pratique de la pharmacie au Québec. Parmi les énoncés suivants entourant les dispositions de cette loi, lequel est VRAI?","a":[{"t":"Le client n'a pas à payer de taxes sur les frais d'exécution d'ordonnance","c":true},{"t":"Les médicaments nécessitant une prescription sont taxés","c":false},{"t":"L’épinéphrine est un produit taxable","c":false},{"t":"Les drogues et les substances qui sont utilisées en médecine vétérinaire ne sont pas taxables","c":false}],"f":"Bonne réponse![14.1 Décrire les principales lois applicables au droit du travail]"},{"i":"07160","c":14,"q":"L’affichage en pharmacie est soumis à plusieurs lois, règlements et normes. Parmi les énoncés suivants entourant l’affichage en pharmacie, lequel est FAUX?","a":[{"t":"Les articles publicitaires ou promotionnels sont soumis à la règle de la nette prédominance du français","c":false},{"t":"L’affichage en pharmacie doit être fait exclusivement en français","c":true},{"t":"Les formulaires de demande d’emploi peuvent être rédigés en français et en anglais","c":false},{"t":"L’affichage public en pharmacie comprend l’affichage à l’intérieur et l’affichage à l’extérieur de la pharmacie","c":false}],"f":"L’énoncé est FAUX!En vertu de la Charte de la langue française, l’affichage public peut être fait à la fois en français et dans une AUTRE LANGUE pourvu que le français y figure de façon nettement prédominante par rapport à toute autre langue, c’est-à-dire que son impact visuel soit beaucoup plus important"},{"i":"07161","c":14,"q":"Il existe plusieurs associations de pharmaciens, chacune ayant un rôle différent à jouer. Parmi les énoncés suivants entourant ces associations, lequel est VRAI?","a":[{"t":"Les pharmaciens propriétaires du Québec sont tous représentés par une association de chaîne et bannières","c":false},{"t":"L’Association professionnelle des pharmaciens salariés du Québec (APPSQ) est signataire d’une entente en regard avec la rémunération des pharmaciens pour des services pharmaceutiques rendus","c":false},{"t":"L’Association des pharmaciens en établissement de santé (APES) est un syndicat professionnel regroupant la majorité des pharmaciens du Québec","c":false},{"t":"L’Association québécoise des pharmaciens propriétaires (AQPP) a pour mandat l’étude, la défense et le développement des intérêts économiques, sociaux et professionnels de ses membres","c":true}],"f":"Bonne réponse![14.2 Discuter du rôle des associations et syndicats professionnels]"},{"i":"07162","c":14,"q":"Parmi les énoncés suivants concernant la Loi sur les normes du travail, lequel est FAUX?","a":[{"t":"Le congé parental peut être payé et être partagé entre les deux parents","c":false},{"t":"Un salarié peut refuser de travailler si, une semaine donnée, on lui demande de travailler plus de 40 heures","c":true},{"t":"Le salarié qui est en vacances à l'occasion d'un jour férié a droit à une indemnité ou à un congé compensatoire payé, à une date convenue entre lui et l'employeur","c":false},{"t":"Certains salariés sont exclus de l'application de la norme sur le salaire minimum, notamment les stagiaires dans un cadre de formation professionnelle reconnu par une loi","c":false}],"f":"L'énoncé est FAUX!Un salarié peut refuser de travailler si, une semaine donnée, on lui demande de travailler plus de 50 HEURES, sauf si ses heures de travail son étalées"},{"i":"07163","c":14,"q":"Un salarié a droit à un certain nombre de congés payés et non payés par l'employeur pour des événements liés à sa famille. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Les dispositions concernant le retrait préventif sont prévues par la Loi sur les services de santé et les services sociaux","c":true},{"t":"Une absence pour congé de paternité durant l'année de référence n'a pas pour effet de réduire la durée des vacances du salarié","c":false},{"t":"Si une salariée désire revenir au travail moins de deux semaines après son accouchement, l'employeur peut exiger un certificat médical attestant qu'elle est en mesure de travailler","c":false},{"t":"Le congé de maternité peut être réparti au gré de la salariée avant ou après la date prévue pour l'accouchement","c":false}],"f":"L'énoncé est FAUX!Les dispositions concernant le retrait préventif sont prévues par la Loi sur la santé et la sécurité au travail"},{"i":"07164","c":14,"q":"Les heures d'affaires des commerces sont encadrés par la Loi sur les heures et les jours d’admission dans les établissements commerciaux. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Le public ne peut être admis dans un établissement d'alimentation qu'entre 8h00 et 20h00 le samedi et le dimanche","c":false},{"t":"Le public ne peut être admis dans une pharmacie le 25 décembre et le 1er janvier","c":true},{"t":"L'exploitant d'un établissement commercial ou la personne à son emploi ne peut y tolérer la présence de qui que ce soit du public plus de 30 minutes après l'heure où le public ne peut plus y être admis","c":false},{"t":"Le public peut être admis en dehors des heures d’ouvertures prévues par la loi s’il offre principalement en vente, en tout temps, des produits pharmaceutiques, hygiéniques ou sanitaires","c":false}],"f":"L'énoncé est FAUX!Le public PEUT être admis dans une pharmacie le 25 décembre et le 1er janvier"},{"i":"07165","c":14,"q":"Le programme maternité sans danger (PMSD) est un programme de prévention de la Commission des normes, de l’équité, de la santé et de la sécurité au travail (CNESST) a pour objet l’emploi sans danger pour la travailleuse enceinte ou qui allaite. Parmi les énoncés suivants entourant le PMSD, lequel est FAUX?","a":[{"t":"Les étudiantes en stage ne sont pas admissibles au PMSD","c":false},{"t":"Le médecin désigné par le Directeur de la santé publique émet des recommandations, dans un rapport médico-environnemental qu’il transmet directement à l’employeur de la travailleuse","c":true},{"t":"L'employée qui subit une affectation dans le cadre du PMSD peut contester cette affectation devant le CNESST","c":false},{"t":"Les travailleuses domestiques travaillant chez un particulier ne sont pas admissibles au PMSD","c":false}],"f":"L'énoncé est FAUX!Le médecin désigné par le Directeur de la santé publique émet des recommandations, dans un rapport médico-environnemental qu’il transmet au MÉDECIN de famille de la travailleuse"},{"i":"07166","c":14,"q":"Parmi les énoncés suivants entourant la Loi sur les normes du travail, lequel est FAUX?","a":[{"t":"Le salaire d’un employé doit être versé à intervalles réguliers ne pouvant pas dépasser 16 jours","c":false},{"t":"L’employeur doit fournir gratuitement à toutes les personnes salariées le vêtement particulier qui les identifie comme personnes salariées de son établissement","c":false},{"t":"Au Québec, l'âge minimal légal pour travailler est de 14 ans","c":true},{"t":"Le salaire minimum est fixé par le gouvernement du Québec","c":false}],"f":"L'énoncé est FAUX!Au Québec, il N’y a PAS d’âge minimum pour ravail l'expose à un danger pour sa santé, sa sécurité ou son intégrité physique ou psychique","c":false}],"f":"L'énoncé est FAUX!Les dispositions concernant le retrait préventif d’une femme enceinte sont prévues par la Loi sur la SANTÉ ET LA SÉCURITÉ AU TRAVAIL"},{"i":"07171","c":14,"q":"En vertu de la Loi sur les syndicats professionnels, on définit les modalités permettant à un groupe de personnes de se regrouper aux fins de constituer une association ou un syndicat professionnel. Parmi les énoncés suivants entourant ces modalités, lequel est FAUX?","a":[{"t":"Un syndicat professionnel doit être constitué de personnes exerçant la même profession, le même emploi, des métiers similaires, se livrant à des travaux connexes concourant à l'établissement de produits déterminés","c":false},{"t":"Un syndicat professionnel doit être constitué d'au moins 15 personnes","c":false},{"t":"Pour être membre du conseil d'administration d'un syndicat, il faut minimalement avoir le statut de résident permanent du Canada","c":true},{"t":"Les syndicats professionnels peuvent exercer devant toutes cours de justice tous les droits appartenant à leurs membres, relativement aux faits portant un préjudice direct ou indirect à l'intérêt collectif de la profession qu'ils représentent","c":false}],"f":"L'énoncé est FAUX!Seuls les CITOYENS canadiens peuvent être membres du conseil d'administration d'un syndicat"},{"i":"07172","c":14,"q":"Parmi les énoncés suivants entourant les différents syndicats et associations de pharmaciens, lequel est FAUX?","a":[{"t":"L'Association des pharmaciens d'établissement de santé du Québec (APES) est en fait un syndicat professionnel","c":false},{"t":"L’Association professionnelle des pharmaciens salariés du Québec (APPSQ) milite pour que la charge de travail du pharmacien soit en harmonie avec ses obligations professionnelles","c":false},{"t":"L'Association québécoise des pharmaciens propriétaires (AQPP) exclut les pharmacies indépendantes","c":true},{"t":"L'Association québécoise des pharmaciens propriétaires (AQPP) est en fait un syndicat professionnel","c":false}],"f":"L'énoncé est FAUX!L'Association québécoise des pharmaciens propriétaires (AQPP) regroupe tous les types d’officine, de la petite pharmacie de quartier à la pharmacie à grande surface et ce, INDÉPENDAMMENT de leur affiliation à une chaîne ou une bannière"},{"i":"07173","c":14,"q":"En tant que citoyen canadien et professionnel de la santé, le pharmacien doit être familier avec les différents organismes ayant un impact sur l’exercice de la pharmacie. Parmi les associations suivantes, laquelle est VRAIE?","a":[{"t":"CNESST- Commission des normes et des équités scolaires et sociales territoriales","c":false},{"t":"APPSQ- Association professionnelle des pharmaciens salariés du Québec","c":true},{"t":"APES- Association des praticiens en établissement de santé","c":false},{"t":"AQPP- Association québécoise des pharmaciens professionnels","c":false}],"f":"Bonne réponse![14.1 Décrire les principales lois applicables au droit du travail]et[14.2 Discuter du rôle des associations et syndicats professionnels]"},{"i":"07174","c":14,"q":"Le droit des affaires et les associations sont soumis à de nombreuses dispositions de la loi. Parmi les éléments suivants entourant le droit des affaires et les associations, lequel est FAUX?","a":[{"t":"Les pharmaciens propriétaires doivent appliquer les dispositions de la Loi sur la taxe de vente du Québec","c":false},{"t":"En vertu de la Loi sur les services de santé et les services sociaux, le ministre peut conclure avec un organisme représentatif des pharmaciens œuvrant pour les établissements une entente sur les conditions de travail de ces pharmaciens","c":false},{"t":"L’Association des chaînes et bannières veille à ce que les pharmaciens propriétaires appliquent les dispositions de la Loi sur les normes de travail","c":true},{"t":"Les membres de l’Association québécoise des pharmaciens propriétaire (AQPP) doivent appliquer les rmaciens des établissements de santé du Québec (APES)","c":false},{"t":"Le médecin et le pharmacien doivent détenir des permis d’exercice de leur ordre professionnel","c":false},{"t":"Le médecin, tout comme le pharmacien, doit soumettre sa candidature au comité des titres du Conseil des médecins, dentistes et pharmaciens (CMDP)","c":false},{"t":"Le médecin doit être membre de la Fédération des médecins omnipraticiens du Québec","c":true}],"f":"L’énoncé est FAUX!Le médecin qui désire pratiquer au sein d’un établissement de \nsanté doit être membre de l’une des fédérations qui les représentent \nsoit la Fédération des médecins omnipraticiens du Québec ou la Fédération des médecins spécialistes du Québec."},{"i":"07248","c":15,"q":"Tout comme l’acte médical, l’acte pharmaceutique peut faire l’objet d’une évaluation. Parmi les énoncés suivants entourant l’évaluation de l’acte pharmaceutique ainsi que l’inspection professionnelle, lequel est FAUX?","a":[{"t":"Toute évaluation de l’acte pharmaceutique peut être versée par le chef du département de pharmacie au dossier professionnel du pharmacien, généralement sous la garde du Directeur des services professionnels","c":false},{"t":"Le chef de département de pharmacie doit former un comité d’évaluation de l’acte pharmaceutique","c":false},{"t":"La prescription d’un médicament peut faire l’objet d’une évaluation de l’acte pharmaceutique","c":true},{"t":"Le chef du département de pharmacie doit établir les modalités régissant l’émission et la rédaction des ordonnances dans son établissement","c":false}],"f":"L'énoncé est FAUX!La prescription d’un médicament est un acte MÉDICAL"},{"i":"07261","c":15,"q":"Le Comité sur la sécurité des médicaments antinéoplasiques a été mis sur pied par la Direction québécoise de cancérologie afin de définir les enjeux relatifs à l’usage sécuritaire des médicaments antinéoplasiques. Parmi les énoncés suivants entourant les recommandations du Comité sur la sécurité des médicaments antinéoplasique
