s. Parmi les énoncés suivants entourant tous ces candidats, lequel est VRAI?","a":[{"t":"Le Conseil d’administration de l’Ordre peut imposer à un pharmacien qui retourne à la pratique en pharmacie communautaire après deux ans d’absence un cours de perfectionnement en raison de son absence de durée prolongée","c":false},{"t":"Une personne diplômée d’un programme en pharmacie accrédité par le Conseil canadien de l’agrément des programmes de pharmacie (CCAPP) dispensé par une université canadienne est admissible à l’exercice de la pharmacie au Québec","c":true},{"t":"Le stage d’actualisation est d'une durée minimale de 200 heures pour les candidats s’étant absenté 5 ans et d'une durée maximale de 400 heures pour les candidats s’étant absentés 20 ans","c":false},{"t":"En vertu du Règlement sur les normes d’équivalence de diplômes et de formation aux fins de la délivrance d’un permis de pharmacien, un candidat bénéficie d’une équivalence de la formation que s’il démontre qu’il possède un niveau de connaissances supérieur à celui acquis par le titulaire d’un diplôme donnant ouverture au permis de l’ordre","c":false}],"f":"Bonne réponse![7.1 Définir les exigences et les limites de l’utilisation du terme «pharmacien» et des autres titres pertinents]"},{"i":"06579","c":7,"q":"Parmi les énoncés suivants entourant l'entente France-Québec en matière de délivrance d'un permis de l'Ordre des pharmaciens du Québec (OPQ), lequel est FAUX?","a":[{"t":"Parmi les mesures que le demandeur doit accomplir, on retrouve la réussite d’une formation d’appoint sur la législation et le système de santé québécois offerte en auto-apprentissage par l’Université de Montréal","c":false},{"t":"Le Règlement sur la délivrance d’un permis de l’Ordre des pharmaciens du Québec pour donner effet à l’arrangement conclu par l’Ordre en vertu de l’Entente entre le Québec et la France en matière de reconnaissance mutuelle des qualifications professionnelles est le règlement qui balise cette entente","c":false},{"t":"Pour obtenir un permis de l’OPQ, le demandeur doit absolument avoir obtenu, sur le territoire de la France, le diplôme d’État de docteur en pharmacie","c":true},{"t":"Le comité décideur informe le demandeur de sa décision par courrier recommandé dans les 30 jours suivant la date à laquelle elle a été rendue","c":false}],"f":"L’énoncé est FAUX!Pour obtenir un permis de l’OPQ, le demandeur doit avoir obtenu, sur le territoire de la France, le diplôme d’État de docteur en pharmacie OU le diplôme d’État de pharmacien"},{"i":"06580","c":7,"q":"Parmi les énoncés suivants entourant les différents statuts accordés ou définis dans le cadre de l'exercice de la pharmacie, lequel est FAUX?","a":[{"t":"L'étudiant en pharmacie est défini dans la Loi sur la pharmacie","c":false},{"t":"Au Québec, une personne qui détient un baccalauréat en pharmacie ou un doctorat professionnel en pharmacie ne peut porter le titre de pharmacien que si elle est inscrite au tableau de l'Ordre des pharmaciens du Québec (OPQ)","c":false},{"t":"Les pharmaciens qui veulent agir comme maître de stage doivent être inscrits au Tableau de l'Ordre des pharmaciens du Québec (OPQ) depuis au moins 5 ans","c":true},{"t":"Les termes pharmaciens cliniciens, pharmaciens communautaires et pharmaciens industriels ne sont pas définis par la Loi sur la pharmacie mais le sont dans le Grand dictionnaire terminologique","c":false}],"f":"L'énoncé est FAUX!Les pharmaciens qui veulent agir comme maître de stage doivent être inscrits au Tableau de l'OPQ depuis au moins 2 ANS"},{"i":"06581","c":7,"q":"Parmi les énoncés suivants entourant les spécialités dans le domaine de la santé, lequel est FAUX?","a":[{"t":"Il existe au moins 60 spécialités médicales et chirurgicales reconnues par le Collège royal des médecins et chirurgiens du Canada","c":false},{"t":"L'Ordre des infirmières et infirmier du Québec reconnaît cinq spécialités en soins infirmiers pour les infirmières praticiennes spécialisées, soit les soins aux adultes, la néonatologie, les soins de première ligne, les soins pédiatriques et la santé mentale","c":false},{"t":"Le Board of Pharmaceutical Specialties est un organisme américain qui reconnaît plusieurs spécialités, dont les pharmacothérapies nucléaire, en magistrales stériles et nutritionnelle","c":false},{"t":"Au Québec, la délivrance de certificats de spécialistes dans le domaine de la santé est une réalité vécue par 10 ordres professionnels","c":true}],"f":"L'énoncé est FAUX!Au Québec, la délivrance de certificats de spécialistes dans le domaine de la santé est une réalité vécue par 5 ORDRES professionnels"},{"i":"06582","c":7,"q":"En ce qui concerne les obligations d’un pharmacien québécois qui désire travailleurs ailleurs au Canada, aux États-Unis ou en Europe, laquelle des affirmations suivantes est VRAIE?","a":[{"t":"Un pharmacien québécois qui désire travailler dans une autre province canadienne doit obligatoirement commencer une nouvelle formation dans la province où il veut exercer","c":false},{"t":"Outre les exigences professionnelles que doit remplir un pharmacien québécois qui veut exercer aux États-Unis, il faut tout simplement obtenir un permis de travail","c":false},{"t":"L’Accreditation Council for Pharmacy Education (ACPE) reconnaît les programmes de base de formation en pharmacie qui ont obtenu l’agrément du Canadian Council for Accreditation of Pharmacy Programs (CCAP)","c":true},{"t":"Un examen européen unique est exigé des pharmaciens qui veulent exercer dans un pays d’Europe","c":false}],"f":"Bonne réponse![7.2 Nommer les obligations d’un pharmacien québécois qui désire pratiquer en Europe, aux États-Unis et ailleurs au Canada]"},{"i":"06583","c":7,"q":"La pratique de la pharmacie comporte des risques. Chaque pharmacien doit s'assurer de détenir une protection en cas de poursuites et de condamnations. Parmi les énoncés suivants entourant l'assurance responsabilité professionnelle, lequel est FAUX?","a":[{"t":"En vertu du Code des professions et de la Loi sur les assurances, le Conseil d'administration d'un ordre professionnel peut créer un fonds d'assurance-responsabilité professionnelle","c":false},{"t":"Les personnes qui ne sont plus membres de l’Ordre des pharmaciens (OPQ) demeurent assurées pour toute faute professionnelle commise lorsqu’ils exerçaient la pharmacie, et ce, aussi longtemps que le fonds d'assurance responsabilité professionnelle de l'OPQ existera","c":false},{"t":"Un pharmacien peut augmenter le montant de la couverture d'assurance responsabilité s'il le désire","c":false},{"t":"Un pharmacien peut cotiser à l'assurance responsabilité professionnelle proposée par le Fond d'assurance professionnelle de l'Ordre des pharmaciens du Québec ou un autre assureur de son choix","c":true}],"f":"L’énoncé est FAUX!En vertu du Règlement sur la souscription obligatoire au Fonds d'assurance de la responsabilité professionnelle de l'Ordre des pharmaciens du Québec (FARPOPQ), tout pharmacien inscrit au tableau de l'Ordre doit souscrire à ce fonds particulier"},{"i":"06584","c":7,"q":"Le pharmacien, qu’il œuvre en milieu communautaire ou en établissement de santé, est obligé de s’assurer. Parmi les affirmations suivantes entourant l’obligation de s’assurer des pharmaciens et les options en matière d’assurance, laquelle est VRAIE?","a":[{"t":"Les pharmaciens œuvrant en milieu hospitalier jouissent d’une double couverture","c":true},{"t":"Tout pharmacien et tout étudiant en pharmacie, qu’il soit stagiaire ou non, doit souscrire au Fonds d’assurance de la responsabilité professionnelle de l’Ordre des pharmaciens du Québec (FARPOPQ)","c":false},{"t":"En ce qui concerne l'exercice en société, le pharmacien peut utiliser son assurance personnelle comme couverture en raison de fautes commises par un pharmacien dans l'exercice de sa profession au sein de cette société","c":false},{"t":"La couverture maximale d'assurance pour la responsabilité professionnelle du pharmacien est de 3 000 000$ par sinistre","c":false}],"f":"Bonne réponse![7.3 Définir et reconnaître les régimes de responsabilité applicables à la pratique de la pharmacie, les obligations et les options en matière d’assurance-responsabilité]"},{"i":"06585","c":7,"q":"Parmi les énoncés suivants entourant la responsabilité civile en pharmacie et les fautes, lequel est FAUX?","a":[{"t":"Il existe deux types de responsabilité civile, soit la responsabilité civile dite contractuelle et la responsabilité civile dite extracontractuelle","c":false},{"t":"Le pharmacien demeure responsable de la faute commise par les personnes qu’il s’adjoint, par exemple les assistants-techniques en pharmacie","c":false},{"t":"Le pharmacien doit répondre tant au niveau civil que déontologique de ses activités professionnelles","c":false},{"t":"La faute est toujours de nature non intentionnelle","c":true}],"f":"L'énoncé est FAUX!La faute peut être de nature intentionnelle OU non"},{"i":"06586","c":7,"q":"Parmi les énoncés suivants entourant la préparation et la vente de médicaments, lequel est FAUX?","a":[{"t":"La préparation de médicaments est une activité réservée et exclusive aux pharmaciens","c":false},{"t":"Seul un pharmacien et un vétérinaire peuvent vendre au public des médicaments destinés aux animaux","c":false},{"t":"Le pharmacien peut seulement vendre des médicaments à des patients","c":true},{"t":"Un médecin peut vendre des médicaments s'il détient un permis valide afin de vendre des médicaments à des patients en zone de faible densité de population et en l'absence d'un pharmacien d'officine","c":false}],"f":"L’énoncé est FAUX!FAUX; il peut aussi en vendre à des professionnels de la santé habilités à prescrire, pour usage professionnel"},{"i":"06587","c":7,"q":"Outre le pharmacien, plusieurs professionnels de la santé participent à la prise en charge du patient et le pharmacien se doit de connaître leur rôle. Parmi les affirmations suivantes entourant l’exercice des autres professionnels de la santé, laquelle est VRAIE?","a":[{"t":"Les inhalothérapeutes peuvent effectuer l’assistance ventilatoire à un patient en tout temps, sans ordonnance","c":false},{"t":"Les infirmières peuvent diagnostiquer un patient en cabinet médical","c":false},{"t":"Les diététistes peuvent évaluer l’état nutritionnel d’une personne et lui prescrire des médicaments en vue de rétablir sa santé","c":false},{"t":"Les infirmières praticiennes spécialisées (IPS) peuvent prescrire des médicaments et d’autres substances","c":true}],"f":"Bonne réponse![7.4 Définir l’exercice de la pharmacie et identifier les situations non conformes]"},{"i":"06588","c":7,"q":"Bien que le pharmacien soit une source importante de médicaments, d’autres professionnels peuvent, en vertu de certaines lois, vendre des médicaments. Parmi les énoncés suivants entourant la vente des médicaments, lequel est VRAI?","a":[{"t":"Un médecin peut réclamer une compensation pour des médicaments utilisés dans son cabinet en vertu de la Loi médicale","c":true},{"t":"Un médecin peut obtenir un permis valide afin de vendre des médicaments à des patients en zone de faible densité de population s’il y a moins de deux pharmaciens d’officine","c":false},{"t":"Le Ministre de la santé peut donner en cas d'urgence des autorisations de vendre des médicaments","c":false},{"t":"Un fabricant ne peut vendre directement des médicaments à un pharmacien","c":false}],"f":"Bonne réponse![7.4 Définir l’exercice de la pharmacie et identifier les situations non conformes]"},{"i":"06589","c":7,"q":"Parmi les énoncés suivants entourant la formation pour devenir pharmacien et le statut des stagiaires, lequel est FAUX?","a":[{"t":"Lors d'un emploi en pharmacie, l'étudiant en pharmacie n'est pas protégé par le fonds d'assurance responsabilité professionnelle de l'Ordre des pharmaciens du Québec (FARPOPQ), de sorte que la supervision par le pharmacien est d'autant plus importante","c":true},{"t":"Un étudiant en pharmacie doit mettre à jour son adresse auprès de l'Ordre des pharmaciens  du Québec (OPQ) s'il déménage","c":false},{"t":"L'enregistrement à l'Ordre des pharmaciens du Québec (OPQ) est obligatoire dès le début des études en pharmacie dans une université du Québec","c":false},{"t":"Lorsque l’immatriculation d’un étudiant est révoquée, celui-ci ne peut plus être admis dans les milieux de stage","c":false}],"f":"L'énoncé est FAUX!Lors de son emploi à titre d’étudiant en pharmacie, le pharmacien superviseur et l’ÉTUDIANT sont protégés par le FARPOPQ contre les conséquences des actes posés"},{"i":"06590","c":7,"q":"Le Bureau des examinateurs en pharmacie du Canada (BEPC) évalue les compétences, au moyen d’un examen d’aptitude, des candidats qui désirent exercer la pharmacie. Parmi les énoncés suivants entourant cet examen, lequel est VRAI?","a":[{"t":"L'examen d'aptitude du BEPC pour les pharmaciens est composées de deux parties : la première partie est composée de questions à choix multiples et la seconde partie est l'examen clinique appelé ECOS (examens cliniques objectifs et structurés)","c":true},{"t":"Toutes les autorités provinciales et territoriales de réglementation font du certificat d’aptitude du BEPC une de leurs exigences en vue de l’émission du permis d’exercice","c":false},{"t":"L’examen du BEPC pose des exigences langagières dans les deux langues officielles du Canada","c":false},{"t":"Le certificat d’aptitude émis par le BEPC donne le droit d’exercer la pharmacie","c":false}],"f":"Bonne réponse![7.7 Identifier les éléments qui caractérisent l’exercice de la pharmacie au Québec par rapport aux autres provinces]"},{"i":"06591","c":7,"q":"Parmi les énoncés suivants entourant le Bureau des examinateurs en pharmacie du Canada (BEPC) et ses responsabilités, lequel est FAUX?","a":[{"t":"Le BEPC a notamment la responsabilité d’évaluer les compétences des techniciens en pharmacie au nom des organismes de réglementation provinciaux","c":false},{"t":"La réussite des examens du BEPC est obligatoire afin d'obtenir un permis de l'Ordre des pharmaciens du Québec (OPQ)","c":true},{"t":"Le BEPC a notamment la responsabilité d’évaluer les compétences des pharmaciens au nom des organismes de réglementation provinciaux","c":false},{"t":"Le BEPC utilise des méthodes d’évaluation des compétences exigeant la compréhension et l’application du savoir et du savoir-faire dans l’accomplissement des tâches professionnelles les plus fréquentes et/ou critiques","c":false}],"f":"L'énoncé est FAUX!Au Québec, le certificat d'aptitude du BEPC n'est pas une exigence en vue de l'émission du permis d'exercice de la pharmacie par l'OPQ"},{"i":"06592","c":7,"q":"En ce qui concerne la certification externe dans le domaine de la santé, lequel des énoncés suivants est FAUX?","a":[{"t":"Agissant comme une agence de l’American Pharmaceutical Association, le Board of Pharmaceutical Specialties (BPS) possède son propre conseil d’administration et est composé de six pharmaciens, de deux professionnels de la santé non-pharmaciens et d’un représentant du public","c":false},{"t":"La Société canadienne des pharmaciens d'hôpitaux (SCPH) décerne chaque année le titre de Fellow à des pharmaciens qui se distinguent par leur compétence, leur pratique et leurs réalisations","c":false},{"t":"De façon générale, on peut dire qu'un professionnel détenteur d'un certificat de spécialiste détient le permis de pratique de base","c":false},{"t":"Le Board of Pharmaceutical Specialties reconnait 8 spécialités en pharmacie, fondées sur une approche de connaissances par disciplines","c":true}],"f":"L'énoncé est FAUX!Le Board of Pharmaceutical Specialties reconnait 11 SPÉCIALITÉS en pharmacie, fondées sur une approche de connaissances par disciplines"},{"i":"06593","c":7,"q":"Parmi les énoncés suivants entourant la responsabilité pénale et criminelle ainsi que la responsabilité disciplinaire, lequel est FAUX?","a":[{"t":"Toute condamnation définitive pour un acte criminel, après les délais d'appels expirés, pour un professionnel est passible d'une comparution devant le comité de discipline de sa profession","c":false},{"t":"Un pharmacien est obligé de déclarer à l'Ordre des pharmaciens du Québec (OPQ) les décisions disciplinaires et judiciaires le concernant","c":false},{"t":"Une erreur est jugée faute lorsqu'elle n'aurait pas été commise par un autre professionnel compétant exposé au même contexte","c":false},{"t":"La responsabilité disciplinaire, qui fait partie du droit criminel, est définie en vertu du Code criminel et des lois applicables","c":true}],"f":"L'énoncé est FAUX!La responsabilité disciplinaire, qui fait partie du droit PÉNAL, est définie en vertu du Code DES PROFESSIONS et des lois professionnelles applicables"},{"i":"06594","c":7,"q":"En ce qui concerne la délégation par les pharmaciens, lequel des énoncés suivants est VRAI?","a":[{"t":"Chaque pharmacie est responsable de déterminer, parmi les activités professionnelles que peuvent exercer les membres de l’Ordre des pharmaciens du Québec (OPQ), celles qui peuvent être exercées par des non pharmaciens, à ses risques et périls","c":false},{"t":"La délégation permet à un pharmacien de laisser sa pharmacie sans surveillance pendant un maximum d'une heure","c":false},{"t":"Un pharmacien qui délègue des actes en conserve la responsabilité professionnelle","c":true},{"t":"Le technicien en pharmacie peut procéder à un prélèvement en introduisant un instrument dans le pharynx, mais l'assistant-technique en pharmacie n'y est pas autorisé","c":false}],"f":"Bonne réponse!\n[7.5 Reconnaître les activités réservées au pharmacien pouvant être exercées par des non pharmaciens]"},{"i":"06595","c":7,"q":"Parmi les énoncés suivants entourant la certification externe en pharmacie, lequel est FAUX?","a":[{"t":"Aux États-Unis, le Board of Pharmaceutical Specialties (BPS) a pour mission notamment de reconnaître les spécialités en pharmacie et d'établir les standards de certification et de re-certification","c":false},{"t":"Il existe un organisme de certification américain pour les techniciens en pharmacie, soit le Pharmacy Technician Certification Board (PTCB)","c":false},{"t":"Le Board of Pharmaceutical Specialties (BPS) rapporte plus de 950 pharmaciens certifiés au Canada, mais aucun au Québec","c":true},{"t":"Les étudiants ayant complété le doctorat professionnel de l'Université de Montréal ou de l'Université Laval détiennent le titre de docteur en pharmacie","c":false}],"f":"L'énoncé est FAUX!Le Québec compte plus de 140 pharmaciens certifiés par le BPS"},{"i":"06596","c":7,"q":"Parmi les énoncés suivants entourant les obligations d'un pharmacien québécois qui désire exercer sa profession en dehors de la province, lequel est FAUX?","a":[{"t":"La Grande-Bretagne, les Pays-Bas et le Danemark ont une pratique pharmaceutique qui s'apparente davantage à la pratique nord-américaine parmi les pays d'Europe","c":false},{"t":"Un pharmacien québécois verra ses qualifications être reconnues dans les autres provinces canadiennes","c":false},{"t":"En autant qu'un pharmacien réponde aux exigences professionnelles d'exercice de la pharmacie aux États-Unis, il peut exercer dans ce pays","c":true},{"t":"Chaque état américain a ses propres critères d'admissibilité face aux candidats pharmaciens canadiens","c":false}],"f":"L'énoncé est FAUX!Outre les exigences professionnelles, il faut obtenir un permis de travail et satisfaire aux exigences linguistiques"},{"i":"06597","c":7,"q":"Parmi les énoncés suivants entourant les standards de pratique pour les pharmaciens et ceux pour le personnel technique en pharmacie, lequel est FAUX?","a":[{"t":"Le maintien de la compétence, développement professionnel et activités de rayonnement et d'avancement de la profession est un standard de pratique des pharmaciens","c":false},{"t":"Les standards de pratique des pharmaciens de l'Ordre des pharmaciens du Québec (OPQ) comportent 4 volets","c":false},{"t":"Le personnel technique peut assister le pharmacien dans les tâches d'ordre technique, technologique et de gestion, mais n'a pas les connaissances nécessaires pour l'assister dans la surveillance de la thérapie médicamenteuse des patients","c":true},{"t":"Les standards de pratique des techniciens en pharmacies se divisent en 5 catégories","c":false}],"f":"L'énoncé est FAUX!Le personnel technique possède des connaissances au sujet des principales maladies chroniques dans le but de mieux dépister les problématiques, mais aussi de mieux anticiper les besoins du pharmacien pour surveiller adéquatement la thérapie médicamenteuse des patients qui en sont atteints"},{"i":"06598","c":7,"q":"Parmi les énoncés suivants entourant la délégation des activités réservées aux pharmaciens à des non-pharmaciens, lequel est FAUX?","a":[{"t":"Le personnel technique peut assister le pharmacien dans les tâches d'ordre technique, technologique et de gestion, mais n'a pas les connaissances nécessaires pour l'assister dans la surveillance de la thérapie médicamenteuse des patients","c":false},{"t":"Le technicien en pharmacie a les connaissances et la capacité d’analyse requise pour gérer différentes situations : supervision du travail technique, contrôle de la qualité, gestion du changement, du personnel et du parc technologique","c":false},{"t":"Un pharmacien peut établir qu’une tâche est de nature technique, et donc qu’elle peut être déléguée, si elle répond à ces 2 critères : 1) la tâche est composée d’une suite continue d’étapes claires, constituant la manière de faire, incluses dans une procédure et ayant un début et une fin; 2) la tâche ne nécessite pas de jugement professionnel ou de raisonnement clinique lors de son exécution","c":false},{"t":"Au Québec, l’appellation « assistant technique en pharmacie » est décernée à une personne ayant cumulé 480 heures de travail au laboratoire d’une pharmacie","c":true}],"f":"L'énoncé est FAUX!Au Québec, l’appellation « assistant technique en pharmacie » est décernée à un étudiant ayant un diplôme d’études professionnelles (DEP) en assistance-technique en pharmacie"},{"i":"06599","c":7,"q":"Parmi les énoncés suivants entourant la formation du personnel technique en pharmacie, lequel est FAUX?","a":[{"t":"Malgré sa formation de niveau collégial, le technicien en pharmacie ne devient pas membre de l'Ordre des pharmaciens du Québec (OPQ)","c":false},{"t":"L'Association québécoise des assistant(e)s-techniques en pharmacie (AQATP) permet à ses membres de partager des informations et de la formation continue et constitue par le fait même un syndicat professionnel","c":true},{"t":"Au niveau canadien, le détenteur d'une formation équivalente à une technique collégiale doit satisfaire aux exigences du Bureau des examinateurs en pharmacie du Canada (BEPC)","c":false},{"t":"L'assistant-technique en pharmacie n'a pas d'assurance professionnelle","c":false}],"f":"L'énoncé est FAUX!L'Association québécoise des assistant(e)s-techniques en pharmacie (AQATP) permet à ses membres de partager des informations et de la formation continue; il NE s'agit PAS d'un syndicat professionnel"},{"i":"06600","c":7,"q":"Parmi les énoncés suivants entourant l'obligation de l'immatriculation des étudiants en pharmacie, lequel est FAUX?","a":[{"t":"Le Conseil d’administration révoque l'immatriculation d'un étudiant en pharmacie si un étudiant abandonne définitivement ses études en pharmacie","c":false},{"t":"L'inscription des étudiants au registre de l'Ordre des pharmaciens du Québec (OPQ) doit être renouvelée annuellement","c":true},{"t":"Les modalités entourant l’immatriculation des étudiants en pharmacie sont définies en vertu du Règlement sur les conditions et modalités de délivrance des permis de l'Ordre des pharmaciens du Québec","c":false},{"t":"Dans le cadre d'un emploi en pharmacie, l'étudiant doit constamment porter l'étiquette que lui fournit par l'Ordre des pharmaciens du Québec (OPQ) afin de démontrer son inscription au registre","c":false}],"f":"L'énoncé est FAUX!L'inscription des étudiants au registre de l'Ordre des pharmaciens du Québec (OPQ) est valide pour toute la durée du programme"},{"i":"06601","c":7,"q":"Parmi les énoncés suivants entourant la formation en pharmacie partout à travers le Canada, lequel est FAUX?","a":[{"t":"Au Québec, l’étudiant en pharmacie est défini dans la Loi sur les services de santé et les services sociaux","c":true},{"t":"Au Québec, pour pouvoir être maître de stage, un pharmacien doit notamment avoir participé à au moins une activité de formation continue au cours de l'année précédente","c":false},{"t":"Les autorités provinciales et territoriales ayant entrepris de réglementer les activités des techniciens en pharmacie vont utiliser le certificat d’aptitude du Bureau des examinateurs en pharmacie du Canada (BEPC) pour les techniciens comme une de leurs exigences pour la délivrance du permis d’exercice","c":false},{"t":"Le Québec est la seule province canadienne où l’examen du Bureau des examinateurs en pharmacie du Canada (BEPC) n’est pas requis en vue de l'émission du permis d'exercice de pharmacien","c":false}],"f":"L'énoncé est FAUX!L’étudiant en pharmacie est défini en vertu de la Loi sur la pharmacie"},{"i":"06602","c":7,"q":"Parmi les énoncés suivants entourant la certification des pharmaciens au Québec, dans les autres provinces canadiennes et à l'étranger, lequel est FAUX?","a":[{"t":"Chaque province a ses propres exigences pour la délivrance d’un permis d’exercice comme l’expérience professionnelle, les habiletés langagières et des examens sur la jurisprudence","c":false},{"t":"Un pharmacien désirant exercer sa profession aux États-Unis n'a qu'à répondre à deux exigences: 1) obtenir un permis de travail; 2) satisfaire aux exigences linguistiques","c":true},{"t":"Le certificat d’aptitude émis par le Bureau des examinateurs en pharmacie du Canada (BEPC) ne donne PAS, d’office, le droit d’exercer la pharmacie","c":false},{"t":"De façon générale, on peut dire qu’un pharmacien québécois qui désire exercer la pharmacie en Europe doit satisfaire aux exigences de l’Ordre des pharmaciens et compléter avec succès une portion significative du cursus académique dans le pays ciblé","c":false}],"f":"L'énoncé est FAUX!Chaque état américain a ses propres critères d'admissibilité face aux candidats canadiens en plus de l'obtention du permis de travail et des exigences linguistiques"},{"i":"06603","c":7,"q":"Parmi les énoncés suivants entourant les activités réservées au pharmacien qui peuvent être exercées par des non-pharmaciens, lequel est FAUX?","a":[{"t":"Le pharmacien peut déléguer à un stagiaire en pharmacie l'évaluation de la condition physique et mentale d'un patient","c":false},{"t":"Bien que seul un pharmacien peut vendre des médicaments, un vétérinaire peut vendre des médicaments des annexes I, II ou III pour usage animal","c":true},{"t":"Bien que seul un pharmacien peut vendre des médicaments, un médecin peut obtenir un permis valide afin de vendre des médicaments à des patients en zone de faible densité de population et en l’absence de pharmacie d’officine","c":false},{"t":"C'est le Conseil d'administration de l'Ordre des pharmaciens du Québec (OPQ) qui détermine, parmi les activités professionnelles que peuvent exercer les pharmaciens, celles qui peuvent être exercées par des non-pharmaciens","c":false}],"f":"L'énoncé est FAUX!Bien que seul un pharmacien peut vendre des médicaments, un vétérinaire peut vendre des médicaments des annexes IV OU V pour usage animal"},{"i":"06656","c":8,"q":"Il existe plusieurs formes juridiques que peuvent prendre les entreprises québécoises. Parmi les énoncés suivants entourant ces formes juridiques, lequel est FAUX?","a":[{"t":"La société en nom collectif est composée de 2 personnes ou plus","c":false},{"t":"La société en participation ne possède pas de siège","c":false},{"t":"L’entreprise individuelle est la seule entreprise qui ne nécessite pas l’obtention d’un permis municipal","c":true},{"t":"Il existe 5 types de coopératives, soit les coopératives de producteurs, de consommateurs, de travail, de travailleurs actionnaires et de solidarité","c":false}],"f":"L’énoncé est FAUX!L’entreprise individuelle est soumise à l’obtention de permis municipaux ou gouvernementaux nécessaires à son exploitation"},{"i":"06657","c":8,"q":"Un professionnel de la santé peut être propriétaire de son bureau professionnel, de son cabinet ou de sa pharmacie. Parmi les énoncés suivants concernant les modalités entourant les contrats de société et d’association, lequel est VRAI?","a":[{"t":"À défaut de stipulation sur le mode de gestion, les associés sont réputés n’avoir aucun pouvoir de gestion","c":false},{"t":"En vertu du Code civil du Québec, les associés peuvent faire entre eux toute convention qu’ils jugent appropriée quant à leurs pouvoirs respectifs dans la gestion des affaires de la société","c":true},{"t":"L’exercice professionnel en association offre uniquement un partage des droits et des obligations","c":false},{"t":"L’exercice professionnel à titre de propriétaire unique garantit une grande autonomie et des profits assurés","c":false}],"f":"Bonne réponse![8.1 Définir les formes juridiques d’une entreprise au Québec]"},{"i":"06658","c":8,"q":"En vertu du Règlement sur l’exercice de la pharmacie en société, on précise le type d’entreprise au sein de laquelle le pharmacien peut exercer. Parmi les énoncés suivants entourant ce règlement, lequel est FAUX?","a":[{"t":"La société doit être une société par actions ou une société en nom collectif à responsabilité limitée","c":false},{"t":"La société est constituée majoritairement de pharmaciens et les parts sociales ou actions sont détenues principalement par des pharmaciens","c":true},{"t":"Le contrat écrit constituant la société ou permettant la continuation de la société en nom collectif à responsabilité limitée doit contenir, entre autres, les éléments suivants : le nom et le domicile professionnel de tous les associés, la date de la constitution de la société et le nom de la société","c":false},{"t":"Dans le cas d’une société par actions, la société ne peut utiliser aucun nom d’emprunt","c":false}],"f":"L’énoncé est FAUX!La société doit être constituée EXCLUSIVEMENT de pharmaciens et TOUTES les parts sociales doivent être détenues par des PHARMACIENS"},{"i":"06659","c":8,"q":"Au Québec, il existe différentes formes juridiques d'entreprises. Parmi les énoncés suivants entourant les formes d'entreprises, lequel est VRAI?","a":[{"t":"Une société par action ne permet pas de limiter la responsabilité des actionnaires à leur mise de fond","c":false},{"t":"Une société en nom collectif peut porter un nom commun aux associés, composé du nom d'un ou de tous les associés","c":true},{"t":"Une entreprise individuelle a une existence juridique propre","c":false},{"t":"Une société en participation regroupe au moins 10 personnes physiques ou morales.","c":false}],"f":"Bonne réponse![8.1 Définir les formes juridiques d’une entreprise au Québec]"},{"i":"06660","c":8,"q":"Afin de prendre une décision éclairée quant à l’achat ou non d’une pharmacie, la proposition d’affaires doit comporter certains éléments importants. Parmi les énoncés suivants entourant l’étude d’une proposition d’affaires, lequel est VRAI?","a":[{"t":"Une analyse de l’environnement interne peut inclure l’emplacement géographique, l’ambiance, le local, les produits et services, la qualité du personnel, le merchandising et l’association","c":true},{"t":"Une évaluation du chiffre d’affaires et de l’achalandage n’est pas pertinente dans la proposition d’affaires","c":false},{"t":"Une analyse de marché inclut l’identification des zones commerciales","c":false},{"t":"Une analyse de concurrence doit notamment inclure uniquement les éléments suivants : une évaluation des prix, une évaluation de la relation prix/qualité et une évaluation des capacités de production","c":false}],"f":"Bonne réponse![8.2 Identifier les différents types d’ententes commerciales en pharmacie]"},{"i":"06661","c":8,"q":"Avant d’acheter une pharmacie, il est pertinent d’avoir une vue d’ensemble des tendances en pharmacie. Parmi les énoncés suivants entourant les tendances en pharmacie, lequel est FAUX?","a":[{"t":"Une chaîne de pharmacie n’est pas obligatoirement membre de l’Association canadienne des chaînes de pharmacie","c":false},{"t":"Les pharmacies sous bannières sont gérées de manière indépendante et les propriétaires possèdent un degré d’autonomie élevé pour ce qui est de la commercialisation locale et des services professionnels","c":false},{"t":"Dans un contrat de franchise, le franchiseur détient normalement le bail principal des locaux où se trouve la pharmacie","c":false},{"t":"Les franchisés ne disposent d'aucune autonomie pour ce qui est de la commercialisation locale, des services d'achats et des services offerts en magasin","c":true}],"f":"L'énoncé est FAUX!Les franchisés disposent d'une CERTAINE autonomie pour ce qui est de la commercialisation locale, des services d'achats et des services offerts en magasin"},{"i":"06662","c":8,"q":"Les lignes directrices publiées en 1997 par l’Ordre des pharmaciens du Québec (OPQ) touchant à la propriété des pharmacies dégagent certains principes quant à la définition d’un bien. Parmi les énoncés suivants entourant les critères sur lesquels s’appuient ces lignes directrices, lequel est VRAI?","a":[{"t":"Le critère de «l’usus» prévoit que le propriétaire doit pouvoir user de son bien selon sa volonté tout en respectant les limites de la loi","c":true},{"t":"Le critère de «l’abusus» prévoit que le propriétaire doit pouvoir bénéficier des fruits de son opération et qu'il doit assumer les risques et pertes inhérents à cette opération","c":false},{"t":"Le critère de «l’usus» indique que le propriétaire doit pouvoir jouir pleinement de sa propriété","c":false},{"t":"Le critère du «fructus» indique que le propriétaire doit pouvoir disposer de son bien selon sa volonté","c":false}],"f":"Bonne réponse![8.3 Définir les conditions du droit de propriété au Québec et identifier les différences entre la pharmacie et le commerce adjacent]"},{"i":"06663","c":8,"q":"Il existe des différences tant au Canada que dans le reste de l’Amérique du Nord quant au droit de propriété d’une pharmacie. Parmi les énoncés suivants entourant le droit de propriété d’une pharmacie et l’aménagement de celle-ci, lequel est FAUX?","a":[{"t":"Au Canada, le droit de propriété exclusif aux pharmaciens ne s’applique qu’au Québec","c":false},{"t":"Au Québec, la présence d’un pharmacien pour l’exercice de la pharmacie est obligatoire","c":false},{"t":"Le Règlement sur la tenue des pharmacies permet la coexistence, dans un même immeuble, d’une pharmacie, où exerce le pharmacien, et d’un commerce à condition qu’ils soient sur des étages différents","c":true},{"t":"En vertu du Code de déontologie des pharmaciens, un pharmacien ne peut pas accepter que l’on se serve de son nom de sorte à faire croire qu’il est le véritable propriétaire de cette pharmacie alors que ce n'est pas le cas","c":false}],"f":"L’énoncé est FAUX!Le Règlement sur la tenue des pharmacies permet la coexistence, dans un même LOCAL, d’une pharmacie, lieu d’exercice du pharmacien, et d’autres activités commerciales, à la condition que la pharmacie doit physiquement distincte du commerce général par un mur d’au moins 2,13 mètres de hauteur"},{"i":"06664","c":8,"q":"Parmi les énoncés suivants entourant les éléments types des ententes contractuelles applicables à la pharmacie, lequel est FAUX?","a":[{"t":"Un contrat de société peut préciser les modalités entourant le retrait des affaires, comme la non-concurrence","c":false},{"t":"Un contrat de franchise peut préciser les modalités relatives à la confidentialité","c":false},{"t":"Dans un contrat de franchise, les droits et redevances peuvent être précisés","c":false},{"t":"Dans un contrat de société, les prémisses sont omises","c":true}],"f":"L'énoncé est FAUX!Un contrat de société comporte des énoncés généraux qui précisent les prémisses"},{"i":"06665","c":8,"q":"Parmi les énoncés suivants entourant le guide «Acquérir votre première pharmacie - réfléchir - planifier - agir» de l'Association québécoise des pharmaciens propriétaires, lequel est FAUX?","a":[{"t":"L'AQPP recommande de suivre au besoin des cours complémentaires en gestion d'entreprise et en gestion des ressources humaines","c":false},{"t":"En ce qui concerne l'action, l'AQPP recommande de reconnaître ses forces et ses faiblesses et afin de limiter la délégation","c":true},{"t":"En ce qui concerne l'action, le guide discute des négociations, de l'offre d'achat, de l'acte de vente, de l'enregistrement et de la gestion de la pharmacie","c":false},{"t":"En ce qui concerne la planification, le guide propose un tableau avec 11 points clés quant aux types d'ententes commerciales","c":false}],"f":"FAUX; En ce qui concerne l'action, l'AQPP recommande de reconnaître ses forces et ses faiblesses et de SAVOIR déléguer"},{"i":"06666","c":8,"q":"Les pharmaciens peuvent conclure certains contrats dans l'exercice de leur profession. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Dans la majorité des pays d'Europe, l'exclusivité du droit de propriété des pharmacies constitue la règle","c":false},{"t":"Le processus menant à la signature des ententes relatives à l'acquisition ou l'ouverture d'une pharmacie inclut la négociation d'un contrat de courtage","c":false},{"t":"Le contrat de vente d'une pharmacie est soumis à l'application du Règlement sur certains contrats que peuvent conclure les pharmaciens dans l'exercice de leur profession","c":false},{"t":"Le pharmacien propriétaire doit transmettre au secrétaire de l'Ordre des pharmaciens du Québec (OPQ) une copie conforme du contrat qu'il a conclu avant son entrée en vigueur","c":true}],"f":"L'énoncé est FAUX!Le pharmacien propriétaire doit transmettre au secrétaire de l'Ordre des pharmaciens du Québec (OPQ), dans les 30 JOURS où celui-ci lui EN FAIT LA DEMANDE, une copie conforme du contrat en vigueur qu'il a conclu"},{"i":"06667","c":8,"q":"Parmi les énoncés suivants entourant les formes juridiques que peuvent prendre les entreprises du Québec, lequel est FAUX?","a":[{"t":"La société en nom collectif (SENC) permet de déduire les pertes de la société des autres revenus des associés","c":false},{"t":"Toute entreprise doit notamment produire une déclaration d’immatriculation","c":false},{"t":"Une coopérative doit être minimalement constituée de 12 personnes","c":false},{"t":"L'actionnaire d'une société par actions possède notamment les biens de la société puisqu'il en détient les actions","c":true}],"f":"L'énoncé est FAUX!L’actionnaire possède des actions et les biens de la société ne lui appartiennent pas; ils sont propriété de la société"},{"i":"06668","c":8,"q":"Parmi les énoncés suivants entourant les formes juridiques que peuvent prendre les entreprises au Québec, lequel est FAUX?","a":[{"t":"Une société en commandite possède une existence distincte du point de vue fiscal","c":true},{"t":"Une coopérative possède un nom, un siège, des droits et obligations, des activités propres et des biens","c":false},{"t":"Une association se distingue d'une entreprise par le fait qu'elle est sans but lucratif","c":false},{"t":"La déclaration d'immatriculation permet d'obtenir un NEQ, soit un Numéro d'entreprise du Québec, afin de faire connaître au public l'identité de l'exploitant","c":false}],"f":"L'énoncé est FAUX!Une société en commandite NE possède PAS une existence distincte du point de vue fiscal"},{"i":"06669","c":8,"q":"Parmi les énoncés suivants entourant les tendances en pharmacie communautaire, lequel est FAUX?","a":[{"t":"En adhérant à un système de franchise, le pharmacien accepte de confier une partie importante de ses décisions d’entrepreneur au franchiseur","c":false},{"t":"Si le propriétaire d’une pharmacie sous bannière possède 5 pharmacies ou plus, on considère que ces pharmacies constituent une chaîne","c":false},{"t":"Une pharmacie indépendante est une pharmacie qui n’est affiliée à aucune bannière commerciale, à aucune franchise commerciale, ni à aucun programme de chaîne","c":false},{"t":"Une chaîne doit obligatoirement être membre de l’Association canadienne des chaînes de pharmacies","c":true}],"f":"L'énoncé est FAUX!Une chaîne N’est PAS obligatoirement membre de l’Association canadienne des chaînes de pharmacies."},{"i":"06670","c":8,"q":"Parmi les énoncés suivants entourant les conditions de droit de propriété en pharmacie, lequel est FAUX?","a":[{"t":"Au cas où un pharmacien propriétaire de pharmacie est rayé du Tableau de l’Ordre des pharmaciens du Québec (OPQ), le curateur peut administrer cette pharmacie pendant une période de 3 ans, en la plaçant sous la surveillance personnelle d'un pharmacien","c":false},{"t":"Au cas de décès d'un pharmacien propriétaire de pharmacie, l'héritier peut administrer cette pharmacie pendant les 3 mois qui suivent le décès, en la plaçant sous la surveillance personnelle d'un pharmacien durant cette période","c":true},{"t":"Toutes les législations en Amérique du Nord obligent la présence d’un pharmacien pour l’exercice de la pharmacie, nonobstant le propriétaire","c":false},{"t":"Un pharmacien ne peut permettre que son nom soit utilisé de sorte à faire croire qu’il est le propriétaire d’une pharmacie alors qu’il ne l’est pas","c":false}],"f":"L'énoncé est FAUX!Au cas de décès d'un pharmacien propriétaire de pharmacie, l'héritier peut administrer cette pharmacie pendant les 3 ANNÉES qui suivent le décès, en la plaçant sous la surveillance personnelle d'un pharmacien"},{"i":"06671","c":8,"q":"Parmi les énoncés suivants entourant les contrats que peuvent conclure les pharmaciens dans l'exercice de leur profession, lequel est FAUX?","a":[{"t":"Les déclarations pour société doivent être appuyées d'un serment devant un commissaire à l'assermentation qui doit mentionner lisiblement ses nom et résidence","c":false},{"t":"Un contrat d'approvisionnement en médicaments est soumis aux modalités du Règlement sur certains contrats que peuvent conclure les pharmaciens dans l’exercice de leur profession","c":false},{"t":"À chaque fois qu'il y a un changement dans les noms des associés d’une pharmacie, une déclaration contenant les nom, qualité et résidence de chacun des associés doit être faite et remise au secrétaire, dans un délai de trente jours","c":false},{"t":"Un contrat d'embauche d'un assistant technique en pharmacie est soumis aux modalités du Règlement sur certains contrats que peuvent conclure les pharmaciens dans l’exercice de leur profession","c":true}],"f":"L'énoncé est FAUX!Le Règlement sur certains contrats que peuvent conclure les pharmaciens dans l’exercice de leur profession ne s'applique pas dans ce cas"},{"i":"06672","c":8,"q":"Parmi les énoncés suivants entourant les contrats que peuvent conclure les pharmaciens avec les résidences pour aînés, lequel est VRAI?","a":[{"t":"Les pharmacies dans les résidences privées pour aînés sont souvent très petites, de sorte qu'il est possible d'entreposer des médicaments dans un autre local de la résidence, en autant que ce local ait un double système de sécurité pour y accéder","c":false},{"t":"Dans le contrat entre un pharmacien et une résidence pour aînés, une clause peut stipuler que les loyers de la pharmacie seront ajustés à la hausse ou à la baisse selon le taux d'occupation de la résidence","c":false},{"t":"En signant une entente avec une bannière, laquelle signe une entente avec une résidence privée pour aînés, le pharmacien propriétaire doit être en mesure de fournir la copie de l’entente avec la bannière","c":true},{"t":"Une personne nouvellement admise dans une résidence privée pour aînés doit faire affaire avec la pharmacie de la résidence afin de faciliter les processus de délivrance de médicaments et de suivi","c":false}],"f":"Bonne réponse![8.4 Expliquer les règles concernant les contrats que peuvent conclure les pharmaciens dans l’exercice de leur profession]"},{"i":"06673","c":8,"q":"Il faut savoir distinguer ce que sont les chaînes, bannières et franchises et les modalités entourant leurs contrats. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"Un contrat de société ne peut préciser les modalités entourant le retrait des affaires","c":false},{"t":"Un contrat de franchise ne peut préciser les modalités relatives à la confidentialité","c":false},{"t":"Les pharmacies de type «bannières» versent une cotisation leur donnant le droit d’utiliser un nom reconnu","c":true},{"t":"La possession par un propriétaire de deux pharmacies ou plus constitue une chaîne de pharmacie","c":false}],"f":"Bonne réponse![8.2 Identifier les différents types d’ententes commerciales en pharmacie]et  [8.4 Expliquer les règles concernant les contrats que peuvent conclure les pharmaciens dans l’exercice de leur profession]"},{"i":"06674","c":8,"q":"Parmi les énoncés suivants entourant la location de locaux en pharmacie et les baux, lequel est FAUX?","a":[{"t":"Toute personne qui ouvre une pharmacie doit envoyer au secrétaire de l'Ordre des pharmaciens du Québec (OPQ), par lettre recommandée ou certifiée, une copie de son titre ou de son bail","c":false},{"t":"Le bail de location doit généralement inclure l’intention des parties","c":false},{"t":"Le bail de location d'une pharmacie comprend généralement des modalités précisant les assurances","c":false},{"t":"Un pharmacien peut louer un local dans une résidence privée pour aînés et y vendre des médicaments, en autant qu'il se limite aux médicaments inscrits aux annexes 2 et 3","c":true}],"f":"L’énoncé est FAUX!Le pharmacien ne peut exercer sa profession que dans une pharmacie, donc vendre des médicaments inscrits aux annexes 2 et 3 dans un local qui n'est pas une pharmacie est interdit"},{"i":"06675","c":8,"q":"Parmi les énoncés suivants entourant les contrats qui peuvent être signés dans un cadre professionnel, lequel est FAUX?","a":[{"t":"Un contrat tel que défini dans le Règlement sur certains contrats que peuvent conclure les pharmaciens dans l’exercice de leur profession doit être constaté par un écrit et être clairement et lisiblement rédigé, en au moins 2 exemplaires sur support papier","c":false},{"t":"La part de chaque associé dans l'actif, dans les bénéfices et dans la contribution aux pertes est égale si elle n'est pas déterminée par le contrat de société","c":false},{"t":"Le processus menant à la signature des ententes relatives à l’acquisition ou l’ouverture d’une pharmacie inclut notamment la négociation des contrats préliminaires, principaux, de courtage et en périphérie","c":false},{"t":"Si le contrat avec un pharmacien salarié stipulait une clause de non-concurrence, l'employeur pourra s'en prévaloir même s'il congédie le salarié sans motif sérieux","c":true}],"f":"L'énoncé est FAUX!L'employeur NE peut PAS se prévaloir d'une stipulation de non-concurrence, s'il a résilié le contrat sans motif sérieux"},{"i":"06676","c":8,"q":"Parmi les énoncés suivants entourant les lois qui encadrent le droit de propriété et les contrats qui s'y rattachent, lequel est FAUX?","a":[{"t":"Le Loi sur la pharmacie précise les modalités entourant les obligations de loyauté et les clauses de non-concurrence","c":true},{"t":"Le Code civil du Québec définit les modalités entourant les contrats de société et d'association","c":false},{"t":"Le Code de déontologie des pharmaciens précise qu’il est dérogatoire que l’on se serve de son nom comme donnant lieu de croire qu’on est propriétaire d’une pharmacie si on ne l’est pas vraiment","c":false},{"t":"Le Code des professions définit l’exercice des activités professionnelles au sein d’une société en nom collectif à responsabilité limitée ou d’une société par actions","c":false}],"f":"L'énoncé est FAUX!Le CODE CIVIL du Québec précise les modalités entourant les obligations de loyauté et les clauses de non-concurrence"},{"i":"06737","c":9,"q":"Parmi les énoncés suivants entourant l’affichage en pharmacie, lequel est VRAI?","a":[{"t":"Le pharmacien propriétaire doit, dans la section des médicaments en vente libre, disposer au moins une affiche incitant les patients à consommer des médicaments afin d'en retirer des bénéfices pour leur santé","c":false},{"t":"Le pharmacien propriétaire d’une pharmacie, les pharmaciens exerçant régulièrement dans cette pharmacie et les pharmaciens remplaçants doivent afficher, à la vue du public, à l’intérieur de celle-ci, leur permis d’exercice","c":false},{"t":"L’affiche externe doit absolument permettre de reconnaître les pharmaciens exerçant dans la pharmacie","c":false},{"t":"Le pharmacien propriétaire doit, dans la section des médicaments en vente libre, disposer au moins une affiche incitant les patients à demander conseil au pharmacien lors de l’achat d’un médicament","c":true}],"f":"Bonne réponse![9.1 Définir les modalités d’aménagement et d’affichage dans une pharmacie]"},{"i":"06738","c":9,"q":"L’Ordre des pharmaciens du Québec (OPQ), en plus de protéger le public, doit veiller à l’aménagement adéquat de la pharmacie en respect des lois et règlements qui s’appliquent. Parmi les énoncés suivants entourant l’aménagement d’une pharmacie, lequel est FAUX?","a":[{"t":"La pharmacie doit être délimitée du commerce adjacent par un mur de 2,13 mètres de hauteur et les ouvertures donnant accès à celle-ci ne peuvent dépasser une largeur maximale de 2 mètres","c":false},{"t":"Les médicaments de l’annexe III du Règlement sur les conditions et modalités de vente des médicaments doivent être dans la pharmacie dans une zone non accessible au public","c":true},{"t":"Les substances toxiques doivent être conservées dans une zone réservée aux professionnels et à l’équipe de soutien","c":false},{"t":"En vertu du Règlement sur la tenue des pharmacies, une pharmacie doit comprendre une aire de confidentialité","c":false}],"f":"L’énoncé est FAUX!Les médicaments de l’annexe III du Règlement sur les conditions et modalités de vente des médicaments PEUVENT être dans une zone ACCESSIBLE au public"},{"i":"06739","c":9,"q":"Il ne suffit pas de détenir un permis d'exercice ou même d'être propriétaire d'une pharmacie pour que la tenue de celle-ci soit appropriée. Parmi les énoncés suivants entourant la tenue de pharmacie, lequel est VRAI?","a":[{"t":"Un pharmacien n'a pas le droit de tenir des médicaments de l'annexe III à l'intérieur de la zone réservée aux professionnels et à son équipe de soutien","c":false},{"t":"Le pharmacien propriétaire d'une pharmacie doit placer, près de chaque porte donnant accès à celle-ci, une affiche ou une enseigne visible de l'extérieur de la pharmacie et indiquant son nom, accompagnée ou non du symbole graphique de l'Ordre des pharmaciens du Québec (OPQ)","c":false},{"t":"Le commerce adjacent peut être situé à l'intérieur de la pharmacie s'il est la propriété du pharmacien","c":false},{"t":"En vertu du Règlement sur la tenue des pharmacies, il faut disposer à la vue du public au moins une affiche incitant le public à conserver tout médicament hors de la portée des enfants et à demander conseil au pharmacien lors de l'achat d'un médicament","c":true}],"f":"Bonne réponse![9.1 Définir les modalités d’aménagement et d’affichage dans une pharmacie]"},{"i":"06740","c":9,"q":"Alors que vous travaillez en pharmacie communautaire comme étudiant en pharmacie, un client vous demande où se situent les crèmes solaires. Parmi les énoncés suivants entourant la disposition des différents produits en pharmacie, lequel est FAUX?","a":[{"t":"Les laits maternisés et les biberons peuvent être placés à l’intérieur de la pharmacie","c":false},{"t":"Les médicaments de l’annexe III du Règlement sur les conditions et modalités de vente des médicaments sont obligatoirement placés dans la pharmacie","c":false},{"t":"Le chocolat sans sucre et les bonbons sont placés à l’extérieur de la pharmacie","c":false},{"t":"Les crèmes solaires et les crèmes auto-bronzantes, de même que les crèmes épilatoires peuvent être placées à l’intérieur ou à l’extérieur de la pharmacie","c":true}],"f":"L’énoncé est FAUX!Les crèmes auto-bronzantes doivent obligatoirement être placées à l’EXTÉRIEUR de la pharmacie"},{"i":"06741","c":9,"q":"La tenue de pharmacie inclut l'entreposage approprié des médicaments. Parmi les énoncés entourant l'entreposage, lequel est FAUX?","a":[{"t":"Tous les médicaments conservés dans une pharmacie doivent être gardés à une température variant entre 15 et 30ºC, sauf ceux dont l'étiquette indique qu'ils doivent être réfrigérés","c":false},{"t":"Le pharmacien doit s'assurer que le local dont il dispose permet un entreposage à des températures adéquates, une gestion sécuritaire des substances toxiques, une gestion sécuritaire des médicaments périmés et une gestion des lots de médicaments","c":false},{"t":"Les médicaments nécessitant une réfrigération doivent être conservés entre 4 et 8°C","c":true},{"t":"Chaque pharmacie doit posséder un réfrigérateur pour entreposer les médicaments et il doit être réservé exclusivement à la conservation des médicaments","c":false}],"f":"L’énoncé est FAUX!Les médicaments nécessitant une réfrigération doivent être conservés entre 2 à 8°C"},{"i":"06742","c":9,"q":"Parmi les énoncés suivants entourant ce qui peut être tenu à l'intérieur et/ou à l'extérieur de la pharmacie, lequel est VRAI?","a":[{"t":"Il est permis de tenir à l'intérieur de la pharmacie des bavoirs, des dispositifs de sécurité, des gels à cheveux, des lunettes de lecture, des crèmes épilatoires et des brosses à dents électriques","c":false},{"t":"Il est permis de tenir à l'intérieur de la pharmacie des lunettes de soleil, des produits pour les soins de la peau, des substituts de sel et des teintures à cheveux","c":false},{"t":"Il est interdit de tenir des produits, services et moyens amaigrissants (PSMA) dans la pharmacie ou dans le commerce adjacent","c":false},{"t":"Un pharmacien peut notamment tenir en pharmacie les produits destinés aux soins et à l'hygiène dentaire et corporelle et les laits maternisés et les articles servant à leur administration","c":true}],"f":"Bonne réponse![9.2 Identifier les produits et médicaments qui doivent se trouver en pharmacie et les conditions d’entreposage]"},{"i":"06743","c":9,"q":"Parmi les énoncés suivants entourant la tenue des dossiers patients, lequel est FAUX?","a":[{"t":"Le dossier patient ne doit contenir que les informations relatives aux ordonnances qui ont été approuvées par le pharmacien et exécutées","c":true},{"t":"Les dispositions du Règlement sur la tenue des dossiers s’appliquent tant chez l’humain que chez l’animal","c":false},{"t":"La date de naissance et le sexe du patient figurent parmi les informations à inscrire obligatoirement au dossier patient d’un enfant de 3 ans","c":false},{"t":"Les médicaments vendus en annexe II doivent être inscrits au dossier-patient","c":false}],"f":"L’énoncé est FAUX!Lors d’un refus d’exécuter une ordonnance, la date et la raison du refus doivent être inscrites dans le dossier-patient"},{"i":"06744","c":9,"q":"La tenue de pharmacie inclut la tenue de dossiers. Le pharmacien doit assurer la garde des dossiers patients en tenant compte d'un ensemble de règles visant à protéger le patient. Parmi les énoncés suivants entourant la tenue de dossiers, lequel est VRAI?","a":[{"t":"Les renseignements suivants doivent notamment être consignés au dossier de chaque patient: nom et prénom, adresse, date de naissance, sexe","c":true},{"t":"Un dossier-patient ne peut qu'être fermé sous une seule condition, soit le décès du patient","c":false},{"t":"Les originaux d'ordonnances doivent être conservés pour une période d'au moins 5 ans","c":false},{"t":"Un pharmacien doit tenir à l'endroit où il exerce sa profession un dossier pour chaque patient pour le compte de qui une vente est effectuée","c":false}],"f":"Bonne réponse![9.3 Identifier les dispositions relatives à la tenue du dossier patient]"},{"i":"06745","c":9,"q":"Compte tenu de la pénurie de ressources observées depuis quelques années, on assiste de plus en plus à des fermetures temporaires de pharmacies. Parmi les énoncés suivants entourant les procédures en cas de fermeture temporaire, lequel est FAUX?","a":[{"t":"L’Ordre des pharmaciens du Québec (OPQ) suggère d’aviser, au moins 15 jours à l’avance, le secrétaire général via le service de l’inscription, de la date prévue pour la fermeture temporaire","c":false},{"t":"Lors d'une fermeture temporaire, l'Ordre des pharmaciens du Québec (OPQ) suggère de documenter au dossier-patient durant les 2-3 derniers renouvellements, la remise d'un avis de fermeture","c":false},{"t":"Dans le cas d’une fermeture temporaire de sa pharmacie habituelle, un patient peut transférer toutes ses ordonnances, incluant celle d'oxycodone","c":true},{"t":"Le pharmacien propriétaire qui ferme temporairement sa pharmacie devrait indiquer sur une affiche extérieure ce qu’il faut faire en cas d’urgence","c":false}],"f":"L’énoncé est FAUX!Le patient NE peut PAS transférer son ordonnance d'oxycodone"},{"i":"06746","c":9,"q":"Parmi les énoncés suivants entourant les procédures et les délais à respecter lors d’un achat/vente d’une pharmacie, lors d’association/dissociation avec d’autres pharmaciens et lors de déménagements, lequel est VRAI?","a":[{"t":"Lors de la fermeture d’une pharmacie, 24 heures sont nécessaires à la RAMQ pour la modification de la ligne interactive","c":false},{"t":"Il faut aviser l’Ordre des pharmaciens du Québec (OPQ) dans les 30 jours qui suivent l’acquisition ou la vente d’une pharmacie","c":true},{"t":"Lors de l’ouverture d’une pharmacie, le délai requis par la RAMQ pour modification de la ligne interactive est de 2 semaines","c":false},{"t":"Lors d’un déménagement, seul le sous-bail de location est requis par l’Ordre des pharmaciens du Québec (OPQ)","c":false}],"f":"Bonne réponse![9.4 Décrire les modalités entourant l’achat/vente, association/dissociation, fermeture, ouverture et déménagements d’une pharmacie ou le décès d’un pharmacien]"},{"i":"06747","c":9,"q":"En vertu du Règlement sur la conservation, l’utilisation ou la destruction des dossiers, livres et registres d’un pharmacien cessant d’exercer, on précise les modalités en cas de cessation d’exercice définitive ou temporaire. Parmi les énoncés suivants entourant les dispositions de ce règlement, lequel est FAUX?","a":[{"t":"S’il trouve preneur, le pharmacien propriétaire qui cesse définitivement d’exercer sa profession, doit indiquer au secrétaire de l’Ordre des pharmaciens du Québec (OPQ) les nom, adresse et numéros de téléphone du preneur","c":false},{"t":"Le preneur doit envoyer au secrétaire de l’Ordre des pharmaciens du Québec (OPQ), copie de son engagement écrit de prendre possession des dossiers, livres et registres du pharmacien qui cesse d’exercer au moins 15 jours avant la date fixée pour la cessation d’exercice","c":false},{"t":"Le pharmacien propriétaire qui cesse d’exercer définitivement sa profession pour toute autre cause que le décès doit aviser le secrétaire de l’Ordre des pharmaciens du Québec (OPQ) s'il trouve preneur","c":false},{"t":"Les dispositions du Règlement sur la conservation, l’utilisation ou la destruction des dossiers, livres et registres d’un pharmacien cessant d’exercer ne concernent que les cas de cessation d’exercice définitive ou temporaire sans aborder les cas de décès","c":true}],"f":"L’énoncé est FAUX!La section III du  Règlement sur la conservation, l’utilisation ou la destruction des dossiers, livres et registres d’un pharmacien cessant d’exercer aborde les cas de décès d’un pharmacien propriétaire"},{"i":"06748","c":9,"q":"Le pharmacien propriétaire, bien qu’il désire fournir des services de qualité à sa clientèle, est en compétition avec ses collègues. Parmi les énoncés suivants entourant la publicité en pharmacie communautaire, lequel est VRAI?","a":[{"t":"Le pharmacien doit défrayer lui-même le coût de la publicité qu’il diffuse ou permet de diffuser","c":true},{"t":"Le pharmacien ne peut annoncer de rabais ou ristourne applicable à l’achat d’un médicament, mais il peut utiliser, dans sa publicité, un témoignage de reconnaissance","c":false},{"t":"Les dispositions du Code de déontologie des pharmaciens ne s’appliquent qu’à la publicité visuelle (ex. : télévision)","c":false},{"t":"Le Code de déontologie des pharmaciens encadre la publicité entourant le commerce adjacent de la pharmacie","c":false}],"f":"Bonne réponse![9.5 Déterminer si une réclame publicitaire sur un service professionnel est conforme]"},{"i":"06749","c":9,"q":"En ce qui concerne la gestion des retours en pharmacie, lequel des énoncés suivants est FAUX?","a":[{"t":"Le pharmacien doit accepter de gérer les contenants de déchets cytotoxiques utilisés à domicile par les patients","c":false},{"t":"En vertu du Règlement sur la tenue des pharmacies, les médicaments périmés doivent être conservés distinctement des autres médicaments ou des substances servant à la préparation des médicaments","c":false},{"t":"Les déchets biomédicaux infectieux ne peuvent pas être traités par autoclave et enfouis à des fins de destruction","c":true},{"t":"Les pharmaciens peuvent donner aux patients qui s'injectent des médicaments cytotoxiques un contenant sécuritaire fourni gratuitement par le Ministère de la santé et des services sociaux (MSSS) aux personnes qui utilisent des seringues et des aiguilles à des fins domestiques","c":false}],"f":"L'énoncé est FAUX!Les déchets biomédicaux infectieux PEUVENT être traités par autoclave et enfouis à des fins de destruction"},{"i":"06750","c":9,"q":"En ce qui concerne les différentes annexes dans lesquelles les médicaments peuvent être classés, lequel des énoncés suivants est FAUX?","a":[{"t":"Les médicaments destinés aux humains et vendus sur ordonnance sont inscrits à l'annexe I du Règlement sur les conditions et modalités de vente des médicaments.","c":false},{"t":"Les médicaments de l'annexe III peuvent être à la portée du public sans surveillance pharmaceutique","c":true},{"t":"En vertu du Règlement sur les conditions et modalités de vente des médicaments, les médicaments sont classés en 5 annexes qui déterminent les modalités de vente","c":false},{"t":"Les médicaments destinés aux animaux et vendus sur ordonnance sont inscrits à l'annexe IV du Règlement sur les conditions et modalités de vente des médicaments","c":false}],"f":"L'énoncé est FAUX!Les médicaments de l'annexe III peuvent être à la portée du public AVEC surveillance pharmaceutique"},{"i":"06751","c":9,"q":"Le dossier patient est un des éléments les plus importants de la pratique du pharmacien. Parmi les énoncés suivants entourant les dispositions relatives à la tenue du dossier patient, lequel est FAUX?","a":[{"t":"Il est permis de consigner une ordonnance destinée à un animal au dossier du propriétaire de celui-ci","c":true},{"t":"Tout pharmacien ne peut pas constituer pour des médecins des listes de patients, à moins d’avoir reçu de chaque patient un consentement libre, éclairé, manifeste et à des fins spécifiques","c":false},{"t":"Lorsqu'un pharmacien remet un médicament pour usage professionnel, il est important de constituer un dossier au nom du professionnel à l'origine de la réquisition, et de mentionner que les produits qui y apparaissent sont pour usage professionnel","c":false},{"t":"Bien que la réglementation spécifie une période de conservation de 2 ans, il est recommandé de conserver les informations relatives au dossier patient et aux ordonnances originales pour une période de 10 ans","c":false}],"f":"L'énoncé est FAUX!Il est incorrect au plan légal, et possiblement même dangereux au plan clinique, de consigner une ordonnance destinée à un animal au dossier du propriétaire de celui-ci"},{"i":"06752","c":9,"q":"Parmi les énoncés suivants entourant le Code Médicament, lequel est FAUX?","a":[{"t":"Les pharmaciens peuvent, selon leur jugement, afficher les lettres du Code Médicament pour les produits de santé naturels (PSN) lorsqu’elles s’appliquent","c":false},{"t":"La lettre-code E indique que le médicament est déconseillé pour une personne souffrant de diabète","c":false},{"t":"Le Code Médicament est composé de 5 lettres alphabétiques","c":true},{"t":"Le Code Médicament vise à identifier des précautions particulières qui s'appliquent à certains produits","c":false}],"f":"L'énoncé est FAUX!Le Code Médicament est composé de 6 LETTRES alphabétiques"},{"i":"06753","c":9,"q":"Parmi les énoncés suivants entourant la télésanté et la télépharmacie, lequel est FAUX?","a":[{"t":"La Loi sur la pharmacie établit les balises de la télépharmacie au Québec","c":true},{"t":"La télésanté peut s'exercer dans plusieurs champs pharmaceutiques, dont la consultation, l'éducation au patient et la surveillance","c":false},{"t":"La télésanté se définit comme une activité, un service ou un système lié à la santé ou aux services sociaux, pratiqué à distance, au moyen des technologies de l’information et des communications","c":false},{"t":"La télésanté et la télépharmacie assurent un meilleur accès à divers services de soins de santé","c":false}],"f":"L'énoncé est FAUX!Il revient à l’Ordre des pharmaciens du Québec (OPQ) d’établir les balises de la télépharmacie"},{"i":"06754","c":9,"q":"Parmi les énoncés suivants entourant les mécanismes mis en place au Québec afin de soutenir la gestion des pénuries de médicaments, lequel est FAUX?","a":[{"t":"Le Ministère de la santé et des services sociaux (MSSS) participe à un comité canadien principalement composé de pharmaciens sur les pénuries de médicaments avec les autres provinces","c":true},{"t":"La Régie de l'assurance maladie du Québec (RAMQ) public dans ses infolettres des avis de rupture de stock","c":false},{"t":"Le Ministère de la santé et des services sociaux (MSSS) tient périodiquement une téléconférence du comité des partenaires afin de faire le point sur les pénuries","c":false},{"t":"Le Ministère de la santé et des services sociaux (MSSS) chapeaute un comité des partenaires impliquant la direction des affaires pharmaceutiques, les principaux ordres professionnels, des pharmaciens d’officine et d’établissement afin de discuter de certaines problématiques de ruptures","c":false}],"f":"L'énoncé est FAUX!Le Ministère de la santé et des services sociaux participe à un comité canadien sur les pénuries de médicaments avec les autres provinces, mais les pharmaciens en exercice NE participent malheureusement PAS à ce comité"},{"i":"06755","c":9,"q":"Parmi les énoncés suivants entourant les réfrigérateurs de médicaments et le maintien de la chaîne de froid, lequel est VRAI?","a":[{"t":"Le pharmacien doit veiller à ce que le nettoyage d'un réfrigérateur de médicaments est fait au moins 1 fois par année","c":false},{"t":"Les réfrigérateurs de style bar est déconseillé en raison de l'accumulation de glace qui accentue les variations de température","c":true},{"t":"Afin de maintenir la chaîne de froid lors d'une livraison d'un médicament réfrigéré, il est recommandé que le médicament en contact direct avec un accumulateur de froid","c":false},{"t":"Il est recommandé de noter la température des réfrigérateurs de médicaments 1 fois par jour","c":false}],"f":"Bonne réponse![9.2 Identifier les produits et médicaments qui doivent se trouver en pharmacie et les conditions d’entreposage]"},{"i":"06756","c":9,"q":"Parmi les énoncés suivants entourant la publicité de services pharmaceutiques et de médicaments, lequel est VRAI?","a":[{"t":"Le pharmacien peut notamment se désigner dans une publicité à titre de pharmacien-clinicien ou de pharmacien-hospitalier","c":false},{"t":"Une publicité professionnelle ne peut porter sur un médicament visé à l’une des annexes I, II et IV du Règlement sur les conditions et modalités de vente des médicaments même si c’est dans le but d’informer votre clientèle de la disponibilité d’un médicament en rupture d’approvisionnement","c":true},{"t":"Même si la publicité professionnelle ne fait pas mention d’une ou plusieurs activités réservées et/ou n’indique aucune affiliation, la mention de «pharmacien propriétaire» est obligatoire","c":false},{"t":"Une publicité professionnelle d'une pharmacie peut contenir des termes comparatifs ou superlatifs tels que «ici, on ne vous traite pas comme un numéro» ou «nous sommes spécialisés en...», seulement sur les réseaux sociaux","c":false}],"f":"Bonne réponse![9.5 Déterminer si une réclame publicitaire sur un service professionnel est conforme]"},{"i":"06757","c":9,"q":"Parmi les énoncés suivants entourant la gestion des retours de médicaments et des déchets, lequel est FAUX?","a":[{"t":"Il est interdit aux pharmaciens de demander des frais lorsqu’ils contribuent à l’élimination sécuritaire des déchets cytotoxiques, même ceux qui ne peuvent être éliminés dans le cadre du programme mis en place par le Ministère de la santé et des services sociaux (MSSS) du Québec","c":true},{"t":"Le pharmacien doit procéder à la récupération sécuritaire des instruments médicaux qui ont été utilisés dans le cadre de l’administration de médicaments et qui sont susceptibles d’avoir été contaminés par des liquides biologiques","c":false},{"t":"Les déchets cytotoxiques doivent être incinérés à haute température à des fins de destruction","c":false},{"t":"Les contenants jaunes fournis par le Ministère de santé et des services sociaux (MSSS) du Québec ne doivent pas être utilisés pour y déposer des déchets ayant été en contact avec le méthotrexate","c":false}],"f":"L'énoncé est FAUX!RIEN n'empêche les pharmaciens de demander des frais raisonnables lorsqu’ils contribuent à l’élimination sécuritaire des déchets cytotoxiques qui ne peuvent être éliminés dans le cadre du programme mis en place par le MSSS"},{"i":"06758","c":9,"q":"Parmi les énoncés suivants entourant les médicaments pour les animaux, lequel est VRAI?","a":[{"t":"Les préparations qui contiennent des ingrédients destinés uniquement aux animaux et qui ne peuvent pas être consommés par les humains doivent être effectuées dans un local distinct de celui des préparations pour les humains","c":true},{"t":"Les médicaments destinés aux animaux sont inscrits aux annexes III et IV en vertu du Règlement sur les conditions et modalités de vente des médicaments","c":false},{"t":"La validation d'ordonnance pour un animal revient au vétérinaire, donc il ne faut s'assurer que de remettre ce qui est inscrit sur l'ordonnance","c":false},{"t":"En vertu de la Loi sur la pharmacie, les règles entourant les catégories de médicaments et les conditions et modalités de vente doivent être identiques pour un même médicament selon s'il est destiné à la consommation humaine ou animale","c":false}],"f":"Bonne réponse![9.2 Identifier les produits et médicaments qui doivent se trouver en pharmacie et les conditions d’entreposage]et[9.3 Identifier les dispositions relatives à la tenue du dossier patient]"},{"i":"06759","c":9,"q":"Les technologies ne cessent de gagner du terrain, même dans le domaine de la santé! Parmi les énoncés suivants entourant la télésanté et les publicités de services pharmaceutiques, lequel est VRAI?","a":[{"t":"Les dispositions en vigueur du Code de déontologie des pharmaciens s’appliquent à la publicité sur Internet","c":false},{"t":"La définition de télésanté inclut les consultations par téléphone","c":false},{"t":"La télépharmacie est interdite au Québec, mais autorisée dans d'autres provinces","c":false},{"t":"Une publicité professionnelle ne peut être publiée sur la page Facebook créée pour le commerce adjacent d’une pharmacie","c":true}],"f":"Bonne réponse![9.1 Définir les modalités d’aménagement et d’affichage dans une pharmacie]et[9.5 Déterminer si une réclame publicitaire sur un service professionnel est conforme]"},{"i":"06760","c":9,"q":"Les standards de pratiques de l'Ordre des pharmaciens du Québec (OPQ) sont divisés en 4 volets. Parmi les associations suivantes entre les volets et leurs énoncés respectifs, laquelle est VRAIE?","a":[{"t":"Organisation et sécurité des soins et services pharmaceutiques- Le pharmacien met en place des mécanismes de contrôle pour éviter les diversions","c":false},{"t":"Organisation et sécurité des soins et services pharmaceutiques- Le pharmacien s’assure que les médicaments sont entreposés et transportés dans des conditions nécessaires à leur stabilité et à leur intégrité","c":false},{"t":"Gestion des médicaments- Le pharmacien s’assure de l’efficience et de la sécurité du circuit du médicament","c":false},{"t":"Gestion des médicaments- Le pharmacien s’assure que la destruction des médicaments et des instruments est sécuritaire et respecte les normes légales et environnementales","c":true}],"f":"Bonne réponse![9.1 Définir les modalités d’aménagement et d’affichage dans une pharmacie]et[9.6 Identifier les obligations en matière de gestion des retours de médicaments et des déchets]"},{"i":"06761","c":9,"q":"En pharmacie, il faut tenir de nombreux registres! Parmi les énoncés suivants entourant les registres, lequel est FAUX?","a":[{"t":"Les factures de tous les fournisseurs doivent être conservées dans un registre réservé exclusivement à cette fin, en plus de retranscrire dans un cahier toutes les informations sur les achats","c":true},{"t":"La Régie de l’assurance maladie du Québec (RAMQ) peut réclamer à un pharmacien le coût des services qu’elle lui a erronément payés au cours des 10 ans précédents, donc conserver les registres pour une période de 10 ans constitue une bonne pratique","c":false},{"t":"Afin de détecter rapidement les divergences entre les ordonnances, la saisie et le registre des ventes, il est recommandé d'en faire une vérification quotidienne ou hebdomadaire","c":false},{"t":"Le registre de température des réfrigérateurs doit être conservé pendant une période minimale de 2 ans","c":false}],"f":"L'énoncé est FAUX!Il N’est PAS nécessaire de retranscrire toutes les informations sur vos achats dans un cahier, en autant que les factures de tous vos fournisseurs soient conservées dans un registre réservé exclusivement à cette fin"},{"i":"06830","c":10,"q":"Afin de bien saisir la portée d'une ordonnance, il est important de ne pas confondre plusieurs termes utilisés aux fins du droit de prescrire. Parmi les énoncés suivants entourant les définitions du terme «ordonnance», lequel est FAUX?","a":[{"t":"En vertu du Règlement sur les normes relatives aux ordonnances faites par un médecin, une ordonnance collective est une prescription donnée par un médecin ou un groupe de médecins à une personne habilitée, ayant notamment pour objet les médicaments, et qui vise un groupe de personnes","c":false},{"t":"En français, le forme écrit de l'ordonnance doit être désignée par le terme «prescription»","c":true},{"t":"En vertu du Code des professions, une ordonnance est une prescription donnée à un professionnel par un médecin, par un dentiste ou par un professionnel habileté par la loi ayant notamment pour objet les médicaments","c":false},{"t":"En vertu de la Loi sur la pharmacie, une ordonnance est une autorisation de fournir un médicament","c":false}],"f":"L'énoncé est FAUX!En français, le forme écrit de la PRESCRIPTION doit être désignée par le terme «ORDONNANCE»"},{"i":"06831","c":10,"q":"Les cadres législatifs canadien et québécois présentent plusieurs définitions qui touchent à la pratique de la pharmacie. Parmi les définitions suivantes, laquelle est VRAIE?","a":[{"t":"En vertu du Règlement sur les normes relatives aux ordonnances faites par un médecin, un protocole médical externe est une description des procédures, méthodes, limites ou normes applicables pour une condition particulière dans un établissement","c":true},{"t":"En vertu du Code des professions, une ordonnance signifie une prescription donnée à un professionnel par un médecin ou un groupe de médecin ayant notamment pour objet le diagnostic","c":false},{"t":"En vertu de la Loi règlementant certaines drogues et autres substances, un praticien est une personne qui, en vertu des lois d’une province, est agréée et est autorisée à exercer dans cette province la profession de médecin, de dentiste ou de pharmacien","c":false},{"t":"En vertu de la Loi sur la pharmacie, une ordonnance est un ordre de fournir un médicament","c":false}],"f":"Bonne réponse![10.1 Définir les concepts de prescrire et d’ordonnance]"},{"i":"06832","c":10,"q":"En comparant les champs d'exercice de différents professionnels de la santé, on est à même de mieux comprendre le rôle de chacun. Parmi les associations suivantes entourant l'exercice professionnel, laquelle est VRAIE?","a":[{"t":"Infirmières- Contribuer à l'évaluation de l'état de santé d'une personne et à la réalisation du plan de soins, prodiguer des soins et des traitements infirmiers et médicaux dans le but de maintenir la santé, de la rétablir et de prévenir la maladie et fournir des soins palliatifs","c":false},{"t":"Ergothérapeutes- Évaluer les déficiences et les incapacités de la fonction physique reliées aux systèmes neurologique, musculosquelettique et cardiorespiratoire","c":false},{"t":"Inhalothérapeutes- Contribuer à l'évaluation de la fonction cardio-respiratoire à des fins diagnostiques ou de suivi thérapeutique, contribuer à l'anesthésie et traiter les problèmes qui affectent le système cardiorespiratoire","c":true},{"t":"Physiothérapeutes- Évaluer les habiletés fonctionnelles d'une personne, déterminer et mettre en œuvre un plan de traitement et d'intervention","c":false}],"f":"Bonne réponse![10.3 Définir les champs de pratique et les activités réservées des principales professions de la santé au Québec]"},{"i":"06833","c":10,"q":"La comparaison des divers champs d’exercice des professionnels de la santé mène inévitablement à la comparaison de leurs activités réservées. Parmi les énoncés suivants entourant les activités réservées dans le milieu de la santé, lequel est FAUX?","a":[{"t":"L’activité d’ajuster la thérapie médicamenteuse est réservée aux infirmiers, aux inhalothérapeutes et aux pharmaciens","c":true},{"t":"L’activité de prescrire des traitements est réservée aux médecins et à certaines infirmières","c":false},{"t":"L’activité d’effectuer l’évaluation physique du patient est réservée aux médecins, infirmières, physiothérapeutes, ergothérapeutes, orthophonistes, audiologistes et pharmaciens","c":false},{"t":"L’activité de décider des mesures de contention est réservée aux médecins, aux infirmières, aux physiothérapeutes et aux ergothérapeutes","c":false}],"f":"L'énoncé est FAUX!L’activité d’ajuster des MÉDICAMENTS selon une ordonnance est réservée aux infirmiers, aux inhalothérapeutes et aux pharmaciens"},{"i":"06834","c":10,"q":"En plus de préciser le droit de prescrire, les lois professionnelles décrivent également l’exercice de la profession. Parmi les énoncés suivants entourant ces lois professionnelles, lequel est FAUX?","a":[{"t":"En vertu de la Loi sur les médecins vétérinaires, l’exercice de la médecine vétérinaire inclut la prescription de médicaments aux animaux","c":false},{"t":"En vertu de la Loi sur les infirmières et infirmiers, l’infirmière peut mélanger des substances en vue de compléter la préparation d’un médicament, selon une ordonnance","c":false},{"t":"En vertu de la Loi sur l’art dentaire, les dentistes sont habiletés à prendre des empreintes et des articulés","c":true},{"t":"En vertu du Code des professions, les diététistes peuvent évaluer l’état nutritionnel d’une personne, déterminer et assurer la mise en œuvre d’une stratégie d’intervention visant à adapter l’alimentation en fonction des besoins pour maintenir ou rétabli la santé","c":false}],"f":"L'énoncé est FAUX!En vertu de la Loi sur les dentistes, les dentistes sont habiletés à prendre des empreintes et des articulés"},{"i":"06835","c":10,"q":"Le droit de prescrire ne vise pas tous les professionnels de la santé. Parmi les énoncés suivants entourant le droit de prescrire, lequel est VRAI?","a":[{"t":"Il y a une liste de médicaments délimitant ce qu'un dentiste peut prescrire","c":false},{"t":"Un diététiste ne peut sous aucune
