e,"n":"matière autre que provenant de l'humain (p. 210)"},{"t":"Il existe deux catégories de médicaments homéopathiques","c":true,"n":""},{"t":"Les PSN avec licence affichent un NPN ou un DIN-HM","c":true,"n":"p. 210"}],"f":""},{"i":"06277","c":4,"s":"S","q":"Parmi les énoncés entourant les médicaments génériques, lequel est FAUX ?","a":[{"t":"Lorsqu'il existe plusieurs concentrations d'un même produit, il faut une étude de biodisponibilité pour chacune","c":false,"n":"appliquées à l'ensemble"},{"t":"Le terme «bioéquivalence» suppose des effets systémiques identiques au produit de référence","c":true,"n":""},{"t":"Les produits sont bioéquivalents si forme galénique identique, même dose, mêmes ingrédients actifs et profils semblables","c":true,"n":""},{"t":"Un équivalent pharmaceutique contient les mêmes quantités d'ingrédients médicinaux mais pas nécessairement les mêmes ingrédients non médicinaux","c":true,"n":""}],"f":""},{"i":"06275","c":4,"s":"S","q":"Parmi les énoncés entourant les termes définissant le médicament, lequel est FAUX ?","a":[{"t":"La BDPP contient des informations sur les médicaments autorisés au Canada, incluant les produits annulés","c":true,"n":"p. 198"},{"t":"Les médicaments biologiques proviennent d'organismes vivants et sont souvent fabriqués par biotechnologie","c":true,"n":"p. 194"},{"t":"Une drogue qui n'a pas été vendue assez longtemps peut être considérée comme une drogue nouvelle","c":true,"n":"p. 190"},{"t":"L'usage d'un générique doit s'inscrire dans les conditions d'approbation du médicament innovateur, bien que la voie d'administration puisse être différente","c":false,"n":"même voie d'adm. (p. 193)"}],"f":""},{"i":"06296","c":4,"s":"S","q":"En ce qui concerne la déclaration des effets indésirables et erreurs médicamenteuses, lequel est VRAI ?","a":[{"t":"Les stratégies des SSPSM combinent expertise clinique et connaissances en amélioration de la sécurité","c":true,"n":"p. 290"},{"t":"La déclaration des incidents liés à la médication est nettement surestimée","c":false,"n":"sous-estimée (p. 293)"},{"t":"L'encadrement juridique des réactions indésirables relève de la Loi sur la pharmacie","c":false,"n":"LAD (p. 281)"},{"t":"Le Programme Canada Vigilance recueille des déclarations d'erreurs médicamenteuses depuis 1965","c":false,"n":"effets indésirables (p. 284)"}],"f":""},{"i":"06291","c":4,"s":"S","q":"Parmi les énoncés concernant les avis de conformité, lequel est FAUX ?","a":[{"t":"L'utilisation d'une drogue provenant d'un autre pays = utilisation sans avis de conformité","c":true,"n":""},{"t":"L'utilisation d'une drogue pour une indication non reconnue = utilisation hors monographie","c":true,"n":""},{"t":"L'utilisation d'une drogue malgré une contre-indication = utilisation sans avis de conformité","c":false,"n":"hors monographie"},{"t":"L'utilisation chez un groupe d'âge non reconnu = utilisation hors monographie","c":true,"n":""}],"f":""},{"i":"06283","c":4,"s":"S","q":"Parmi les énoncés au sujet des monographies de médicament, lequel est FAUX ?","a":[{"t":"Les médicaments avec un long historique n'ont généralement pas de monographie associée","c":true,"n":""},{"t":"On peut retrouver les monographies sur le e-CPS de l'Association des pharmaciens du Canada","c":true,"n":""},{"t":"Les monographies contiennent des renseignements pour le professionnel, scientifiques et pour les patients","c":true,"n":""},{"t":"La monographie doit être mise à jour annuellement","c":false,"n":"pas de maj régulière obligatoire"}],"f":""},{"i":"06420","c":5,"s":"F","q":"Parmi les énoncés entourant la distribution et la vente des médicaments, lequel est FAUX ?","a":[{"t":"Plusieurs stupéfiants figurent parmi les médicaments les plus impliqués dans les erreurs rapportées","c":true,"n":""},{"t":"La vente de drogues sur ordonnance est permise aux fabricants, praticiens, pharmaciens","c":true,"n":"p. 316"},{"t":"Seul un pharmacien peut procéder au transfert d'une ordonnance relative à une drogue sur ordonnance","c":false,"n":"tech aussi (p. 315)"},{"t":"Le fentanyl est inclus dans la liste des stupéfiants","c":true,"n":"p. 318"}],"f":""},{"i":"06432","c":5,"s":"F","q":"Parmi les énoncés entourant l'approvisionnement des médicaments, lequel est FAUX ?","a":[{"t":"Il existe deux formulaires distincts pour le programme d'accès spécial","c":true,"n":"p. 302"},{"t":"Le programme d'accès spécial vise à favoriser l'utilisation rapide de médicaments et contourner le développement clinique","c":false,"n":"demande de méds non commercialisés pour maladies graves/mortelles"},{"t":"Il existe des obligations en matière de commande, vente et registre d'achat pour les substances désignées","c":true,"n":""},{"t":"Le bon de commande peut être transmis verbalement, par télécopieur ou en ligne","c":true,"n":"p. 312"}],"f":""},{"i":"06428","c":5,"s":"F","q":"Parmi les énoncés entourant les retours de médicaments post-consommation, lequel est FAUX ?","a":[{"t":"Les distributeurs autorisés doivent signaler toute perte ou vol à Santé Canada dans les 72 heures","c":true,"n":""},{"t":"Il faut séparer les retours contenant des drogues contrôlées des autres retours","c":false,"n":"pas nécessaire"},{"t":"Il convient de suggérer aux consommateurs de retirer les renseignements personnels des bouteilles","c":true,"n":""},{"t":"Les retours doivent être reçus par un pharmacien, un stagiaire ou un technicien","c":true,"n":""}],"f":""},{"i":"06425","c":5,"s":"F","q":"Parmi les façons d'acheter ou d'obtenir des médicaments au Canada, laquelle est FAUSSE ?","a":[{"t":"Médicaments sans avis de conformité sur ordonnance hors Canada avec importation personnelle d'au plus 3 mois","c":true,"n":""},{"t":"Médicaments avec avis de conformité avec ou sans ordonnance auprès d'une pharmacie ou commerce autorisé","c":true,"n":""},{"t":"Médicaments sans avis de conformité sur ordonnance avec lettre d'objection pour un essai clinique autorisé auprès d'un promoteur","c":false,"n":""},{"t":"Médicaments sans avis de conformité sur ordonnance requis en cas d'urgence (PAS, arrêté d'urgence)","c":true,"n":""}],"f":""},{"i":"06373","c":5,"s":"S","q":"Parmi les énoncés au sujet de l'inventaire des stupéfiants et drogues contrôlées, lequel est FAUX ?","a":[{"t":"Le pharmacien doit cibler minimalement 5 narcotiques ou substances ciblées chaque mois","c":false,"n":"quelques produits (pas 5)"},{"t":"Le pharmacien doit s'assurer que le rapport des ventes est imprimé au moins une fois par mois, mais n'a plus à le faire parvenir au BSC","c":true,"n":"p. 312"},{"t":"La vérification aléatoire peut être faite par le personnel de soutien, mais le pharmacien demeure responsable","c":true,"n":""},{"t":"Un inventaire de référence doit d'abord être effectué au jour 0","c":true,"n":""}],"f":""},{"i":"06381","c":5,"s":"S","q":"Parmi les énoncés entourant les procédures de destruction des médicaments, lequel est FAUX ?","a":[{"t":"Les pharmaciens sont tenus de faire parvenir les demandes de destruction à Santé Canada","c":false,"n":""},{"t":"Toutes les destructions locales doivent être effectuées en présence d'un praticien, pharmacien, stagiaire ou technicien","c":true,"n":""},{"t":"Les pharmaciens doivent consigner la date, l'identifiant unique et le nombre de contenants détruits","c":true,"n":""},{"t":"Les pharmaciens devraient détruire les retours sur une base régulière pour éviter le détournement","c":true,"n":""}],"f":""},{"i":"06361","c":5,"s":"S","q":"Parmi les énoncés concernant l'achat et la vente de médicaments, lequel est VRAI ?","a":[{"t":"Le registre retranscrit manuellement pour les drogues contrôlées n'est plus acceptable","c":false,"n":""},{"t":"L'esprit de la LRCDAS est de prévenir la consommation excessive de stupéfiants","c":false,"n":"prévenir le détournement"},{"t":"Le bon de commande peut être transmis verbalement, par télécopieur ou en ligne","c":true,"n":""},{"t":"Le fabricant n'est pas tenu de détenir une licence d'établissement","c":false,"n":"doit avoir licence"}],"f":""},{"i":"06370","c":5,"s":"S","q":"Parmi les énoncés entourant les infractions et peines prévues, lequel est FAUX ?","a":[{"t":"L'obtention de substances inscrites à l'annexe I de la LRCDAS peut être passible d'emprisonnement à perpétuité","c":false,"n":"6 mois"},{"t":"L'utilisation de drogues illicites fait référence à l'importation, l'exportation, la production, la vente ou la possession","c":true,"n":""},{"t":"Le BSC a pour mandat de conseiller les professionnels en matière de manipulation, conservation, prescription, distribution et élimination","c":true,"n":"p. 345"},{"t":"En vertu de la LAD, un inspecteur peut saisir et retenir tout article ayant servi à une infraction","c":true,"n":""}],"f":""},{"i":"06388","c":5,"s":"S","q":"Parmi les énoncés entourant les pénuries et retraits de lots, lequel est FAUX ?","a":[{"t":"Le fabricant doit entreprendre lui-même une évaluation du danger lors d'un retrait de lots","c":true,"n":""},{"t":"Les médicaments en pénurie de niveau 3 peuvent être admissibles à l'importation exceptionnelle","c":true,"n":""},{"t":"Les produits importés doivent être fabriqués dans des établissements étrangers conformes","c":true,"n":""},{"t":"Un fabricant qui retire une drogue du marché doit fournir les informations dans les 7 jours suivant le retrait","c":false,"n":"dès le début"}],"f":""},{"i":"06518","c":6,"s":"F","q":"Parmi les énoncés entourant l'organisation de l'OPQ et l'inspection professionnelle, lequel est VRAI ?","a":[{"t":"Le Comité de la formation examine les questions relatives à la qualité de la formation des pharmaciens","c":true,"n":"p. 398"},{"t":"Les pharmaciens communautaires semblent sous-estimer leurs habiletés en surveillance thérapie","c":false,"n":"sur-estimer (p. 406)"},{"t":"Le comité d'inspection professionnelle est un comité facultatif, composé de 10 membres","c":false,"n":"obligatoire (p. 398)"},{"t":"Les inspections du circuit du médicament visent à réprimander les pharmaciens propriétaires","c":false,"n":"sécuriser circuit + améliorer surveillance (p. 408)"}],"f":""},{"i":"06505","c":6,"s":"F","q":"Parmi les énoncés entourant la structure du CA d'un ordre professionnel, lequel est VRAI ?","a":[{"t":"Tous les administrateurs du CA sont élus","c":false,"n":"certains nommés par l'office des professions"},{"t":"Lors d'un vote, au cas d'égalité des voix, le président donne un vote prépondérant","c":true,"n":""},{"t":"Le CA est formé d'au moins 15 administrateurs","c":false,"n":"entre 8 et 15 (p. 386)"},{"t":"Le président doit obligatoirement être domicilié au Québec, contrairement aux autres","c":false,"n":"les 2 QC"}],"f":""},{"i":"06511","c":6,"s":"F","q":"Parmi les énoncés portant sur les comités au sein de l'OPQ, lequel est FAUX ?","a":[{"t":"Les comités formation, dispenses et réviseur de l'admission sont obligatoires","c":true,"n":""},{"t":"Le comité réviseur étudie les demandes d'équivalence de diplôme et décide de reconnaître ou refuser","c":false,"n":""},{"t":"Les comités interordres, gouvernance et évaluation du président sont facultatifs","c":true,"n":""},{"t":"Le conseil de discipline est saisi et juge toute plainte formulée contre un pharmacien","c":true,"n":""}],"f":""},{"i":"06501","c":6,"s":"F","q":"Parmi les énoncés entourant le Conseil interprofessionnel, lequel est VRAI ?","a":[{"t":"Le Conseil peut uniquement inviter les groupes reconnus comme ordres professionnels","c":false,"n":"reconnus ou non"},{"t":"Le Conseil doit donner son avis au ministre sur toute question soumise","c":true,"n":""},{"t":"L'OPQ désigne 10 représentants au Conseil interprofessionnel","c":false,"n":""},{"t":"Les activités du Conseil sont balisées par la Loi sur les activités relatives au Conseil interprofessionnel","c":false,"n":"Code des professions"}],"f":""},{"i":"06476","c":6,"s":"S","q":"Parmi les énoncés entourant le système professionnel du Québec, lequel est FAUX ?","a":[{"t":"Le Québec est la seule province dont le CA de l'Ordre comporte des membres non-pharmaciens","c":false,"n":"p. 424"},{"t":"Le Québec réserve le droit de propriété exclusivement aux pharmaciens","c":true,"n":""},{"t":"Le Québec est la seule province dont le Doyen n'est pas membre du CA de l'Ordre","c":true,"n":""},{"t":"En vertu du Code des professions, l'État constitue des ordres professionnels pour protéger le public","c":true,"n":"p. 368"}],"f":""},{"i":"06471","c":6,"s":"S","q":"Parmi les énoncés entourant les infractions et sanctions des professionnels, lequel est FAUX ?","a":[{"t":"Le Bureau du syndic fait enquête advenant qu'un pharmacien ait commis une infraction","c":true,"n":"p. 414"},{"t":"Le CIQ propose des formations obligatoires pour les syndics et une surveillance par un comité indépendant","c":true,"n":""},{"t":"La plupart des plaintes portées au conseil de discipline concernent la qualité des services rendus","c":true,"n":""},{"t":"Le conseil de discipline peut imposer une amende maximale de 62 500$ pour la totalité des infractions","c":false,"n":"chaque infraction (p. 421)"}],"f":""},{"i":"06463","c":6,"s":"S","q":"Parmi les énoncés entourant le système professionnel québécois, lequel est VRAI ?","a":[{"t":"Le Conseil intraprofessionnel fait partie des principaux acteurs du système professionnel","c":false,"n":"p. 369"},{"t":"Le système professionnel prend appui sur les valeurs de la société québécoise et les droits fondamentaux","c":true,"n":"p. 368"},{"t":"Le Code civil assigne la protection du public comme objectif principal","c":false,"n":"Code des professions (p. 367)"},{"t":"L'ordre vise la protection de ses membres et l'association vise la protection du public","c":false,"n":"ordre = public / association = membres"}],"f":""},{"i":"06466","c":6,"s":"S","q":"Parmi les énoncés entourant les décisions du CA d'un ordre professionnel, lequel est FAUX ?","a":[{"t":"Le CA fixe la cotisation ; il est recommandé mais pas obligatoire de consulter les membres","c":false,"n":"doit"},{"t":"Le CA peut suggérer un tarif d'honoraires professionnels","c":true,"n":""},{"t":"Un règlement ne peut être adopté que si le projet a été communiqué aux membres au moins 30 jours avant","c":true,"n":""},{"t":"Le CA peut établir une caisse de retraite et organiser des régimes d'assurance-groupe","c":true,"n":""}],"f":""},{"i":"06468","c":6,"s":"S","q":"Parmi les énoncés entourant la planification stratégique de l'OPQ, lequel est VRAI ?","a":[{"t":"L'une des orientations est de développer une culture d'idéalisme","c":false,"n":"pragmatisme"},{"t":"Le courage est une valeur clé de l'OPQ","c":true,"n":""},{"t":"L'une des orientations est de limiter l'indépendance professionnelle des pharmaciens","c":false,"n":"favoriser"},{"t":"La rentabilité financière est une valeur clé de l'OPQ","c":false,"n":""}],"f":""},{"i":"06592","c":7,"s":"F","q":"En ce qui concerne la certification externe dans le domaine de la santé, lequel est FAUX ?","a":[{"t":"Le BPS reconnaît 8 spécialités en pharmacie","c":false,"n":"plusieurs spécialités (p. 450)"},{"t":"Le BPS possède son propre CA composé de six pharmaciens, deux professionnels non-pharmaciens et un représentant du public","c":true,"n":""},{"t":"La SCPH décerne le titre de Fellow à des pharmaciens qui se distinguent","c":true,"n":""},{"t":"Un professionnel détenteur d'un certificat de spécialiste détient le permis de pratique de base","c":true,"n":""}],"f":""},{"i":"06603","c":7,"s":"F","q":"Parmi les énoncés entourant les activités réservées pouvant être exercées par des non-pharmaciens, lequel est FAUX ?","a":[{"t":"Un vétérinaire peut vendre des médicaments des annexes I, II ou III pour usage animal","c":false,"n":"annexes IV et V"},{"t":"Un médecin peut obtenir un permis pour vendre des médicaments en zone de faible densité de population","c":true,"n":""},{"t":"C'est le CA de l'OPQ qui détermine les activités pouvant être exercées par des non-pharmaciens","c":true,"n":""},{"t":"Le pharmacien peut déléguer à un stagiaire l'évaluation de la condition physique et mentale","c":true,"n":""}],"f":""},{"i":"06591","c":7,"s":"F","q":"Parmi les énoncés entourant le BEPC, lequel est FAUX ?","a":[{"t":"Le BEPC évalue les compétences des techniciens en pharmacie","c":true,"n":""},{"t":"La réussite des examens du BEPC est obligatoire pour obtenir un permis de l'OPQ","c":false,"n":""},{"t":"Le BEPC évalue les compétences des pharmaciens au nom des organismes de réglementation provinciaux","c":true,"n":""},{"t":"Le BEPC utilise des méthodes d'évaluation des compétences","c":true,"n":""}],"f":""},{"i":"06582","c":7,"s":"F","q":"En ce qui concerne un pharmacien québécois qui veut travailler ailleurs, laquelle est VRAIE ?","a":[{"t":"L'ACPE reconnaît les programmes de base agréés par le CCAPP","c":true,"n":""},{"t":"Un pharmacien québécois doit obligatoirement commencer une nouvelle formation dans l'autre province","c":false,"n":"portion du cursus"},{"t":"Un examen européen unique est exigé des pharmaciens voulant exercer en Europe","c":false,"n":""},{"t":"Il faut simplement obtenir un permis de travail pour exercer aux États-Unis","c":false,"n":"+ exigences langue"}],"f":""},{"i":"06539","c":7,"s":"S","q":"Parmi les énoncés entourant les pharmaciens d'outre-mer et ceux ayant cessé d'exercer, lequel est FAUX ?","a":[{"t":"Le CA de l'OPQ peut imposer un cours de perfectionnement sur recommandation du conseil de discipline","c":true,"n":""},{"t":"Deux avenues d'actualisation sont possibles pour un retour à la pratique","c":true,"n":""},{"t":"Le programme d'actualisation doit être réalisé dans un délai de 24 mois consécutifs","c":false,"n":"délai différent"},{"t":"Il est tenu compte de la nature et la durée de l'expérience pertinente de travail du candidat","c":true,"n":""}],"f":""},{"i":"06558","c":7,"s":"S","q":"Parmi les énoncés entourant la pratique de la pharmacie au Canada, lequel est FAUX ?","a":[{"t":"Le BEPC est l'organisme national de reconnaissance professionnelle en pharmacie","c":true,"n":""},{"t":"Au Canada, l'ACPE agrée les programmes de base de formation de pharmacie","c":false,"n":"CCAPP agrée / ACPE reconnaît"},{"t":"Un pharmacien canadien peut devoir compléter certains éléments pour travailler aux États-Unis","c":true,"n":""},{"t":"L'ANORP regroupe les ordres de chaque province","c":true,"n":""}],"f":""},{"i":"06552","c":7,"s":"S","q":"Parmi les énoncés portant sur le guide de délégation en pharmacie, lequel est VRAI ?","a":[{"t":"Le pharmacien peut déléguer à un étudiant à partir de son premier jour de classe","c":false,"n":"doit être inscrit à OPQ + formation"},{"t":"Le technicien possède des connaissances sur les maladies chroniques pouvant aider le pharmacien","c":true,"n":""},{"t":"La responsabilité de surveillance revient uniquement au pharmacien propriétaire","c":false,"n":"salarié, gestionnaire aussi"},{"t":"Une tâche est dite technique si elle répond à un des deux critères","c":false,"n":"aux 2"}],"f":""},{"i":"06543","c":7,"s":"S","q":"Parmi les énoncés entourant les activités des autres professions de la santé, lequel est VRAI ?","a":[{"t":"Les aliments médicamenteux pour le bétail sont considérés comme des PSN","c":false,"n":"médicaments (p. 687)"},{"t":"La formation d'inhalothérapeute au Québec est d'ordre universitaire","c":false,"n":"DEC collégiale"},{"t":"Le Ministre de la santé peut donner des autorisations de vendre des médicaments en cas d'urgence","c":false,"n":"Ministre Agriculture"},{"t":"La surveillance de la thérapie médicamenteuse est une activité réservée aux pharmaciens","c":true,"n":""}],"f":""},{"i":"06550","c":7,"s":"S","q":"Parmi les énoncés entourant la formation du personnel technique, lequel est VRAI ?","a":[{"t":"En établissement de santé, le DEP en assistance technique en pharmacie est exigé","c":true,"n":""},{"t":"Il n'y a pas de titre réservé reconnu par l'Office des professions pour le DEC en techniques en pharmacie","c":true,"n":""},{"t":"Le programme collégial touche 3 volets : technique, administratif et clinique","c":true,"n":""},{"t":"L'Association québécoise des assistant(e)s-techniques en pharmacie est un syndicat professionnel","c":false,"n":""}],"f":""},{"i":"06670","c":8,"s":"F","q":"Parmi les énoncés entourant les conditions de droit de propriété en pharmacie, lequel est FAUX ?","a":[{"t":"Un pharmacien ne peut permettre que son nom soit utilisé pour faire croire qu'il est le propriétaire","c":true,"n":""},{"t":"Au cas de radiation, le curateur peut administrer la pharmacie pendant 3 ans sous surveillance d'un pharmacien","c":true,"n":""},{"t":"Toutes les législations en Amérique du Nord obligent la présence d'un pharmacien","c":true,"n":""},{"t":"Au cas de décès, l'héritier peut administrer la pharmacie pendant les 3 mois qui suivent","c":false,"n":"3 années"}],"f":""},{"i":"06665","c":8,"s":"F","q":"Parmi les énoncés entourant le guide «Acquérir votre première pharmacie», lequel est FAUX ?","a":[{"t":"L'AQPP recommande de reconnaître ses forces et faiblesses afin de limiter la délégation","c":false,"n":"Savoir"},{"t":"L'AQPP recommande de suivre des cours complémentaires en gestion","c":true,"n":""},{"t":"Le guide propose un tableau avec 11 points clés quant aux types d'ententes commerciales","c":true,"n":""},{"t":"Le guide discute des négociations, de l'offre d'achat, de l'acte de vente","c":true,"n":""}],"f":""},{"i":"06663","c":8,"s":"F","q":"Parmi les énoncés entourant le droit de propriété et l'aménagement, lequel est FAUX ?","a":[{"t":"Un pharmacien ne peut pas accepter que l'on se serve de son nom pour faire croire qu'il est le propriétaire","c":true,"n":""},{"t":"Au Canada, le droit de propriété exclusif aux pharmaciens ne s'applique qu'au Québec","c":true,"n":""},{"t":"Au Québec, la présence d'un pharmacien est obligatoire","c":true,"n":""},{"t":"Le Règlement permet la coexistence d'une pharmacie et d'un commerce à condition qu'ils soient sur des étages différents","c":false,"n":""}],"f":""},{"i":"06675","c":8,"s":"F","q":"Parmi les énoncés entourant les contrats professionnels, lequel est FAUX ?","a":[{"t":"Le processus inclut la négociation des contrats préliminaires, principaux, de courtage et en périphérie","c":true,"n":""},{"t":"La part de chaque associé dans l'actif est égale si elle n'est pas déterminée par le contrat","c":true,"n":"p. 528"},{"t":"Un contrat doit être constaté par un écrit, en au moins 2 exemplaires sur support papier","c":true,"n":"p. 547"},{"t":"Si le contrat stipulait une clause de non-concurrence, l'employeur pourra s'en prévaloir même s'il congédie sans motif sérieux","c":false,"n":"ne peut pas (p. 529)"}],"f":""},{"i":"06619","c":8,"s":"S","q":"Parmi les énoncés entourant le droit de propriété et l'aménagement d'une pharmacie, lequel est FAUX ?","a":[{"t":"Le commerce adjacent doit être séparé par un mur d'au moins 1,5 mètre","c":false,"n":"2½ pieds (≈ 0,75 m)"},{"t":"Le concept de droit de propriété est défini en vertu du Code civil du Québec","c":true,"n":""},{"t":"Les LDPP s'appuient sur l'usus, le fructus et l'abusus","c":true,"n":""},{"t":"Seuls peuvent être propriétaires un pharmacien, une société de pharmaciens ou une SPA de pharmaciens","c":true,"n":""}],"f":""},{"i":"06626","c":8,"s":"S","q":"Parmi les énoncés entourant les contrats que peuvent conclure les pharmaciens, lequel est FAUX ?","a":[{"t":"Le secrétaire de l'OPQ peut déterminer les règles concernant les contrats","c":false,"n":"CA"},{"t":"Le bail doit indiquer les modalités d'accès consenties aux tiers","c":true,"n":""},{"t":"Toute entente avec une résidence pour aînés qui limite le choix du pharmacien pourrait contrevenir au Code de déontologie","c":true,"n":""},{"t":"Au moins 9 types de contrats sont visés par le Règlement","c":true,"n":""}],"f":""},{"i":"06638","c":8,"s":"S","q":"Parmi les énoncés entourant les lois qui encadrent le droit de propriété, lequel est FAUX ?","a":[{"t":"En vertu de la Loi sur la pharmacie, le CA peut déterminer les règles concernant les contrats","c":true,"n":""},{"t":"En vertu du Code des professions, un pharmacien doit prévenir toute situation de conflit d'intérêts","c":false,"n":""},{"t":"En vertu du Code civil, on définit le concept de droit de propriété","c":true,"n":""},{"t":"En vertu de la Loi sur la pharmacie, on précise certaines exceptions au droit de propriété exclusif","c":true,"n":""}],"f":""},{"i":"06633","c":8,"s":"S","q":"Parmi les énoncés entourant l'étude d'une proposition d'affaires, lequel est VRAI ?","a":[{"t":"Une analyse de la concurrence inclut l'identification des zones commerciales environnantes","c":true,"n":""},{"t":"Une analyse de l'environnement interne comporte une description de la clientèle","c":false,"n":"marché"},{"t":"Une analyse de marché comporte l'analyse de l'emplacement géographique et de l'ambiance","c":false,"n":"environnement"},{"t":"Une évaluation du chiffre d'affaires comporte une évaluation des prix et parts de marchés","c":false,"n":"concurrence"}],"f":""},{"i":"06634","c":8,"s":"S","q":"Parmi les énoncés entourant le droit de propriété au Québec, lequel est FAUX ?","a":[{"t":"Au cas de décès, l'héritier peut administrer la pharmacie pendant les trois années qui suivent","c":true,"n":""},{"t":"C'est dans le but de mieux protéger les pharmaciens que le droit de propriété exclusif a été accordé","c":false,"n":"protéger le public"},{"t":"Un pharmacien ne peut pas permettre que son nom donne lieu de croire qu'il a un intérêt dans une société alors qu'il n'en a pas","c":true,"n":""},{"t":"Au cas de mise en tutelle ou curatelle, le tuteur ou curateur peut administrer pendant trois ans sous surveillance","c":true,"n":""}],"f":""},{"i":"06758","c":9,"s":"F","q":"Parmi les énoncés entourant les médicaments pour les animaux, lequel est VRAI ?","a":[{"t":"Les préparations destinées uniquement aux animaux doivent être effectuées dans un local distinct","c":true,"n":""},{"t":"Les règles de catégories de médicaments doivent être identiques pour humains et animaux","c":false,"n":""},{"t":"La validation d'ordonnance pour un animal revient au vétérinaire, il ne faut que remettre ce qui est inscrit","c":false,"n":""},{"t":"Les médicaments destinés aux animaux sont inscrits aux annexes III et IV","c":false,"n":"annexes IV et V"}],"f":""},{"i":"06739","c":9,"s":"F","q":"Parmi les énoncés entourant la tenue de pharmacie, lequel est VRAI ?","a":[{"t":"Un pharmacien n'a pas le droit de tenir des médicaments de l'annexe III dans la zone réservée","c":false,"n":""},{"t":"Le pharmacien propriétaire doit placer une affiche visible de l'extérieur indiquant son nom","c":false,"n":"doit (obligatoire)"},{"t":"Il faut disposer au moins une affiche incitant le public à conserver les médicaments hors de la portée des enfants","c":true,"n":""},{"t":"Le commerce adjacent peut être situé à l'intérieur de la pharmacie s'il est la propriété du pharmacien","c":false,"n":""}],"f":""},{"i":"06750","c":9,"s":"F","q":"Parmi les énoncés entourant les annexes de médicaments, lequel est FAUX ?","a":[{"t":"Les médicaments sont classés en 5 annexes qui déterminent les modalités de vente","c":true,"n":""},{"t":"Les médicaments destinés aux humains vendus sur ordonnance sont inscrits à l'annexe I","c":true,"n":""},{"t":"Les médicaments destinés aux animaux vendus sur ordonnance sont inscrits à l'annexe IV","c":true,"n":""},{"t":"Les médicaments de l'annexe III peuvent être à la portée du public sans surveillance pharmaceutique","c":false,"n":"avec surveillance pharmaceutique"}],"f":""},{"i":"06756","c":9,"s":"F","q":"Parmi les énoncés entourant la publicité de services pharmaceutiques, lequel est VRAI ?","a":[{"t":"La mention de «pharmacien propriétaire» est obligatoire même sans mention d'activités réservées","c":false,"n":""},{"t":"Le pharmacien peut se désigner comme pharmacien-clinicien ou pharmacien-hospitalier","c":false,"n":""},{"t":"Une publicité peut contenir des termes comparatifs seulement sur les réseaux sociaux","c":false,"n":""},{"t":"Une publicité professionnelle ne peut porter sur un médicament visé aux annexes I, II et IV","c":true,"n":""}],"f":""},{"i":"06703","c":9,"s":"S","q":"Parmi les énoncés entourant la cessation d'exercice, lequel est FAUX ?","a":[{"t":"Un pharmacien qui cesse d'exercer définitivement doit aviser le secrétaire au moins 15 jours avant","c":true,"n":""},{"t":"La section III concerne les modalités en cas de décès d'un pharmacien propriétaire","c":true,"n":""},{"t":"Lorsqu'un pharmacien est suspendu ou radié temporairement, il doit continuer à tenir à jour ses dossiers","c":false,"n":"perd droit"},{"t":"Le Règlement permet à des non pharmaciens d'administrer une pharmacie durant 3 ans","c":true,"n":""}],"f":""},{"i":"06698","c":9,"s":"S","q":"Parmi les énoncés entourant la base de données sur les médicaments de vente libre, lequel est VRAI ?","a":[{"t":"Les pharmaciens doivent afficher les lettres du Code Médicament pour tous les PSN","c":false,"n":"peuvent"},{"t":"La lettre B du Code Médicament signifie à déconseiller pour un diabétique","c":false,"n":"lettre E"},{"t":"La base de données permet une recherche par nom commercial, DIN, NPN ou DIN-HM","c":true,"n":""},{"t":"La détermination de la qualité et de l'innocuité des médicaments de vente libre est la responsabilité de l'OPQ","c":false,"n":"Santé Canada"}],"f":""},{"i":"06719","c":9,"s":"S","q":"Parmi les énoncés entourant l'étiquetage en pharmacie, lequel est FAUX ?","a":[{"t":"L'utilisation d'étiquettes auxiliaires contribue à l'identification des médicaments de niveau d'alerte élevé","c":true,"n":""},{"t":"Le pharmacien doit utiliser le nom commun sur l'étiquette ; pour un médicament original, le nom commun entre parenthèses","c":false,"n":"commercial"},{"t":"Une lettre du Code Médicament doit être affichée sur l'étiquette de la tablette","c":true,"n":""},{"t":"Une date limite d'utilisation doit être inscrite sur chaque étiquette","c":true,"n":""}],"f":""},{"i":"06693","c":9,"s":"S","q":"Parmi les énoncés entourant les dossiers patients, lequel est FAUX ?","a":[{"t":"L'inscription de la substitution est obligatoire dans le dossier patient","c":true,"n":""},{"t":"Un dossier patient peut être fermé après une période d'inactivité d'au moins deux ans ou en cas de décès","c":true,"n":""},{"t":"Lors de la vente d'un médicament pour un animal, le pharmacien doit consigner l'ordonnance dans le dossier du propriétaire","c":false,"n":""},{"t":"La constitution d'un dossier patient est obligatoire lors de la vente d'un médicament inscrit à l'annexe 2","c":true,"n":""}],"f":""},{"i":"06701","c":9,"s":"S","q":"Parmi les énoncés entourant les conditions d'entreposage, lequel est FAUX ?","a":[{"t":"Toutes les pharmacies doivent se doter d'un réfrigérateur de type biomédical conforme","c":true,"n":""},{"t":"Le pharmacien propriétaire peut laisser en consigne à un tiers des stocks de médicaments","c":false,"n":""},{"t":"Le pharmacien devient responsable du maintien de la chaîne de froid dès la réception des médicaments","c":true,"n":""},{"t":"L'alcool méthylique, l'arsenic et la strychnine font partie des substances toxiques pouvant être conservées","c":true,"n":""}],"f":""},{"i":"06848","c":10,"s":"F","q":"Parmi les énoncés entourant le droit de prescrire, lequel est VRAI ?","a":[{"t":"Les dentistes peuvent prescrire des médicaments uniquement s'ils sont requis au point de vue dentaire","c":true,"n":""},{"t":"Une sage-femme peut prescrire des antihypertenseurs à un homme de 42 ans","c":false,"n":""},{"t":"Un podiatre peut prescrire un onguent antibiotique pour appliquer sur le bras","c":false,"n":""},{"t":"L'optométriste peut prescrire des gouttes pour les yeux à un chat","c":false,"n":""}],"f":""},{"i":"06831","c":10,"s":"F","q":"Parmi les définitions touchant à la pratique de la pharmacie, laquelle est VRAIE ?","a":[{"t":"Un protocole médical externe est une description des procédures pour une condition particulière dans un établissement","c":true,"n":""},{"t":"En vertu de la Loi sur la pharmacie, une ordonnance est un ordre de fournir un médicament","c":false,"n":"autorisation"},{"t":"En vertu de la LRCDAS, un praticien est un médecin, un dentiste ou un pharmacien","c":false,"n":"vét aussi"},{"t":"En vertu du Code des professions, une ordonnance est une prescription donnée par un médecin ayant pour objet le diagnostic","c":false,"n":""}],"f":""},{"i":"06833","c":10,"s":"F","q":"Parmi les énoncés entourant les activités réservées dans le milieu de la santé, lequel est FAUX ?","a":[{"t":"L'évaluation physique est réservée aux médecins, infirmières, physiothérapeutes, ergothérapeutes, orthophonistes, audiologistes et pharmaciens","c":true,"n":""},{"t":"Les mesures de contention sont réservées aux médecins, infirmières, physiothérapeutes et ergothérapeutes","c":true,"n":""},{"t":"L'ajustement de la thérapie médicamenteuse est réservé aux infirmiers, inhalothérapeutes et pharmaciens","c":false,"n":""},{"t":"La prescription de traitements est réservée aux médecins et à certaines infirmières","c":true,"n":""}],"f":""},{"i":"06840","c":10,"s":"F","q":"Parmi les énoncés entourant le droit de prescrire des pharmaciens au Canada et aux É.-U., lequel est FAUX ?","a":[{"t":"Historiquement, les pharmaciens américains ont eu le droit de prescrire sans restriction jusqu'en 1951","c":true,"n":""},{"t":"Accorder le droit de prescrire tient souvent de juridiction provinciale","c":true,"n":""},{"t":"Un Statement on pharmacist prescribing a été adopté par la SCPH en 2001","c":true,"n":""},{"t":"La plupart des états américains limitent le droit de prescrire des pharmaciens étant donné le manque de compétences","c":false,"n":""}],"f":""},{"i":"06780","c":10,"s":"S","q":"Parmi les énoncés entourant le concept d'ordonnance, lequel est FAUX ?","a":[{"t":"En établissement, les chefs de départements doivent établir des règles d'utilisation de médicaments et d'émission des ordonnances","c":true,"n":""},{"t":"Le droit de prescrire n'est plus défini en nommant une profession, mais en identifiant les professions habilitées","c":true,"n":""},{"t":"La Loi sur la pharmacie définit une ordonnance individuelle comme une prescription donnée par un médecin","c":false,"n":"autorisation"},{"t":"Selon l'Office des professions, la définition d'ordonnance prévue à la Loi sur la pharmacie n'est pas suffisante","c":true,"n":""}],"f":""},{"i":"06809","c":10,"s":"S","q":"Parmi les énoncés entourant les ordonnances collectives, lequel est FAUX ?","a":[{"t":"L'ordonnance collective ne permet pas d'initier un traitement par les opioïdes, médicaments contrôlés ou benzodiazépines","c":true,"n":""},{"t":"Le concept d'ordonnance collective est défini par le Règlement sur les normes relatives aux ordonnances faites par un médecin","c":true,"n":""},{"t":"L'ordonnance collective permet d'exercer certaines activités médicales sans ordonnance individuelle du médecin","c":true,"n":""},{"t":"Les résidents en médecine sont autorisés à rédiger une ordonnance collective","c":false,"n":"médecin ou groupe de med"}],"f":""},{"i":"06795","c":10,"s":"S","q":"Parmi les énoncés au sujet des critères d'activités réservées, lequel est FAUX ?","a":[{"t":"L'activité doit potentiellement être complexe ou invasive","c":true,"n":""},{"t":"L'activité doit potentiellement causer des bénéfices et améliorations physiques assurées","c":false,"n":""},{"t":"L'activité doit potentiellement présenter un caractère irrémédiable","c":true,"n":""},{"t":"L'activité doit potentiellement causer la perte d'un droit","c":true,"n":""}],"f":""},{"i":"10004","c":10,"s":"S","q":"Parmi les énoncés entourant les conditions mineures, lequel est FAUX ?","a":[{"t":"Le pharmacien qui prescrit pour une condition mineure doit transmettre les informations au prescripteur initial","c":true,"n":""},{"t":"Le pharmacien peut prescrire pour l'infection urinaire chez la femme (au plus 1 traitement en 6 mois, 2 en 12 mois, ordonnance de moins de 5 ans)","c":true,"n":""},{"t":"Le pharmacien peut prescrire un traitement antiviral pour l'herpès zoster, sauf au niveau de la tête","c":true,"n":""},{"t":"Le pharmacien peut prescrire pour les hémorroïdes avec diagnostic et traitement de moins de 5 ans","c":false,"n":"2 ans"}],"f":""},{"i":"06797","c":10,"s":"S","q":"Parmi les moyens pour prévenir la fraude, lequel est FAUX ?","a":[{"t":"Le médecin ne devrait rien inscrire sur l'ordonnance s'il ne prescrit aucun renouvellement","c":false,"n":"NR doit être inscrit"},{"t":"Le médecin devrait conserver en sécurité ses carnets d'ordonnance","c":true,"n":""},{"t":"Le médecin devrait rayer d'un trait oblique la partie inutilisée de l'ordonnance","c":true,"n":""},{"t":"Le médecin devrait garder en tout temps le contrôle de sa signature électronique","c":true,"n":""}],"f":""},{"i":"06925","c":11,"s":"F","q":"Parmi les énoncés entourant les substances ciblées en pharmacie d'officine, lequel est VRAI ?","a":[{"t":"L'ordonnance pour une substance ciblée doit absolument être écrite","c":false,"n":"+ verbale"},{"t":"Les substances ciblées doivent être étiquetées conformément au Règlement sur l'étiquetage des substances ciblées","c":false,"n":""},{"t":"Lors de la réception, le pharmacien doit conserver les factures et les classer par ordre chronologique","c":true,"n":""},{"t":"Les résidents en médecine ne peuvent pas prescrire de substance ciblée","c":false,"n":"peuvent"}],"f":""},{"i":"06937","c":11,"s":"F","q":"Parmi les énoncés entourant la norme 2012.01 sur les préparations magistrales non stériles, lequel est FAUX ?","a":[{"t":"Au Québec, la préparation magistrale relève de l'OPQ","c":true,"n":""},{"t":"Le remballage d'une crème ou onguent dans un pot approprié est exclu de la norme","c":true,"n":""},{"t":"La norme exclut la préparation de produits non médicamenteux comme des cosmétiques","c":false,"n":"inclut"},{"t":"La norme exclut la reconstitution effectuée conformément aux directives d'un médicament homologué","c":true,"n":""}],"f":""},{"i":"06941","c":11,"s":"F","q":"Parmi les énoncés entourant l'étiquetage de médicaments, lequel est FAUX ?","a":[{"t":"Pour une substance ciblée, aucune obligation supplémentaire en matière d'étiquetage","c":true,"n":""},{"t":"L'étiquette doit comporter l'identification du prescripteur : nom, prénom, adresse et numéro de téléphone","c":false,"n":""},{"t":"Il existe des différences entre le contenu d'une étiquette en officine et en établissement de santé","c":true,"n":""},{"t":"L'identification peut se limiter au nom commercial ou au nom générique","c":true,"n":""}],"f":""},{"i":"06929","c":11,"s":"F","q":"En ce qui concerne le pilulier, lequel est FAUX ?","a":[{"t":"Le pilulier doit être propre et sec, ce qui implique un nettoyage au moins hebdomadaire","c":false,"n":"mensuel"},{"t":"La décision de recourir au pilulier doit être individualisée","c":true,"n":""},{"t":"L'étiquetage du pilulier doit respecter le Règlement sur l'étiquetage des médicaments et des poisons","c":true,"n":""},{"t":"Les médicaments restants dans le pilulier au retour doivent être jetés","c":true,"n":""}],"f":""},{"i":"06884","c":11,"s":"S","q":"Parmi les énoncés à propos des piluliers, lequel est FAUX ?","a":[{"t":"Le pharmacien doit favoriser l'autonomie du patient","c":true,"n":""},{"t":"La décision de recourir au pilulier doit être individualisée","c":true,"n":""},{"t":"Le pilulier peut être livré à la maison, de préférence un jour fixe","c":true,"n":""},{"t":"Si le patient est hospitalisé, on peut reprendre ses médicaments inutilisés pour un autre patient","c":false,"n":""}],"f":""},{"i":"06894","c":11,"s":"S","q":"En ce qui concerne les préparations magistrales, lequel est FAUX ?","a":[{"t":"La norme exclut la reconstitution effectuée conformément aux directives d'un médicament homologué","c":true,"n":""},{"t":"La mise en seringue d'insuline doit être faite sous une hotte à flux laminaire","c":false,"n":""},{"t":"Les préparations stériles incluent les solutions pour inhalation nasale, gouttes otiques intratympaniques et nutrition parentérale","c":true,"n":""},{"t":"La norme inclut la préparation de produits non médicamenteux (cosmétiques, alimentaires, diététiques)","c":true,"n":""}],"f":""},{"i":"06889","c":11,"s":"S","q":"Parmi les énoncés entourant la vente entre pharmaciens propriétaires, lequel est FAUX ?","a":[{"t":"La vente de stupéfiants entre pharmaciens n'est permise que si 3 conditions sont respectées","c":false,"n":"2 conditions"},{"t":"La vente de substances ciblées à un autre pharmacien est possible en cas de retard ou insuffisance de stocks","c":true,"n":""},{"t":"L'annonce de médicaments sur des sites Internet aux fins de vente entre pharmaciens est à éviter","c":true,"n":""},{"t":"Les ventes répétées ou en quantité importante pourraient être assimilées à de la vente en gros","c":true,"n":""}],"f":""},{"i":"06867","c":11,"s":"S","q":"Parmi les définitions du Guide de substitution, lequel est FAUX ?","a":[{"t":"Le choix thérapeutique est la détermination du produit le plus approprié","c":true,"n":""},{"t":"Le monitorage est la procédure de contrôle visant une pharmacothérapie appropriée, efficace et économique","c":true,"n":""},{"t":"L'équivalence thérapeutique s'établit lorsque des produits administrés aux mêmes sujets produisent des effets identiques","c":true,"n":""},{"t":"La bioéquivalence est la vitesse et le taux d'absorption d'un médicament","c":false,"n":""}],"f":""},{"i":"06881","c":11,"s":"S","q":"En vertu du volet «Surveillance de la thérapie médicamenteuse», laquelle des associations est FAUSSE ?","a":[{"t":"Le pharmacien doit fournir l'information nécessaire — éduquer le patient pour qu'il gère son problème de santé","c":true,"n":""},{"t":"Le pharmacien surveille de façon autonome et proactive — vérifie l'impact de la thérapie découlant d'une ordonnance","c":false,"n":"+ surveillance globale, pas uniquement sur ordonnance"},{"t":"Le pharmacien effectue une ou plusieurs interventions — surveille de façon globale la thérapie du patient","c":true,"n":""},{"t":"Le pharmacien effectue des interventions — individualise ses interventions","c":true,"n":""}],"f":""},{"i":"07009","c":12,"s":"F","q":"Parmi les dispositions du Code de déontologie des pharmaciens, lequel est VRAI ?","a":[{"t":"L'article 106 permet d'utiliser le symbole graphique de l'OPQ dans une publicité","c":false,"n":""},{"t":"L'article 48 précise que le pharmacien doit faire preuve de subjectivité","c":false,"n":"objectivité (art. 46)"},{"t":"L'article 63 indique les situations où le pharmacien peut être relevé du secret professionnel","c":true,"n":""},{"t":"L'article 37 précise qu'il faut obtenir l'autorisation du prescripteur avant de refuser une ordonnance","c":false,"n":""}],"f":""},{"i":"07021","c":12,"s":"F","q":"Parmi les énoncés entourant le Code de déontologie, lequel est FAUX ?","a":[{"t":"Le Code n'impose pas de participer aux programmes de fidélisation des fabricants","c":true,"n":""},{"t":"Le pharmacien doit éviter les conversations indiscrètes au sujet d'un patient","c":true,"n":""},{"t":"Le pharmacien a le droit de faire usage de renseignements confidentiels au préjudice d'un patient dans certaines situations","c":false,"n":""},{"t":"Le pharmacien doit se comporter avec dignité, courtoisie, respect et intégrité envers l'OPQ","c":true,"n":""}],"f":""},{"i":"07006","c":12,"s":"F","q":"Parmi les énoncés entourant les bases légales d'un code de déontologie, lequel est VRAI ?","a":[{"t":"Un code doit imposer des devoirs d'ordre général et particulier envers le public, ses clients et sa profession","c":true,"n":""},{"t":"Les codes québécois doivent contenir des dispositions interdisant formellement la publicité","c":false,"n":"conditions, obligations, prohibitions"},{"t":"Un code doit contenir des dispositions visant à prévenir les conflits entre les membres d'un ordre","c":false,"n":"intérêts"},{"t":"Les lois professionnelles obligent chaque Bureau à adopter un code de déontologie","c":false,"n":""}],"f":""},{"i":"07008","c":12,"s":"F","q":"Parmi les articles du Code de déontologie, lequel est FAUX ?","a":[{"t":"L'article 16 : le pharmacien doit collaborer pour assurer une disponibilité raisonnable des services de santé","c":false,"n":"services pharmaceutiques"},{"t":"L'article 70 : donner suite dans les 15 jours à une demande de copie du dossier-patient","c":true,"n":""},{"t":"L'article 78 : l'exercice de la médecine est incompatible avec l'exercice de la pharmacie","c":true,"n":""},{"t":"L'article 36 : le pharmacien est responsable d'assurer le suivi requis","c":true,"n":""}],"f":""},{"i":"06966","c":12,"s":"S","q":"Parmi les actes contraires à la déontologie, lequel est FAUX ?","a":[{"t":"L'absence d'un pharmacien sur place contrevient à l'article 31","c":true,"n":""},{"t":"Ne pas conserver les médicaments périmés distinctement contrevient à l'article 9 du Règlement sur la tenue des pharmacies","c":false,"n":""},{"t":"Omettre de vérifier les laboratoires contrevient à l'article 33 du Code de déontologie","c":true,"n":""},{"t":"Vendre des échantillons contrevient à l'article 57 du Code de déontologie","c":true,"n":""}],"f":""},{"i":"06960","c":12,"s":"S","q":"Parmi les autres sources de déontologie pour les pharmaciens, lequel est FAUX ?","a":[{"t":"L'AQPP propose un code d'éthique des pharmaciens propriétaires du Québec","c":true,"n":""},{"t":"L'ACPP propose un code avec 10 règles de conduites","c":false,"n":""},{"t":"Le CCEPP propose 11 principes directeurs","c":true,"n":""},{"t":"L'Association des pharmaciens du Canada propose des lignes directrices sur l'éthique dans les relations avec les manufacturiers","c":true,"n":""}],"f":""},{"i":"06983","c":12,"s":"S","q":"Parmi les énoncés entourant le Code de déontologie, lequel est VRAI ?","a":[{"t":"Le Code impose de participer aux programmes de fidélisation des fabricants","c":false,"n":""},{"t":"Le pharmacien doit éviter les conversations indiscrètes au sujet d'un patient","c":true,"n":""},{"t":"Le pharmacien a le droit de faire usage de renseignements confidentiels au préjudice d'un patient","c":false,"n":""},{"t":"La seule raison qui justifie qu'un pharmacien traite ses proches est en cas d'urgence","c":false,"n":""}],"f":""},{"i":"06972","c":12,"s":"S","q":"En vertu du volet «Maintien de la compétence», laquelle des associations est FAUSSE ?","a":[{"t":"Le pharmacien juge de la valeur des sources documentaires — connaît les sources disponibles","c":false,"n":"sélectionne (et non juge)"},{"t":"Le pharmacien perfectionne ses habiletés de communication — adapte son langage selon son auditoire","c":true,"n":""},{"t":"Le pharmacien suit l'évolution de la législation — respecte et applique les changements des normes","c":true,"n":""},{"t":"Le pharmacien fait preuve d'éthique professionnelle — est altruiste et transparent","c":true,"n":""}],"f":""},{"i":"06975","c":12,"s":"S","q":"Parmi les énoncés entourant le jugement professionnel, lequel est FAUX ?","a":[{"t":"Échanger des études de cas avec les membres de son équipe et d'autres professionnels","c":true,"n":""},{"t":"Apprendre de ses expériences en les mettant à profit","c":true,"n":""},{"t":"Être en mesure d'expliquer le raisonnement derrière une décision","c":true,"n":""},{"t":"Douter de ses capacités à prendre les bonnes décisions","c":false,"n":"confiance"}],"f":""},{"i":"07088","c":13,"s":"F","q":"Parmi les énoncés entourant le consentement, lequel est VRAI ?","a":[{"t":"Le consentement à la communication par un tiers peut être donné par la personne concernée à la personne qui les recueille","c":true,"n":""},{"t":"Le consentement aux soins médicaux est nécessaire en tout temps","c":false,"n":"sauf urgence"},{"t":"Le mineur de 14 ans et plus peut consentir seul à des soins peu importe leur nature","c":false,"n":""},{"t":"Une personne majeure peut se soumettre à une expérimentation peu importe les risques","c":false,"n":""}],"f":""},{"i":"07104","c":13,"s":"F","q":"Parmi les énoncés entourant le consentement dans certaines situations, lequel est FAUX ?","a":[{"t":"Le secret professionnel ne s'applique pas face à une fausse ordonnance","c":true,"n":""},{"t":"Le consentement n'est pas requis pour l'inspection professionnelle ou l'enquête du syndic","c":true,"n":""},{"t":"Le consentement aux soins non requis par l'état de santé doit être donné par écrit","c":true,"n":""},{"t":"En tout temps, le mineur de 14 ans et plus peut consentir seul à ses soins de santé","c":false,"n":""}],"f":""},{"i":"07092","c":13,"s":"F","q":"Parmi les énoncés entourant les lois de protection des renseignements personnels au fédéral, lequel est FAUX ?","a":[{"t":"La Loi sur l'accès à l'information vise à restreindre l'accès aux renseignements des institutions fédérales","c":false,"n":"vise à compléter les modalités d'accès"},{"t":"La Loi sur le contrôle des renseignements relatifs aux matières dangereuses permet une demande de dérogation","c":true,"n":""},{"t":"La Loi sur la protection des renseignements personnels a pour objet de compléter la législation canadienne","c":true,"n":""},{"t":"La LPRPDE vise à faciliter et promouvoir le commerce électronique","c":true,"n":""}],"f":""},{"i":"07089","c":13,"s":"F","q":"Parmi les énoncés entourant la vente de données et IMS, lequel est FAUX ?","a":[{"t":"IMS offre des profils de pratique individuels et confidentiels aux médecins du Québec","c":true,"n":""},{"t":"Il existe des différences entre les provinces en matière de consentement et vente d'informations relatives aux ordonnances","c":true,"n":""},{"t":"Les données envoyées par IMS à une compagnie pharmaceutique sont identiques à un profil individuel envoyé à un médecin","c":false,"n":""},{"t":"IMS Health a élaboré un Code de gestion des renseignements personnels au Québec","c":true,"n":""}],"f":""},{"i":"07039","c":13,"s":"S","q":"En vertu de la Loi sur la protection des renseignements personnels dans le secteur privé, lequel est VRAI ?","a":[{"t":"Un commerçant ne peut exiger le permis de conduire lors d'une transaction","c":true,"n":""},{"t":"La requête d'accès à un document doit être sous forme écrite","c":false,"n":"30 jours"},{"t":"L'entreprise privée a 20 jours civils pour répondre à une demande d'accès","c":false,"n":"30 jours"},{"t":"Un propriétaire de logement peut recueillir le NAS","c":false,"n":""}],"f":""},{"i":"07065","c":13,"s":"S","q":"Parmi les énoncés entourant les lois de protection des renseignements personnels, lequel est VRAI ?","a":[{"t":"La Loi sur la protection des renseignements personnels est une loi provinciale","c":false,"n":"fédérale"},{"t":"La Loi sur les services de santé et les services sociaux balise la protection des renseignements","c":true,"n":""},{"t":"En vertu du Code criminel, pénétrer chez quelqu'un peut être une atteinte à la vie privée","c":true,"n":""},{"t":"La Loi sur l'accès à l'information vise à compléter les modalités d'accès aux documents de l'administration fédérale","c":true,"n":""}],"f":""},{"i":"07042","c":13,"s":"S","q":"Parmi les énoncés entourant la protection des renseignements personnels en pharmacie communautaire, lequel est FAUX ?","a":[{"t":"Le recours à des caméras de surveillance peut être acceptable si certains critères sont respectés","c":true,"n":""},{"t":"La transmission d'informations à l'assureur doit se limiter aux informations factuelles","c":true,"n":""},{"t":"Un pharmacien peut divulguer à un collègue d'une autre pharmacie qu'un patient a un compte en souffrance","c":false,"n":""},{"t":"Un accès sécuritaire devrait comporter une gestion des accès électroniques avec mot de passe unique","c":true,"n":""}],"f":""},{"i":"07055","c":13,"s":"S","q":"Parmi les énoncés entourant l'utilisation responsable du web 2.0, lequel est FAUX ?","a":[{"t":"Les principes d'un comportement en ligne responsable devraient être enseignés dès les premiers jours du programme","c":true,"n":""},{"t":"La personne ayant connaissance d'une publication non autorisée devrait veiller au retrait","c":true,"n":""},{"t":"Le comportement en ligne doit être compatible avec l'exercice de sa profession","c":true,"n":""},{"t":"Le pharmacien ne devrait pas hésiter à utiliser les médias écrits pour donner des conseils individualisés","c":false,"n":""}],"f":""},{"i":"07051","c":13,"s":"S","q":"Parmi les énoncés au sujet du DSQ, lequel est VRAI ?","a":[{"t":"Si une personne refuse le DSQ, elle sera dans l'obligation d'avoir des assurances privées","c":false,"n":""},{"t":"La Loi médicale identifie les personnes pouvant consulter les renseignements du DSQ","c":true,"n":""},{"t":"La participation au DSQ est automatique pour les personnes inscrites à la RAMQ","c":true,"n":""},{"t":"Un professionnel qui consulte le DSQ d'une personne ayant exercé son droit de refus verrait les données antérieures au refus","c":false,"n":"aucun renseignement disponible"}],"f":""},{"i":"07161","c":14,"s":"F","q":"Parmi les énoncés entourant les associations de pharmaciens, lequel est VRAI ?","a":[{"t":"L'AQPP a pour mandat l'étude, la défense et le développement des intérêts de ses membres","c":true,"n":""},{"t":"L'APES est un syndicat regroupant la majorité des pharmaciens du Québec","c":false,"n":"pharmaciens employés d'un ES du QC"},{"t":"Les pharmaciens propriétaires sont tous représentés par une association de chaîne et bannières","c":false,"n":""},{"t":"L'APPSQ est signataire d'une entente de rémunération pour les services pharmaceutiques","c":false,"n":""}],"f":""},{"i":"07171","c":14,"s":"F","q":"En vertu de la Loi sur les syndicats professionnels, lequel est FAUX ?","a":[{"t":"Un syndicat doit être constitué de personnes exerçant la même profession ou des métiers similaires","c":true,"n":""},{"t":"Les syndicats peuvent exercer devant toutes cours de justice les droits de leurs membres","c":true,"n":""},{"t":"Pour être membre du CA d'un syndicat, il faut minimalement le statut de résident permanent","c":false,"n":"citoyen canadien"},{"t":"Un syndicat doit être constitué d'au moins 15 personnes","c":true,"n":""}],"f":""},{"i":"07173","c":14,"s":"F","q":"Parmi les associations suivantes, laquelle est VRAIE ?","a":[{"t":"APES – Association des praticiens en établissement de santé","c":false,"n":"pharmaciens"},{"t":"APPSQ – Association professionnelle des pharmaciens salariés du Québec","c":true,"n":""},{"t":"CNESST – Commission des normes et des équités scolaires et territoriales","c":false,"n":"santé et sécurité au travail"},{"t":"AQPP – Association québécoise des pharmaciens professionnels","c":false,"n":"propriétaires"}],"f":""},{"i":"07166","c":14,"s":"F","q":"Parmi les énoncés entourant la Loi sur les normes du travail, lequel est FAUX ?","a":[{"t":"Le salaire minimum est fixé par le gouvernement du Québec","c":true,"n":""},{"t":"Au Québec, l'âge minimal légal pour travailler est de 14 ans","c":false,"n":"pas d'âge"},{"t":"Le salaire doit être versé à intervalles réguliers ne pouvant pas dépasser 16 jours","c":true,"n":""},{"t":"L'employeur doit fournir gratuitement le vêtement particulier qui identifie les personnes salariées","c":true,"n":""}],"f":""},{"i":"07130","c":14,"s":"S","q":"Parmi les énoncés à propos du PMSD, lequel est VRAI ?","a":[{"t":"Un médecin désigné par le Directeur de la santé publique émet des recommandations transmises au médecin de famille","c":true,"n":""},{"t":"Le droit au retrait préventif est déterminé par l'employeur","c":false,"n":"CNESST"},{"t":"Les étudiantes en stage sont admissibles au PMSD","c":false,"n":""},{"t":"La travailleuse enceinte ne peut contester une nouvelle affectation de son employeur","c":false,"n":""}],"f":""},{"i":"07118","c":14,"s":"S","q":"Parmi les énoncés entourant la Loi sur les normes de travail, lequel est FAUX ?","a":[{"t":"La Loi protège la majorité des personnes salariées travaillant à temps plein et à temps partiel","c":true,"n":""},{"t":"Les étudiants dans un programme d'initiation au travail sont exclus","c":true,"n":""},{"t":"Les périodes d'essai ou de formation peuvent être rémunérées ou non, au choix de l'employeur","c":false,"n":"doivent être rémunérées"},{"t":"La personne salariée obligée de travailler un jour férié a droit à une indemnité ou un congé compensatoire","c":true,"n":""}],"f":""},{"i":"07139","c":14,"s":"S","q":"Parmi les éléments entourant le droit des affaires et les associations, lequel est FAUX ?","a":[{"t":"L'APES représente tous les pharmaciens employés d'un établissement de santé du Québec","c":true,"n":""},{"t":"Santé Canada a mis en place un programme d'évaluation des substances prioritaires","c":true,"n":""},{"t":"En cas d'accident de travail, l'AQPP verse l'indemnité de remplacement de revenu","c":false,"n":""},{"t":"Les formulaires de demande d'emploi dans un établissement de santé ne peuvent être exclusivement rédigés en anglais","c":true,"n":""}],"f":""},{"i":"07126","c":14,"s":"S","q":"Parmi les énoncés entourant les conditions minimales de travail, lequel est FAUX ?","a":[{"t":"Un employé à temps partiel peut avoir un salaire moindre simplement parce qu'il travaille moins d'heures","c":false,"n":""},{"t":"Le stagiaire dans un cadre de formation professionnelle reconnu est exclu de la norme sur le salaire minimum","c":true,"n":""},{"t":"Un employeur ne peut demander à son employé de payer une tenue de travail s'il travaille au salaire minimum","c":true,"n":""},{"t":"L'employeur a un mois pour verser la première paye et doit verser le salaire dans un délai ne pouvant dépasser 16 jours","c":true,"n":""}],"f":""},{"i":"07129","c":14,"s":"S","q":"Parmi les énoncés sur les médicaments dangereux en pharmacie, lequel est FAUX ?","a":[{"t":"Il n'existe aucun seuil déterminé pour les traces de médicaments dangereux","c":true,"n":""},{"t":"Un travailleur a le droit de refuser d'exécuter un travail s'il a des motifs raisonnables de croire en un danger","c":true,"n":""},{"t":"Le Certificat visant le retrait préventif vise à l'arrêt de travail de la travailleuse","c":false,"n":"modifs (affectation à d'autres tâches)"},{"t":"La liste des médicaments dangereux devrait être communiquée aux travailleurs","c":true,"n":""}],"f":""}];
const REDACTION = [{"i":"06041","c":1,"s":"F","q":"La plateforme Éducaloi : EXPLIQUEZ quels sont les droits des femmes en matière d'avortement au Québec.","r":"Au Québec, la femme a le droit d'avorter tout au long de sa grossesse (l'autorisation du partenaire n'est pas obligatoire). Pour les jeunes de 14 ans et plus, pas besoin du consentement des parents (pour les moins de 14 ans, autorisation nécessaire). Pour les mineurs qui doivent rester dans un établissement de santé plus de 12 heures, les parents doivent être tenus au courant."},{"i":"DEV-C1","c":1,"s":"S","q":"La profession juridique au Québec","r":"Au Québec, la profession juridique comprend les avocats et les notaires. Les notaires œuvrent principalement dans les affaires contractuelles (immobilier) et ne peuvent pas représenter leurs clients devant les tribunaux, sauf dans les affaires non contentieuses."},{"i":"DEV-C2","c":2,"s":"S","q":"Les 5 conditions de la Loi canadienne sur la santé (LCS)","r":"1. Administration publique : régime géré par une autorité publique à but non lucratif. 2. Intégralité : couvrir tous les services médicalement nécessaires. 3. Universalité : tous les résidents ont accès selon des modalités uniformes. 4. Transférabilité : couverture lors d'absences temporaires. 5. Accessibilité : accès raisonnable et uniforme, sans obstacle financier."},{"i":"DEV-C3","c":3,"s":"S","q":"Contribution de l'usager : régimes public et privé","r":"Régime public : franchise mensuelle (ajustée le 1er juillet), coassurance, montant maximal mensuel et annuel, enfants ne participent pas. Régime privé : franchise généralement annuelle (certains sans franchise), contribution annuelle maximale (une fois atteinte → tous les frais assumés), enfants participent selon paramètres du régime familial."},{"i":"DEV-C4","c":4,"s":"S","q":"Organismes de contrôle de la publicité sur les médicaments","r":"NCP (Normes canadiennes de publicité) : pré-approuve la publicité des médicaments en vente libre et PSN destinée aux consommateurs. CCPP (Conseil consultatif de publicité pharmaceutique) : pré-approuve la publicité destinée aux professionnels de la santé. Aux États-Unis, publicité directe aux consommateurs pour médicaments sur ordonnance permise depuis les années 80. Au Canada, plutôt interdite."},{"i":"DEV-C5","c":5,"s":"S","q":"Naloxone et crise des opioïdes : exigences et objectifs","r":"2 exigences lors de la remise : autocollant de mise en garde + fiche de renseignements. Objectifs CMQ/OPQ : sensibiliser le public, encourager le rôle du patient partenaire, promouvoir l'usage sécuritaire des opioïdes, reconnaître que les opioïdes peuvent être un bon choix selon le contexte, favoriser la prise en charge des patients avec trouble lié à l'usage des opioïdes."},{"i":"DEV-C6","c":6,"s":"S","q":"Critères de réservation d'activités (Code des professions)","r":"Connaissances requises, degré d'autonomie et difficulté de jugement externe, caractère personnel des rapports et confiance des clients, gravité du préjudice possible, caractère confidentiel des renseignements traités."},{"i":"DEV-C7","c":7,"s":"S","q":"Les deux types de responsabilité civile","r":"Contractuelle : manquement à un devoir imposé par un contrat (écrit ou verbal). Extracontractuelle (délictuelle) : manquement à une règle de conduite sociale prévue par la loi et les usages. Pas une transgression à un contrat mais à une règle générale de conduite."},{"i":"06129","c":2,"s":"F","q":"EXPLIQUEZ les contributions du Canada au niveau mondial par l'intermédiaire de l'OMS.","r":"Réduire l'incidence des maladies (poliomyélite, VIH/sida, tuberculose), répondre aux urgences sanitaires (COVID-19), accès équitable aux contre-mesures médicales, soutenir les services de santé essentiels, faire progresser la recherche en santé reproductive, contribuer à la biosécurité (Ebola en Sierra Leone)."},{"i":"06223","c":3,"s":"F","q":"PRÉSENTEZ les points clés d'une facture remise aux patients.","r":"1. Prix coûtant du médicament + montant au distributeur (fixé par le gouvernement, sans marge de profit). 2. Honoraire professionnel du pharmacien (dépenses directes et indirectes : salaires, électricité, etc.). 3. Contribution de l'assuré (franchise + coassurance)."},{"i":"06320","c":4,"s":"F","q":"COMMENTEZ les recommandations du RRSPUM concernant la gestion des échantillons de médicaments dans les GMF.","r":"12 recommandations visant à utiliser les échantillons de façon sécuritaire, éthique et responsable. Premier projet de recherche mettant à contribution tous les centres de formation en médecine familiale du Québec."},{"i":"06407","c":5,"s":"F","q":"EXPLIQUEZ le rôle du pharmacien à travers la crise des opioïdes.","r":"Remettre l'aide-mémoire de l'INESSS sur l'administration de la naloxone, enseignement sur les signes de surdose et l'administration, expliquer les conditions de conservation et la gestion du matériel usagé, expliquer le cadre légal (loi C-224), rappeler d'appeler les services d'urgence (risque de surdose rebond), exercer un rôle pivot avec outils et ressources."},{"i":"06496","c":6,"s":"F","q":"PRÉSENTEZ les modalités entourant la divulgation d'erreurs aux patients.","r":"(Consulter le Guide de l'OPQ sur la gestion des incidents et accidents dans la prestation des soins et services pharmaceutiques)"},{"i":"06577","c":7,"s":"F","q":"Commentez le processus de délégation de la VCC (vérification contenant-contenu).","r":"(Consulter le Guide d'exercice sur la délégation en pharmacie de l'OPQ, 2010)"},{"i":"06654","c":8,"s":"F","q":"PRÉSENTEZ la démarche à suivre lors d'une première déclaration d'exercice en société de pharmaciens.","r":"(Consulter le site Web de l'OPQ pour la démarche d'exercice en société de pharmaciens)"},{"i":"06736","c":9,"s":"F","q":"L'OPQ salue les pharmaciens qui ont retiré les produits alimentaires à faible valeur nutritive des commerces adjacents. COMMENTEZ.","r":"(Consulter le bulletin Interaction été 2018 de l'OPQ, p. 14)"},{"i":"06828","c":10,"s":"F","q":"RÉSUMEZ les enjeux liés à la prise en charge médicale des proches ou de soi-même par un médecin.","r":"(Consulter la nouvelle du CMQ «Savoir garder une saine distance»)"},{"i":"06918","c":11,"s":"F","q":"RÉSUMEZ les obligations déontologiques des médecins à l'égard des traitements non reconnus.","r":"(Consulter l'énoncé de position du CMQ «Le médecin et les traitements non reconnus», mars 2006)"},{"i":"07004","c":12,"s":"F","q":"Consultez le dépliant «Choisir votre pharmacien : un droit qui appartient» et COMMENTEZ.","r":"(Consulter le dépliant de l'OPQ)"},{"i":"07082","c":13,"s":"F","q":"RÉSUMEZ les modalités de consentement du patient lors de la réalisation d'un BCM.","r":"(Consulter le recueil OPQ/CMQ sur les bilans comparatifs des médicaments)"},{"i":"07155","c":14,"s":"F","q":"RÉSUMEZ les responsabilités de la travailleuse dans le cadre du PMSD.","r":"(Consulter le site Web de la CNESST sur le PMSD)"}];
