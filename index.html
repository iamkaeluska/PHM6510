 de son renouvellement"},{"i":"06321","c":4,"q":"En tant que futur professionnel de la santé exerçant au sein du système de santé québécois, il est primordial de bien comprendre le cadre législatif dans lequel exerce le pharmacien. Parmi les énoncés suivants entourant les lois fédérales touchant la pharmacie, lequel est VRAI?","a":[{"t":"Les anti-sudorifiques et les pâtes dentifrices sont principalement abordés dans le Règlement sur les instruments médicaux","c":false},{"t":"La Loi règlementant certaines drogues et autres substances comporte une annexe sur le cannabis et ses dérivés","c":true},{"t":"L'annexe A de la Loi sur les aliments et drogues aborde les produits biologiques","c":false},{"t":"La Loi sur la pharmacie encadre la pratique du pharmacien au niveau canadien","c":false}],"f":"Cet énoncé est VRAI!"},{"i":"06322","c":4,"q":"En plus de connaître le cadre réglementaire dans lequel exerce le pharmacien québécois, il faut également connaître les différents symboles que l’on retrouve en pharmacie. Parmi les associations suivantes entourant ces symboles, laquelle est FAUSSE?","a":[{"t":"DIN- numéro de 8 chiffres généré par la Division des présentations et politiques d’information de Santé Canada à un produit pharmaceutique après sa commercialisation","c":true},{"t":"GIA- Numéro de groupe d’ingrédients actifs","c":false},{"t":"N- drogues telles qu’identifiées à la Loi réglementant certaines drogues et autres substances- annexe 1 et à l’annexe du Règlement sur les stupéfiants","c":false},{"t":"TC- drogues telles qu’identifiées au Règlement sur les benzodiazépines et substances ciblées","c":false}],"f":"L'énoncé est FAUX!Le DIN s’obtient AVANT la commercialisation du produit pharmaceutique"},{"i":"06323","c":4,"q":"Une bonne compréhension du cadre législatif repose sur la connaissance de certaines définitions. Parmi les énoncés suivants entourant les définitions de substances utilisées en pharmacie, lequel est VRAI?","a":[{"t":"Au Canada, une drogue innovante est une drogue qui contient un ingrédient médicinal non déjà approuvé dans une drogue par le ministre et qui ne constitue pas une variante d'un ingrédient médicinal déjà approuvé","c":true},{"t":"Au Québec, un médicament est défini comme une substance ou un mélange de substance pouvant être employé pour le diagnostic, le traitement, l'atténuation ou la prévention d'une maladie, d'un désordre, d'un état physique ou psychique anormal ou de leurs symptômes chez l'humain exclusivement","c":false},{"t":"Le terme drogue est préféré au terme médicament dans la cadre québécois tandis que le terme médicament est préféré dans le cadre canadien","c":false},{"t":"Au Canada, une drogue est une substance ou un mélange de substances fabriqués, vendus ou présentés comme pouvant notamment servir au diagnostic, au traitement, à l'atténuation ou à la prévention d'une maladie, d'un désordre, d'un état psychique anormal ou de leurs symptômes chez l'être humain ou les animaux","c":false}],"f":"Cet énoncé est VRAI!"},{"i":"06324","c":4,"q":"Il existe plusieurs systèmes de classification des médicaments qu’il convient de bien comprendre afin d’exercer la pharmacie. Parmi les énoncés entourant ces systèmes, lequel est FAUX?","a":[{"t":"La dose journalière définie (DDD) pour les antinéoplasiques et les agents de contraste n’a pas été établie","c":false},{"t":"La classification Anatomical Therapeutic and Chemical (ATC) comporte 14 groupes anatomiques de 1er niveau","c":false},{"t":"La classification de l'American Hospital Formulary Service (AHFS) de l’Organisation mondiale de la santé (OMS) comporte 4 niveaux hiérarchiques","c":true},{"t":"La classification de Santé Canada inclut le code ATC, le code AHFS, le DIN et le GIA","c":false}],"f":"L'énoncé est FAUX!La classification AHFS n’est pas une classification de l’OMS, mais bien d’une classification de l’American Society of Health-System Pharmacist"},{"i":"06325","c":4,"q":"Parmi les énoncés suivants entourant les produits autres que les médicaments que l’on retrouve en pharmacie, lequel est VRAI?","a":[{"t":"Les probiotiques font partie des ingrédients visés par le Règlement sur les produits de santé naturels","c":true},{"t":"Les pesticides et les produits de beauté sont couverts par le Règlement sur les produits chimiques et contenants de consommation","c":false},{"t":"Les vitamines et minéraux sont exclus de la définition de produits de santé naturels","c":false},{"t":"Les savons à vaisselle font partie des produits para-pharmaceutiques que l’on retrouve dans le Règlement sur la tenue des pharmacies","c":false}],"f":"Bonne réponse![4.4 Distinguer les drogues des produits de santé naturels et autres produits et instruments]"},{"i":"06326","c":4,"q":"Afin d’appliquer les exigences réglementaires de façon plus uniforme et de permettre à l’industrie réglementée de se conformer plus facilement à ces exigences, l’Inspectorat de la Direction générale de la protection de la santé a développé les lignes directrices sur les bonnes pratiques de fabrication. Parmi les énoncés suivants entourant ces lignes directrices, lequel est FAUX?","a":[{"t":"Le but des bonnes pratiques d'examen est de favoriser l'opportunité, la prévisibilité, l'uniformité et la qualité des examens et des rapports d'examen concernant notamment les instruments médicaux et les désinfectants","c":false},{"t":"Les bonnes pratiques de fabrication concernent notamment la fabrication, l’emballage, l’étiquetage et la distribution des médicaments","c":false},{"t":"Une bonne pratique de fabrication est une norme de qualité éthique et scientifique internationale s’appliquant à la conception et à la réalisation d’essais","c":true},{"t":"Les bonnes pratiques de fabrication ont pour but d’orienter l’industrie en ce qui concerne les interprétations du Titre 2, partie C, du Règlement sur les aliments et drogues","c":false}],"f":"L'énoncé est FAUX!La définition donnée est celle d’une bonne pratique clinique"},{"i":"06327","c":4,"q":"Parmi les affirmations suivantes entourant la biodisponibilité et la bioéquivalence des médicaments, laquelle est VRAIE?","a":[{"t":"La bioéquivalence est un concept qui intègre uniquement la teneur du médicament","c":false},{"t":"Pour les médicaments à dose critique, Santé Canada accepte une bioéquivalence de 70-130%","c":false},{"t":"Une comparaison de la surface sous la courbe (SSC) après une administration par voie orale et de celle obtenue suivant l’administration intraveineuse d’une dose équivalente du même ingrédient actif permet d’estimer la biodisponibilité absolue pour la plupart des médicaments","c":true},{"t":"Au Canada, la reconnaissance de la bioéquivalence d’une drogue par Santé Canada oblige le professionnel de la santé à substituer le médicament pour son générique","c":false}],"f":""},{"i":"06328","c":4,"q":"Plusieurs lois et règlements balisent l’étiquetage des produits vendus en pharmacie. Parmi les énoncés suivants entourant l’étiquetage de ces produits et leur cadre réglementaire, lequel est FAUX?","a":[{"t":"En vertu du Règlement sur les aliments et drogues, l'étiquette d'une drogue renfermant de l'acétaminophène doit porter une mise en garde indiquant qu'il est dangereux de dépasser la dose maximale recommandée sans l'autorisation d'un médecin","c":false},{"t":"En vertu du Règlement sur les produits naturels de santé, les étiquettes intérieure et extérieure d’un produit de santé naturelle n'ont pas l'obligation d'indiquer si le produit est importé","c":true},{"t":"Un répertoire toxicologique est proposé par la Commission des normes, de l'équité, de la santé et de la sécurité au travail (CNESST)","c":false},{"t":"Le Règlement sur les aliments et drogues définit les modalités entourant les critères d’étiquetage intérieur et extérieur d’une drogue","c":false}],"f":"FAUX; en vertu du Règlement sur les produits naturels de santé, les étiquettes intérieure et extérieure d’un produit de santé naturelle DOIVENT indiquer si le produit est importé"},{"i":"06329","c":4,"q":"Au Canada, la publicité sur les médicaments est limitée par plusieurs règlements et lois. Parmi les énoncés suivants entourant la publicité pharmaceutique et la législation qui s’applique, lequel est FAUX?","a":[{"t":"Il est interdit de diffuser l’information non promotionnelle à l’intention du grand public tel que des communiqués, des publications destinées aux consommateurs, des expositions scientifiques et des articles de périodiques","c":true},{"t":"Il est interdit de faire la promotion de médicament de prescription ou de vente libre au grand public et aux professionnels avant la délivrance de l’autorisation de mise en marché","c":false},{"t":"Au Canada, il est interdit de faire la publicité d’une substance ciblée auprès du grand public en vertu du Règlement sur les benzodiazépines et autres substances ciblées","c":false},{"t":"Il est permis de faire la promotion du médicament de prescription ou de vente libre auprès du grand public, pour autant que la promotion du médicament ne porte que sur la marque, le prix et la quantité","c":false}],"f":"L'énoncé est FAUX!Il est PERMIS de diffuser l’information non promotionnelle à l’intention du grand public tel que des communiqués, des publications destinées aux consommateurs, des expositions scientifiques et des articles de périodiques"},{"i":"06330","c":4,"q":"En ce qui concerne les effets indésirables, leur déclaration et l’interprétation des données, lequel des énoncés suivants est FAUX?","a":[{"t":"Il est possible de faire une déclaration d’effets indésirables à Santé Canada en ligne","c":false},{"t":"Le nombre de déclarations reçues ne devrait pas servir de base à déterminer l’incidence de la réaction étant donné qu’on ignore le nombre total d’effets indésirables et le nombre de patients exposés aux produits de santé","c":false},{"t":"Le fabricant, dans les 2 mois après avoir reçu communication de renseignements concernant toute réaction indésirable grave à une drogue, présente un rapport faisant état de ces renseignements au ministre","c":true},{"t":"Les effets indésirables et effets indésirables sont utilisés de façon interchangeable","c":false}],"f":"L'énoncé est FAUX!Le fabricant, dans les 15 JOURS après avoir reçu communication de renseignements concernant toute réaction indésirable grave à une drogue, présente un rapport faisant état de ces renseignements au ministre"},{"i":"06331","c":4,"q":"En ce qui concerne les erreurs médicamenteuses et leur déclaration, lequel des énoncés suivants est FAUX?","a":[{"t":"Le programme du Système canadien de déclaration et de prévention des incidents médicamenteux (SCDPIM) vise notamment à coordonner la saisie, l’analyse et la diffusion de renseignements sur les incidents médicamenteux","c":false},{"t":"Le Système national de déclaration des accidents et incidents (SNDAI) permet aux établissements de santé du Canada de déclarer et d'analyser les accidents et incidents liés aux médicaments de façon sécuritaire et anonyme","c":false},{"t":"Le Groupe vigilance est un groupe formé par le Ministère de la santé et des services sociaux (MSSS) suite aux travaux du comité ministériel présidé par monsieur Jean Francoeur qui a déposé son rapport en 2000","c":false},{"t":"Excellence en Santé Canada vise à faire connaître des innovations et pratiques exemplaires en matière de sécurité des professionnels dans leur milieu de pratique","c":true}],"f":"L'énoncé est FAUX!Excellence en Santé Canada vise à faire connaître des innovations et pratiques exemplaires en matière de sécurité des PATIENTS"},{"i":"06332","c":4,"q":"La découverte, le développement et la mise en marché d'un médicament est un processus qui comprend de multiples étapes. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"Santé Canada étudie actuellement la possibilité pour les promoteurs de soumettre des présentations au format de la FDA modifiée concernant les produits d'usage vétérinaire","c":false},{"t":"On estime à plusieurs centaines de milliers de dollars le coût du développement d'un nouveau médicament","c":false},{"t":"Les essais cliniques de phase III se font sur des sujets malades et permettent d'identifier les effets indésirables rares","c":false},{"t":"La monographie d'une drogue est un document qui n'est pas forcément mis à jour régulièrement","c":true}],"f":"Bonne réponse![4.6 Identifier les éléments clés de la découverte et du développement d’un médicament et de la mise en marché]"},{"i":"06333","c":4,"q":"En ce qui concerne les produits de santé naturels (PSN), lequel des énoncés suivants est FAUX?","a":[{"t":"Il existe deux catégories de médicaments homéopathiques, notamment les médicaments homéopathiques dont l'usage ou les fins recommandés ne sont pas précisés","c":false},{"t":"Les plantes ou matières végétales, les algues, les bactéries, les champignons et les matières provenant de l'humain sont des exemples de PSN","c":true},{"t":"Les PSN qui possèdent une licence de mise en marché affichent un numéro de produit naturel (NPN) ou un numéro de remède homéopathique (DIN-HM)","c":false},{"t":"Deux types de cheminements sont proposés pour les demandes de licence de mise en marché des PSN","c":false}],"f":"L'énoncé est FAUX!Les plantes ou matières végétales, les algues, les bactéries, les champignons et les matières ANIMALES autres que les matières provenant de l'humain sont des exemples de produits de santé naturels"},{"i":"06334","c":4,"q":"Le contrôle du médicament relève du ministère de la santé nationale et du bien-être social, par le biais de la Direction générale de la protection de la santé. Parmi les énoncés suivants entourant les mécanismes d'assurance de la qualité des médicaments au Canada, lequel est FAUX?","a":[{"t":"Le Réseau sur l'innocuité et l'efficacité des médicaments a trois composantes clés dont un réseau virtuel de centres de collaboration interreliés en recherche pharmaceutique post-commercialisation","c":false},{"t":"L'inspection par rapport aux bonnes pratiques cliniques sert à vérifier que les drogues sont fabriquées, conditionnées, étiquetées, importées, distribuées, vendues en gros et analysées d'une manière conforme au règlement","c":true},{"t":"L'Inspectorat de la Direction générale des produits de santé et des aliments (DGPSA) a la responsabilité de mener des enquêtes lorsque des plaintes dénoncent des dérogations possibles à la Loi sur les aliments et drogues, à la Loi réglementant certaines drogues et autres substances ou à leurs règlements","c":false},{"t":"Les lignes directrices concernant les bonnes pratiques cliniques de l'International Conference on Harmonisation doivent être respectées lorsque l'on produit des données sur les essais cliniques destinés à être présentées à des organismes de réglementation","c":false}],"f":"L'énoncé est FAUX!L'inspection par rapport aux bonnes pratiques de FABRICATION sert à vérifier que les drogues sont fabriquées, conditionnées, étiquetées, importées, distribuées, vendues en gros et analysées d'une manière conforme au règlement."},{"i":"06335","c":4,"q":"Les médicaments génériques doivent contenir les mêmes ingrédients médicamenteux que son médicament innovateur de référence. Parmi les énoncés suivants portant sur les médicaments génériques, lequel est FAUX?","a":[{"t":"La date d'expiration des brevets ou des certificats de protection supplémentaire (CPS) inscrits au registre des brevets est toujours un bon indice de quand une version générique d'un médicament peut recevoir son avis de conformité et, ainsi, faire son entrée sur le marché","c":true},{"t":"Les médicaments génériques sont évalués selon un processus abrégé visant à montrer que le médicament générique est bioéquivalent au médicament innovateur, et, à ce titre, qu'il est interchangeable","c":false},{"t":"Un médicament générique doit avoir la même voie d'administration que le médicament innovateur de référence","c":false},{"t":"Les pharmaciens peuvent remplacer les médicaments génériques par des médicaments d'origine si aucune indication contraire n'a été formulée","c":false}],"f":"L'énoncé est FAUX!La date d'expiration des brevets ou des certificats de protection supplémentaire (CPS) inscrits au registre des brevets N'est PAS toujours un bon indice de quand une version générique d'un médicament peut recevoir son avis de conformité et, ainsi, faire son entrée sur le marché"},{"i":"06336","c":4,"q":"Parmi les énoncés suivants portant sur les instruments tels que définis selon le Loi sur les aliments et drogues, lequel est FAUX?","a":[{"t":"Il y a 4 classes d'instruments médicaux : la classe I est celle présentant le risque le plus faible, la classe IV, celle qui présente le risque le plus élevé","c":false},{"t":"Les seringues sont des instruments de classe IV","c":true},{"t":"Un instrument actif est un instrument médical dont le fonctionnement dépend d’une source d’énergie, autre que l’énergie produite par la force musculaire ou la pesanteur","c":false},{"t":"Un instrument effractif est un instrument médical destiné à entrer en contact avec la surface de l’oeil ou à pénétrer dans le corps, soit par un de ses orifices, soit à travers sa surface","c":false}],"f":"L'énoncé est FAUX!Les seringues sont des instruments de classe II"},{"i":"06337","c":4,"q":"Le Conseil d'examen du prix des médicaments brevetés (CEPMB) assure un suivi continu des prix auxquels les brevetés vendent leurs médicaments brevetés. Parmi les énoncés suivants concernant les étapes du processus du CEPMB, lequel est VRAI?","a":[{"t":"L'examen scientifique vise à évaluer le niveau d'amélioration thérapeutique d'un nouveau produit médicamenteux breveté, permettant d’établir un prix plafond, ou Prix moyen maximal potentiel, au moment du lancement","c":true},{"t":"S'il est démontré que le prix du produit médicamenteux est excessif, le CEPMB peut rendre une ordonnance obligeant le breveté à réduire le prix de son produit, mais ne peut exiger de rembourser la partie excessive des recettes qu'il a tirées de la vente de son produit à un prix excessif","c":false},{"t":"L'examen du prix est la première étape du processus de réglementation du CEPMB","c":false},{"t":"Les brevetés sont tenus d'obtenir une approbation du prix du CEPMB avant de vendre leurs médicaments","c":false}],"f":"Bonne réponse![4.5 Identifier les principaux éléments de la Loi sur les brevets]"},{"i":"06338","c":4,"q":"Avant d'autoriser la vente d’une drogue au Canada, Santé Canada procède à un examen des drogues nouvelles afin d'évaluer leur innocuité, leur efficacité et leur qualité. Parmi les énoncés suivants portant sur les étapes de recherche clinique, lequel est VRAI?","a":[{"t":"La phase III des essais cliniques permet d'identifier d'identifier s'il y a une différence liée au sexe ou à la prise de nourriture","c":false},{"t":"Les essais pré-cliniques sont effectués in vitro seulement (tubes à essai)","c":false},{"t":"La phase II des essais cliniques permet d’évaluer l’innocuité (i.e. effets indésirables et risques) et l’efficacité, l’impact sur le métabolisme, l’identification d’une dose et d’une durée optimale de traitement","c":true},{"t":"La phase I des essais cliniques dure généralement 4 à 6 mois","c":false}],"f":"Bonne réponse![4.6 Identifier les éléments clés de la découverte et du développement d’un médicament et de la mise en marché]"},{"i":"06339","c":4,"q":"Santé Canada est responsable de déterminer les modalités entourant la rédaction d'une monographie de médicament. Parmi les énoncés suivants portant sur les monographies au Canada, lequel est FAUX?","a":[{"t":"Il est obligatoire pour les fabricants d'afficher leur monographie via la Base de données des produits pharmaceutiques (BDPP)","c":true},{"t":"La monographie de produit devrait indiquer les dates de la première approbation et de la révision en vigueur, le cas échéant","c":false},{"t":"La partie II d'une monographie présente les études de biodisponibilité comparatives","c":false},{"t":"La partie I d'une monographie indique les contre-indications, les considérations pomologiques et la gestion des doses oubliées","c":false}],"f":"L'énoncé est FAUX!Bien que NON EXIGÉE, plusieurs fabricants permettent un affichage leur monographie via la BDPP"},{"i":"06340","c":4,"q":"Parmi les énoncés suivants portant sur le Système d'information sur les matières dangereuses utilisées au travail (SIMDUT), lequel est FAUX?","a":[{"t":"Les fournisseurs doivent procéder à des vérifications pour déterminer si leurs produits sont dangereux","c":false},{"t":"Les travailleurs doivent participer à la désignation et au contrôle des dangers","c":false},{"t":"Le Système général harmonisé (SGH) de classification et d'étiquetage des produits chimiques consiste en une approche internationale cohérente de classification des produits chimiques et de communication de renseignements sur les dangers au moyen d'étiquettes et de fiches de données de sécurité","c":false},{"t":"Les employeurs doivent participer à des programmes de formation sur le SIMDUT et la sécurité des produits chimiques","c":true}],"f":"L'énoncé est FAUX!Les TRAVAILLEURS doivent participer à des programmes de formation sur le SIMDUT et la sécurité des produits chimiques"},{"i":"06341","c":4,"q":"Plusieurs termes peuvent être utilisés à l'échelle du Québec ou du Canada pour décrire différents produits utilisés en pharmacie. Parmi les énoncés suivants entourant ces termes et définitions, lequel est VRAI?","a":[{"t":"La définition de produit de santé naturel inclut notamment les bactéries, les champignons, les minéraux, les probiotiques et toutes les vitamines","c":false},{"t":"Selon la Loi sur les aliments et drogues, les drogues comprennent notamment les produits biologiques (p.ex. vaccins), les produits de santé naturels, les stupéfiants et les instruments","c":false},{"t":"Les produits dangereux sont définis en vertu de la Loi sur les aliments et drogues","c":false},{"t":"Un produit para-pharmaceutique peut inclure les pansements, les produits destinés aux soins et à l'hygiène dentaire et corporelle, les produits alimentaires destinés à des fins thérapeutiques et les appareils d'orthopédie","c":true}],"f":"Bonne réponse![4.2 Définir les drogues incluant les symboles et les lois applicables]et[4.4 Distinguer les drogues des produits de santé naturels et autres produits et instruments]"},{"i":"06342","c":4,"q":"Afin de consulter les banques de données sur les médicaments, il est important de comprendre les différentes variables permettant de décrire, de catégoriser et de définir les médicaments. Parmi les énoncés suivants entourant la codification des médicaments, lequel est VRAI?","a":[{"t":"Au Québec, la classification ATC (Anatomical Therapeutic and Chemical classification) est utilisée pour établir la liste des médicaments remboursés en vertu du régime général d'assurance-médicaments (RGAM)","c":false},{"t":"Le numéro de groupe d'ingrédients actifs (GIA) est un numéro à 10 chiffres qui permet de repérer les produits contenant le ou les mêmes ingrédients actifs et la ou les mêmes concentrations d'ingrédients","c":true},{"t":"Le code d'identification apposé sur l'étiquette d'un médicament peut comprendre les lettres Pr (sur ordonnance), N (stupéfiant), C (contrôlé), TC (très contrôlé)","c":false},{"t":"On peut attribuer plusieurs codes ATC ou AHFS à un médicament","c":false}],"f":"Bonne réponse![4.2 Définir les drogues incluant les symboles et les lois applicables]et[4.3 Expliquer les systèmes de classification des médicaments]"},{"i":"06343","c":4,"q":"En ce qui concerne l’étiquetage et la publicité des produits vendus en pharmacie, lequel des énoncés suivants est VRAI?","a":[{"t":"La Loi sur les aliments et drogues est une loi québécoise qui précise qu’il est interdit d’étiqueter, d’emballer, de traiter, de préparer ou de vendre une drogue- ou d’en faire la publicité- d’une manière fausse, trompeuse ou mensongère ou susceptible de créer une fausse impression quant à sa nature, sa valeur, sa quantité, sa composition, ses avantages ou sa sûreté","c":false},{"t":"Au Canada, la publicité précédant la délivrance de l’autorisation de mise en marché est permise uniquement aux professionnels","c":false},{"t":"Les étiquettes intérieure et extérieure d’une drogue doivent porter, sur l’espace principal, la mention «stérile», en anglais ou en français, s’il s’agit d’une drogue dont l’état stérile est exigé par le Règlement sur les aliments et drogues","c":true},{"t":"Il est interdit de diffuser l'information non promotionnelle à l’intention du grand public tels que des communiqués, des publications destinées aux consommateurs, des expositions scientifiques et des articles de périodiques","c":false}],"f":"Bonne réponse!\n[4.9 Déterminer les critères d’étiquetage intérieur et extérieur d’un médicament par le fabricant]\net\n[4.10 Identifier les éléments permis au niveau de la publicité portant sur un médicament et décrire les codes volontaires de publicité et de pratique commerciales]"},{"i":"06344","c":4,"q":"En ce qui concerne les exigences relatives à la déclaration des effets indésirables et des erreurs médicamenteuses, lequel des énoncés suivants est VRAI?","a":[{"t":"L'Institut canadien pour la sécurité des patients (ICSP) recueille des données sur tous les problèmes liés aux médicaments qui surviennent dans le cadre du processus d'utilisation des médicaments","c":false},{"t":"Le Programme Canada Vigilance est soutenu par sept bureaux provinciaux de Canada Vigilance qui offrent un point de service aux professionnels et aux consommateurs","c":false},{"t":"Au cours des dernières années, des établissements de santé de partout au pays ont contribué à la prévention d'incidents liés à la sécurité des patients grâce à la mise en oeuvre des stratégies des Soins de santé plus sécuritaires, maintenant!","c":true},{"t":"Les déclarations d'effets indésirables sont soumises de façon volontaire à Santé Canada par les consommateurs, les professionnels de la santé et les détenteurs d'autorisation de mise en marché","c":false}],"f":"Bonne réponse!\n[4.11 Identifier les exigences relatives à la déclaration des effets indésirables]\net\n[4.12 Identifier les exigences relatives à la déclaration des erreurs médicamenteuses]"},{"i":"06345","c":4,"q":"Les bonnes pratiques de fabrication (BPF) doivent être utilisées pour s'assurer de l'innocuité et de la qualité du produit. Parmi les énoncés suivants entourant les BPF, lequel est FAUX?","a":[{"t":"Il incombe à Santé Canada de vérifier si les produits de santé naturels ont été fabriqués dans des établissements où les bonnes pratiques de fabrication sont suivies","c":false},{"t":"Le Canada participe à plusieurs accords de reconnaissance mutuelle (ARM) touchant les programmes de conformité aux BPF des médicaments","c":false},{"t":"La partie 3 du Règlement sur les produits de santé naturels porte sur les BPF","c":false},{"t":"Le Règlement sur les produits dangereux prévoit les modalités entourant les BPF","c":true}],"f":"L'énoncé est FAUX!Le Règlement sur les aliments et drogues prévoit les modalités entourant les BPF"},{"i":"06409","c":5,"q":"Parmi les énoncés suivants entourant la vente et l’achat de médicaments, lequel est FAUX?","a":[{"t":"La production des rapports d’achats et de ventes permet au pharmacien de contrôler l’inventaire des stupéfiants et des drogues contrôlées","c":false},{"t":"En ce qui concerne les drogues contrôlées et les stupéfiants, le pharmacien désigné responsable doit toujours s’assurer que le rapport des ventes est imprimé au moins une fois par mois et doit faire parvenir ce rapport au Bureau des substances contrôlées (BSC)","c":true},{"t":"Le bon de commande peut être transmis verbalement de personne à personne, transmis par télécopieur ou via un site en ligne, selon les catégories médicaments","c":false},{"t":"Le distributeur autorisé (grossiste) de médicaments doit détenir une licence d’établissement tout comme le fabricant","c":false}],"f":"L'énoncé est FAUX!Le pharmacien n’est plus tenu de faire parvenir le rapport des ventes au BSC"},{"i":"06410","c":5,"q":"Un résident en médecine doit faire une prescription d’une substance contrôlée et vous demande des précisions. Parmi les énoncés suivants entourant le cadre législatif de la distribution des substances contrôlées, lequel est FAUX?","a":[{"t":"Les renouvellements ne sont pas permis pour les ordonnances de stupéfiants","c":false},{"t":"Le butorphanol peut être transféré une seule fois","c":true},{"t":"L’ordonnance d’un stupéfiant doit préciser la quantité à dispenser au patient","c":false},{"t":"Les stéroïdes anabolisants peuvent faire l’objet d’une ordonnance verbale","c":false}],"f":"L'énoncé est FAUX!Le butorphanol ne peut être transféré puisqu’il s’agit d’une drogue contrôlée-partie II"},{"i":"06411","c":5,"q":"La Loi réglementant certaines drogues et autres substances précise les modalités entourant l'achat, la vente et la destruction de substances contrôlées. Parmi les énoncés suivants entourant les substances contrôlées, lequel est VRAI?","a":[{"t":"Il est requis de tenir un registre des achats d'au moins 12 mois pour les achats de benzodiazépines","c":false},{"t":"Il est permis de transférer une ordonnance de drogues contrôlées de type stéroïdes anabolisants","c":false},{"t":"Il est permis de procéder au renouvellement d'une ordonnance de préparations de stupéfiants","c":false},{"t":"Il est interdit de procéder au transfert d'une ordonnance de drogues contrôlées de type amphétamine","c":true}],"f":"Cet énoncé est VRAI!"},{"i":"06412","c":5,"q":"Parmi les énoncés suivants entourant les échantillons de médicaments, lequel est VRAI?","a":[{"t":"La Loi sur les aliments et drogues permet la distribution d'une drogue comme échantillon dans certaines conditions, notamment à un dentiste, un médecin ou un pharmacien pour tout médicament détenant un avis de conformité","c":false},{"t":"Le fabricant qui distribue des échantillons doit conserver durant une période de 12 mois les dossiers de commandes qu'il constitue","c":false},{"t":"Un fabricant qui procède à la distribution d'échantillons doit tenir un dossier en précisant le nom, l'adresse et le titre des professionnels visés, la marque nominative, la quantité et la forme de la drogue, puis la date de distribution","c":true},{"t":"Lorsqu'une commande d'échantillons par un médecin est rédigée, elle peut être renouvelée pour une période d'au plus 12 mois","c":false}],"f":"Bonne réponse![5.3 Décrire les modalités entourant la distribution des médicaments et produits de santé]"},{"i":"06413","c":5,"q":"La législation fédérale prévoit des peines concernant l’utilisation, la vente et le trafic de certaines drogues et autres substances. Parmi les énoncés suivants entourant les infractions et le cadre législatif s’y rapportant, lequel est VRAI?","a":[{"t":"En vertu du Code criminel, une «drogue illicite» est une substance dangereuse susceptible de causer la mort de 10% de la population","c":false},{"t":"Le tribunal qui détermine la peine à infliger à une personne reconnue coupable d’une infraction désignée est tenu de considérer toute circonstance aggravante pertinente telle que le recours à la violence","c":true},{"t":"Lors d’une infraction à Loi réglementant certaines drogues et autres substances, des amendes maximales de 2000$ sont prévues par la loi","c":false},{"t":"Dans le cas d’une première infraction à la Loi réglementant certaines drogues et autres substances, lors d’une procédure sommaire, l’emprisonnement est impossible","c":false}],"f":"Bonne réponse![5.5 Identifier les pouvoirs et infractions prévus concernant l’utilisation, la vente et le trafic de certaines drogues et autres substances]"},{"i":"06414","c":5,"q":"Parmi les énoncés suivants concernant les pouvoirs donnés aux inspecteurs, lequel est FAUX?","a":[{"t":"L’inspecteur peut ouvrir tout contenant ou emballage qui, à son avis, contient un article visé par la loi ou ses règlements","c":false},{"t":"Les pouvoirs donnés aux inspecteurs sont définis en vertu la Loi réglementant certaines drogues et autres substances","c":true},{"t":"L’inspecteur peut également examiner tout registre qui, à son avis, contient des renseignements sur un article visé par la loi ou ses règlements","c":false},{"t":"Les moyens de transport sont également visés par la loi","c":false}],"f":"L'énoncé est FAUX!Les pouvoirs donnés aux inspecteurs sont définis en vertu de la Loi sur les aliments et drogues"},{"i":"06415","c":5,"q":"Le pharmacien doit se doter de mécanismes afin de garantir la sécurité des substances contrôlées qu’il a en sa possession. Parmi les énoncés suivants entourant la perte et le vol de ces substances désignées, lequel est VRAI?","a":[{"t":"Tout pharmacien doit permettre à l’inspecteur de vérifier tous les stocks de drogues contrôlées dans son établissement","c":true},{"t":"Tout pharmacien doit conserver en sa possession un registre d'ordonnances des drogues contrôlées durant au moins cinq ans","c":false},{"t":"Tout pharmacien doit signaler au ministre toute perte ou tout vol d’une drogue contrôlée 7 jours au plus après en avoir fait la découverte","c":false},{"t":"Le pharmacien peut refuser de fournir à l’inspecteur des extraits des registres","c":false}],"f":"Bonne réponse![5.6 Identifier les obligations en termes de tenue de dossiers et les mécanismes d’inspection au niveau fédéral]"},{"i":"06416","c":5,"q":"Plusieurs organismes nationaux ou internationaux veillent au contrôle et à l’usage adéquat des stupéfiants et des drogues contrôlées. Parmi les énoncés suivants entourant ces organismes, lequel est FAUX?","a":[{"t":"Les travaux des membres de l’Organe international de contrôle des stupéfiants sont financés par l’Organisation des Nations unies (ONU)","c":false},{"t":"Le Programme de stratégie antidrogue et substances contrôlées (PSASC) peut participer à des opérations policières conjointes","c":false},{"t":"L’Organe international de contrôle des stupéfiants est indépendant de l’Organisation des Nations unies (ONU)","c":false},{"t":"Le Programme de stratégie antidrogue et substances contrôlées (PSASC) exerce son rôle au Canada exclusivement","c":true}],"f":"L'énoncé est FAUX!Le PSASC collabore avec des intervenants des secteurs public et privé, au Canada ET à l’étranger"},{"i":"06417","c":5,"q":"Parmi les énoncés suivants concernant les obligations du pharmacien dans un contexte de retraits de lots de médicaments (RLM), lequel est FAUX?","a":[{"t":"Lors d’un RLM, Santé Canada doit entreprendre une évaluation de la nature et de l’étendue de l’éventuel danger pour la santé qui est transmise au fabricant","c":true},{"t":"Le pharmacien peut prendre connaissance des avis de RLM sur le site de l’Ordre des pharmaciens (OPQ)","c":false},{"t":"Le retrait étant un processus volontaire, Santé Canada doit être avisée de tous les retraits","c":false},{"t":"En vertu du Règlement sur les aliments et drogues, le manufacturier doit tenir un système de contrôle qui permet le retrait rapide et complet de tout lot ou tout lot de fabrication de la drogue se trouvant sur le marché","c":false}],"f":"L'énoncé est FAUX!Lors d’un RLM, le FABRICANT doit entreprendre une évaluation de la nature et de l’étendue de l’éventuel danger pour la santé qui est transmise à SANTÉ CANADA"},{"i":"06418","c":5,"q":"En 2019, Santé Canada a publié des lignes directrices dans les domaines de la sécurité, du rapprochement des stocks et de la tenue de dossiers à l’intention des pharmaciens communautaires, notamment applicables aux stupéfiants. Parmi les énoncés suivants entourant l'utilisation et la destruction des timbres de fentanyl, lequel est FAUX?","a":[{"t":"Après usage, il ne reste plus de médicament dans les timbres de fentanyl","c":true},{"t":"Les timbres de fentanyl décollés devraient être recollés sur la peau du patient au moyen de ruban adhésif de premiers soins","c":false},{"t":"Les timbres de fentanyl usagés doivent être pliés de manière à ce que les côtés adhésifs adhèrent ensemble, puis retournés à la pharmacie en vue de leur élimination","c":false},{"t":"Les timbres de fentanyl ne doivent pas être placés dans les déchets domestiques où des enfants et des animaux pourraient les trouver","c":false}],"f":"L'énoncé est FAUX!Même après usage, il reste dans le timbre une quantité importante de médicament pouvant être très dommageable"},{"i":"06419","c":5,"q":"Parmi les énoncés suivants entourant les avis, mises en garde et retraits de lots, lequel est FAUX?","a":[{"t":"Si les mesures de retrait entreprises par le manufacturier sont jugées insuffisantes, Santé Canada peut alors prendre les mesures nécessaires pour empêcher la vente ou l'utilisation du produit","c":false},{"t":"Un fabricant doit fournir certains renseignements au Directeur (sous-ministre adjoint de la Direction générale des produits de santé et des aliments du ministère) s’il décide de retirer une drogue du marché, dans un délai d’un mois suivant le début du retrait","c":true},{"t":"Il est possible d’accéder aux avis de retrait du marché à partir du site Internet de l’Ordre des pharmaciens du Québec (OPQ)","c":false},{"t":"Le ministre de la Santé peut suspendre, pour une période déterminée ou indéterminée, un avis de conformité délivré à l’égard d’une présentation de drogue nouvelle s’il estime que le fabricant n’a pas établi un système pour tenir les registres exigés","c":false}],"f":"L'énoncé est FAUX!Il doit fournir ces renseignements dès le début du retrait"},{"i":"06420","c":5,"q":"Bien que la préparation et la vente de médicaments à un patient soient de juridiction provinciale, le gouvernement fédéral exerce un contrôle de la vente de l'ensemble des médicaments par le biais de la Loi sur les aliments et drogues. Parmi les énoncés suivants entourant la distribution et la vente des médicaments, lequel est FAUX?","a":[{"t":"En vertu du Règlement sur les aliments et drogues, la vente de drogues sur ordonnance est notamment permise aux personnes et entités suivantes: les fabricants de drogues, les praticiens, les pharmaciens","c":false},{"t":"Le fentanyl est inclus dans la liste des stupéfiants en vertu de l'annexe du Règlement sur les stupéfiants","c":false},{"t":"Seul un pharmacien a le droit de procéder au transfert d'une ordonnance relative à une drogue sur ordonnance selon le Règlement sur les aliments et drogues","c":true},{"t":"Plusieurs stupéfiants figurent parmi les médicaments les plus impliqués dans les erreurs rapportées","c":false}],"f":"L'énoncé est FAUX!Le technicien en pharmacie PEUT aussi transférer une ordonnance relative à une drogue sur ordonnance."},{"i":"06421","c":5,"q":"Au Canada, il existe trois voies principales par lesquelles il est possible d’avoir accès à des médicaments dont la vente n’est pas autorisée au pays qui sont destinés à des situations d’urgence, dont le Programme d’accès spécial (PAS) de Santé Canada. Parmi les énoncés suivants au sujet du PAS, lequel est FAUX?","a":[{"t":"Les praticiens ne sont pas tenus d'avoir une licence d’établissement de produits pharmaceutiques (LEPP) pour demander un médicament en cas d'urgence médicale","c":false},{"t":"Pour faciliter la procédure auprès du PAS, il n'y a qu'un seul formulaire disponible pour les différentes situations de demandes possibles","c":true},{"t":"Une autorisation émise par Santé Canada dans le cadre du PAS n’oblige en rien un fabricant étranger à vendre un médicament à un praticien autorisé au Canada","c":false},{"t":"Le PAS est notamment utilisé dans le cadre du traitement, du diagnostic ou de la prévention de maladies graves ou mortelles, notamment lorsque les thérapies conventionnelles se sont révélées inefficaces","c":false}],"f":"L'énoncé est FAUX!Il y a 2 types de formulaires de demande d'accès spécial : le A pour utilisation immédiate et le B pour une utilisation ultérieure en prévision d'une urgence médicale"},{"i":"06422","c":5,"q":"En ce qui concerne les enjeux reliés à l'achat de médicaments en ligne dont met en garde l'Ordre des pharmaciens du Québec (OPQ), quel énoncé parmi les suivants est VRAI?","a":[{"t":"Il est sécuritaire d'effectuer une demande de renouvellement d'ordonnances en ligne via les sites Web des chaînes et bannières","c":true},{"t":"Si les médicaments achetés en ligne comportent un DIN (Drug Identification Number), c'est qu'ils sont approuvés par Santé Canada","c":false},{"t":"Si un site affiche un drapeau canadien, c'est qu'il a reçu l'approbation d'utilisation de ce logo, ce qui rend cette source plus sûre","c":false},{"t":"Il est très difficile de reproduire un comprimé identique sans utiliser les mêmes ingrédients par rapport à un médicament de référence, donc une apparence identique est généralement bon signe pour utiliser le médicament","c":false}],"f":"Bonne réponse![5.1 Décrire les différents mécanismes d’approvisionnement en médicaments sur le marché canadien, incluant l’importation et les achats via Internet]"},{"i":"06423","c":5,"q":"Depuis la crise provoquée par la réduction très marquée de la production à l’usine de Boucherville de Sandoz Canada (Novartis AG), l’ensemble des parties prenantes se sont mobilisées afin de réduire les impacts des pénuries de médicaments. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Les fonctions du site PenuriesdemedicamentsCanada.ca comprennent des alertes par courriel concernant un médicament particulier, des fonctions de recherche avancée des renseignements plus complets et la capacité pour les utilisateurs de télécharger des sous-ensembles de données au moyen d’un logiciel tiers","c":false},{"t":"Les pénuries de niveau 1 sont celles qui peuvent entraîner le plus de répercussions à la fois sur l'approvisionnement en médicaments et sur le système de soins de santé canadien","c":true},{"t":"La feuille de route de l’Association canadienne du médicament générique propose notamment de renforcer l’industrie nationale, d’assurer et renforcer le rôle du Canada dans la chaîne d’approvisionnement pharmaceutique internationale, d’identifier les médicaments génériques essentiels à produire au Canada ou à stocker pour répondre aux besoins canadiens","c":false},{"t":"Il est obligatoire de déclarer les pénuries de drogues, les cessations de la vente de drogues ainsi que les modifications aux renseignements liés à ces événements selon les délais prescrits","c":false}],"f":"L'énoncé est FAUX!Les pénuries de niveau 3 sont celles qui peuvent entraîner le plus de répercussions à la fois sur l'approvisionnement en médicaments et sur le système de soins de santé canadien"},{"i":"06424","c":5,"q":"L’Organisation mondiale de la Santé (OMS) définit un médicament contrefait comme délibérément et frauduleusement muni d’une étiquette n’indiquant pas son identité et/ou son origine véritable. Parmi les énoncés suivants entourant les médicaments contrefaits, lequel est FAUX?","a":[{"t":"Selon l’OMS, dans les pays en développement, les médicaments les plus fréquemment contrefaits sont ceux qui visent à guérir des maladies infectieuses et des maladies graves, comme la malaria, la tuberculose, le VIH et le SIDA, ou encore des infections banales","c":false},{"t":"La contrefaçon de médicaments peut se manifester de différentes façons, dont une présentation et/ou composition identique, une composition différente et un conditionnement falsifié","c":false},{"t":"Le commerce criminel des médicaments contrefaits est plus répandu dans les pays en développement en raison de la législation, de la répression et du contrôle peu rigoureux qui y sont associés","c":false},{"t":"Le marché de la drogue est plus facile à mettre en place que le marché des médicaments contrefaits vu l'encadrement strict des médicaments par Santé Canada et les peines sévères qui sont associés au trafic de médicaments","c":true}],"f":"L'énoncé est FAUX!En plus d'être lucratif, le trafic de médicaments contrefaits est plus facile à mettre en place que celui de la drogue et offre des débouchés beaucoup plus légères"},{"i":"06425","c":5,"q":"Les énoncés suivants correspondent aux différentes façons d'acheter ou obtenir des médicaments au Canada. Lequel est FAUX?","a":[{"t":"Médicaments sans avis de conformité sur ordonnance requis en cas d’urgence (i.e. Programme d’accès spécial, arrêté d’urgence, circonstances exceptionnelles)","c":false},{"t":"Médicaments sans avis de conformité sur ordonnance, mais comportant une lettre d'objection pour un essai clinique autorisé par Santé Canada auprès d’un promoteur","c":true},{"t":"Médicaments avec avis de conformité avec ou sans ordonnance auprès d’une pharmacie ou d’un commerce autorisé à vendre le médicament","c":false},{"t":"Médicaments sans avis de conformité sur ordonnance hors Canada dans une autre juridiction avec une importation personnelle d’au plus 3 mois de stock lors d’un déplacement","c":false}],"f":"L'énoncé est FAUX!Médicaments sans avis de conformité sur ordonnance, mais comportant une lettre de NON-objection pour un essai clinique autorisé par Santé Canada auprès d’un promoteur"},{"i":"06426","c":5,"q":"Parmi les énoncés suivants entourant les procédures d'achats et de ventes des médicaments en pharmacie, lequel est FAUX?","a":[{"t":"Les factures ou copies de factures qui constituent le registre d'achat de médicaments doivent être disponibles en tout temps à la pharmacie et être conservées au moins 2 ans","c":false},{"t":"Un inventaire de référence des stupéfiants et des drogues contrôlées doit d’abord être effectué au jour 0, ce qui peut correspondre, dans la majorité des cas, à l’inventaire annuel ou à l’inventaire effectué lors de l’achat d’une pharmacie","c":false},{"t":"Le pharmacien, ou le personnel de soutien à qui la tâche a été déléguée, peut cibler quelques produits de façon aléatoire pour s’assurer que la quantité disponible au jour de la vérification correspond bien à la quantité restante prévue en fonction des achats et les ventes effectués depuis l’inventaire","c":false},{"t":"Aux fins d'acheter des substances désignées, le pharmacien doit satisfaire à des exigences telles qu'un emplacement sécuritaire et un système de décompte","c":true}],"f":"L'énoncé est FAUX!On fait ici référence aux exigences pour les GROSSISTES pour la VENTE de substances désignées"},{"i":"06427","c":5,"q":"Parmi les énoncés suivants entourant le cannabis à des fins médicales ou thérapeutiques, lequel est FAUX?","a":[{"t":"Les limites de possession de cannabis en public sont soit le moindre de 150 grammes ou d'un approvisionnement de 30 jours de cannabis séché (ou l'équivalent en produits à base de cannabis) en plus des 30 grammes autorisés à des fins non médicales","c":false},{"t":"Santé Canada continue de rendre compte de la littérature scientifique concernant les éventuels usages thérapeutiques du cannabis à des fins médicales et les effets nocifs","c":false},{"t":"Les personnes autorisées à accéder au cannabis à des fins médicales doivent être prêtes à prouver qu'elles sont légalement autorisées à en posséder plus de 30 grammes (ou l'équivalent) en public si les membres des services de police le leur demandent","c":false},{"t":"Les patients ayant accès à du cannabis à des fins médicales acheté auprès de vendeurs autorisés par le gouvernement fédéral doivent respecter la limite de maximum 30 jours d'approvisionnement","c":true}],"f":"L'énoncé est FAUX!Pour ces patients, il n'y a pas de période limite de 30 jours afin de ne pas interrompre l'approvisionnement d'un patient"},{"i":"06428","c":5,"q":"Parmi les énoncés suivants entourant les retours de médicaments post-consommation, lequel est FAUX?","a":[{"t":"Les distributeurs autorisés à la destruction doivent signaler toute perte ou tout vol à Santé Canada dans les 72 heures suivant la découverte","c":false},{"t":"Les retours post-consommation doivent être reçus par un pharmacien, un stagiaire en pharmacie ou un technicien en pharmacie","c":false},{"t":"Il faut séparer les retours post-consommation contenant des drogues contrôlées et des substances désignées retournées des autres retours post-consommation contenant des médicaments d'ordonnance ou en vente libre","c":true},{"t":"Il convient de suggérer aux consommateurs qui retournent des médicaments inutilisés ou périmés de retirer les renseignements personnels des bouteilles et des emballages de médicaments, mais il s’agit de la responsabilité des consommateurs","c":false}],"f":"L'énoncé est FAUX!Il N'EST PAS NÉCESSAIRE de séparer les retours post-consommation contenant des drogues contrôlées et des substances désignées retournées des autres retours post-consommation contenant des médicaments d'ordonnance ou en vente libre"},{"i":"06429","c":5,"q":"Parmi les énoncés suivants entourant l'entreposage des retours de médicaments post-consommation, lequel est FAUX?","a":[{"t":"Les distributeurs autorisés sont tenus d'entreposer les retours post-consommation avec leur stock de produits utilisables et de produits devenus inutilisables","c":true},{"t":"Il est recommandé que les contenants de retours post-consommation soient également opaques, discrets et inviolables","c":false},{"t":"Les retours post-consommation doivent être placés dans des contenants dotés d'une entrée à sens unique portant un identifiant unique","c":false},{"t":"Les contenants en utilisation active doivent être gardés dans l'officine de la pharmacie et l'accès doit être limité au personnel de pharmacie","c":false}],"f":"L'énoncé est FAUX!Les distributeurs autorisés NE sont PAS tenus d'entreposer les retours post-consommation avec leur stock de produits utilisables et de produits devenus inutilisables, mais ils doivent toutefois les entreposer de façon à empêcher qu'ils soient détournés, notamment dans une zone à accès limité"},{"i":"06430","c":5,"q":"Au Canada, le nombre croissant de surdoses et de décès causés par les opioïdes est une urgence en santé publique. Parmi les énoncés suivants concernant la crise sur les opioïdes, lequel est VRAI?","a":[{"t":"Ceux qui ne consomment de la drogue qu'occasionnellement dans un contexte récréatif ne sont pas à risque de surdosage","c":false},{"t":"À l’été 2021, on rapporte que la pandémie à COVID19 est associée à une hausse de la consommation de plusieurs drogues incluant le cannabis, les amphétamines et les opioïdes","c":true},{"t":"Il faut une ordonnance pour obtenir de la naloxone, puisque qu'elle figure à l'annexe I du Règlement sur les conditions et modalités de vente des médicaments","c":false},{"t":"Les opioïdes d'ordonnances ne sont pas rattachés à l'augmentation des taux de surdosage au Canada, ce sont plutôt les drogues illicites qui s'y rattachent","c":false}],"f":"Bonne réponse![5.6 Identifier les obligations en termes de tenue de dossiers et les mécanismes d’inspection au niveau fédéral]"},{"i":"06431","c":5,"q":"Lorsqu’il vend ou achète des substances désignées, le pharmacien doit procéder à un contrôle rigoureux de son inventaire. Parmi les énoncés suivants entourant la distribution et l’achat de substances désignées, lequel est VRAI?","a":[{"t":"Lors du transfert partiel d’une ordonnance de méthadone, le pharmacien recevant le transfert doit conserver les informations relatives à celui-ci durant au moins deux ans","c":false},{"t":"Le registre d’achat de substances désignées doit obligatoirement mentionner le nom et la quantité de produit reçu, la date de réception du stupéfiant, les nom et adresse du fournisseur ainsi que les indications usuelles des substances reçues","c":false},{"t":"Lors de l’exécution partielle d’une ordonnance de Fiorinal, le pharmacien doit conserver les informations relatives à cette exécution durant au moins deux ans","c":true},{"t":"Une ordonnance écrite d’amphétamine comportant la mention «3 renouvellements» n’est pas conforme","c":false}],"f":"Bonne réponse![5.2 Décrire les modalités entourant les procédures d’achat et de contrôle de l’inventaire de médicaments, de certaines drogues et autres substances]et[5.3 Décrire les modalités entourant la distribution des médicaments et produits de santé]"},{"i":"06432","c":5,"q":"En tant que futur pharmacien, il est important de connaître les différents mécanismes d’approvisionnement ainsi que les procédures d’achat et de vente des médicaments. Parmi les énoncés suivants entourant l’approvisionnement, l’achat et la vente des médicaments, lequel est FAUX?","a":[{"t":"En ce qui concerne le programme d’accès spécial, il existe deux formulaires distincts pour transiger avec Santé Canada","c":false},{"t":"En ce qui concerne les substances désignées, il existe des obligations en matière de commande, de vente à un praticien ou un professionnel et de registre d’achat","c":false},{"t":"Le bon de commande pour les achats de médicaments peut être transmis verbalement de personne à personne, transmis par télécopieur ou via un site en ligne, selon les catégories médicaments","c":false},{"t":"Le programme d’accès spécial est un mécanisme destiné à favoriser l’utilisation rapide de médicaments ainsi qu’à contourner le développement clinique d’un médicament","c":true}],"f":"L'énoncé est FAUX!Le programme d’accès spécial n’est pas un mécanisme destiné à favoriser l’utilisation rapide de médicaments et ne vise pas non plus à contourner le développement clinique d’un médicament ou l’évaluation réglementaire d’une présentation aux fins de commercialisation"},{"i":"06433","c":5,"q":"Le Canada fait face à une crise nationale des opioïdes. Le nombre croissant de surdoses et de décès causés par les opioïdes est une urgence en santé publique. Parmi les énoncés suivants au sujet des opioïdes, lequel est FAUX?","a":[{"t":"Pour les opioïdes administrés sous la supervision d’un professionnel de la santé, comme en milieu hospitalier, il n’est pas obligatoire de remettre un autocollant de mise en garde et une fiche de renseignements aux patients","c":false},{"t":"Les individus qui ne consomment de la drogue qu'occasionnellement dans un contexte récréatif s'exposent tout de même à un risque de surdose","c":false},{"t":"La fiche de renseignements sur les opioïdes qui est remise au moment de la distribution vise à rassurer les patients sur la prise des opioïdes qui se veut, dans le cadre médical, sécuritaire","c":true},{"t":"La naloxone peut être remise aux patients par les pharmaciens sans qu'une ordonnance d'un médecin soit requise","c":false}],"f":"L'énoncé est FAUX!La fiche de renseignements sur les opioïdes qui est remise au moment de la distribution vise à renseigner clairement les patients quant à l'utilisation sécuritaire des opioïdes et les RISQUES qui y sont associés"},{"i":"06498","c":6,"q":"Grâce au projet de Loi 90 adopté en 2002, le système professionnel québécois connaît une réforme. Parmi les énoncés suivants entourant l’organisation du système professionnel québécois, lequel est VRAI?","a":[{"t":"Le mandat principal des ordres professionnels est la protection et le développement de ses membres","c":false},{"t":"Le système professionnel est régi par une loi cadre, 25 lois particulières et environ 500 règlements afférents","c":true},{"t":"Association professionnelle est synonyme d'ordre professionnel lorsqu'on parle du système professionnel québécois","c":false},{"t":"Les principaux acteurs du système professionnel sont les ordres professionnels, le Conseil interprofessionnel du Québec, l’Office des professions du Québec, le Tribunal des professions et le Ministre de l’emploi","c":false}],"f":"Bonne réponse![6.1 Décrire l’organisation du système professionnel au Québec]"},{"i":"06499","c":6,"q":"Parmi les énoncés suivants portant sur les définitions et l’organisation du système professionnel, lequel est FAUX?","a":[{"t":"La réglementation des activités professionnelles est une compétence du gouvernement du Québec","c":false},{"t":"La notion de protection du public est fondée sur les risques de préjudice que comporte l'exercice de certaines activités qui peuvent porter atteinte à l'intégrité physique, psychologique et patrimoniale des individus ainsi qu'à la confidentialité et la vie privée","c":false},{"t":"On retrouve les professionnels dans des secteurs stratégiques comme la santé, les relations humaines, le génie, l’aménagement, les sciences, le droit, l’administration et les affaires","c":false},{"t":"Afin d’assurer la protection du public, le système professionnel s’inspire du Code de déontologie des pharmaciens","c":true}],"f":"L’énoncé est FAUX!Le système professionnel s’inspire plutôt des exigences et valeurs de la société québécoise exprimées par des droits fondamentaux inscrits dans la Charte des droits et libertés de la personne du Québec"},{"i":"06500","c":6,"q":"L’Office des professions du Québec veille à ce que les professionnels exercent leur profession de façon compétente et intègre. Parmi les énoncés suivants entourant l’Office des professions et ses fonctions, lequel est FAUX?","a":[{"t":"L’Office voit à ce que le public soit informé et représenté au sein des ordres","c":false},{"t":"L’Office s’assure que les membres des ordres professionnels reçoivent un salaire équitable","c":true},{"t":"L’Office travaille en étroite collaboration avec plusieurs ministères, les ordres professionnels, le public et les médias","c":false},{"t":"L’Office donne au gouvernement son avis sur tout diplôme qui donne ouverture à un permis ou à un certificat de spécialiste délivré par un ordre","c":false}],"f":"L’énoncé est FAUX!L’Office n’a pas comme mandat de juger le salaire des membres des ordres professionnels"},{"i":"06501","c":6,"q":"En plus de l’Office des professions et du Tribunal des professions, il existe également un Conseil interprofessionnel. Parmi les énoncés suivants entourant ce conseil et son mandat, lequel est VRAI?","a":[{"t":"L’Ordre des pharmaciens du Québec (OPQ) désigne 10 représentants au Conseil interprofessionnel","c":false},{"t":"Le Conseil interprofessionnel doit donner son avis au ministre sur toute question que ce dernier lui soumet","c":true},{"t":"Les activités du Conseil interprofessionnel sont balisées par la Loi sur les activités relatives au Conseil interprofessionnel","c":false},{"t":"Le Conseil interprofessionnel peut uniquement inviter les groupes qui sont reconnus comme ordres professionnels à se rencontrer en vue de trouver une solution à leurs problèmes","c":false}],"f":"Bonne réponse![6.2 Distinguer les fonctions attribuées à l’Office des professions, au Conseil interprofessionnel et aux ordres professionnels]"},{"i":"06502","c":6,"q":"L'exercice de plusieurs professions est balisé par le Code de professions alors que d'autres bénéficient en plus d'une loi professionnelle spécifique. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"Les infirmières auxiliaires, les hygiénistes dentaires, les technologues professionnels, les optométristes et les podiatres ont une loi professionnelle spécifique","c":false},{"t":"Les chiropraticiens et les psychologues ont une loi professionnelle spécifique","c":false},{"t":"L'exercice des technologistes médicaux, des physiothérapeutes, des inhalothérapeutes et des ergothérapeutes est balisé Code des professions, sans loi professionnelle spécifique dédiée à leur exercice","c":true},{"t":"Les dentistes, les opticiens d'ordonnance, les pharmaciens et les travailleurs sociaux ont une loi spécifique","c":false}],"f":"Bonne réponse![6.3 Distinguer la notion d’exercice exclusif et d’exercice à titre réservé]"},{"i":"06503","c":6,"q":"Entre activités permises, réservées, exclusives et réglementées, il faut savoir s'y retrouver! Parmi les énoncés suivants entourant les activités professionnelles, lequel est FAUX?","a":[{"t":"Les activités permises requièrent l'assentiment d'un tiers ordre","c":false},{"t":"Les activités réservées représentent un ensemble d'opérations ou d'interventions qui doivent être réalisées dans le cadre du champ d'exercice de la profession","c":false},{"t":"Une activité est exclusive si elle n'est pratiquée que par un groupe","c":true},{"t":"Bien que le système professionnel comporte plusieurs lois et plusieurs ordres, certaines activités ne sont pas/plus réglementées, par exemple le prélèvement capillaire","c":false}],"f":"L’énoncé est FAUX!Le terme exclusif s'applique à l'EXERCICE d'une profession et non une activité"},{"i":"06504","c":6,"q":"Le Conseil d’administration de l’Ordre des pharmaciens du Québec (OPQ) peut, par résolution, prendre des décisions qui vont affecter concrètement l’organisation de la pratique de la pharmacie au Québec. Parmi les énoncés suivants entourant les pouvoirs du Conseil d’administration (CA), lequel est FAUX?","a":[{"t":"Le CA peut autoriser les membres de l’ordre à exercer leurs activités professionnelles au sein d’une société en nom collectif à responsabilité limitée","c":false},{"t":"Le CA peut fixer le montant de la cotisation annuelle","c":false},{"t":"Le CA peut, par résolution, apporter des modifications au Code de déontologie","c":true},{"t":"Le CA peut établir et administrer un fonds afin de promouvoir la formation, l’information, la qualité des services professionnels et la recherche","c":false}],"f":"L’énoncé est FAUX!Pour toute modification au Code de déontologie, les membres de l’ordre doivent être consultés"},{"i":"06505","c":6,"q":"Le Conseil d’administration (CA) d’un ordre est formé de plusieurs administrateurs. Parmi les énoncés suivants entourant la structure du CA d’un ordre professionnel, lequel est VRAI?","a":[{"t":"Le CA est formé d'un président et d'administrateurs dont le nombre est d'au moins 15","c":false},{"t":"Lors d’un vote, au cas d’égalité des voix, le président donne un vote prépondérant","c":true},{"t":"Contrairement aux autres administrateurs du Conseil d’administration, le président doit obligatoirement être domicilié au Québec","c":false},{"t":"Tous les administrateurs du CA sont élus","c":false}],"f":""},{"i":"06506","c":6,"q":"Parmi les énoncés suivants entourant l’Ordre des pharmaciens du Québec (OPQ) et sa structure, lequel est FAUX?","a":[{"t":"Le comité spécial sur la révision du Règlement sur l’exercice de la pharmacie en société est un comité obligatoire qui revoit les règlements afin de vérifier qu’ils tiennent compte de la réalité de la pratique de la pharmacie en société par actions","c":true},{"t":"Le comité d'enquête du programme Alerte enquête, au nom et sous l'autorité du Conseil d'administration, pour la prévention et la détection de la surconsommation de médicaments","c":false},{"t":"Le comité d’enquête à l’éthique et à la déontologie répond aux interrogations que le secrétaire d’élection lui adresse en regard du processus électoral, notamment quant au respect des règles d’éligibilité et de conduite par les candidats aux postes d’administrateurs","c":false},{"t":"Le conseil d’arbitrage des comptes est un comité obligatoire qui détermine, s'il y a lieu, le remboursement d’un compte auquel une personne qui l’acquitte ou doit l’acquitter peut avoir droit","c":false}],"f":"L'énoncé est FAUX!Le comité spécial sur la révision du Règlement sur l’exercice de la pharmacie en société est un comité FACULTATIF qui revoit les règlements afin de vérifier qu’ils tiennent compte de la réalité de la pratique de la pharmacie en société par actions"},{"i":"06507","c":6,"q":"En vertu du Code des professions, on définit les modalités entourant le rôle du syndic, du comité de révision et des sanctions. Parmi les énoncés suivants entourant ces modalités, lequel est FAUX?","a":[{"t":"Un comité de révision est constitué au sein de chacun des ordres","c":false},{"t":"Le syndic peut s’adjoindre tout expert ou toute autre personne pour l’assister dans l’exercice de ses fonctions d’enquête","c":false},{"t":"Le comité de révision peut dans son avis conclure qu’il n’y a pas lieu de porter plainte devant le comité de discipline","c":false},{"t":"Si un syndic n’a pas terminé son enquête dans les 45 jours de la réception de la demande de tenue de l’enquête, il doit, à l’expiration de ce délai, en informer par écrit la personne qui a demandé la tenue de l’enquête","c":true}],"f":"L’énoncé est FAUX!Si un syndic n’a pas terminé son enquête dans les 90 jours de la réception de la demande de tenue de l’enquête, il doit, à l’expiration de ce délai, en informer par écrit la personne qui a demandé la tenue de l’enquête"},{"i":"06508","c":6,"q":"Comme le système professionnel relève des lois provinciales, on remarque plusieurs différences entre le Québec et les autres provinces quant aux conditions d’exercice de la pharmacie. Parmi les énoncés suivants entourant ces distinctions, lequel est VRAI?","a":[{"t":"Tous les ordres professionnels de pharmacie des provinces et territoires ont le même mandat","c":true},{"t":"Le droit de propriété de pharmacie est réservé aux pharmaciens exclusivement partout au Canada à l’exception de l’Alberta","c":false},{"t":"La Société canadienne des pharmaciens d’hôpitaux (SCPH) comporte un membership corporatif, contrairement à l’Association des pharmaciens du Canada dont le membership est individuel","c":false},{"t":"L’Association des pharmaciens du Canada représente l’ensemble des pharmaciens du pays, à l’exception du Québec","c":false}],"f":"Bonne réponse![6.8 Identifier quelques éléments distinctifs du système professionnel dans les autres provinces en matière de pratique pharmaceutique]"},{"i":"06509","c":6,"q":"Outre les ordres professionnels, il existe au Canada d’autres organismes de pharmaciens. Parmi les énoncés suivants entourant ces organismes, lequel est FAUX?","a":[{"t":"Tous les ordres professionnels de pharmacie des provinces ont notamment pour mandat d'émettre un permis d'exercice","c":false},{"t":"L’Association des pharmaciens du Canada représente principalement les pharmaciens exerçant en établissement de santé","c":true},{"t":"L'Association nationale des organismes de réglementation de la pharmacie (ANORP) regroupe les ordres de pharmacie au Canada","c":false},{"t":"Le membership à l’Association des pharmaciens du Canada est corporatif","c":false}],"f":"L’énoncé est FAUX!L’Association des pharmaciens du Canada représente principalement les pharmaciens exerçant en MILIEU COMMUNAUTAIRE"},{"i":"06510","c":6,"q":"Parmi les énoncés suivants entourant les fonctions attribuées à l'Office des professions, au Conseil interprofessionnel et aux ordres professionnels, lequel est FAUX?","a":[{"t":"L'Office des professions doit notamment élaborer et proposer au public et aux ordres professionnels tout document propre à favoriser l'exercice de tout droit et de tout recours prévus","c":false},{"t":"L'Office des professions du Québec s'assure que le public est bien représenté au sein des ordres professionnels en désignant des administrateurs nommés qui ne sont pas membres de l'ordre","c":false},{"t":"Les recours judiciaires sont applicables lorsqu'un professionnel n'a pas respecté une loi ou un règlement professionnel","c":true},{"t":"Le Ministre de la responsable des lois professionnelles peut intervenir dans des situations problématiques, en autorisant par exemple une enquête sur un ordre professionnel","c":false}],"f":"L'énoncé est FAUX!Les recours DISCIPLINAIRES sont applicables lorsqu'un professionnel n'a pas respecté une loi ou un règlement professionnel"},{"i":"06511","c":6,"q":"Parmi les énoncés suivants portant sur les différents comités au sein de l'Ordre des pharmaciens du Québec (OPQ), lequel est FAUX?","a":[{"t":"Les comités interordres, de gouvernance et d'évaluation du président et du directeur général et secrétaire sont des comités facultatifs","c":false},{"t":"Les comités sur la formation des pharmaciens, d'étude des dispenses des formations obligatoires et réviseur de l'admission à la pratique sont des comités obligatoires","c":false},{"t":"Le comité réviseur de l’admission à la pratique étudie les demandes d’équivalence de diplôme et de la formation et décide de reconnaître, en tout ou en partie, ou de refuser l’équivalence","c":true},{"t":"Le conseil de discipline est saisi et juge toute plainte formulée contre un pharmacien pour une infraction aux lois et règlements encadrant l'exercice de la pharmacie","c":false}],"f":"L'énoncé est FAUX!Le COMITÉ DE L’ADMISSION À LA PRATIQUE étudie les demandes d’équivalence de diplôme et de la formation et décide de reconnaître, en tout ou en partie, ou de refuser l’équivalence"},{"i":"06512","c":6,"q":"Le Code des professions confie au Conseil d'administration (CA) l’administration générale des affaires de l’Ordre des pharmaciens du Québec (OPQ). Parmi les énoncés suivants concernant le CA, lequel est FAUX?","a":[{"t":"Le nombre maximal de mandats consécutifs que peuvent effectuer un président et un administrateur est fixé à 4","c":true},{"t":"Le CA se réserve notamment le mandat d’approuver les plans et les budgets, d’exercer un suivi sur la performance générale de l’organisation et de nommer le syndic et les membres de comités","c":false},{"t":"Le CA n’a pas la charge de l’administration courante des affaires de l’OPQ","c":false},{"t":"Un membre ne peut se porter candidat à plus d’un poste à la fois","c":false}],"f":"L'énoncé est FAUX!Le nombre maximal de mandats consécutifs que peuvent effectuer un président et un administrateur est fixé à 2"},{"i":"06513","c":6,"q":"Le programme de surveillance de l'exercice de la pharmacie a été revu et simplifié en 2020-2021. Parmi les énoncés suivants entourant cette mise à jour du programme, lequel est VRAI?","a":[{"t":"Le plan de prise en charge en pharmacie (PPCP) et le plan de projet d’auto-inspection (PPAI) visent à démontrer la rapidité d'exécution des tâches cliniques et à évaluer les connaissances fondamentales nécessaires à la prestation de soins et services pharmaceutiques","c":false},{"t":"L'inspection individuelle se déroule en 3 étapes, soit la préparation, l'observation directe et les sanctions","c":false},{"t":"Les pharmaciens n’exerçant pas auprès du public doivent automatiquement remplir un plan de prise en charge en pharmacie (PPCP) et le joindre au questionnaire d'auto-inspection (QAI)","c":false},{"t":"Les inspections du circuit du médicament en milieu communautaire visent ultimement à ce que les pharmaciens propriétaires deviennent pleinement autonomes dans l’identification de leurs enjeux et problématiques et soient en mesure d’élaborer leur propre plan d’action afin de les résoudre","c":true}],"f":"Bonne réponse![6.6 Décrire le rôle du service de l’inspection professionnelle]"},{"i":"06514","c":6,"q":"Parmi les énoncés suivants entourant le Règlement sur l'inspection professionnel de l'Ordre des pharmaciens du Québec (OPQ), lequel est FAUX?","a":[{"t":"Une inspection particulière sur la compétence est obligatoirement précédée d'une inspection tenue en vertu des articles 11 à 18 du Règlement sur l'inspection professionnel de l'Ordre des pharmaciens du Québec","c":true},{"t":"Le pharmacien doit autoriser le membre du comité, l'inspecteur ou l'expert qui le demande à prendre connaissance ou obtenir copie sans frais des dossiers, livres, registres et aux autres éléments, quel qu'en soit le support, qui sont en sa possession ou détenus par un tiers","c":false},{"t":"Au moins 5 jours francs avant la date de l'inspection particulière, le secrétaire du comité fait parvenir au pharmacien visé un avis écrit à cet effet","c":false},{"t":"Si, pour un motif sérieux, le pharmacien ne peut recevoir le membre du comité, l'inspecteur ou l'expert à la date prévue, il doit, sur réception de l'avis, en prévenir le secrétaire du comité et convenir avec lui d'une nouvelle date","c":false}],"f":"L'énoncé est FAUX!Une inspection particulière sur la compétence N'a PAS à être précédée d'une inspection tenue en vertu des articles 11 à 18 du Règlement sur l'inspection professionnel de l'Ordre des pharmaciens du Québec"},{"i":"06515","c":6,"q":"En vertu du Règlement sur l’inspection professionnelle de l’Ordre des pharmaciens du Québec (OPQ), on précise notamment la composition du comité d''inspection professionnelle. Parmi les énoncés suivants portant sur ce comité, lequel est FAUX?","a":[{"t":"Le directeur des services professionnels de l'OPQ agit comme secrétaire du comité","c":false},{"t":"Le comité peut nommer des experts pour l'assister; le secrétaire propose alors les experts en fonction de leur domaine d'expertise","c":false},{"t":"Toute décision administrative ou disciplinaire prise à l'égard d'un membre du comité et ayant pour effet de porter atteinte à son droit d'exercice ne met pas forcément fin à son mandat selon la nature de la décision","c":true},{"t":"Le comité d'inspection professionnelle de l'OPQ est formé d'au moins 6 membres, dont l’un d’eux est choisi parmi les administrateurs nommés par l'Office des professions du Québec","c":false}],"f":"L'énoncé est FAUX!Toute décision administrative ou disciplinaire prise à l'égard d'un membre du comité et ayant pour effet de porter atteinte à son droit d'exercice MET FIN à son mandat à partir de la date de la notification de cette décision"},{"i":"06516","c":6,"q":"En vertu du Code des professions, on précise les notamment modalités entourant tout le processus disciplinaire. Parmi les énoncés suivants entourant le traitement d'une plainte ou d'une enquête du syndic, lequel est FAUX?","a":[{"t":"Durant la majorité des enquêtes, le pharmacien visé doit cesser d'exercer jusqu'à ce que la plainte disciplinaire soit entendue par le conseil de discipline","c":true},{"t":"Les enquêtes du syndic sont confidentielles, de sorte qu'un membre du public ou un autre pharmacien ne peut pas savoir si une enquête est en cours ou a déjà lieu au sujet d'un pharmacien en particulier","c":false},{"t":"Pour qu'une demande d'enquête soit considérée comme recevable, 3 conditions doivent être respectées : information crédible, infraction possible, professionnel identifiable","c":false},{"t":"Une demande d'enquête peut provenir d'une source anonyme","c":false}],"f":"L'énoncé est FAUX!Durant la majorité des enquêtes, le pharmacien visé peut CONTINUER d'exercer"},{"i":"06517","c":6,"q":"Parmi les énoncés suivants entourant le système professionnel québécois et la composition des ordres professionnels, lequel est FAUX?","a":[{"t":"En plus des comités obligatoires d'un ordre professionnel, son Conseil d'administration peut former d'autres comités et groupes de travail","c":false},{"t":"L’objectif principal du système est la protection du public en vertu du Code des professions","c":false},{"t":"Un ordre professionnel est minimalement composé d’un comité exécutif et d'un conseil de discipline, tous les autres comités étant facultatifs","c":true},{"t":"Le système professionnel du Québec comporte plus de 40 ordres professionnels qui regroupent des centaines de milliers de membres","c":false}],"f":"L'énoncé est FAUX!Un ordre professionnel est minimalement composé d’un comité exécutif, d'un conseil de discipline, d'un comité d'inspection professionnelle ET d'un comité de révision"},{"i":"06518","c":6,"q":"Parmi les énoncés suivants entourant l’organisation de l’Ordre des pharmaciens du Québec et l’inspection professionnelle en milieu communautaire, lequel est VRAI?","a":[{"t":"Le comité d’inspection professionnelle est un comité facultatif, composé de 10 membres, chargé notamment de procéder à des inspections portant sur la compétence professionnelle de tout membre à la demande du Conseil d'administration","c":false},{"t":"Le Comité de la formation des pharmaciens examine dans le respect des compétences respectives et complémentaires de l’Ordre des pharmaciens du Québec (OPQ), des établissements d’enseignement universitaire et du Ministre de l’éducation, des loisirs et du sport, les questions relatives à la qualité de la formation des pharmaciens","c":true},{"t":"Au regard des données recueillies lors de l’auto-inspection (bilan 2010-2017), les pharmaciens communautaires semblent sous-estimer leurs habiletés au plan de la surveillance de la thérapie médicamenteuse et de la consignation des informations et interventions dans le dossier des patients","c":false},{"t":"Les inspections du circuit du médicament en milieu communautaire visent ultimement à réprimander les pharmaciens propriétaires sur leurs procédures","c":false}],"f":"Bonne réponse![6.5 Décrire la structure de l’Ordre des pharmaciens du Québec]et[6.6 Décrire le rôle du service d’inspection professionnelle]"},{"i":"06519","c":6,"q":"L’Ordre des pharmaciens du Québec (OPQ) encadre la pratique de la pharmacie au Québec. Parmi les énoncés suivants entourant l’organisation de l’OPQ et les organismes indépendants de celui-ci, lequel est FAUX?","a":[{"t":"Le conseil de discipline de l’OPQ ne peut être composé d’un membre qui occupe un emploi au sein d’une chaîne ou bannière","c":false},{"t":"L’OPQ est composé de plusieurs comités conjoints obligatoires dont celui en collaboration que le Collège des médecins du Québec (CMQ), soit le comité interordre OPQ-CMQ","c":true},{"t":"Le Conseil d’administration de l’OPQ doit veiller à l’application des dispositions du Code des professions, de la Loi sur la pharmacie et des règlements créés en vertu de ceux-ci","c":false},{"t":"Le conseil de discipline est saisi et juge toute plainte formulée contre un pharmacien pour une infraction aux lois et règlements encadrant l'exercice de la pharmacie","c":false}],"f":"L'énoncé est FAUX!Le comité interordre OPQ-CMQ est FACULTATIF"},{"i":"06520","c":6,"q":"Parmi les énoncés suivants entourant l'organisation d'un ordre professionnel et plus particulièrement de l'Ordre des pharmaciens du Québec (OPQ), lequel est FAUX?","a":[{"t":"Le principal rôle d'un ordre professionnel est de s'assurer, dans le domaine qui leur est propre, que les professionnels dispensent les meilleurs services possibles au public","c":false},{"t":"Les pouvoirs dont chaque ordre professionnel dispose pour garantir la protection du public et pour assurer la qualité des services professionnels sont le pouvoir réglementaire et le pouvoir d'autorité","c":true},{"t":"La permanence de l'OPQ est composée de 7 directions, dont la direction générale, la direction des enquêtes et la direction des finances et systèmes d'information","c":false},{"t":"Le comité de révision est responsable de donner un avis relativement à la décision du syndic ou du syndic adjoint de ne pas porter plainte, à toute personne qui le lui demande et qui a demandé au syndic la tenue d’une enquête","c":false}],"f":"L'énoncé est FAUX!Les pouvoirs dont chaque ordre professionnel dispose pour garantir la protection du public et pour assurer la qualité des services professionnels sont le pouvoir réglementaire et le pouvoir de contrôle de l'exercice de la profession"},{"i":"06521","c":6,"q":"Parmi les énoncés suivants entourant le système professionnel du Québec et celui des autres provinces canadiennes en matière de pratique pharmaceutique, lequel est FAUX?","a":[{"t":"Toutes les provinces canadiennes ont une double législation qui balise la pharmacie, soit un code des professions et une loi sur la pharmacie","c":true},{"t":"Les principaux acteurs du système professionnel québécois sont les ordres professionnels, le Conseil interprofessionnel du Québec, l’Office des professions du Québec, le Tribunal des professions et le Ministre responsable de l’application des lois professionnelles","c":false},{"t":"Comme organismes de réglementation et de surveillance des activités de leurs membres, les ordres professionnels gèrent une démarche qualité dans les secteurs stratégiques de la société québécoise","c":false},{"t":"L'Association des pharmaciens en établissement de santé du Québec (APES) est un syndicat professionnel et une association professionnelle à la fois qui maintient des liens avec la Société canadienne des pharmaciens d'hôpitaux (SCPH)","c":false}],"f":"L'énoncé est FAUX!Seuls le Québec, l'Ontario et l'Alberta ont une double législation qui balise la pharmacie, soit un code des professions et une loi sur la pharmacie"},{"i":"06578","c":7,"q":"Outre les candidats reconnus dans une autre province canadienne ou ayant complété leurs études outre-mer, il arrive que l’Ordre des pharmaciens exige une formation supplémentaire aux pharmaciens ayant cessé d’exercer durant un certain temp
