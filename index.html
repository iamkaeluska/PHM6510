<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PHM6510 — QCM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0c0f14;--bg2:#151920;--bg3:#1c2029;--bg4:#242832;--text:#e8eaed;--text2:#9aa0ac;--text3:#5e6370;--accent:#5b8af5;--accent2:#4070e0;--green:#34c759;--green-bg:rgba(52,199,89,.12);--red:#ff453a;--red-bg:rgba(255,69,58,.12);--yellow:#ffd60a;--yellow-bg:rgba(255,214,10,.12);--orange:#ff9f0a;--orange-bg:rgba(255,159,10,.12);--purple:#bf5af2;--purple-bg:rgba(191,90,242,.12);--gray:#3a3f4b;--radius:12px;--radius-sm:8px;--font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'JetBrains Mono',monospace;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}

/* HOME */
.home{justify-content:center;align-items:center;padding:24px;text-align:center}
.home-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),#7c5bf5);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(91,138,245,.25)}
.home h1{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.home .subtitle{font-size:14px;color:var(--text2);margin-bottom:32px}
.home .q-count{font-family:var(--mono);font-size:13px;color:var(--accent);background:rgba(91,138,245,.1);padding:6px 14px;border-radius:20px;margin-bottom:36px;display:inline-block}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:12px;width:100%;max-width:360px;text-align:left}
.size-selector{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;width:100%;max-width:360px}
.size-btn{flex:1;min-width:56px;padding:12px 8px;background:var(--bg3);border:2px solid transparent;border-radius:var(--radius-sm);color:var(--text2);font-family:var(--mono);font-size:16px;font-weight:500;cursor:pointer;transition:all .2s}
.size-btn.selected{border-color:var(--accent);background:rgba(91,138,245,.1);color:var(--accent)}
.mode-selector{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px;margin-bottom:32px}
.mode-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg3);border:2px solid transparent;border-radius:var(--radius);color:var(--text2);font-size:15px;cursor:pointer;transition:all .2s;text-align:left}
.mode-btn.selected{border-color:var(--accent);background:rgba(91,138,245,.1);color:var(--text)}
.mode-btn .mode-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.mode-btn .mode-label{font-weight:500}
.mode-btn .mode-desc{font-size:12px;color:var(--text3);margin-top:2px}
.mode-btn.disabled{opacity:.35;pointer-events:none}
.mode-btn[data-mode="annales"].selected{border-color:var(--orange)}
.mode-btn[data-mode="redaction"].selected{border-color:var(--purple)}
.btn-primary{width:100%;max-width:360px;padding:16px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:12px}
.btn-primary:active{transform:scale(.97);background:var(--accent2)}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.btn-secondary{width:100%;max-width:360px;padding:14px;background:transparent;border:1.5px solid var(--bg4);border-radius:var(--radius);color:var(--text2);font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-secondary:active{background:var(--bg3)}

/* QUIZ */
.quiz-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bg3);padding:12px 16px 10px}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.quiz-score{font-family:var(--mono);font-size:14px;color:var(--text2)}
.quiz-score .correct-count{color:var(--green);font-weight:600}
.quiz-timer{font-family:var(--mono);font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px}
.quiz-timer .pause-btn{background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:4px}
.quiz-nav{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.quiz-nav::-webkit-scrollbar{display:none}
.nav-dot{width:28px;height:28px;min-width:28px;border-radius:6px;background:var(--gray);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;transition:all .2s;border:2px solid transparent}
.nav-dot.current{border-color:var(--accent);color:var(--text)}
.nav-dot.correct{background:var(--green);color:#fff}
.nav-dot.wrong{background:var(--red);color:#fff}
.nav-dot.skipped{background:var(--yellow);color:#000}
.quiz-body{flex:1;padding:20px 16px;padding-bottom:100px;overflow-y:auto}
.question-number{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.question-text{font-size:17px;font-weight:500;line-height:1.55;margin-bottom:24px;color:var(--text)}
.answers-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.answer-btn{width:100%;padding:14px 16px;background:var(--bg3);border:2px solid transparent;border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.45;text-align:left;cursor:pointer;transition:all .15s}
.answer-btn:active{transform:scale(.98)}
.answer-btn.selected{border-color:var(--accent);background:rgba(91,138,245,.1)}
.answer-btn.correct-reveal{border-color:var(--green);background:var(--green-bg)}
.answer-btn.wrong-reveal{border-color:var(--red);background:var(--red-bg)}
.answer-btn.disabled{pointer-events:none}
.answer-marker{display:inline-block;width:22px;height:22px;border-radius:50%;font-size:12px;line-height:22px;text-align:center;margin-right:10px;flex-shrink:0;vertical-align:middle}
.feedback-box{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;margin-top:16px;font-size:14px;line-height:1.55;color:var(--text2);animation:slideIn .25s ease}
.note-box{background:var(--bg3);border-left:3px solid var(--orange);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;margin-top:10px;font-size:14px;line-height:1.55;color:var(--orange);animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.quiz-footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bg3);padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));display:flex;gap:10px;align-items:center;z-index:100}
.footer-btn{height:46px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.footer-btn:active{transform:scale(.95)}
.footer-icon-btn{width:46px;min-width:46px;background:var(--bg3);color:var(--text2);font-size:20px}
.footer-icon-btn.note-btn{color:var(--orange)}
.footer-skip{padding:0 16px;background:var(--bg3);color:var(--text2)}
.footer-verify{flex:1;background:var(--accent);color:#fff;font-weight:600}
.footer-verify:disabled{opacity:.35;pointer-events:none}
.footer-next{flex:1;background:var(--green);color:#fff;font-weight:600}
.chapter-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg4);border:1px solid var(--text3);border-radius:var(--radius);padding:14px 28px;font-size:15px;font-weight:600;color:var(--text);z-index:200;animation:toastIn .2s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* PAUSE */
.pause-overlay{position:fixed;inset:0;background:rgba(12,15,20,.92);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.pause-overlay.active{display:flex}
.pause-overlay .pause-icon{font-size:48px;color:var(--text3)}
.pause-overlay .pause-label{font-size:18px;color:var(--text2);font-weight:500}
.pause-overlay .resume-btn{padding:14px 48px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer}
.pause-overlay .quit-btn{padding:10px 32px;background:transparent;border:1px solid var(--bg4);border-radius:var(--radius);color:var(--red);font-family:var(--font);font-size:14px;cursor:pointer}

/* RESULTS */
.results{padding:24px 16px;padding-bottom:calc(24px + var(--safe-bottom))}
.results-header{text-align:center;margin-bottom:32px}
.results-score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono)}
.results-score-circle .big{font-size:36px;font-weight:700}
.results-score-circle .small{font-size:13px;color:var(--text2);margin-top:-4px}
.score-great{background:var(--green-bg);border:2px solid var(--green);color:var(--green)}
.score-ok{background:var(--yellow-bg);border:2px solid var(--yellow);color:var(--yellow)}
.score-bad{background:var(--red-bg);border:2px solid var(--red);color:var(--red)}
.results-meta{display:flex;justify-content:center;gap:24px;font-size:13px;color:var(--text3);margin-bottom:8px}
.results-meta span{display:flex;align-items:center;gap:5px}
.results-section{margin-bottom:24px}
.results-section h3{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.result-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--red)}
.result-card .rc-q{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.45}
.result-card .rc-correct{font-size:13px;color:var(--green);margin-bottom:4px}
.result-card .rc-feedback{font-size:12px;color:var(--text3);line-height:1.4}
.results-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}

/* STATS */
.stats{padding:24px 16px;padding-bottom:calc(24px + var(--safe-bottom))}
.stats-back{background:none;border:none;color:var(--accent);font-family:var(--font);font-size:15px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;gap:6px}
.stats h2{font-size:22px;font-weight:700;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:14px 12px;text-align:center}
.stat-card .sv{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent)}
.stat-card .sl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.chapter-stats{margin-bottom:28px}
.ch-stat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg3)}
.ch-stat-row .ch-label{font-size:13px;color:var(--text2);width:90px;flex-shrink:0}
.ch-stat-row .ch-bar-bg{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.ch-stat-row .ch-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s ease}
.ch-stat-row .ch-pct{font-family:var(--mono);font-size:12px;color:var(--text3);width:45px;text-align:right}
.top-list-item{padding:10px 0;border-bottom:1px solid var(--bg3)}
.top-list-item .tl-q{font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.4}
.top-list-item .tl-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.stats-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.danger-btn{width:100%;padding:14px;background:transparent;border:1.5px solid var(--red);border-radius:var(--radius);color:var(--red);font-family:var(--font);font-size:15px;cursor:pointer}

/* RÉDACTION */
.redac-body{flex:1;padding:20px 16px;padding-bottom:100px;overflow-y:auto}
.redac-header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bg3);padding:12px 16px}
.redac-topbar{display:flex;align-items:center;justify-content:space-between}
.redac-counter{font-family:var(--mono);font-size:14px;color:var(--text2)}
.redac-back{background:none;border:none;color:var(--accent);font-family:var(--font);font-size:14px;cursor:pointer}
.redac-question{font-size:17px;font-weight:500;line-height:1.55;margin-bottom:24px}
.redac-reveal-btn{width:100%;padding:16px;background:var(--purple-bg);border:1.5px solid var(--purple);border-radius:var(--radius);color:var(--purple);font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:16px}
.redac-reveal-btn:active{transform:scale(.97)}
.redac-answer{background:var(--bg3);border-left:3px solid var(--purple);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:16px;font-size:15px;line-height:1.6;color:var(--text2);animation:slideIn .25s ease;margin-bottom:20px}
.redac-footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bg3);padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));display:flex;gap:10px;z-index:100}
.redac-nav-btn{flex:1;height:46px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.redac-nav-btn.prev{background:var(--bg3);color:var(--text2)}
.redac-nav-btn.next{background:var(--purple);color:#fff}
.redac-nav-btn:disabled{opacity:.35;pointer-events:none}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(12,15,20,.85);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.active{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:24px;max-width:340px;width:100%;text-align:center}
.confirm-box p{margin-bottom:20px;font-size:15px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}
.confirm-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none}
.confirm-cancel{background:var(--bg4);color:var(--text2)}
.confirm-danger{background:var(--red);color:#fff}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen home active">
  <div class="home-logo">Rx</div>
  <h1>PHM6510</h1>
  <p class="subtitle">Législation et système de soins — QCM</p>
  <div class="q-count" id="home-q-count"></div>

  <div class="section-label">Nombre de questions</div>
  <div class="size-selector" id="size-selector"></div>

  <div class="section-label">Mode</div>
  <div class="mode-selector">
    <button class="mode-btn selected" data-mode="normal" onclick="selectMode('normal')">
      <span class="mode-icon">🎲</span>
      <div><div class="mode-label">Session normale</div><div class="mode-desc">Questions StudiUM — tous chapitres</div></div>
    </button>
    <button class="mode-btn" data-mode="annales" onclick="selectMode('annales')">
      <span class="mode-icon">📝</span>
      <div><div class="mode-label">Annales</div><div class="mode-desc" id="annales-count-desc">QCM issus des PDFs formatives/sommatives</div></div>
    </button>
    <button class="mode-btn" data-mode="failed" id="mode-failed-btn" onclick="selectMode('failed')">
      <span class="mode-icon">🔁</span>
      <div><div class="mode-label">Questions ratées</div><div class="mode-desc" id="failed-count-desc">Aucune question dans le dossier</div></div>
    </button>
    <button class="mode-btn" data-mode="redaction" onclick="selectMode('redaction')">
      <span class="mode-icon">✍️</span>
      <div><div class="mode-label">Rédaction</div><div class="mode-desc" id="redac-count-desc">Questions à développement</div></div>
    </button>
  </div>

  <button class="btn-primary" id="btn-start" onclick="startSession()">Démarrer</button>
  <button class="btn-secondary" onclick="showScreen('screen-stats')">📊 Mes Stats</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-topbar">
      <div class="quiz-score"><span class="correct-count" id="quiz-correct">0</span> / <span id="quiz-answered">0</span></div>
      <div class="quiz-timer"><span id="quiz-timer-display">00:00</span><button class="pause-btn" onclick="togglePause()">⏸</button></div>
    </div>
    <div class="quiz-nav" id="quiz-nav"></div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
  <div class="quiz-footer" id="quiz-footer"></div>
</div>

<!-- PAUSE -->
<div class="pause-overlay" id="pause-overlay">
  <div class="pause-icon">⏸</div>
  <div class="pause-label">Session en pause</div>
  <button class="resume-btn" onclick="togglePause()">Reprendre</button>
  <button class="quit-btn" onclick="quitQuiz()">Abandonner la session</button>
</div>

<!-- RESULTS -->
<div id="screen-results" class="screen"><div class="results" id="results-content"></div></div>

<!-- STATS -->
<div id="screen-stats" class="screen"><div class="stats" id="stats-content"></div></div>

<!-- RÉDACTION -->
<div id="screen-redaction" class="screen">
  <div class="redac-header">
    <div class="redac-topbar">
      <button class="redac-back" onclick="showScreen('screen-home')">← Accueil</button>
      <div class="redac-counter" id="redac-counter"></div>
    </div>
  </div>
  <div class="redac-body" id="redac-body"></div>
  <div class="redac-footer" id="redac-footer"></div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-text"></p>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Annuler</button>
      <button class="confirm-danger" id="confirm-action">Confirmer</button>
    </div>
  </div>
</div>

<script>

const QUESTIONS = [{"i":"06043","c":1,"q":"Parmi les énoncés suivants entourant les sources du droit, lequel est FAUX?","a":[{"t":"La Loi est un ensemble de règles spécifiques de droit, concrètes et permanentes","c":true},{"t":"La jurisprudence est l'ensemble des décisions rendues par les tribunaux","c":false},{"t":"La doctrine est l'ensemble des écrits des auteurs consacrés aux questions juridiques","c":false},{"t":"La coutume est un ensemble de règles de droit établies par l’usage universel et persévérant","c":false}],"f":"L’énoncé est FAUX!Selon la définition, la Loi est un ensemble de règles GÉNÉRALES de droit, ABSTRAITES et permanentes"},{"i":"06044","c":1,"q":"En ce qui concerne la jurisprudence, lequel des énoncés suivants est FAUX?","a":[{"t":"Selon la théorie du précédent, un tribunal ne peut pas être lié par des décisions rendues par des tribunaux de hiérarchie parallèle","c":true},{"t":"La jurisprudence est de source interprétative dans les pays/provinces de droit écrit comme au Québec où un jugement n’est pas un précédent","c":false},{"t":"Selon la théorie du précédent, les tribunaux sont liés par les décisions des tribunaux qui leur sont supérieurs dans la hiérarchie judiciaire","c":false},{"t":"La jurisprudence est la source dominante de droit dans les pays de droit coutumier (Common law)","c":false}],"f":"L’énoncé est FAUX!Selon la théorie du précédent, un tribunal PEUT être lié par des décisions rendues par des tribunaux de hiérarchie parallèle"},{"i":"06045","c":1,"q":"Il existe plusieurs sources du droit permettant de baliser la vie en société. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"La coutume est une source interprétative des lois et des décisions judiciaires; il s'agit des écrits des auteurs consacrés aux questions juridiques","c":false},{"t":"Les lignes directrices permettent d'appliquer les mandats d'une façon équitable, uniforme et efficace en ayant force de loi","c":false},{"t":"La Loi regroupe un ensemble de règles générale ":"06063","c":1,"q":"Parmi les énoncés suivants entourant l'adoption d'un projet de loi d'intérêt public, lequel est VRAI?","a":[{"t":"Après l'adoption du projet de loi, le gouvernement rédige une politique pour son application","c":false},{"t":"Un projet de loi d'intérêt public n'est généralement pas présenté/parrainé par le gouvernement","c":false},{"t":"Un projet de loi n'entre pas forcément en vigueur à la date de sa sanction","c":true},{"t":"Tous les députés peuvent proposer les projets qui ont des incidences financières","c":false}],"f":"Bonne réponse![1.4 Décrire le processus permettant la mise à jour du cadre législatif au niveau canadien]et[1.5 Décrire le processus permettant la mise à jour du cadre législatif au niveau québécois]"},{"i":"06064","c":1,"q":"Il existe plusieurs différences dans les éléments de procédure entre les affaires civiles et les affaires pénales et criminelles. Parmi les énoncés suivants entourant ces procédures, lequel est FAUX?","a":[{"t":"Dans les affaires civiles, l'interrogatoire préalable fait partie intégrante du procès; il s'agit de la première étape","c":true},{"t":"Dans une affaire pénale, la personne accusée n’est pas nécessairement arrêtée par les policiers","c":false},{"t":"Lors d’un procès devant juge et jury, c’est le jury qui évalue les faits alors que le juge détermine le droit applicable","c":false},{"t":"Dans une affaire criminelle, la poursuite doit prouver hors de tout doute raisonnable que l’accusé est coupable de l’infraction qui lui est reprochée","c":false}],"f":"L'énoncé est FAUX!Dans les affaires civiles, l'interrogatoire préalable d'une poursuite a lieu AVANT le procès"},{"i":"06065","c":1,"q":"Parmi les énoncés suivants entourant l'organisation politique au Canada et au Québec, lequel est FAUX?","a":[{"t":"Formant le gouvernement avec le lieutenant-gouverneur, le premier ministre et ses ministres sont titulaires du pouvoir législatif au Québec","c":true},{"t":"Afin de permettre aux citoyens dans les territoires de s'occuper des matières de nature purement locales, comme le font les citoyens des provinces, les lois fédérales prévoient l'élection de conseils territoriaux qui ont le pouvoir d'adopter des lois","c":false},{"t":"Le gouvernement fédéral s'occupe notamment de la défense nationale, des brevets et du service postal","c":false},{"t":"Au Québec , le Parlement étudie, adopte ou rejette les projets de lois que le gouvernement lui soumet","c":false}],"f":"L'énoncé est FAUX!Formant le gouvernement avec le lieutenant-gouverneur, le premier ministre et ses ministres sont titulaires du pouvoir EXÉCUTIF au Québec"},{"i":"06130","c":2,"q":"Il existe plusieurs lois fédérales touchant de loin ou de près le domaine de la santé et la pratique du pharmacien. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"La Loi sur les brevets concerne les brevets d’invention, notamment les médicaments dont le brevet est échu","c":true},{"t":"L’immigration de pharmaciens étrangers relève de la Loi sur l’immigration","c":false},{"t":"La Loi réglementant certaines drogues et autres substances encadre l’accès au marché, la vente et la distribution de médicaments ayant un potentiel d’abus au Canada","c":false},{"t":"La Loi sur la concurrence encadre la fixation des prix, notamment les prix des médicaments","c":false}],"f":"L'énoncé est FAUX!La Loi sur les brevets concerne les brevets d’invention, notamment les médicaments dont le brevet N’est PAS échu"},{"i":"06131","c":2,"q":"Bien que de compétence provinciale, plusieurs lois canadiennes encadrent la santé et la pratique du pharmacien. Parmi les associations suivantes, laquelle est VRAIE?","a":[{"t":"Loi sur la taxe d’accise- Ministre des finances","c":false},{"t":"Loi sur les aliments et drogues- Ministre de l’agriculture","c":false},{"t":"Loi sur le cannabis- Ministre de la santé / Santé Canada","c":false},{"t":"Loi sur les dispositifs émettant des radiations- Santé Canada","c":true}],"f":"Bonne réponse![2.1  Identifier les principales lois canadiennes touchant la santé, la pratique professionnelle ou les activités commerciales pertinentes en pharmacie]"},{"i":"06132","c":2,"q":"Santé Canada est le ministère fédéral responsable de la santé. Parmi les énoncés suivants entourant la structure et le rôle de cet organisme, lequel est FAUX?","a":[{"t":"Santé Canada s’emploie à maintenir le régime d’assurance-médicaments du Canada de renommée internationale","c":true},{"t":"Santé Canada a pour but de classer les Canadiens parmi les populations les plus en santé au monde","c":false},{"t":"Santé Canada est composé, entre autres, des agences et directions suivantes : Agence de réglementation de la lutte antiparasitaire (ARLA), Direction générale des produits de santé et des aliments (DGPSA) et Direction générale de la santé environnementale et de la sécurité des consommateurs (DGSESC)","c":false},{"t":"Santé Canada a pour mandat d’aider les Canadiens et Canadiennes à maintenir et à améliorer leur santé","c":false}],"f":"L'énoncé est FAUX!Santé Canada s’emploie à maintenir le régime d’assurance-SANTÉ du Canada, de renommée internationale"},{"i":"06133","c":2,"q":"La Loi canadienne sur la santé est une loi pivot qui définit le système de santé canadien. Parmi les énoncés suivants entourant cette loi, lequel est VRAI?","a":[{"t":"Les gouvernements des provinces doivent fournir volontairement un rapport trimestriel décrivant comment leur régime respecte les conditions et obligations de la Loi canadienne sur la santé","c":false},{"t":"Il existe neuf exigences que les gouvernements des provinces sont tenus de respecter dans le cadre de leur régime public d'assurance-santé pour avoir droit à la totalité des contributions fédérales","c":true},{"t":"Les cinq conditions que doivent respecter les provinces sont l’administration publique, l’intégralité, l’individualité, la transférabilité et l’accessibilité","c":false},{"t":"L’accès gratuit aux médicaments assurés constitue l’élément clé de la Loi canadienne sur la santé","c":false}],"f":"Bonne réponse![2.3 Identifier les éléments clés de la Loi canadienne sur la santé]."},{"i":"06134","c":2,"q":"La Loi canadienne sur la santé énumère neuf exigences que les gouvernements des provinces sont tenus de respecter dans le cadre de leur régime public d’assurance-santé pour avoir droit à la totalité des contributions fédérales versées en vertu du Transfert canadien en matière de santé (TCS). Parmi les énoncés suivants entourant ces exigences, lequel est FAUX?","a":[{"t":"La condition de l’intégralité prévoit que le régime d’assurance-santé d’une province doit couvrir tous les services médicalement nécessaires","c":false},{"t":"Les provinces ont comme obligation de faire état publiquement des transferts fédéraux","c":false},{"t":"La condition de transférabilité oblige les provinces à couvrir les services de santé assurés qui sont fournis à ses citoyens lorsque ceux-ci s’absentent temporairement de leur province ou du Canada","c":false},{"t":"Les dispositions de la Loi canadienne sur la santé visent spécifiquement à encourager les provinces d’exiger une contribution financière de la part des patients","c":true}],"f":"L'énoncé est FAUX!Les dispositions de la Loi canadienne sur la santé visent spécifiquement à DÉCOURAGER les provinces d’exiger une contribution financière de la part des patients"},{"i":"06135","c":2,"q":"Il existe de nombreuses lois québécoises ayant un impact sur la pratique du pharmacien. Parmi les associations suivantes, laquelle est VRAIE?","a":[{"t":"Ministre des finances- Loi sur l'équité salariale","c":true},{"t":"Office de la protection du consommateur- Loi sur la protection des renseignements personnels dans le secteur privé","c":false},{"t":"Ministre du travail, de l'emploi et de la solidarité sociale- Code des professions","c":false},{"t":"Ministre responsable des lois professionnelles- Code du travail","c":false}],"f":"Bonne réponse![2.4 Identifier les principales lois québécoises touchant la santé, la pratique professionnelle ou les activités commerciales pertinentes en pharmacie]."},{"i":"06136","c":2,"q":"Il existe plusieurs lois québécoises qui encadrent la pratique de la pharmacie au Québec. Parmi les énoncés suivants entourant ces lois, lequel est FAUX?","a":[{"t":"La Loi sur l’assurance médicament détermine les services pharmaceutiques assurés en ambulatoire et en établissement de santé","c":true},{"t":"La Loi sur l’assurance-hospitalisation détermine les services de santé assurés lors d’une hospitalisation","c":false},{"t":"La Loi sur la régie de l’Assurance-maladie détermine les modalités d’organisation et de gestion de la RAMQ","c":false},{"t":"La Loi sur l’assurance-maladie détermine les services assurés en établissement et en ambulatoire","c":false}],"f":"L'énoncé est FAUX!La Loi sur l’assurance médicament détermine les services pharmaceutiques assurés en ambulatoire UNIQUEMENT"},{"i":"06137","c":2,"q":"De nombreuses lois provinciales régissent le système de santé québécois. Parmi les énoncés suivants entourant les domaines d’application de ces lois, lequel est FAUX?","a":[{"t":"Le Code du travail encadre les conditions de travail du personnel syndiqué","c":false},{"t":"La Loi sur la santé publique encadre les programmes de vaccination et la gestion des épidémies","c":false},{"t":"La Loi sur la pharmacie encadre la vente et l’usage du tabac dans les pharmacies au Québec","c":true},{"t":"La Loi sur la gestion des finances publiques encadre le paiement de frais de médicament pour les employés fédéraux","c":false}],"f":"L'énoncé est FAUX!C’est la Loi sur le tabac qui encadre la vente et l’usage du tabac dans les pharmacies au Québec."},{"i":"06138","c":2,"q":"Afin d'exercer la pharmacie au Québec, le pharmacien doit bien connaître le réseau dans lequel il exerce. Parmi les énoncés suivants entourant ce réseau, lequel est VRAI?","a":[{"t":"Il existe plus d'une cinquantaine de centres intégrés de santé et services sociaux (CISSS) au Québec","c":false},{"t":"Les centres locaux de services communautaires (CLSC) sont issus de la fusion des établissements publics d'une même région et, le cas échéant, de l'agence de la santé et des services sociaux de cette région","c":false},{"t":"Les centres intégrés de santé et de services sociaux (CISSS) exploitent, sous un même conseil d'administration, un centre local de services communautaires (CLSC), un centre d'hébergement et de soins longue durée (CHSLD) et, le cas échéant, un centre hospitalier (CH)","c":true},{"t":"Le Ministère de la santé et des services sociaux (MSSS) est responsable de garantir une planification régionale des ressources humaines","c":false}],"f":"Bonne réponse![2.5 Identifier les organismes responsables de la mise en application des lois québécoises]."},{"i":"06139","c":2,"q":"Le Ministère de santé et des services sociaux (MSSS) a de nombreuses responsabilités. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Le MSSS a pour mission de maintenir, d'améliorer et de restaurer la santé et le bien-être des Québécois et Québécoises en rendant accessibles un ensemble de services de santé et de services sociaux","c":false},{"t":"Le MSSS est responsable d'allouer l'enveloppe budgétaire aux centres intégrés de santé et des services sociaux (CISSS)","c":false},{"t":"Le MSSS planifie et coordonne les services nationaux qui doivent être offerts dans l'ensemble du Québec","c":false},{"t":"Le MSSS réalise le suivi et la reddition de comptes auprès des centres intégrés (universitaires ou non) de santé et de services sociaux (CISSS et CIUSSS) en fonction de leurs attentes","c":true}],"f":"L'énoncé est FAUX!C'est plutôt les CISSS et les CIUSSS et qui réalisent le suivi et la reddition de compte auprès du MSSS en fonction de ses attentes"},{"i":"06140","c":2,"q":"En vertu de la Loi sur la recherche des causes et circonstances de décès, on définit les compétences du coroner. Parmi les énoncés suivants entourant ces compétences, lequel est FAUX?","a":[{"t":"Le coroner ne peut se prononcer sur la responsabilité criminelle d'une personne","c":false},{"t":"Le coroner est un officier public qui a compétence à l'égard de tout décès survenu au Québec","c":false},{"t":"Le coroner peut se prononcer sur la responsabilité civile d'une personne","c":true},{"t":"Le coroner peut faire, à l'occasion d'une investigation ou d'une enquête, toute recommandation visant une meilleure protection de la vie humaine","c":false}],"f":"L’énoncé est FAUX!Le coroner NE peut PAS se prononcer sur la responsabilité civile d'une personne."},{"i":"06141","c":2,"q":"Les centres intégrés (universitaires ou non )de santé et de services sociaux (CISSS et CIUSSS), ont de nombreuses responsabilités. Parmi les énoncés, lequel est FAUX?","a":[{"t":"Les CISSS exploitent, sous un même conseil d'administration, un centre local de services communautaires (CLSC), un centre d'hébergement et de soins longue durée (CHSLD) et, le cas échéant, un centre hospitalier (CH)","c":false},{"t":"Quatre Réseaux universitaires intégrés de santé (RUIS) favorisent la concertation, la complémentarité ainsi que l'intégration des missions de soins, d'enseignement et de recherche dévolues aux établissements de santé et aux universités auxquelles ceux-ci sont affiliés","c":false},{"t":"Les Réseaux universitaires intégrés de santé (RUIS) ont pour mandat de faire des recommandations au ministre et aux agences de la santé et des services sociaux sur l'organisation des services médicaux généraux pour en améliorer l'efficacité","c":true},{"t":"Les CISSS doivent assurer la coordination des services offerts par tous les partenaires des réseaux de services, dont les groupes de médecine familiale (GMF), les pharmacies communautaires et les organismes communautaires","c":false}],"f":"L'énoncé est FAUX!Les réseaux universitaires ont pour mandat de faire des recommandations au ministre et aux agences de la santé et des services sociaux sur l'organisation des services médicaux SPÉCIALISÉS pour en améliorer l'efficacité"},{"i":"06142","c":2,"q":"Le Ministère de la santé et des services sociaux (MSSS) a publié un guide pour la mise en place des comités régionaux sur les services pharmaceutiques (CRSP) dans les agences de la santé et des services sociaux en avril 2006. Parmi les énoncés suivants entourant les principes directeurs de ce guide, lequel est FAUX? Note : Les textes en vigueur mentionnent encore les Agences comme référence régionale, mais ce sont maintenant les centre intégrés (universitaires ou non) de santé et de services sociaux (CISSS et CIUSSS) qui en sont responsables.","a":[{"t":"Seuls les pharmaciens exerçant en pharmacie communautaire ou en établissement sur le territoire de l'Agence ont qualité d'électeurs et peuvent être élus au comité régional","c":false},{"t":"Le mandat des membres des comités régionaux est de 2 ans","c":true},{"t":"Le statut d'électeur et l'éligibilité d'un pharmacien sont déterminés par son lieu d'exercice principal, tel qu'inscrit sur sa déclaration annuelle à l'Ordre des pharmaciens du Québec (OPQ)","c":false},{"t":"Le comité régional exerce ses responsabilités sous l'autorité du président-directeur général de l'Agence régionale","c":false}],"f":"L'énoncé est FAUX!Le mandat est de 4 ans"},{"i":"06143","c":2,"q":"L'Institut national de santé publique du Québec (INSPQ) vise à être le centre d'expertise et de référence en matière de santé publique au Québec. En ce qui concerne l'INSPQ, lequel des énoncés suivants est FAUX?","a":[{"t":"L'INSPQ vise notamment à assurer des services de soutien au maintien de la qualité","c":false},{"t":"L'INSPQ contribue au suivi des maladies infectieuses/ immunisation et à la santé au travail","c":false},{"t":"L'INSPQ vise notamment à assurer des services de dépistage","c":false},{"t":"L'INSPQ relève du Commission d'accès à l'information","c":true}],"f":"L'énoncé est FAUX!L'INSPQ relève du Ministre de la santé et des services sociaux"},{"i":"06144","c":2,"q":"Parmi les énoncés suivants entourant les rapports pivots relatifs au médicament au Québec, lequel est FAUX?","a":[{"t":"Un état de situation (344 pages) sur les médicaments d'ordonnance au Québec a été publié en 2014 par le Vérificateur général du Québec","c":true},{"t":"Avant l'adoption de la Loi sur l'assurance médicaments, près de 17% de la population québécoise n'avait pas accès à une assurance pour couvrir le coût des médicaments exigés par son état de santé","c":false},{"t":"La Politique du médicament (2007) énonce 29 orientations ministérielles regroupées autour de 4 axes","c":false},{"t":"Le maintien d'une industrie biopharmaceutique dynamique au Québec constitue l'un des axes de la Politique du médicament","c":false}],"f":"L'énoncé est FAUX!Un état de situation (344 pages) sur les médicaments d'ordonnance au Québec a été publié en 2014 par le Commissaire à la santé et au bien-être."},{"i":"06145","c":2,"q":"Plusieurs lois québécoises balisent la pratique du pharmacien. Parmi les associations suivantes, laquelle est FAUSSE?","a":[{"t":"Ministre de la justice- Loi sur la transparence et l'éthique en matière de lobbying","c":false},{"t":"Ministre de la justice- Charte des droits et libertés de la personne","c":false},{"t":"Ministre responsable des lois professionnelles- Loi sur l'équité salariale","c":true},{"t":"Ministre de la santé et des services sociaux- Loi assurant l'exercice des droits des personnes handicapées","c":false}],"f":"L'énoncé est FAUX!Ministre des finances- Loi sur l'équité salariale"},{"i":"06146","c":2,"q":"Outre les ressources institutionnelles, plusieurs partenaires contribuent à la réalisation de la mission du système québécois de santé et de services sociaux. Parmi les énoncés suivants entourant les groupes de médecine familiale (GMF), lequel est FAUX?","a":[{"t":"Un GMF favorise le travail d'équipe, la collaboration interprofessionnelle, la responsabilité populationnelle ainsi que le développement de liens de confiance et de collaboration étroits entre patients et cliniciens","c":false},{"t":"Un GMF incarne la base de l'organisation des soins et services de santé de première ligne au Québec","c":false},{"t":"Les GMF-Réseau se distinguent par la reconnaissance universitaire en matière d'enseignement","c":true},{"t":"Les GMF-Réseau sont complémentaires aux GMF et visent à assurer une offre de service accrue à toute clientèle inscrite ou non","c":false}],"f":"L'énoncé est FAUX!On parle ici de GMF universitaires."},{"i":"06147","c":2,"q":"Parmi les énoncés suivants entourant les éléments clés de la Loi canadienne sur la santé, lequel est FAUX?","a":[{"t":"En vertu de la Constitution canadienne et de l'interprétation qu'en ont donnée les tribunaux, les soins de santé relèvent principalement de la compétence du gouvernement fédéral","c":true},{"t":"La désassurance de services autrefois couverts par les régimes provinciaux d'assurance-santé fait partie des facteurs qui remettent en question les principes nationaux de la Loi canadienne sur la santé","c":false},{"t":"La prestation des soins de santé est largement le fait du secteur privé : la majorité des médecins sont en pratique privée et les hôpitaux sont, en grande partie, des organismes privés sans but lucratif","c":false},{"t":"Le marché privé vient suppléer à l'assurance publique dans le cas des services de santé qui ne sont pas couverts par le régime public ou qui ne sont garantis qu'en partie par des programmes gouvernementaux","c":false}],"f":"L'énoncé est FAUX!En vertu de la Constitution canadienne et de l'interprétation qu'en ont donnée les tribunaux, les soins de santé relèvent principalement de la compétence des PROVINCES"},{"i":"06148","c":2,"q":"L'Organisation mondiale de la santé (OMS) mentionne que l'usage irrationnel des médicaments est un problème mondial majeur. En ce qui concerne les types d'usage inapproprié des médicaments, quel énoncé est FAUX?","a":[{"t":"L'usage d'un trop grand nombre de médicaments par patient (polypharmacie)","c":false},{"t":"L'usage inapproprié d'antimicrobien","c":false},{"t":"L'auto-médication inappropriée et fréquente de médicaments disponibles uniquement sur ordonnance","c":false},{"t":"L'usage abusif de formulations orales quand les produits injectables seraient plus appropriés","c":true}],"f":"L'énoncé est FAUX!C'est plutôt l'usage abusif de produits injectables quand les formulations orales seraient plus appropriées."},{"i":"06149","c":2,"q":"L'Agence canadienne des médicaments et des technologiques de la santé (ACMTS) offre aux décideurs du secteur de la santé les données probantes, les analyses, les conseils et les recommandations nécessaires à la prise de décisions éclairées. Parmi les énoncés suivants concernant son offre de produits et services, lequel est FAUX?","a":[{"t":"Le Service d'évaluation de technologies de la santé fournit une analyse complète des preuves cliniques et économiques au sujet d'une technologie de la santé, incluant les facteurs éthiques, juridiques et sociaux","c":false},{"t":"Le Programme de consultation scientifique de l'ACMTS offre aux fabricants de médicaments des consultations sur leurs projets au stade précoce de développement de médicaments","c":false},{"t":"Le programme d'analyses prospectives fait l'évaluation des technologies de la santé nouvelles et émergentes susceptibles d'influer sur la prestation des services de santé au Canada","c":false},{"t":"Le Programme commun d'évaluation des médicaments (PCEM) présente des recommandations quant au remboursement des médicaments par les régimes publics d'assurance médicaments de toutes les provinces et territoires du Canada","c":true}],"f":"L'énoncé est FAUX!Le Québec est exclu de ce programme"},{"i":"06150","c":2,"q":"La Loi sur les langues officielles fournit un cadre législatif par rapport à l'usage du français et de l'anglais. Parmi les énoncés suivants concernant les langues officielles au Canada et la santé, lequel est FAUX?","a":[{"t":"En vertu de la Loi sur les langues officielles, le gouvernement du Canada s'engage à favoriser l'épanouissement des minorités francophones et anglophones du Canada","c":false},{"t":"Puisque la mondialisation des échanges commerciaux favorise l'utilisation de l'anglais, l'anglais devrait être favorisé lors de la prestation de soins de santé","c":true},{"t":"Les barrières linguistiques limitent l'accès aux services de santé","c":false},{"t":"Il est difficile de rendre l'apprentissage du français plus accessible aux anglophones vivant dans un milieu majoritaire","c":false}],"f":"L'énoncé est FAUX!Malgré la mondialisation des échanges commerciaux en anglais, aucune langue n'est à favoriser pour la prestation des soins de santé. La langue française doit par ailleurs être davantage protégée et promue."},{"i":"06151","c":2,"q":"En ce qui concerne les organismes pharmaceutiques canadiens, quel énoncé parmi les suivants est FAUX?","a":[{"t":"Les membres de l'Association nationale des organismes de réglementation de la pharmacie (ANORP) ont comme principal mandat de protéger et servir l'intérêt public","c":false},{"t":"L'association des facultés de pharmacie (AFPC) est un organisme sans but lucratif qui s'est engagé à faire progresser l'enseignement et la recherche en pharmacie","c":false},{"t":"Les membres de l'Association des facultés de pharmacie du Canada (AFPC) sont les doyens et les professeurs des 18 écoles de pharmacie canadiennes","c":true},{"t":"L'Association nationale des organismes de réglementation de la pharmacie (ANORP) est une alliance des autorités provinciales et territoriales de réglementation de la pharmacie ainsi que des Services pharmaceutiques des Forces canadiennes","c":false}],"f":"L'énoncé est FAUX!Les membres de l'AFPC sont les doyens et les professeurs des DIX écoles de pharmacie canadiennes"},{"i":"06152","c":2,"q":"Les experts se font de plus plus en nombreux en faveur de la modification de la Loi canadienne sur la santé. Parmi les suggestions de modifications, laquelle est FAUSSE?","a":[{"t":"Clarifier les définitions relatives aux services médicaux, aux services hospitaliers et aux services complémentaires de santé","c":false},{"t":"Abolir la condition d'administration publique afin d'élargir la prise par le secteur privé","c":true},{"t":"Préciser la condition de l'intégrité dans la Loi canadienne sur la santé afin de mieux délimiter les services qui doivent être pris en charge par le secteur public","c":false},{"t":"Mieux définir ce que signifie l'expression «médicalement nécessaire»","c":false}],"f":"L'énoncé est FAUX!L'abolition de toute condition sur lesquelles repose l'assurance-santé viendrait miner les plus belles réussites du système de soins de santé au Canada"},{"i":"06153","c":2,"q":"En ce qui concerne les critères d'admissibilité à l'aide médical à mourir, lequel est FAUX?","a":[{"t":"Il faut être âgé d'au moins 18 ans","c":false},{"t":"La mort naturelle doit être raisonnablement prévisible","c":true},{"t":"Les patients qui font la demande d'aide médicale à mourir doivent ressentir des souffrances physiques ou psychologiques insupportables qui ne peuvent être atténuées de façon acceptable","c":false},{"t":"La demande délibérée d'aide médicale à mourir ne doit pas découler de pressions externes","c":false}],"f":"L'énoncé est FAUX!La Loi canadienne en matière d'aide médical à mourir n'exige plus que la mort naturelle soit raisonnablement prévisible"},{"i":"06154","c":2,"q":"La composition du conseil d'administration des centres intégrés de santé et de services sociaux est pré-établie et doit être respectée. En ce qui concerne les membres obligatoires du conseil d'administration, quel énoncé est VRAI?","a":[{"t":"Un médecin omnipraticien, un pharmacien communautaire, un pharmacien d'établissement","c":false},{"t":"Un médecin omnipraticien, un médecin spécialiste, le président-directeur général de l'établissement","c":true},{"t":"Un pharmacien d'établissement, un médecin omnipraticien, un psychologue","c":false},{"t":"Un physiothérapeute, un psychologue, un médecin spécialiste","c":false}],"f":"Bonne réponse![2.5 Identifier les organismes responsables de la mise en application des lois québécoises]"},{"i":"06155","c":2,"q":"Le Commissaire à la santé et au bien-être (CSBE) a pour mission d'éclairer le débat public et la prise de décision gouvernementale pour un système de santé pérenne, agile et performant. Parmi les valeurs sur lesquelles se fonde le CSBE, laquelle est FAUSSE?","a":[{"t":"Transparence","c":false},{"t":"Exclusivité","c":true},{"t":"Équité","c":false},{"t":"Impartialité","c":false}],"f":"L'énoncé est FAUX!On parle plutôt d'inclusivité, ce qui fait référence à la collaboration et à la prise en compte des enjeux de toutes les parties prenantes"},{"i":"06156","c":2,"q":"En vertu de la Loi sur les services de santé et les services sociaux, chaque région doit se doter d'un comité régional sur les services pharmaceutiques. Quelle profession parmi les suivantes NE FAIT PAS partie de ce comité?","a":[{"t":"Pharmaciens communautaires","c":false},{"t":"Pharmaciens propriétaires","c":false},{"t":"Médecins de famille","c":true},{"t":"Pharmaciens d'établissements de santé","c":false}],"f":"L'énoncé est FAUX!Les médecins de famille ne font pas partie des comités régionaux sur les services pharmaceutiques"},{"i":"06157","c":2,"q":"La Politique gouvernementale de prévention de santé (2016) s'articule autour de 4 grandes orientations afin de marquer des progrès en matière de problèmes de santé évitables prioritaires. En ce qui concerne ces 4 grandes orientations, quel énoncé parmi les suivants est FAUX?","a":[{"t":"L'amélioration des conditions de vie qui favorise la santé","c":false},{"t":"Le renforcement de prise en charge de maladies aiguës dans le système de santé de services sociaux","c":true},{"t":"Le développement des capacités des personnes dès leur plus jeune âge","c":false},{"t":"L'aménagement de communautés et de territoires sains et sécuritaires","c":false}],"f":"L'énoncé est FAUX!L'orientation est plutôt le renforcement des actions de PRÉVENTION dans le système de santé et de services sociaux"},{"i":"06158","c":2,"q":"Plusieurs lois canadiennes et québécoises balisent la pratique du pharmacien. Parmi les associations suivantes, laquelle est VRAIE?","a":[{"t":"Loi sur l’assurance-hospitalisation- Santé Canada","c":false},{"t":"Loi sur le régime de rentes du Québec- Ministre du commerce","c":false},{"t":"Loi sur les aliments et drogues- Ministre de la santé et des services sociaux du Québec","c":false},{"t":"Loi sur les brevets- Innovation, sciences et développement économique Canada","c":true}],"f":"Bonne réponse![2.1  Identifier les principales lois canadiennes touchant la santé, la pratique professionnelle ou les activités commerciales pertinentes en pharmacie] et[2.4 Identifier les principales lois québécoises touchant la santé, la pratique professionnelle ou les activités commerciales pertinentes en pharmacie]"},{"i":"06159","c":2,"q":"Plusieurs organismes ou ministères fédéraux et provinciaux sont responsables de la mise en application, respectivement, des lois canadiennes et des lois québécoises. Parmi les associations suivantes, laquelle est FAUSSE?","a":[{"t":"Code criminel- Justice Canada","c":false},{"t":"Loi sur l’accise- Innovation, sciences et développement économique Canada","c":false},{"t":"Code des professions- Emploi et développement social Canada","c":true},{"t":"Loi sur la fête nationale- Ministère du travail, de l'emploi et de la solidarité social","c":false}],"f":"L'énoncé est FAUX!Code des professions- Ministre responsable des lois professionnelles"},{"i":"06160","c":2,"q":"Plusieurs lois québécoises et canadiennes balisent la pratique du pharmacien. Parmi les associations suivantes, laquelle est VRAIE?","a":[{"t":"Loi sur l'assurance-maladie- Encadre la pratique et les règles de la RAMQ où travaillent des pharmaciens","c":false},{"t":"Loi sur l'accès à l'information- Confidentialité pour les pharmaciens exerçant pour le gouvernement fédéral","c":false},{"t":"Loi relative aux aliments du bétail- Aliments médicamentés et additifs","c":true},{"t":"Loi sur la protection des renseignements personnels dans le secteur privé- Dossier santé Québec incluant le domaine médicament","c":false}],"f":"Bonne réponse!\n[2.1 Identifier les principales lois canadiennes touchant la santé, la pratique professionnelle ou les activités commerciales pertinentes en pharmacie]\net\n[2.4 Identifier les principales lois québécoises touchant la santé, la pratique professionnelle ou les activités commerciales pertinentes en pharmacie]"},{"i":"06161","c":2,"q":"La Loi canadienne sur la santé encadre le régime d'assurance-santé du Canada. En ce qui concerne l'application de cette loi, quel énoncé est VRAI?","a":[{"t":"Les provinces doivent respecter au moins 7 des 9 exigences de la Loi canadienne sur la santé afin d'avoir droit à la totalité des contributions fédérales qui leur sont versées","c":false},{"t":"Les deux dispositions de la Loi canadienne sur la santé visent à décourager les provinces d'exiger une contribution financière de la part des patients","c":true},{"t":"Le régime d'assurance-hospitalisation du Canada, de renommée internationale, est tiré de la Loi canadienne sur la santé","c":false},{"t":"La Loi canadienne sur la santé est administrée par Justice Canada, dans le but de pouvoir prodiguer des soins égalitaires à la toute la population, peu importe le revenu","c":false}],"f":"Bonne réponse![2.2 Identifier les organismes responsables de la mise en application des lois canadiennes] et[2.3 Identifier les éléments clés de la Loi canadienne sur la santé]"},{"i":"06162","c":2,"q":"L'Institut national d'excellence en santé et en services sociaux (INESSS) a de nombreuses responsabilités. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Mandater l'INESSS pour assumer l'ensemble des responsabilités relatives à l'utilisation des médicaments dans les situations exceptionnelles constitue l'une des 10 recommandations du Commissaire à la santé et au bien-être pour agir sur les coûts et l'usage au bénéfice du patient et de la pérennité du système","c":false},{"t":"La Loi sur l'Institut national d'excellence en santé et en services sociaux détermine les modalités d'organisation et de gestion de la Régie de l'assurance-maladie du Québec (RAMQ)","c":true},{"t":"L'INESSS est né de la fusion de l'Agence d'évaluation des technologies et des modes d'intervention en santé (AETMIS) et du Conseil du médicament","c":false},{"t":"L'INESSS a publié le Guide sur les niveaux de soins","c":false}],"f":"L'énoncé est FAUX!La Loi sur l'Institut national d'excellence en santé et en services sociaux détermine les modalités d'organisation et de gestion de l'INESSS"},{"i":"06226","c":3,"q":"Le Code civil du Québec énonce les droits de la personne de manière générale, mais plus particulièrement en ce qui concerne le consentement aux soins et le consentement à l’expérimentation. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Celui qui consent à des soins pour autrui ou qui les refuse est tenu d’agir dans le seul intérêt de cette personne","c":false},{"t":"Nul ne peut être soumis sans son consentement à des soins","c":false},{"t":"En cas d’urgence, le consentement aux soins demeure obligatoire","c":true},{"t":"Le mineur de 14 ans et plus peut consentir seul aux soins non requis par l'état de santé","c":false}],"f":"L’énoncé est FAUX!En cas d’urgence, le consentement aux soins médicaux n’est pas nécessaire lorsque la vie de la personne est en danger ou son intégrité menacée"},{"i":"06227","c":3,"q":"Le Canada est reconnu pour sa contribution à la mise en place d'une Charte canadienne des droits et libertés. De plus, les provinces ont aussi le pouvoir d'adopter une charte, comme la Charte québécoise des droits et libertés. En tenant compte de cet encadrement législatif et d'autres lois, indiquez parmi les énoncés suivants, celui qui est FAUX.","a":[{"t":"Au Québec, nous reconnaissons le droit au respect du secret professionnel","c":false},{"t":"En vertu du Code civil du Québec, l'aliénation que fait une personne d'une partie ou de produits de son corps doit être rémunérée à juste valeur selon les modalités en vigueur","c":true},{"t":"Au Canada, nous reconnaissons le droit de l'individu à la vie, à la liberté, à la sécurité de sa personne","c":false},{"t":"En vertu du Code civil du Québec, nul ne peut être soumis sans son consentement à des soins, sauf exceptions prévues par le Code","c":false}],"f":"L'énoncé est FAUX!L'aliénation que fait une personne d'une partie ou de produits de son corps doit être GRATUITE"},{"i":"06228","c":3,"q":"Les programmes d’assurance dans le domaine des services de santé peuvent être publics, privés ou recourir à des modalités mixtes. Parmi les énoncés suivants concernant les assurances, lequel est VRAI?","a":[{"t":"Les programmes publics couvrent l'ensemble des dépenses de santé pour les services couverts","c":false},{"t":"La couverture des régimes privés est similaire d'un régime privé à l'autre","c":false},{"t":"Un régime privé est une assurance collective qui offre une couverture de base pour les médicaments","c":true},{"t":"Les programmes privés sont financés par les impôts","c":false}],"f":"Bonne réponse![3.2 Définir la notion d’assurance publiques et privées]"},{"i":"06229","c":3,"q":"En ce qui concerne le financement des programmes d’assurance, il importe de distinguer le financement de base du financement via la contribution de l’usager. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"Le financement provenant de la contribution de l’usager est directement lié à l’utilisation des biens ou des services couverts","c":false},{"t":"Dans les programmes publics, le financement de base se fait généralement à partir des contributions de l’usager à la suite de l’utilisation du service","c":true},{"t":"Le financement provenant de la contribution des usagers est une somme que l’utilisateur paie lors de l’utilisation du bien ou du service","c":false},{"t":"Le financement de base n’est pas lié à l’utilisation des biens couverts","c":false}],"f":"L’énoncé est FAUX!Dans les programmes publics, le financement de base se fait généralement à partir des fonds publics alimentés par la collecte d’impôts"},{"i":"06230","c":3,"q":"Au Canada, la Loi canadienne sur la santé vise à ce que tous les Canadiens aient accès aux services médicaux et hospitaliers nécessaires. Parmi les énoncés suivants entourant les biens et services assurés au niveau de la santé, lequel est FAUX?","a":[{"t":"Les services de chirurgie dentaire accomplis dans une clinique privée doivent être couverts uniquement s’ils sont médicalement requis","c":true},{"t":"En vertu de la condition sur l’accessibilité, aucune contribution financière directe ne peut être exigée de la personne qui utilise le service","c":false},{"t":"Les médicaments administrés à l’hôpital doivent être couverts même lorsqu’administrés à des patients externes","c":false},{"t":"En vertu de la condition sur la transférabilité, les habitants qui déménagent dans une autre province doivent demeurer couverts","c":false}],"f":"L'énoncé est FAUX!Les services de chirurgie dentaire doivent être couverts uniquement s’ils doivent être rendus à l’hôpital"},{"i":"06231","c":3,"q":"En vertu de la Loi sur l’assurance-maladie, on définit le régime d’assurance-maladie administré par la Régie de l’assurance-maladie du Québec (RAMQ). Parmi les éléments suivants entourant cette loi, lequel est VRAI?","a":[{"t":"L’examen médical en vue d’obtenir un emploi est couvert","c":false},{"t":"Les touristes doivent s’inscrire à la Régie de l’assurance-maladie du Québec (RAMQ)","c":false},{"t":"Les étudiants d’une autre province canadienne sont couverts par le régime d’assurance-maladie du Québec en vertu de la condition sur la transférabilité","c":false},{"t":"En vertu de la Loi sur l’assurance-maladie, le patient a la liberté de choisir le professionnel de son choix","c":true}],"f":"Bonne réponse![3.5 Identifier les principaux éléments des programmes d’assurance-maladie et d’assurance hospitalisation au Québec]"},{"i":"06232","c":3,"q":"En vertu de la Loi sur l’assurance-maladie, le Ministre de la santé et des services sociaux (MSSS) peut conclure avec les organismes représentatifs des professionnels de la santé des ententes permettant la rémunération des professionnels. Parmi les énoncés suivants entourant les trois (3) statuts prévus par la loi, lequel est VRAI?","a":[{"t":"Le pharmacien peut, en tout temps, revendiquer le statut de désengagé","c":false},{"t":"Les professionnels soumis à l'application d'une entente sont toujours rémunérés par la RAMQ","c":false},{"t":"La RAMQ ne peut pas d'elle-même attribuer le statut de non participant à un professionnel","c":false},{"t":"Les professionnels non participants peuvent réclamer les frais de leur choix au patient","c":true}],"f":"Cet énoncé est VRAI!"},{"i":"06233","c":3,"q":"Implanté en 1997, le programme universel d’assurance-médicaments offre une protection de base en ce qui  trait aux coûts des médicaments et de certains services pharmaceutiques. Parmi les affirmations suivantes entourant le régime général d’assurance médicaments (RGAM) québécois, laquelle est VRAIE?","a":[{"t":"Un assureur est une personne morale titulaire d’un permis délivré par le Ministre de la santé et des services sociaux qui l’autorise à pratiquer l’assurance de personnes au Québec","c":false},{"t":"Le RGAM garantit à toute personne admissible le paiement, en tout ou en partie, du coût de services pharmaceutiques et de médicaments qui lui sont fournis au Québec","c":true},{"t":"Le RGAM ne couvre que les médicaments achetés au Canada","c":false},{"t":"La protection prévue par le RGAM est assumée par la Régie de l’assurance médicaments du Québec","c":false}],"f":"Bonne réponse![3.8 Définir le régime général d’assurance médicaments québécois]"},{"i":"06234","c":3,"q":"En vertu de l’article 60 de la Loi sur l’assurance médicaments, on reconnaît le concept de médicament d’exception et de patients d'exceptions. Parmi les éléments suivants entourant ces concepts, lequel est FAUX?","a":[{"t":"Les préparations magistrales sont admissibles à la mesure du patient d'exception","c":false},{"t":"Il est possible de faire des changements de thérapies sans soumettre de multiples demandes d'autorisation à la Régie d'assurance maladie du Québec (RAMQ) puisqu'elle autorise le paiement d'un groupe de médicaments d'exception ayant des indications de paiements communes","c":false},{"t":"Les médicaments prescrits pour le traitement de l’obésité doivent être remboursés lorsqu’ils sont médicalement requis","c":true},{"t":"Les médicaments prescrits à des fins esthétiques ou cosmétiques ne peuvent faire l’objet d’une couverture grâce à la mesure des patients d’exception","c":false}],"f":"L’énoncé est FAUX!Une demande d’autorisation pour le paiement des médicaments prescrits pour le traitement de l’obésité doit être REFUSÉE"},{"i":"06235","c":3,"q":"Parmi les énoncés suivants entourant le financement des régimes d’assurance privés et publics, lequel est VRAI?","a":[{"t":"Les assurés du régime public paient tous une prime annuelle, celle-ci étant fixée à minimalement à 50$, selon le revenu familial net","c":false},{"t":"La contribution mensuelle maximale est le montant maximal que peut être appelée à payer par mois toute personne assurée par le régime privé","c":false},{"t":"De façon générale, les personnes assurées par un régime privé doivent payer une prime; celle-ci peut être prélevée directement de la paie de l’employé","c":true},{"t":"Si un individu était couvert par le régime public pendant une partie de l'année, il doit payer la même prime annuelle que s'il avait été couvert par le régime public pendant toute l'année","c":false}],"f":"Bonne réponse![3.12 Expliquer les mécanismes de financement et les règles relatives à la contribution de l’usager en distinguant les concepts de prime, coassurance et plafond]"},{"i":"06236","c":3,"q":"En ce qui a trait aux mécanismes de détermination des prix des médicaments, lequel des énoncés suivants est FAUX?","a":[{"t":"Le prix de vente garanti (PVG) doit être le même pour les ventes aux pharmaciens et aux grossistes","c":true},{"t":"La marge bénéficiaire du grossiste n’est payable que si le médicament a été effectivement acheté par l’intermédiaire d’un grossiste reconnu","c":false},{"t":"La liste de médicaments indique la méthode d’établissement du prix de chaque médicament fourni dans le cadre des activités d'un établissement","c":false},{"t":"Pour l'application de la méthode du prix le plus bas, certaines formes pharmaceutiques ou teneurs en ingrédients actifs d'un médicament peuvent être regroupées au sein d'une même dénomination commune","c":false}],"f":"L'énoncé est FAUX!Le PVG peut être DIFFÉRENT pour les ventes aux pharmaciens et aux grossistes"},{"i":"06237","c":3,"q":"Parmi les énoncés suivants entourant la détermination du prix de remboursement des médicaments au niveau québécois, lequel est VRAI?","a":[{"t":"La marge bénéficiaire d'un grossiste est illimitée pour tous les médicaments","c":false},{"t":"Le prix de vente garanti (PVG) est le prix que le patient doit payer en tout temps peu importe la pharmacie qu'il visite","c":false},{"t":"La méthode du prix le plus bas est basée sur le prix de vente garanti pour les pharmaciens le moins élevé soumis par un fabricant pour un format donné","c":true},{"t":"Le montant maximum s'applique autant au régime public qu'aux régimes privés d'assurance-médicament","c":false}],"f":"Bonne réponse![3.13 Expliquer les mécanismes de détermination du remboursement du prix des médicaments]"},{"i":"06238","c":3,"q":"En vertu de la Loi sur les syndicats professionnels, on note que les pharmaciens propriétaires du Québec sont représentés par l’Association québécoise des pharmaciens propriétaires (AQPP). Parmi les énoncés suivants entourant les mécanismes de remboursement aux pharmaciens, lequel est VRAI?","a":[{"t":"Une fois validée par le système de communication interactive (CIP), la demande de paiement ne peut faire l’objet d’un autre contrôle","c":false},{"t":"La Régie de l'assurance maladie du Québec (RAMQ) peut demander des renseignements et documents nécessaires à l’analyse des demandes de paiement jusqu’à 36 mois précédant la date de la requête","c":true},{"t":"Pour être remboursé par la Régie de l'assurance maladie du Québec (RAMQ), le pharmacien propriétaire doit obligatoirement être membre de l’AQPP","c":false},{"t":"La Régie de l'assurance maladie du Québec (RAMQ) peut en tout temps refuser un paiement en raison d’un doute quant à la qualité du service clinique rendu","c":false}],"f":"Bonne réponse![3.14 Expliquer les mécanismes de remboursement au pharmacien en énonçant les principales caractéristiques des ententes signées par l’AQPP]"},{"i":"06239","c":3,"q":"La participation au régime général d'assurance médicaments (RGAM) est obligatoire et le type de régime est déterminé par le lien d'emploi et le type de couverture offert dans le cadre de ce lien d'emploi. Parmi les énoncés suivants entourant le RGAM, lequel est FAUX?","a":[{"t":"Les personnes de moins de 65 ans, admissibles à un régime privé, ont l'obligation d'y adhérer","c":false},{"t":"Un régime privé, contrairement au régime public qui est administré par la Régie de l'assurance maladie du Québec (RAMQ), est offert par une compagnie privée","c":false},{"t":"Un régime privé peut refuser de couvrir une personne (pour la portion médicaments) en raison du risque qu'elle présente à cause de son âge, de son sexe ou de son état de santé","c":true},{"t":"Le régime public d'assurance médicaments s'adresse, entre autres, aux prestataires d'une aide financière de dernier recours et aux autres détenteurs d'un carnet de réclamation","c":false}],"f":"L'énoncé est FAUX!Un régime privé NE peut PAS refuser de couvrir une personne (pour la portion médicaments) en raison du risque qu'elle présente à cause de son âge, de son sexe ou de son état de santé"},{"i":"06240","c":3,"q":"En vertu du Règlement sur les avantages autorisés à un pharmacien, on définit les modalités entourant les rabais consentis aux pharmaciens en contrepartie des achats de médicaments par les fabricants de médicaments génériques ou innovateurs. Parmi les énoncés suivants à ce sujet, lequel est FAUX?","a":[{"t":"Les pharmaciens propriétaires doivent tenir à jour un registre de toutes les allocations professionnelles et de tous les autres avantages autorisés ainsi que de tout autre avantage dont il a bénéficié, directement ou indirectement, de la part d'un fabricant","c":false},{"t":"Le pharmacien propriétaire peut recevoir des avantages d'un fabricant de médicaments génériques qui ne sont pas inclus au règlement, en autant qu'il puisse en justifier le besoin et qu'il l'inscrive dans son registre","c":true},{"t":"L'allocation professionnelle peut être utilisée pour le financement d'activités destinées au grand public, qui se déroulent dans la pharmacie, concernant notamment la promotion ou la protection de la santé","c":false},{"t":"L'allocation professionnelle peut être utilisée pour le financement de programmes et d'activités de formation et d'éducation continue","c":false}],"f":"L'énoncé est FAUX!SEULS les avantages inscrits au règlement sont autorisés"},{"i":"06241","c":3,"q":"En vertu de la Loi sur l'assurance hospitalisation et de son règlement d'application, on définit les services assurés. Parmi les énoncés suivants, lequel est VRAI?","a":[{"t":"Les services d'audiologie et d'orthophonie ne sont pas couverts s'ils sont reçus dans un centre hospitalier sans que les bénéficiaires y soient hébergés","c":false},{"t":"L'hébergement en chambre semi-privée non médicalement requis n'est pas un service couvert","c":true},{"t":"L'ablation de dent ou de racine à un bénéficiaire dont l'état de santé nécessite pour ce faire des services hospitaliers n'est pas un service couvert","c":false},{"t":"La stérilisation chirurgicale, dont la ligature des trompes et la vasectomie, n'est pas un service couvert","c":false}],"f":"Bonne réponse![3.5 Identifier les principaux éléments des programmes d'assurance maladie et d'assurance hospitalisation au Québec]"},{"i":"06242","c":3,"q":"Les services de santé non couverts par le régime d'assurance hospitalisation ou le régime d'assurance maladie publics ou qui ne sont pas offerts dans les établissements du réseau public peuvent être couverts par des régimes privés. On parle alors d'assurances complémentaires de santé. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"En général, les séjours en centre hospitalier en chambre privée ou semi-privée sont des services couverts","c":false},{"t":"La nature des services couverts et les modalités varient beaucoup d'un régime complémentaire à l'autre","c":false},{"t":"Les assurances complémentaires ne couvrent généralement pas les services de chiropractie et d'ostéopathie","c":true},{"t":"Les régimes d'assurances complémentaires ne sont pas concernés par la Loi canadienne sur la santé","c":false}],"f":"L'énoncé est FAUX!Les services de chiropractie et d'ostéopathie sont généralement couverts par les assurances complémentaires"},{"i":"06243","c":3,"q":"L'Institut national d'excellence en santé et en services sociaux (INESSS), la Ministère de la santé et des services sociaux (MSSS) et la Régie de l'assurance maladie du Québec (RAMQ) ont chacun des rôles distincts par rapport aux mesures de médicaments et de patients d'exception. Parmi les énoncés suivants, lequel est FAUX?","a":[{"t":"L'INESSS émet des avis au ministre pour l'inscription des médicaments d'exception et détermine les indications de paiement reconnues","c":false},{"t":"Le MSSS établit la liste de médicaments et les fournitures dont le coût est garanti par le régime général d'assurance médicaments (RGAM)","c":false},{"t":"La RAMQ assure le suivi de l'utilisation de la codification et met en place des mesures de redressement avenant une utilisation inadéquate","c":false},{"t":"L'INESSS détermine les conditions pour la couverture, dans des situations exceptionnelles, de médicaments non inscrits sur la liste de médicaments","c":true}],"f":"L'énoncé est FAUX!C'est les MSSS qui détient ce rôle"},{"i":"06244","c":3,"q":"Afin de formuler ses recommandations, l'Institut national d'excellence en santé et en services sociaux s'est doté de 6 critères permettant de prendre en compte l'ensemble des aspects prévus par la Loi sur l'Institut national d'excellence en santé et en services sociaux. Parmi les critères suivants, lequel est FAUX?","a":[{"t":"L'efficience du médicament","c":false},{"t":"La capacité des patients à payer pour le médicament","c":true},{"t":"L'identification du besoin de santé à combler chez les patients visés et l'appréciation de l'importance de ce besoin","c":false},{"t":"La capacité du médicament à procurer un bénéfice clinique","c":false}],"f":"L'énoncé est FAUX!C'est plutôt la capacité organisationnelle du système à offrir le médicament"},{"i":"06245","c":3,"q":"La mesure de patients d'exception vise à permettre, de façon exceptionnelle, le paiement d'un médicament qui n'est pas inscrit à la liste de médicaments ou qui, dans le cas d'un médicament d'exception, est prescrit pour une indication thérapeutique non énoncée à cette liste. Cependant, une demande d'autorisation pour le paiement de certains médicaments doit être refusée. Les énoncés suivants présentent ces médicaments. Lequel est FAUX?","a":[{"t":"Les médicaments prescrits pour le traitement de l'obésité","c":false},{"t":"Les médicaments prescrits pour le traitement de la dysfonction érectile","c":false},{"t":"Les médicaments prescrits pour traiter des personnes atteintes d'hépatite C chronique avec fibrose hépatique modérée à sévère","c":true},{"t":"Les médicaments prescrits pour la cachexie et pour stimuler l'appétit","c":false}],"f":"L'énoncé est FAUX!Ce sont les médicaments prescrits pour traiter des personnes atteintes d'hépatite C chronique SANS fibrose hépatique ou ayant une fibrose hépatique LÉGÈRE dont la demande d'autorisation pour le paiement doit être refusée"},{"i":"06246","c":3,"q":"Si un patient a subi des blessures dans un accident de la route, la Société d'assurance automobile du Québec (SAAQ) peut rembourser certains médicaments. Parmi les énoncés suivants entourant les conditions d'admissibilité, lequel est FAUX?","a":[{"t":"Le patient doit avoir un numéro d'assurance maladie","c":false},{"t":"Le patient doit avoir un dossier d'indemnisation à la SAAQ","c":false},{"t":"À la suite d'une blessure directement liée à l'accident de la route, si un patient satisfait les conditions d'admissibilité, tous les médicaments prescrits pourront être couverts, que ce soit pour le traitement de la blessure en question ou autres conditions de santé","c":true},{"t":"Le médicament prescrit doit faire partie de la liste des médicaments couverts par le régime général d'assurance médicaments (RGAM) de la Régie de l'assurance maladie du Québec (RSMQ)","c":false}],"f":"L'énoncé est FAUX!La SAAQ rembourse SEULEMENT les médicaments qui doivent être prescrits pour le traitement d'une blessure directement liée à l'accident de la route"},{"i":"06247","c":3,"q":"Le programme des services de santé non assurés (SSNA) de Services aux Autochtones Canada offre à ses clients la couverture d'une gamme de prestations de santé, qui comprend notamment les médicaments sur ordonnance et en vente libre. Parmi les critères d'admissibilité au SSNA suivants, lequel est FAUX?","a":[{"t":"Inuit reconnu par l'une des organisations inuites de revendication territoriale","c":false},{"t":"Enfant de moins d'un an, dont le parent est admissible","c":false},{"t":"Indien inscrit aux termes de la Loi sur les Indiens","c":false},{"t":"Si un client est aussi admissible à des services en vertu d'un régime d'assurance privé ou d'un régime d'assurance maladie ou programme social public, il doit d'abord présenter ses demandes de remboursement au Programme des SSNA","c":true}],"f":"L'énoncé est FAUX!Si un client est aussi admissible à des services en vertu d'un régime d'assurance privé ou d'un régime d'assurance maladie ou programme social public, il doit d'abord présenter ses demandes de remboursement à ces régimes AVANT de les présenter au Programme des SSNA"},{"i":"06248","c":3,"q":"Au Québec, la loi oblige à la participation au régime général d’assurance médicaments (RGAM). Parmi les énoncés suivants concernant les différents régimes, soit privés et public, lequel est FAUX?","a":[{"t":"Il n'y a aucune prime à payer au régime public via la déclaration de revenus pour un individu qui a été couvert pendant toute l'année par un régime privé","c":false},{"t":"Un enfant de 16 ans doit obligatoirement être inscrit au régime public d’assurance médicament","c":true},{"t":"Le conjoint d’une personne assurée par un régime d’avantages sociaux privé doit être assuré par ce même régime à moins d’adhérer à un autre régime privé auquel il est lui-même admissible","c":false},{"t":"Un régime privé n'est pas obligé de couvrir tous les employés d'une organisation","c":false}],"f":"L'énoncé est FAUX!Il doit s’inscrire au régime public d’assurance médicaments seulement si ses parents sont eux aussi des assurés au régime public ; dans le cas où l’un de ses parents est assuré à l’aide d’un régime privé, il doit lui aussi être pris en charge par ce même régime"},{"i":"06249","c":3,"q":"Contrairement à l’assurance-maladie, le régime général d’assurance médicaments québécois n’assure pas la gratuité totale des biens et services couverts. Parmi les affirmations suivantes entourant les contributions de l’usager, laquelle est VRAIE?","a":[{"t":"La coassurance ne peut excéder 10% du coût des médicaments acquis pour un patient assuré au régime privé","c":false},{"t":"La franchise est toujours du même montant pour tous les assurés du régime public","c":false},{"t":"Les assurés du régime public déboursent tous un montant annuel minimal de 50$","c":false},{"t":"La contribution annuelle maximale comprend la franchise et la coassurance pour les assurés du régime public","c":true}],"f":"Cet énoncé est VRAI!"},{"i":"06250","c":3,"q":"Il existe plusieurs programmes québécois et canadiens couvrant des médicaments mais qui ne relèvent pas directement de la RAMQ. Parmi les énoncés entourant les programmes particuliers, lequel est FAUX?","a":[{"t":"Le RSSFP est un organisme qui administre le régime de santé des employés de la fonction publique québécoise","c":true},{"t":"La SAAQ est un organisme qui administre le régime public d'assurance automobile au Québec","c":false},{"t":"Le programme fédéral de santé intérimaire permet aux demandeurs d'asile de recevoir des soins de santé essentiels","c":false},{"t":"La CNESST est un organisme qui administre le régime de santé et de sécurité du travail au Québec","c":false}],"f":"L'énoncé est FAUX!Ce régime s'applique aux employés de la fonction publique FÉDÉRALE"},{"i":"06251","c":3,"q":"En vertu de la Loi sur l'assurance médicaments, le gouvernement du Québec a implanté en 1997 un programme universel d'assurance médicaments pour tous les Québécois. Parmi les énoncés suivants entourant le régime général d'assurance médicaments (RGAM), lequel est FAUX?","a":[{"t":"Le RGAM exige des personnes ou des familles qui en bénéficient une participation financière en tenant compte notamment de leur situation économique","c":false},{"t":"Les garanties du RGAM couvrent le service d'exécution d'une ordonnance, mais pas le renouvellement d'une ordonnance","c":true},{"t":"Les garanties du RGAM couvrent les médicaments inscrits à la liste de médicaments dressée par le ministre","c":false},{"t":"Le RGAM garantit à toute personne admissible le paiement du coût de services pharmaceutiques et de médicaments qui lui sont fournis au Québec, sans égard au risque relié à son état de santé","c":false}],"f":"L'énoncé est FAUX!Les garanties du RGAM couvrent le service d'exécution d'une ordonnance ou
