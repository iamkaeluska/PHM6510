  qStart:0, paused:false, timerInterval:null, chapterRevealed:false, shuffledAnswers:{},
  // Rédaction
  redacCurrent:0, redacRevealed:false
};

// ═══════════ PERSISTENCE ═══════════
const LS={
  getSession(){try{return JSON.parse(localStorage.getItem('phm6510_session'))}catch{return null}},
  setSession(s){localStorage.setItem('phm6510_session',JSON.stringify(s))},
  clearSession(){localStorage.removeItem('phm6510_session')},
  getFailed(){try{return JSON.parse(localStorage.getItem('phm6510_failed'))||[]}catch{return[]}},
  setFailed(f){localStorage.setItem('phm6510_failed',JSON.stringify(f))},
  getFailedAnnales(){try{return JSON.parse(localStorage.getItem('phm6510_failed_annales'))||[]}catch{return[]}},
  setFailedAnnales(f){localStorage.setItem('phm6510_failed_annales',JSON.stringify(f))},
  getHistory(){try{return JSON.parse(localStorage.getItem('phm6510_history'))||[]}catch{return[]}},
  setHistory(h){localStorage.setItem('phm6510_history',JSON.stringify(h))},
};

function getAllFailed(){return[...new Set([...LS.getFailed(),...LS.getFailedAnnales()])]}

// ═══════════ UTILS ═══════════
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

// ═══════════ SCREEN NAV ═══════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home')initHome();
  if(id==='screen-stats')renderStats();
}

// ═══════════ HOME ═══════════
function initHome(){
  const totalStudium=QUESTIONS.length;
  const totalAnnales=ANNALES.length;
  const totalRedac=REDACTION.length;
  document.getElementById('home-q-count').textContent=`${totalStudium} StudiUM · ${totalAnnales} Annales · ${totalRedac} Rédaction`;
  document.getElementById('annales-count-desc').textContent=totalAnnales>0?`${totalAnnales} questions — formatives/sommatives`:'Pas encore de données';
  document.getElementById('redac-count-desc').textContent=totalRedac>0?`${totalRedac} questions à développement`:'Pas encore de données';

  const allFailed=getAllFailed();
  const failedBtn=document.getElementById('mode-failed-btn');
  const failedDesc=document.getElementById('failed-count-desc');
  if(allFailed.length===0){failedBtn.classList.add('disabled');failedDesc.textContent='Aucune question dans le dossier'}
  else{failedBtn.classList.remove('disabled');failedDesc.textContent=allFailed.length+' question'+(allFailed.length>1?'s':'')+' dans le dossier'}

  // Disable annales/redaction if no data
  document.querySelector('.mode-btn[data-mode="annales"]').classList.toggle('disabled',ANNALES.length===0);
  document.querySelector('.mode-btn[data-mode="redaction"]').classList.toggle('disabled',REDACTION.length===0);

  renderSizeSelector();
  const saved=LS.getSession();
  if(saved&&saved.active){if(confirm('Session en cours détectée. Reprendre ?')){restoreSession(saved);return}else{LS.clearSession()}}
}

function renderSizeSelector(){
  const sel=document.getElementById('size-selector');
  const sizes=[10,20,30,40,50];
  let pool;
  if(state.mode==='failed'){pool=getAllFailed().length}
  else if(state.mode==='annales'){pool=ANNALES.length}
  else{pool=QUESTIONS.length}

  sel.innerHTML='';
  if(state.mode==='redaction'){sel.style.display='none';return}
  sel.style.display='flex';

  sizes.forEach(n=>{
    const btn=document.createElement('button');
    btn.className='size-btn'+(n===state.size?' selected':'');
    btn.textContent=n;
    if(n>pool){btn.style.opacity='0.3';btn.style.pointerEvents='none'}
    btn.onclick=()=>{state.size=n;sel.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected')};
    sel.appendChild(btn);
  });
  if(state.size>pool){const valid=sizes.filter(n=>n<=pool);state.size=valid.length>0?valid[valid.length-1]:pool;renderSizeSelector()}
}

function selectMode(m){
  state.mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector(`.mode-btn[data-mode="${m}"]`).classList.add('selected');
  renderSizeSelector();
  const btn=document.getElementById('btn-start');
  btn.textContent=m==='redaction'?'Consulter':'Démarrer';
}

// ═══════════ SESSION START ═══════════
function startSession(){
  if(state.mode==='redaction'){startRedaction();return}
  let pool,dataSource;
  if(state.mode==='failed'){
    const failedIds=getAllFailed();
    // Pool from both QUESTIONS and ANNALES
    const fromStudium=QUESTIONS.map((q,i)=>({src:'studium',idx:i})).filter(x=>failedIds.includes(QUESTIONS[x.idx].i));
    const fromAnnales=ANNALES.map((q,i)=>({src:'annales',idx:i})).filter(x=>failedIds.includes(ANNALES[x.idx].i));
    pool=[...fromStudium,...fromAnnales];
  } else if(state.mode==='annales'){
    pool=ANNALES.map((_,i)=>({src:'annales',idx:i}));
  } else {
    pool=QUESTIONS.map((_,i)=>({src:'studium',idx:i}));
  }

  const selected=shuffle(pool).slice(0,state.size);
  state.quiz=selected;
  state.current=0;state.answers={};state.selectedAnswer=null;state.verified=false;
  state.helpUsed=false;state.noteRevealed=false;state.elapsed=0;state.questionTimers={};
  state.qStart=Date.now();state.paused=false;state.chapterRevealed=false;

  state.shuffledAnswers={};
  selected.forEach((qi,idx)=>{
    const q=qi.src==='annales'?ANNALES[qi.idx]:QUESTIONS[qi.idx];
    state.shuffledAnswers[idx]=shuffle(q.a.map((_,ai)=>ai));
  });

  startTimer();saveSession();showScreen('screen-quiz');renderQuiz();
}

function getQ(qi){return qi.src==='annales'?ANNALES[qi.idx]:QUESTIONS[qi.idx]}

function restoreSession(saved){
  state.quiz=saved.quiz;state.current=saved.current;state.answers=saved.answers||{};
  state.elapsed=saved.elapsed||0;state.questionTimers=saved.questionTimers||{};
  state.shuffledAnswers=saved.shuffledAnswers||{};state.mode=saved.mode||'normal';
  state.selectedAnswer=null;state.verified=false;state.helpUsed=false;state.noteRevealed=false;
  state.paused=false;state.chapterRevealed=false;state.qStart=Date.now();
  startTimer();showScreen('screen-quiz');renderQuiz();
}

// ═══════════ TIMER ═══════════
function startTimer(){if(state.timerInterval)clearInterval(state.timerInterval);state.timerInterval=setInterval(()=>{if(!state.paused){state.elapsed++;document.getElementById('quiz-timer-display').textContent=fmtTime(state.elapsed)}},1000)}
function togglePause(){state.paused=!state.paused;document.getElementById('pause-overlay').classList.toggle('active',state.paused);if(state.paused)recordQuestionTime();else state.qStart=Date.now()}
function recordQuestionTime(){if(state.qStart){state.questionTimers[state.current]=(state.questionTimers[state.current]||0)+Math.round((Date.now()-state.qStart)/1000);state.qStart=Date.now()}}
document.addEventListener('visibilitychange',()=>{if(document.getElementById('screen-quiz').classList.contains('active')&&document.hidden&&!state.paused)togglePause()});

// ═══════════ RENDER QUIZ ═══════════
function renderQuiz(){renderNav();renderQuestion();renderFooter();updateScore()}

function renderNav(){
  const nav=document.getElementById('quiz-nav');nav.innerHTML='';
  state.quiz.forEach((_,idx)=>{
    const dot=document.createElement('div');dot.className='nav-dot';
    if(idx===state.current)dot.classList.add('current');
    if(state.answers[idx]==='correct')dot.classList.add('correct');
    else if(state.answers[idx]==='wrong')dot.classList.add('wrong');
    else if(state.answers[idx]==='skipped')dot.classList.add('skipped');
    dot.textContent=idx+1;dot.onclick=()=>navigateTo(idx);nav.appendChild(dot);
  });
  const cur=nav.children[state.current];if(cur)cur.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function renderQuestion(){
  const qi=state.quiz[state.current];const q=getQ(qi);
  const body=document.getElementById('quiz-body');
  const answerOrder=state.shuffledAnswers[state.current]||q.a.map((_,i)=>i);
  const isAnnales=qi.src==='annales';

  let html=`<div class="question-number">Question ${state.current+1} / ${state.quiz.length}${isAnnales?' · Annale':''}</div>
    <div class="question-text">${escHtml(q.q)}</div><div class="answers-list" id="answers-list">`;

  answerOrder.forEach(ai=>{
    const a=q.a[ai];let cls='answer-btn',marker='';
    if(state.verified||state.helpUsed){
      cls+=' disabled';
      if(a.c){cls+=' correct-reveal';marker='<span class="answer-marker" style="background:var(--green);color:#fff">✓</span>'}
      else if(state.selectedAnswer===ai){cls+=' wrong-reveal';marker='<span class="answer-marker" style="background:var(--red);color:#fff">✗</span>'}
    } else if(state.selectedAnswer===ai){cls+=' selected'}
    html+=`<button class="${cls}" onclick="selectAnswer(${ai})">${marker}${escHtml(a.t)}</button>`;
  });
  html+='</div>';

  // Feedback
  if((state.verified||state.helpUsed)&&q.f){html+=`<div class="feedback-box">${escHtml(q.f)}</div>`}

  // Notes (annales only)
  if(isAnnales&&state.noteRevealed){
    const notes=q.a.filter(a=>a.n).map(a=>`${a.c?'✓':'✗'} ${escHtml(a.n)}`).join('<br>');
    if(notes)html+=`<div class="note-box">${notes}</div>`;
  }

  body.innerHTML=html;body.scrollTop=0;
}

function renderFooter(){
  const footer=document.getElementById('quiz-footer');
  const answered=state.answers[state.current]!=null;
  const qi=state.quiz[state.current];
  const isAnnales=qi.src==='annales';
  const hasNotes=isAnnales&&getQ(qi).a.some(a=>a.n);

  if(state.verified||(answered&&!state.helpUsed)){
    footer.innerHTML=`<button class="footer-btn footer-icon-btn" onclick="revealChapter()">📖</button>
      ${hasNotes?'<button class="footer-btn footer-icon-btn note-btn" onclick="revealNote()">📌</button>':''}
      <button class="footer-btn footer-next" onclick="nextQuestion()">Suivante →</button>`;
  } else {
    footer.innerHTML=`<button class="footer-btn footer-icon-btn" onclick="revealChapter()">📖</button>
      <button class="footer-btn footer-icon-btn" onclick="revealHelp()" title="Aide">?</button>
      ${hasNotes?'<button class="footer-btn footer-icon-btn note-btn" onclick="revealNote()">📌</button>':''}
      <button class="footer-btn footer-skip" onclick="skipQuestion()">Passer</button>
      <button class="footer-btn footer-verify" onclick="verifyAnswer()" ${state.selectedAnswer==null?'disabled':''}>Vérifier</button>`;
  }
}

function updateScore(){
  const correct=Object.values(state.answers).filter(v=>v==='correct').length;
  const answered=Object.values(state.answers).filter(v=>v!=='skipped').length;
  document.getElementById('quiz-correct').textContent=correct;
  document.getElementById('quiz-answered').textContent=answered;
}

// ═══════════ QUIZ ACTIONS ═══════════
function selectAnswer(ai){if(state.verified||state.answers[state.current]!=null)return;state.selectedAnswer=ai;renderQuestion();renderFooter()}

function verifyAnswer(){
  if(state.selectedAnswer==null)return;recordQuestionTime();
  const qi=state.quiz[state.current];const q=getQ(qi);
  state.answers[state.current]=q.a[state.selectedAnswer].c?'correct':'wrong';
  state.verified=true;renderQuiz();saveSession();
}

function skipQuestion(){recordQuestionTime();state.answers[state.current]='skipped';state.selectedAnswer=null;state.verified=false;state.helpUsed=false;state.noteRevealed=false;saveSession();advanceQuestion()}
function revealHelp(){state.helpUsed=true;renderQuestion();renderFooter()}
function revealNote(){state.noteRevealed=!state.noteRevealed;renderQuestion()}

function revealChapter(){
  const qi=state.quiz[state.current];const q=getQ(qi);
  const toast=document.createElement('div');toast.className='chapter-toast';toast.textContent='Chapitre '+q.c;
  document.body.appendChild(toast);setTimeout(()=>toast.remove(),3000);
}

function nextQuestion(){recordQuestionTime();state.selectedAnswer=null;state.verified=false;state.helpUsed=false;state.noteRevealed=false;saveSession();advanceQuestion()}

function advanceQuestion(){
  let next=-1;
  for(let i=state.current+1;i<state.quiz.length;i++){if(state.answers[i]==null){next=i;break}}
  if(next===-1){for(let i=0;i<state.quiz.length;i++){if(state.answers[i]==='skipped'){next=i;delete state.answers[i];break}}}
  if(next===-1){const allDone=state.quiz.every((_,i)=>state.answers[i]==='correct'||state.answers[i]==='wrong');if(allDone){finishQuiz();return}
    for(let i=0;i<state.quiz.length;i++){if(state.answers[i]==null){next=i;break}}
    if(next===-1){finishQuiz();return}}
  state.current=next;state.qStart=Date.now();renderQuiz();saveSession();
}

function navigateTo(idx){if(idx===state.current)return;recordQuestionTime();state.current=idx;state.selectedAnswer=null;state.verified=state.answers[idx]==='correct'||state.answers[idx]==='wrong';state.helpUsed=false;state.noteRevealed=false;state.qStart=Date.now();renderQuiz()}
function quitQuiz(){if(state.timerInterval)clearInterval(state.timerInterval);state.paused=false;document.getElementById('pause-overlay').classList.remove('active');LS.clearSession();showScreen('screen-home')}

// ═══════════ FINISH ═══════════
function finishQuiz(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  const results=[];const wrongQs=[];let correct=0;
  state.quiz.forEach((qi,idx)=>{
    const q=getQ(qi);const ans=state.answers[idx];const isCorrect=ans==='correct';if(isCorrect)correct++;
    results.push({id:q.i,correct:isCorrect,time:state.questionTimers[idx]||0,src:qi.src});
    if(!isCorrect)wrongQs.push({q,qi,idx});
  });

  const history=LS.getHistory();
  history.push({date:new Date().toISOString(),mode:state.mode,total:state.quiz.length,correct,duration:state.elapsed,results});
  LS.setHistory(history);

  // Update failed — separate storage
  const failedStudium=new Set(LS.getFailed());
  const failedAnnales=new Set(LS.getFailedAnnales());
  state.quiz.forEach((qi,idx)=>{
    const q=getQ(qi);
    const store=qi.src==='annales'?failedAnnales:failedStudium;
    if(state.answers[idx]==='wrong')store.add(q.i);
    else if(state.answers[idx]==='correct')store.delete(q.i);
  });
  LS.setFailed([...failedStudium]);LS.setFailedAnnales([...failedAnnales]);
  LS.clearSession();renderResults(correct,wrongQs);
}

function renderResults(correct,wrongQs){
  const total=state.quiz.length;const pct=Math.round((correct/total)*100);
  const scoreClass=pct>=75?'score-great':pct>=50?'score-ok':'score-bad';
  const container=document.getElementById('results-content');
  let html=`<div class="results-header"><div class="results-score-circle ${scoreClass}"><span class="big">${pct}%</span><span class="small">${correct}/${total}</span></div>
    <div class="results-meta"><span>⏱ ${fmtTime(state.elapsed)}</span><span>~${Math.round(state.elapsed/total)}s/question</span></div></div>`;

  if(wrongQs.length>0){
    html+=`<div class="results-section"><h3>Questions ratées (${wrongQs.length})</h3>`;
    wrongQs.forEach(({q})=>{
      const correctAns=q.a.find(a=>a.c);
      html+=`<div class="result-card"><div class="rc-q">${escHtml(q.q)}</div><div class="rc-correct">✓ ${escHtml(correctAns?correctAns.t:'')}</div><div class="rc-feedback">${escHtml(q.f||'')}</div></div>`;
    });html+='</div>';
  }

  html+=`<div class="results-actions">${wrongQs.length>0?`<button class="btn-primary" onclick="replayWrong()">🔁 Rejouer les ratées (${wrongQs.length})</button>`:''}<button class="btn-secondary" onclick="showScreen('screen-home')">Retour à l'accueil</button></div>`;
  container.innerHTML=html;showScreen('screen-results');
}

function replayWrong(){state.mode='failed';const f=getAllFailed();state.size=Math.min(f.length,50);startSession()}

// ═══════════ RÉDACTION ═══════════
function startRedaction(){state.redacCurrent=0;state.redacRevealed=false;showScreen('screen-redaction');renderRedaction()}

function renderRedaction(){
  if(REDACTION.length===0)return;
  const q=REDACTION[state.redacCurrent];
  document.getElementById('redac-counter').textContent=`${state.redacCurrent+1} / ${REDACTION.length} · Ch. ${q.c}`;
  const body=document.getElementById('redac-body');
  let html=`<div class="redac-question">${escHtml(q.q)}</div>`;
  if(state.redacRevealed){html+=`<div class="redac-answer">${escHtml(q.r)}</div>`}
  else{html+=`<button class="redac-reveal-btn" onclick="revealRedacAnswer()">Voir la réponse</button>`}
  body.innerHTML=html;body.scrollTop=0;

  const footer=document.getElementById('redac-footer');
  footer.innerHTML=`<button class="redac-nav-btn prev" onclick="redacNav(-1)" ${state.redacCurrent===0?'disabled':''}>← Précédente</button>
    <button class="redac-nav-btn next" onclick="redacNav(1)" ${state.redacCurrent>=REDACTION.length-1?'disabled':''}>Suivante →</button>`;
}

function revealRedacAnswer(){state.redacRevealed=true;renderRedaction()}
function redacNav(dir){state.redacCurrent+=dir;state.redacRevealed=false;renderRedaction()}

// ═══════════ STATS ═══════════
function renderStats(){
  const history=LS.getHistory();const allFailed=getAllFailed();const container=document.getElementById('stats-content');
  const sessions=history.length;
  const avgScore=sessions>0?Math.round(history.reduce((s,h)=>s+(h.correct/h.total)*100,0)/sessions):0;
  const avgTime=sessions>0?Math.round(history.reduce((s,h)=>s+h.duration,0)/sessions):0;

  const chStats={};Object.keys(CH_TITLES).forEach(ch=>{chStats[ch]={seen:0,correct:0}});
  const qFails={},qAttempts={},qTimes={},qTimeCount={};
  const allQ=[...QUESTIONS,...ANNALES];

  history.forEach(h=>{h.results.forEach(r=>{
    const q=allQ.find(q=>q.i===r.id);if(q){chStats[q.c]=chStats[q.c]||{seen:0,correct:0};chStats[q.c].seen++;if(r.correct)chStats[q.c].correct++}
    qAttempts[r.id]=(qAttempts[r.id]||0)+1;if(!r.correct)qFails[r.id]=(qFails[r.id]||0)+1;
    if(r.time>0){qTimes[r.id]=(qTimes[r.id]||0)+r.time;qTimeCount[r.id]=(qTimeCount[r.id]||0)+1}
  })});

  const topFailed=Object.entries(qFails).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topSlow=Object.entries(qTimes).map(([id,t])=>[id,Math.round(t/(qTimeCount[id]||1))]).sort((a,b)=>b[1]-a[1]).slice(0,10);

  let html=`<button class="stats-back" onclick="showScreen('screen-home')">← Accueil</button><h2>Mes Stats</h2>
    <div class="stat-grid"><div class="stat-card"><div class="sv">${sessions}</div><div class="sl">Sessions</div></div>
    <div class="stat-card"><div class="sv">${avgScore}%</div><div class="sl">Score moy.</div></div>
    <div class="stat-card"><div class="sv">${fmtTime(avgTime)}</div><div class="sl">Temps moy.</div></div></div>
    <div class="results-section"><h3>Par chapitre</h3><div class="chapter-stats">`;

  Object.keys(CH_TITLES).sort((a,b)=>Number(a)-Number(b)).forEach(ch=>{
    const s=chStats[ch]||{seen:0,correct:0};const pct=s.seen>0?Math.round((s.correct/s.seen)*100):0;
    html+=`<div class="ch-stat-row"><span class="ch-label">Ch. ${ch}</span><div class="ch-bar-bg"><div class="ch-bar-fill" style="width:${pct}%"></div></div><span class="ch-pct">${s.seen>0?pct+'%':'—'}</span></div>`;
  });
  html+='</div></div>';

  if(topFailed.length>0){
    html+='<div class="results-section"><h3>Questions les plus ratées</h3>';
    topFailed.forEach(([id,fails])=>{const q=allQ.find(q=>q.i===id);if(!q)return;
      html+=`<div class="top-list-item"><div class="tl-q">${escHtml(q.q.substring(0,120))}${q.q.length>120?'…':''}</div><div class="tl-meta">${fails} échec(s) / ${qAttempts[id]} tentative(s)</div></div>`;
    });html+='</div>';
  }

  if(topSlow.length>0){
    html+='<div class="results-section"><h3>Questions les plus longues</h3>';
    topSlow.forEach(([id,avg])=>{const q=allQ.find(q=>q.i===id);if(!q)return;
      html+=`<div class="top-list-item"><div class="tl-q">${escHtml(q.q.substring(0,120))}${q.q.length>120?'…':''}</div><div class="tl-meta">~${avg}s en moyenne</div></div>`;
    });html+='</div>';
  }

  html+=`<div class="results-section"><h3>Dossier questions ratées</h3><p style="font-size:14px;color:var(--text2)">${allFailed.length} question${allFailed.length>1?'s':''} en attente</p></div>
    <div class="stats-actions"><button class="btn-secondary" onclick="exportStats()">📥 Exporter</button>
    <button class="danger-btn" onclick="showConfirm('Réinitialiser tout l\\'historique et les stats ?',resetAll)">Réinitialiser</button></div>`;
  container.innerHTML=html;
}

function exportStats(){const d={history:LS.getHistory(),failed:LS.getFailed(),failed_annales:LS.getFailedAnnales(),exportDate:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='phm6510_stats.json';a.click();URL.revokeObjectURL(u)}
function resetAll(){LS.clearSession();LS.setFailed([]);LS.setFailedAnnales([]);LS.setHistory([]);closeConfirm();renderStats()}

// ═══════════ SESSION SAVE ═══════════
function saveSession(){LS.setSession({active:true,mode:state.mode,quiz:state.quiz,current:state.current,answers:state.answers,elapsed:state.elapsed,questionTimers:state.questionTimers,shuffledAnswers:state.shuffledAnswers})}

// ═══════════ CONFIRM ═══════════
let confirmCallback=null;
function showConfirm(text,cb){document.getElementById('confirm-text').textContent=text;confirmCallback=cb;document.getElementById('confirm-overlay').classList.add('active');document.getElementById('confirm-action').onclick=()=>{if(confirmCallback)confirmCallback()}}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('active');confirmCallback=null}

// ═══════════ INIT ═══════════
initHome();
</script>
